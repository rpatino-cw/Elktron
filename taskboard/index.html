<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elktron — Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&family=Inconsolata:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Taskboard-specific aliases (map to design-system tokens) */
      --bg: var(--bg-primary);
      --bg-white: var(--bg-surface);
      --bg-tint: var(--bg-elevated);
      --bg-active: #e8ebf5;
      --text: var(--text-primary);
      --text-2: var(--text-secondary);
      --text-3: var(--text-tertiary);
      --text-4: #b8bdd4;
      --accent: #2741E7;
      --accent-h: #4260f5;
      --accent-soft: rgba(39,65,231,0.07);
      --accent-mid: rgba(39,65,231,0.14);
      --green: #00c875;
      --green-soft: rgba(0,200,117,0.10);
      --green-bg: #00c875; /* legacy alias */
      --yellow: #fdab3d;
      --yellow-soft: rgba(253,171,61,0.10);
      --orange: #ff642e;
      --orange-soft: rgba(255,100,46,0.10);
      --red: #e2445c;
      --red-soft: rgba(226,68,92,0.10);
      --purple: #a25ddc;
      --purple-soft: rgba(162,93,220,0.10);
      --blue: #579bfc;
      --blue-soft: rgba(87,155,252,0.10);
      --teal: #0891b2;
      --border: var(--border-default);
      --border-2: var(--border-strong);
      --shadow-drag: 0 20px 60px rgba(39,65,231,0.18);
      --font: var(--font-sans);
      --mono: var(--font-mono);
      --ease: var(--ease-out);
      --ease-out-quart: var(--ease-in-out);
      --radius: var(--radius-sm);
      --radius-lg: var(--radius-md);
    }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    ::selection { background: var(--accent-soft); color: var(--accent); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      height: 52px; display: flex; align-items: center;
      padding: 0 24px; gap: 16px;
      background: var(--bg-white);
      color: var(--text);
      border-bottom: 1px solid var(--border);
      animation: topbarIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes topbarIn {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: none; }
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .topbar-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(0,200,117,0.4);
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 8px rgba(0,200,117,0.4); }
      50% { box-shadow: 0 0 16px rgba(0,200,117,0.6); }
    }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-tab {
      font-size: 12px; font-weight: 600; padding: 6px 12px;
      border-radius: 6px; cursor: pointer;
      color: var(--text-3);
      transition: all 0.15s var(--ease);
      border: none; background: none;
    }
    .topbar-tab:hover { color: var(--text); background: var(--bg-hover); }
    .topbar-tab.active { color: var(--accent); background: var(--accent-soft); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-countdown {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.02em;
    }

    /* ─── APP SHELL ─── */
    .app { display: flex; min-height: calc(100vh - 52px); }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 240px; min-width: 240px;
      background: var(--bg-white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 16px 0;
    }
    .sidebar-section { padding: 0 12px; margin-bottom: 16px; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-3);
      padding: 0 8px; margin-bottom: 8px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--text-2);
      cursor: pointer; transition: all 0.12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
    .sidebar-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto; font-size: 11px; font-weight: 700;
      background: var(--bg-tint); color: var(--text-3);
      padding: 1px 6px; border-radius: 100px;
    }
    .sidebar-item.active .sidebar-badge { background: var(--accent-mid); color: var(--accent); }

    /* Team members in sidebar */
    .sidebar-member {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      cursor: pointer; transition: all 0.12s;
      border: 2px solid transparent;
    }
    .sidebar-member:hover { background: var(--bg-hover); }
    .sidebar-member.active { background: var(--accent-soft); border-color: var(--accent-mid); }
    .sidebar-member.drop-target { border-color: var(--accent); background: var(--accent-soft); }
    .member-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: white; flex-shrink: 0;
    }
    .member-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
    .member-count {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      color: var(--text-3);
    }

    /* ─── MAIN ─── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* ─── PROGRESS HEADER ─── */
    .progress-header {
      padding: 20px 28px 0;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
    }
    .progress-title {
      font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .progress-metrics {
      display: flex; gap: 0; margin-bottom: 0;
    }
    .metric-block {
      flex: 1; padding: 14px 20px;
      border-right: 1px solid var(--border);
      position: relative; cursor: default;
    }
    .metric-block:last-child { border-right: none; }
    .metric-block::before {
      content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
      width: 3px; border-radius: 2px;
    }
    .metric-block.m-todo::before { background: var(--border-2); }
    .metric-block.m-progress::before { background: var(--blue); }
    .metric-block.m-review::before { background: var(--yellow); }
    .metric-block.m-done::before { background: var(--green); }
    .metric-block.m-blocked::before { background: var(--red); }
    .metric-val {
      font-family: var(--mono); font-size: 26px; font-weight: 700;
      line-height: 1; letter-spacing: -0.02em;
    }
    .metric-label {
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;
    }

    /* Master progress bar */
    .master-bar {
      height: 6px; display: flex; gap: 2px;
      border-radius: 3px; overflow: hidden;
      margin-top: 16px;
    }
    .master-bar-seg { height: 100%; transition: flex 0.5s var(--ease); border-radius: 3px; }
    .master-bar-seg.s-done { background: var(--green); }
    .master-bar-seg.s-progress { background: var(--blue); }
    .master-bar-seg.s-review { background: var(--yellow); }
    .master-bar-seg.s-blocked { background: var(--red); }
    .master-bar-seg.s-todo { background: var(--border-2); }

    /* Sub-tabs */
    .sub-tabs {
      display: flex; gap: 0; margin-top: 12px;
    }
    .sub-tab {
      padding: 10px 16px; font-size: 12px; font-weight: 600;
      color: var(--text-3); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s; background: none; border-top: none;
      border-left: none; border-right: none; font-family: var(--font);
    }
    .sub-tab:hover { color: var(--text); }
    .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 52px; z-index: 50;
    }
    .toolbar-search {
      flex: 1; max-width: 320px; padding: 7px 12px 7px 32px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-tint) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239098b1' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E") no-repeat 10px center;
      color: var(--text); outline: none;
      transition: all 0.15s;
    }
    .toolbar-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background-color: var(--bg-white); }
    .toolbar-search::placeholder { color: var(--text-4); }
    .pill-filter {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg-white);
      color: var(--text-2); font-family: var(--font);
      transition: all 0.15s;
    }
    .pill-filter:hover { border-color: var(--border-2); background: var(--bg-tint); }
    .pill-filter.active { background: var(--accent); color: white; border-color: var(--accent); }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ─── QUEUE VIEW ─── */
    .queue { padding: 0 28px 80px; }

    /* Phase group */
    .phase-group { margin-top: 20px; }
    .phase-group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; cursor: pointer;
      user-select: none;
    }
    .phase-group-header:hover .phase-group-name { color: var(--accent); }
    .phase-chevron {
      width: 16px; height: 16px; color: var(--text-3);
      transition: transform 0.2s var(--ease);
    }
    .phase-group.collapsed .phase-chevron { transform: rotate(-90deg); }
    .phase-group-color {
      width: 14px; height: 14px; border-radius: 4px;
      flex-shrink: 0;
    }
    .phase-group-desc {
      font-size: 12px; color: var(--text-2); font-weight: 400;
      padding: 4px 0 8px 28px; line-height: 1.5;
    }
    .phase-group.collapsed .phase-group-desc { display: none; }
    .phase-group-name {
      font-size: 14px; font-weight: 700;
      transition: color 0.15s;
    }
    .phase-group-count {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--text-3); margin-left: 4px;
    }
    .phase-group-bar {
      width: 80px; height: 4px; border-radius: 2px;
      background: var(--border); overflow: hidden; margin-left: 8px;
    }
    .phase-group-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s var(--ease); }

    /* Ticket table */
    .ticket-table {
      width: 100%; border-collapse: collapse;
      margin-top: 4px;
    }
    .phase-group.collapsed .ticket-table { display: none; }
    .ticket-table th {
      position: sticky; top: 116px; z-index: 10;
      text-align: left; padding: 6px 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-4); background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .ticket-table th:first-child { padding-left: 0; width: 32px; }

    /* Ticket rows */
    .ticket-row {
      transition: background 0.1s;
      cursor: grab; user-select: none;
      animation: rowIn 0.25s var(--ease) both;
    }
    .ticket-row:active { cursor: grabbing; }
    .ticket-row.dragging { opacity: 0.3; }
    .ticket-row.drag-above { box-shadow: inset 0 2px 0 var(--accent); }
    .ticket-row td {
      padding: 8px 10px; font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      white-space: nowrap;
    }
    .ticket-row td:first-child { padding-left: 0; width: 32px; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: none; }
    }

    /* Checkbox */
    .t-check {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
      flex-shrink: 0;
    }
    .t-check:hover { border-color: var(--accent); background: var(--accent-soft); }
    .t-check.checked { background: var(--green); border-color: var(--green); }
    .t-check svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity 0.1s; }
    .t-check.checked svg { opacity: 1; }

    /* Ticket ID */
    .t-id {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--text-3); min-width: 50px;
    }

    /* Ticket title */
    .t-title {
      font-weight: 500; color: var(--text);
      max-width: 400px; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: color 0.15s;
    }
    .t-title:hover { color: var(--accent); }
    .ticket-row.done-row .t-title { text-decoration: line-through; color: var(--text-3); }

    /* Status badge — Monday.com style */
    .t-status {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
      color: white; min-width: 80px; justify-content: center;
      cursor: pointer; transition: all 0.15s;
      border: none; font-family: var(--font);
    }
    .t-status:hover { filter: brightness(1.1); transform: scale(1.03); }
    .t-status.s-todo { background: var(--border-2); color: var(--text-2); }
    .t-status.s-progress { background: var(--blue); }
    .t-status.s-review { background: var(--yellow); color: var(--text); }
    .t-status.s-done { background: var(--green); }
    .t-status.s-blocked { background: var(--red); }

    /* Priority */
    .t-priority {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 600;
    }
    .t-priority.p-critical { color: var(--red); }
    .t-priority.p-high { color: var(--orange); }
    .t-priority.p-medium { color: var(--yellow); }
    .t-priority.p-low { color: var(--text-3); }
    .priority-bars { display: flex; gap: 1px; align-items: flex-end; }
    .priority-bar { width: 3px; border-radius: 1px; background: currentColor; }

    /* Assignee */
    .t-assignee {
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .t-assignee-dot {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: white;
    }
    .t-assignee-name { font-size: 12px; font-weight: 500; color: var(--text-2); }
    .t-assignee-empty {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px dashed var(--border-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-4); cursor: pointer;
      transition: all 0.15s;
    }
    .t-assignee-empty:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    /* Phase tag */
    .t-phase {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 4px; background: var(--bg-tint); color: var(--text-3);
    }

    /* Due */
    .t-due {
      font-size: 11px; font-weight: 500; color: var(--text-3);
      font-family: var(--mono);
    }
    .t-due.overdue { color: var(--red); font-weight: 600; }
    .t-due.soon { color: var(--orange); font-weight: 600; }

    /* ─── KANBAN VIEW ─── */
    .kanban {
      display: flex; gap: 16px;
      padding: 20px 28px 80px;
      overflow-x: auto; min-height: 400px;
      align-items: flex-start;
    }
    .kanban-col {
      min-width: 280px; width: 280px;
      background: var(--bg-tint);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column;
      max-height: calc(100vh - 260px);
    }
    .kanban-col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 14px 10px;
      position: sticky; top: 0;
    }
    .kanban-col-dot { width: 10px; height: 10px; border-radius: 50%; }
    .kanban-col-name { font-size: 13px; font-weight: 700; }
    .kanban-col-count {
      font-size: 11px; font-weight: 600;
      color: var(--text-3); margin-left: auto;
      background: var(--bg-white); padding: 1px 7px; border-radius: 100px;
    }
    .kanban-col-body {
      flex: 1; overflow-y: auto; padding: 0 8px 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .kanban-col-body.drag-over { background: rgba(39,65,231,0.04); border-radius: 0 0 12px 12px; }

    .kanban-card {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      cursor: grab; transition: all 0.15s;
      animation: cardIn 0.2s var(--ease) both;
    }
    .kanban-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .kanban-card:active { cursor: grabbing; box-shadow: var(--shadow-drag); transform: scale(1.02); }
    .kanban-card.dragging { opacity: 0.3; }
    .kanban-card-id { font-family: var(--mono); font-size: 10px; color: var(--text-3); font-weight: 600; }
    .kanban-card-title { font-size: 12px; font-weight: 600; margin: 4px 0 6px; line-height: 1.4; cursor: pointer; }
    .kanban-card-title:hover { color: var(--accent); }
    .kanban-card-footer { display: flex; align-items: center; gap: 6px; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }

    /* ─── ASSIGNEE DROPDOWN ─── */
    .assign-dropdown {
      position: fixed; z-index: 999;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 4px; min-width: 180px;
      animation: dropIn 0.15s var(--ease);
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-4px) scale(0.97); }
      to { opacity: 1; transform: none; }
    }
    .assign-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 5px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background 0.1s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: var(--font); color: var(--text);
    }
    .assign-option:hover { background: var(--bg-hover); }
    .assign-option-dot {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800; color: white;
    }

    /* ─── STATUS DROPDOWN ─── */
    .status-dropdown {
      position: fixed; z-index: 999;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 4px; min-width: 140px;
      animation: dropIn 0.15s var(--ease);
    }
    .status-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.1s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: var(--font); color: var(--text);
    }
    .status-option:hover { background: var(--bg-hover); }
    .status-option-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ─── TOASTS ─── */
    .toast-tray {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%); z-index: 9999;
      display: flex; flex-direction: column-reverse; gap: 6px;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius);
      background: var(--bg-white); color: var(--text);
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      animation: toastSlide 0.3s var(--ease-out-quart), toastFade 0.3s 2.2s forwards;
      pointer-events: auto; white-space: nowrap;
    }
    .toast-icon { font-size: 14px; }
    @keyframes toastSlide { from { opacity: 0; transform: translateY(12px) scale(0.95); } }
    @keyframes toastFade { to { opacity: 0; transform: translateY(-4px); } }

    /* ─── TICKET DRAWER (Jira-style) ─── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(26,29,46,0.3);
      backdrop-filter: blur(2px);
      animation: overlayIn 0.2s;
      cursor: pointer;
    }
    @keyframes overlayIn { from { opacity: 0; } }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 560px; max-width: 90vw; z-index: 600;
      background: var(--bg-white);
      box-shadow: -8px 0 40px rgba(26,29,46,0.12);
      display: flex; flex-direction: column;
      animation: drawerSlide 0.25s var(--ease);
      cursor: default;
    }
    @keyframes drawerSlide { from { transform: translateX(100%); } }

    .drawer-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-id {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      color: var(--accent);
    }
    .drawer-phase-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; color: white;
    }
    .drawer-close {
      margin-left: auto; width: 28px; height: 28px;
      border-radius: 6px; border: none; background: var(--bg-tint);
      color: var(--text-3); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .drawer-close:hover { background: var(--bg-hover); color: var(--text); }

    .drawer-body {
      flex: 1; overflow-y: auto; padding: 20px;
    }

    .drawer-title {
      font-size: 18px; font-weight: 700; line-height: 1.4;
      margin-bottom: 16px; letter-spacing: -0.01em;
    }

    .drawer-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .drawer-meta-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-4); margin-bottom: 4px;
    }
    .drawer-meta-value {
      font-size: 13px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }

    .drawer-section {
      margin-bottom: 20px;
    }
    .drawer-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-3);
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .drawer-desc {
      font-size: 13px; line-height: 1.7; color: var(--text-2);
    }
    .drawer-desc strong { color: var(--text); }
    .drawer-desc code {
      font-family: var(--mono); font-size: 12px;
      background: var(--bg-tint); padding: 1px 5px; border-radius: 3px;
    }

    /* Checklist inside drawer */
    .drawer-checklist { list-style: none; padding: 0; }
    .drawer-checklist li {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 0; font-size: 12px; color: var(--text-2);
      border-bottom: 1px solid var(--border);
    }
    .drawer-checklist li:last-child { border-bottom: none; }
    .drawer-check-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border-2); border-radius: 3px;
      margin-top: 1px;
    }

    /* Links inside drawer */
    .drawer-links { list-style: none; padding: 0; }
    .drawer-links li { margin-bottom: 6px; }
    .drawer-links a {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
      color: var(--accent); text-decoration: none;
      transition: color 0.15s;
    }
    .drawer-links a:hover { color: var(--accent-h); text-decoration: underline; }

      content: ''; width: 12px; height: 12px;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%232741E7' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3'/%3E%3C/svg%3E") no-repeat center;
      flex-shrink: 0;
    }

    /* Notes/comments */
    .drawer-note {
      padding: 8px 10px; margin-bottom: 6px;
      background: var(--bg-tint); border-radius: 6px;
      font-size: 12px; line-height: 1.6; color: var(--text-2);
    }
    .drawer-note strong { color: var(--text); }
    .drawer-note code {
      font-family: var(--mono); font-size: 11px;
      background: var(--bg-white); padding: 0 4px; border-radius: 2px;

    /* Dependencies */
    .drawer-deps { display: flex; gap: 6px; flex-wrap: wrap; }
    .drawer-dep {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 100px;
      background: var(--bg-tint); color: var(--text-3);
      cursor: pointer; transition: all 0.15s;
    }
    .drawer-dep:hover { background: var(--accent-soft); color: var(--accent); }

    /* ─── FOCUS ─── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .topbar-tab:focus-visible, .pill-filter:focus-visible, .sidebar-item:focus-visible {
      outline-offset: -2px;
    }
    .t-status:focus-visible { outline-offset: 0; }

    /* ─── ENHANCED HOVER ─── */
    .ticket-row:hover {
      background: var(--bg-hover);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .ticket-row:hover .t-id { color: var(--accent); }

    /* ─── DRAWER STAGGER ─── */
    .drawer-body .drawer-section {
      animation: sectionIn 0.3s var(--ease) both;
    }
    .drawer-body .drawer-section:nth-child(2) { animation-delay: 0.04s; }
    .drawer-body .drawer-section:nth-child(3) { animation-delay: 0.08s; }
    .drawer-body .drawer-section:nth-child(4) { animation-delay: 0.12s; }
    .drawer-body .drawer-section:nth-child(5) { animation-delay: 0.16s; }
    .drawer-body .drawer-section:nth-child(6) { animation-delay: 0.20s; }
    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .drawer-meta-grid {
      animation: sectionIn 0.25s var(--ease) 0.05s both;
    }

    /* ─── VIEW TRANSITION ─── */
    .queue, .kanban {
      animation: viewFade 0.2s var(--ease);
    }
    @keyframes viewFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .phase-group-bar-fill[style*="width:100%"] {
      animation: completePulse 2s ease-in-out infinite;
    }
    @keyframes completePulse {
      0%, 100% { opacity: 1; }

    .sidebar {
      animation: sidebarIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }
    @keyframes sidebarIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: none; }
    }
    .sidebar-item, .sidebar-member {
      animation: itemSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .sidebar-item:nth-child(1) { animation-delay: 0.15s; }
    .sidebar-item:nth-child(2) { animation-delay: 0.2s; }
    .sidebar-item:nth-child(3) { animation-delay: 0.25s; }
    .sidebar-item:nth-child(4) { animation-delay: 0.3s; }
    @keyframes itemSlideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: none; }
    }
    .progress-header {
      animation: progressIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }
    @keyframes progressIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: none; }
    }
    .metric-block {
      animation: metricPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .metric-block:nth-child(1) { animation-delay: 0.2s; }
    .metric-block:nth-child(2) { animation-delay: 0.28s; }
    .metric-block:nth-child(3) { animation-delay: 0.36s; }
    .metric-block:nth-child(4) { animation-delay: 0.44s; }
    .metric-block:nth-child(5) { animation-delay: 0.52s; }
    @keyframes metricPop {
      from { opacity: 0; transform: scale(0.9) translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    .master-bar {
      animation: barGrow 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }
    @keyframes barGrow {
      from { opacity: 0; transform: scaleX(0); transform-origin: left; }
      to { opacity: 1; transform: scaleX(1); }
    }
    .toolbar {
      animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    .phase-group {
      animation: phaseReveal 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes phaseReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ─── BRIEFING VIEW ─── */
    .briefing-view { padding: 28px; max-width: 960px; }

      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;

    }
    .briefing-section-title svg { width: 16px; height: 16px; }
    .briefing-section-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    .briefing-task-row {
      display: flex; align-items: center; gap: 10px;

// ─── STATE ───────────────────────────────────────────────────────────

const STORAGE = 'elktron-mc-v2';
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE)) || {}; } catch(e) { return {}; } }
function saveState() { localStorage.setItem(STORAGE, JSON.stringify(state)); }

let state = { statuses: {}, owners: {}, ...loadState() };
let currentView = 'queue';
let currentFilter = 'all';
let filterMember = null;
let filterPhase = null;
let filterStatus = null;
let searchQuery = '';
let openDropdown = null;

// Apply saved state
TASKS.forEach(t => {
  if (state.owners[t.id] !== undefined) t.owner = state.owners[t.id];
});

function getStatus(id) { const task = TASKS.find(t => t.id === id); return state.statuses[id] || (task && task.status) || 'todo'; }
function setStatus(id, s) { state.statuses[id] = s; saveState(); }
function setOwner(id, o) { state.owners[id] = o; const t = TASKS.find(x => x.id === id); if(t) t.owner = o; saveState(); }

function getMember(id) { return TEAM.find(m => m.id === id); }
function getInitials(name) { return name.split(' ').map(w => w[0]).join(''); }
