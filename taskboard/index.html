  'FC-043': { desc: 'Enable the camera interface in raspi-config. Run: sudo raspi-config → Interface Options → Camera → Enable.', notes: ['On Pi 5 with Bookworm, the camera should be enabled by default via libcamera. But verify with: libcamera-hello --list-cameras'] },
  'FC-044': { desc: 'Enable I2C for the pan-tilt servo controller. Run: sudo raspi-config → Interface Options → I2C → Enable. Then verify with: ls /dev/i2c-*', notes: ['The Arducam/Freenove servo controller uses I2C to receive pan/tilt commands. Without I2C enabled, servos won\'t respond.'] },
  'FC-045': { desc: 'Install system-level dependencies needed by OpenCV, libcamera, and YOLOv8n. These are C libraries that pip packages build against.', checks: ['sudo apt install python3-opencv', 'sudo apt install python3-picamera2', 'sudo apt install libatlas-base-dev', 'sudo apt install libcap-dev'], notes: ['libatlas is needed by numpy/ultralytics. libcap-dev is needed by picamera2.'] },
  'FC-046': { desc: 'Create a Python virtual environment for the escort bot: python3 -m venv ~/escort-env. Activate with: source ~/escort-env/bin/activate', notes: ['Always work inside the venv. System Python packages and venv packages don\'t mix well.'] },
  'FC-047': { desc: 'Install Python requirements: pip install -r requirements.txt. This includes numpy, opencv-python-headless, gpiozero, and other deps.', checks: ['pip install --upgrade pip', 'pip install -r requirements.txt', 'Verify: python3 -c "import cv2; print(cv2.__version__)"'], notes: ['If opencv fails, use the system package instead: sudo apt install python3-opencv and create venv with --system-site-packages.'] },
  'FC-048': { desc: 'Install Ultralytics YOLOv8n for Pi 5 (aarch64). This is the inference engine for person detection.', checks: ['pip install ultralytics', 'Verify: python3 -c "from ultralytics import YOLO; print(YOLO)"'], links: [['Ultralytics YOLOv8 Docs', 'https://docs.ultralytics.com/']], notes: ['For Pi 5 (aarch64 Bookworm): pip install ultralytics. Model auto-downloads on first run.'] },
  'FC-049': { desc: 'Download the YOLOv8n model for person detection. The install.sh script handles this, or it auto-downloads on first run.', checks: ['Run: bash install.sh (if available)', 'Verify model file: yolov8n.pt exists', 'Verify: python3 -c "from ultralytics import YOLO; YOLO(\'yolov8n.pt\')"'], notes: ['Model: yolov8n.pt. Size: ~6MB. Detects 80 COCO classes including "person" (class 0).'] },
  'FC-050': { desc: 'Final import check — verify ALL Python packages load without error in one script.', checks: ['import cv2', 'import numpy', 'from gpiozero import Robot, DistanceSensor', 'from ultralytics import YOLO', 'from picamera2 import Picamera2'], notes: ['If any import fails, fix it NOW before moving to software integration. Don\'t build on a broken foundation.'] },
  'FC-051': { desc: 'Configure the Pi to auto-connect to your phone hotspot as a backup WiFi network. Useful if demo venue WiFi is unreliable.', notes: ['Add a second WiFi network in /etc/wpa_supplicant/wpa_supplicant.conf or via nmcli. Lower priority than primary WiFi.'] },
  'FC-052': { desc: 'Repeat the ENTIRE Pi setup process on Raphael\'s Raspberry Pi (backup). Flash OS, install deps, verify imports. Mirror of the primary Pi.', checks: ['Flash OS (same settings)', 'SSH works', 'All Python imports pass', 'Camera works'], notes: ['This is our backup compute. If the primary Pi dies, we swap the SD card or use this Pi directly.'], deps: ['FC-036', 'FC-037', 'FC-038', 'FC-047'] },

  // ── Phase 3: Escort Bot Build ──
  'FC-053': { desc: 'Open the Freenove 4WD Smart Car Kit box. Lay out ALL parts and cross-reference against the parts list. Count every screw, standoff, and bracket.', checks: ['Smart Car Board PCB present', 'Connection Board PCB present', '4x DC motors', '4x mecanum wheels', 'Battery holder', 'All screws + standoffs', 'Servo motors x2', 'Ultrasonic sensor'], links: [['Freenove GitHub (assembly docs)', 'https://github.com/Freenove/Freenove_4WD_Smart_Car_Kit_for_Raspberry_Pi']] },
  'FC-054': { desc: 'Mount all 4 DC motors to the bottom plate using the included aluminum brackets and M3 screws. Motor shafts point outward through the plate holes.', checks: ['FL motor mounted (front-left)', 'FR motor mounted (front-right)', 'RL motor mounted (rear-left)', 'RR motor mounted (rear-right)', 'All 8 bracket screws tight'], notes: ['Follow the Freenove assembly guide. Motors should be snug — loose motors = drift during driving.'] },
  'FC-055': { desc: 'Attach all 4 mecanum wheels to the motor shafts. Push on firmly and tighten set screws. Spin each wheel by hand — no grinding or resistance.', checks: ['FL wheel: spins freely', 'FR wheel: spins freely', 'RL wheel: spins freely', 'RR wheel: spins freely'], notes: ['Mecanum wheels have a specific A-B-A-B pattern for omnidirectional movement. Check the Freenove diagram.'] },
  'FC-056': { desc: 'Label each motor with masking tape: FL (front-left), FR (front-right), RL (rear-left), RR (rear-right). Essential for wiring and debugging.', notes: ['Also label the motor wires with the same labels. You\'ll thank yourself during wiring.'] },
  'FC-057': { desc: 'Mount the standoffs on the bottom plate and loosely attach the top plate. Leave screws finger-tight so you can access the wiring underneath.', notes: ['Don\'t fully tighten until ALL wiring is complete and tested. You\'ll need to remove the top plate multiple times.'] },
  'FC-058': { desc: 'Wire the LEFT motor pair in parallel: connect FL and RL motor leads together (red to red, black to black). These share one motor driver channel.', notes: ['Parallel wiring = both motors get same voltage and spin together. Twist + solder or use a terminal block.'] },
  'FC-059': { desc: 'Wire the RIGHT motor pair in parallel: connect FR and RR motor leads together (red to red, black to black). These share the second motor driver channel.', notes: ['Same as FC-058 but for the right side. Both sides should spin forward when power is applied normally.'] },
  'FC-060': { desc: 'Quick polarity test: touch a 9V battery (or 2x 18650) to each motor pair. Verify both pairs spin in the FORWARD direction.', checks: ['Left pair spins forward', 'Right pair spins forward'], notes: ['If a pair spins backward: swap the red/black leads for BOTH motors in that pair. Fix polarity NOW before connecting to the driver.'] },
  'FC-061': { desc: 'Mount the L298N motor driver (or the Freenove Smart Car Board) on the top plate using standoffs. If using the kit\'s integrated board, follow the kit assembly guide.', notes: ['The Freenove kit uses a Smart Car Board instead of a standalone L298N. Same concept, different form factor. Follow the kit guide.'] },
  'FC-062': { desc: 'Connect the left and right motor pairs to the motor driver screw terminals (or Smart Car Board motor outputs).', checks: ['Left pair → Motor A terminals', 'Right pair → Motor B terminals', 'Screw terminals tight'], notes: ['If using Freenove Smart Car Board: motors connect to the labeled motor outputs on the PCB.'] },
  'FC-063': { desc: 'Connect the 18650 battery holder to the motor driver power input (VCC and GND). This provides 7.4V to drive the motors.', checks: ['Red wire → VCC/VIN', 'Black wire → GND', 'Connection secure'], notes: ['DO NOT insert batteries yet. Just wire the holder. We test power connection before going live.'] },
  'FC-064': { desc: 'CRITICAL: Remove the L298N 5V regulator jumper. The Pi gets its own separate USB-C power bank — do NOT power the Pi through the motor driver. Mixed power = brownouts and crashes.', notes: ['If using Freenove Smart Car Board: check the manual for how it handles Pi power. The Connection Board may provide power — verify and decide if you want that or separate.', 'THE PI MUST HAVE ITS OWN CLEAN 5V/3A POWER SOURCE. Motor current spikes WILL crash the Pi if they share power.'] },
  'FC-065': { desc: 'Wire motor driver control pins to Pi GPIO: IN1 → GPIO17, IN2 → GPIO27. These control the LEFT motor pair direction.', notes: ['These are the BCM pin numbers, not physical pin numbers. GPIO17 = physical pin 11, GPIO27 = physical pin 13.'] },
  'FC-066': { desc: 'Wire motor driver control pins to Pi GPIO: IN3 → GPIO22, IN4 → GPIO23. These control the RIGHT motor pair direction.', notes: ['GPIO22 = physical pin 15, GPIO23 = physical pin 16. Double-check against the main.py pin definitions.'] },
  'FC-067': { desc: 'CRITICAL: Connect the motor driver GND to a Pi GND pin. This creates a common ground reference. Without it, GPIO signals have no reference and motors behave erratically.', notes: ['Use any Pi GND pin (physical pins 6, 9, 14, 20, 25, 30, 34, 39). Just one wire. But it is MANDATORY.'] },
  'FC-068': { desc: 'Second person (Raphael) independently verifies ALL wiring connections against the wiring diagram. Two eyes catch mistakes one person misses.', checks: ['Motor polarity verified', 'GPIO pin mapping verified', 'Common ground connected', 'Power separation verified', 'No loose wires'], notes: ['This step has saved many projects. A wiring mistake can fry the Pi. 5 minutes of checking saves hours of debugging.'] },
  'FC-069': { desc: 'Photograph the completed wiring from multiple angles. Post in Slack. This serves as documentation for debugging and for the demo video B-roll.', notes: ['Get a clear overhead shot and close-ups of each connection area.'] },
  'FC-070': { desc: 'Run the motor test script (motor_test.py) to verify all 4 directions work: forward, backward, left turn, right turn, stop.', checks: ['Forward: both sides spin forward', 'Backward: both sides spin backward', 'Left turn: right forward + left backward', 'Right turn: left forward + right backward', 'Stop: all motors stop'], notes: ['Run with wheels OFF THE GROUND (prop up chassis). If any direction is wrong, swap motor driver wires for that channel.'] },
  'FC-071': { desc: 'Build the voltage divider on the breadboard: ECHO pin → 1kΩ resistor → junction → 2kΩ resistor → GND. The junction outputs 3.3V to the Pi GPIO.', notes: ['Only needed if using a raw HC-SR04 with 5V ECHO. The Freenove kit sensor may already be 3.3V compatible — check first.', 'Formula: Vout = 5V × 2000/(1000+2000) = 3.33V. Safe for Pi GPIO.'] },
  'FC-072': { desc: 'Wire the HC-SR04 ultrasonic sensor: VCC → 5V, GND → GND, TRIG → GPIO25, ECHO → voltage divider → GPIO24.', checks: ['VCC → 5V pin', 'GND → GND pin', 'TRIG → GPIO25', 'ECHO → through divider → GPIO24'], notes: ['TRIG can connect directly (3.3V output is fine for 5V sensor input). Only ECHO needs the divider.'] },
  'FC-073': { desc: 'Mount the HC-SR04 sensor on the front of the chassis, facing forward. Use the included mount bracket or hot glue. Must be level with ground.', notes: ['Angle sensor slightly downward (~5°) to catch low obstacles. If using the kit mount with a servo, even better — you get scanning.'] },
  'FC-074': { desc: 'Run the sonar test script (sonar_test.py). Hold a flat object at 30cm and 100cm. Readings should be within ±2cm.', checks: ['30cm reading: 28-32cm ✓', '100cm reading: 98-102cm ✓', 'No phantom readings', 'Updates at least 10x/second'], notes: ['If readings are wild: check voltage divider, check wiring, check GND connection. Ultrasonic sensors are finicky with bad wiring.'] },
  'FC-075': { desc: 'Assemble the pan-tilt platform with 2 servo motors. Follow the Arducam/Freenove assembly instructions. Test range of motion by hand.', checks: ['Pan servo installed (horizontal)', 'Tilt servo installed (vertical)', 'Full range of motion: pan ±90°, tilt ±45°', 'No grinding or stiffness'], notes: ['The camera mounts on top of the tilt servo. Pan-tilt lets the bot scan rack faces during SCAN mode.'] },
  'FC-076': { desc: 'Mount the assembled pan-tilt platform on the chassis top plate. Connect the servo controller to the Pi via I2C.', checks: ['Pan-tilt mounted securely', 'I2C cable connected', 'Verify I2C device detected: i2cdetect -y 1'], notes: ['If using the Freenove kit: the servos connect to the Connection Board, not a separate controller.'] },
  'FC-077': { desc: 'Connect the Arducam IMX708 (or kit camera) to the Pi 5 via CSI ribbon cable. The Pi 5 has a specific CSI connector — different from Pi 4. Use the correct adapter.', checks: ['Ribbon cable seated in Pi CSI connector', 'Ribbon cable seated in camera board', 'Locking tabs engaged on both ends'], notes: ['Pi 5 uses a 22-pin FPC connector (smaller than Pi 4\'s). Make sure you have the right ribbon cable. The camera ships with the correct one.'] },
  'FC-078': { desc: 'Test the camera and pan-tilt together. Run libcamera-hello for camera preview. Then write a quick servo sweep test to pan 180° and tilt ±45°.', checks: ['libcamera-hello shows live image', 'Pan servo sweeps full range', 'Tilt servo sweeps full range', 'Camera stays stable during movement'], notes: ['If camera test fails: check ribbon cable seating, check raspi-config camera enabled, check libcamera-hello --list-cameras.'] },
  'FC-079': { desc: 'Cut PVC pipe to approximately 3.5 feet (~107cm) for the camera mast. This puts the camera at roughly "person height" for better tracking angles.', notes: ['Use a hacksaw or have Home Depot cut it. Sand the cut end smooth. The exact height can be adjusted based on testing.'] },
  'FC-080': { desc: 'Attach the PVC T-connector to the chassis and secure the mast vertically. Use zip ties, velcro, or a 3D-printed bracket to keep it stable.', notes: ['The mast needs to be rigid — any wobble blurs the camera image. Consider adding a second attachment point halfway up.'] },
  'FC-081': { desc: 'Mount the camera at the top of the PVC mast. Route the CSI ribbon cable (or USB cable) down the inside of the PVC pipe.', notes: ['This is the hardest part. CSI ribbon cables are fragile and have limited length. See FC-233 for the CSI vs USB decision.'], deps: ['FC-233'] },
  'FC-082': { desc: 'Stability test: with the mast mounted and camera on top, gently push the bot. Mast should sway less than 1cm at the top. If more, add reinforcement.', checks: ['Mast sway < 1cm', 'Camera stays level', 'No vibration at idle'], notes: ['If unstable: add guy wires (zip ties to chassis corners), or use a thicker PVC diameter, or shorten the mast.'] },
  'FC-083': { desc: 'Mount the USB-C power bank to the chassis with velcro strips. It should be accessible for quick swap but won\'t fall off during movement.', notes: ['Keep the power bank weight centered on the chassis for balance. Don\'t block the USB-C port — you need to plug/unplug easily.'], deps: ['FC-237'] },
  'FC-084': { desc: 'Full power-on test: batteries inserted, power bank connected, Pi boots. Verify SSH access AND motor control both work on battery power.', checks: ['Pi boots on battery power', 'SSH connection works', 'Motor test passes', 'Camera streams', 'No brown-outs'], notes: ['If Pi reboots when motors start: the power sources are not isolated. Check FC-064.'] },
  'FC-085': { desc: 'Run the entire system for 5 continuous minutes on battery power. Monitor for voltage drop, thermal issues, or brownouts. Watch Pi temp.', checks: ['5 min continuous operation', 'No Pi reboots or throttling', 'Motors maintain consistent speed', 'Camera stream stable'], notes: ['If battery life is short: reduce motor speed, or use a larger power bank, or add a second set of 18650s.'] },
  'FC-086': { desc: 'Measure actual battery life by running the system continuously until the Pi or motors die. Target: 30+ minutes for the demo with margin.', notes: ['Demo is ~3 min, but we need margin for setup, practice runs, and potential retakes. 30 min gives 10x safety.'] },
  'FC-087': { desc: 'Label all power connections with colored tape: RED = motor power, BLUE = Pi power, BLACK = ground. Makes it easy to troubleshoot and for others to understand the wiring.', notes: ['Also label the battery holder polarity and the power bank cable.'] },

  // ── Phase 4: Escort Bot Software ──
  'FC-088': { desc: 'Copy the camera test script to the Pi: scp test_camera.py pi@elktron-escort.local:~/. This tests person detection without motor control.', notes: ['The test script uses picamera2 + YOLOv8n to detect people and draw bounding boxes. Output is text console or saved frames.'] },
  'FC-089': { desc: 'Run test_camera.py and verify person detection. Have someone stand at 1 meter and then at 3 meters. Both should produce confident detections.', checks: ['Detection at 1m: confidence > 0.6', 'Detection at 3m: confidence > 0.4', 'Bounding box roughly matches person position', 'Frame rate > 5 FPS'], notes: ['If detection fails: check lighting, check model file path, check camera orientation. The model needs decent lighting.'] },
  'FC-090': { desc: 'Walk slowly side to side at 2m distance. The bounding box should track the person\'s position smoothly across the frame.', checks: ['Person tracked moving left', 'Person tracked moving right', 'No false detections on background'], notes: ['If tracking is jerky: the confidence threshold may be too high, or frame rate is too low. Adjust CONFIDENCE_THRESHOLD.'] },
  'FC-091': { desc: 'Test with 2 people in frame. The code should track the CLOSEST person (largest bounding box area), not the most confident detection.', notes: ['main.py uses max(area) to select the target when multiple people are detected. Verify this logic works.'] },
  'FC-092': { desc: 'Measure inference speed. Each YOLOv8n inference should take <100ms on Pi 5. If slower, the bot will react sluggishly.', notes: ['Use time.time() around the model() call. On Pi 5, expect ~40-70ms per frame with YOLOv8n.'] },
  'FC-093': { desc: 'Test detection under fluorescent lighting (simulating DC environment). The harsh lighting and shadows can confuse the model.', notes: ['If detection drops under fluorescent: try adjusting camera exposure settings in picamera2. Auto-exposure usually handles it.'] },
  'FC-094': { desc: 'Test detection with a person wearing dark clothing and carrying a box/equipment (simulating a DC vendor). Verify the model still detects them.', notes: ['The model can struggle with partial occlusion (person behind equipment). If this is an issue, lower the confidence threshold.'] },
  'FC-095': { desc: 'Copy main.py and pan_tilt.py to the Pi via SCP. These are the full escort bot brain — person detection + motor control + scan mode.', checks: ['main.py copied', 'pan_tilt.py copied', 'Both files have correct permissions (chmod +x)'], notes: ['main.py is at hackathon/escort-bot/main.py — ~326 lines.'] },
  'FC-096': { desc: 'CRITICAL: Verify the GPIO pin numbers in main.py match the ACTUAL physical wiring. A mismatch means wrong motors spin or nothing works.', checks: ['LEFT_MOTOR pins match wiring (GPIO17, GPIO27)', 'RIGHT_MOTOR pins match wiring (GPIO22, GPIO23)', 'TRIG_PIN = GPIO25', 'ECHO_PIN = GPIO24'], notes: ['Compare main.py constants against the wiring photo from FC-069. This is the #1 cause of "it doesn\'t work" issues.'] },
  'FC-097': { desc: 'Bench test with WHEELS OFF THE GROUND. Run main.py. Stand in front of camera: wheels should spin forward. Move left: bot should try to turn. Hold object at 30cm: bot should stop.', checks: ['Person detected → wheels forward', 'Person left of center → right wheels faster', 'Person right of center → left wheels faster', 'Obstacle < 30cm → motors stop', 'No person → motors stop (after timeout)'], notes: ['This is the most important test before floor testing. If bench test fails, DO NOT put it on the floor.'] },
  'FC-098': { desc: 'Test scan mode: stand still in front of the bot for 3+ seconds. It should transition to SCAN mode and the pan-tilt should start sweeping left-right.', checks: ['Stationary person triggers SCAN after ~3s', 'Pan-tilt sweeps smoothly', 'Camera captures frames during scan', 'Returns to FOLLOW when person moves'], notes: ['Scan mode is triggered by LOST_TIMEOUT or person standing still. Check the state machine in main.py.'] },
  'FC-099': { desc: 'Find an open indoor space (at least 15ft x 15ft) for the first floor test. Garage, living room, or office hallway all work.', notes: ['Avoid direct sunlight (washes out camera). Need room for the bot to drive 10+ feet. Clear obstacles from the path.'] },
  'FC-100': { desc: 'FIRST FLOOR TEST. Set BASE_SPEED=0.2 (very slow). Have one person walk slowly away from the bot. It should follow at 1-2m distance.', checks: ['Bot follows person forward', 'Bot stops when person stops', 'Bot turns when person turns', 'Obstacle avoidance triggers if wall/furniture is close'], notes: ['THIS IS THE MILESTONE. If this works, the core demo is proven. Start slow, validate, then speed up. Record video on your phone.'] },
  'FC-101': { desc: 'Follow a person continuously for 30+ seconds without the bot losing track, crashing, or going in circles.', notes: ['If it keeps losing the person: increase LOST_TIMEOUT or reduce CONFIDENCE_THRESHOLD. If it oscillates: reduce KP.'] },
  'FC-102': { desc: 'Record phone video of the floor test from multiple angles. This B-roll is critical for the demo video.', notes: ['Get a wide shot (showing the full follow behavior), a close-up of the bot, and a "bot\'s eye view" if possible.'] },
  'FC-103': { desc: 'Tune the steering gain (KP). If the bot oscillates side-to-side while following, KP is too high. If it can\'t turn sharply enough, KP is too low.', notes: ['Start at KP=0.4. Reduce to 0.2 if oscillating. Increase to 0.6 if sluggish in turning. Test in 0.1 increments.'] },
  'FC-104': { desc: 'Tune TARGET_AREA_RATIO to set the follow distance. This defines how large the person\'s bounding box should be in frame at the ideal distance.', notes: ['Larger value = bot follows closer. Smaller = further away. Start at 0.15 (~2m distance). Adjust based on demo space.'] },
  'FC-105': { desc: 'Tune CONFIDENCE_THRESHOLD for detection sensitivity. Lower = more detections but more false positives. Higher = fewer detections but more reliable.', notes: ['Start at 0.5. If missing detections: lower to 0.35. If false positives: raise to 0.6.'] },
  'FC-106': { desc: 'Gradually increase BASE_SPEED from 0.2 to 0.5 over multiple test runs. Only increase when the bot is stable at the current speed.', checks: ['Stable at 0.2', 'Stable at 0.3', 'Stable at 0.4', 'Test at 0.5 (may be too fast)'], notes: ['Higher speed = more dramatic demo, but more risk of crashes. Find the sweet spot. 0.3-0.4 is usually best.'] },
  'FC-107': { desc: 'Record the final "golden config" parameter values that produce the best following behavior. Save these as the defaults in main.py.', checks: ['BASE_SPEED = ?', 'KP = ?', 'TARGET_AREA_RATIO = ?', 'CONFIDENCE_THRESHOLD = ?', 'LOST_TIMEOUT = ?'], notes: ['Write these down in the code AND in the team Slack channel. If someone changes them, we can always revert.'] },
  'FC-108': { desc: 'Test with 2 people walking together. The bot should follow the closer person. When the closer person steps away, it should switch to the remaining person.', notes: ['Low priority — single-person following is the demo. Multi-person is a stretch goal.'] },
  'FC-109': { desc: 'Test obstacle avoidance: place a box or chair in the bot\'s path while it follows someone. It should stop before hitting the obstacle.', checks: ['Box at 30cm: bot stops', 'Box removed: bot resumes following', 'Wall approach: bot stops'], notes: ['Ultrasonic sensor has ~30cm stop distance in main.py. Adjust if needed.'] },
  'FC-110': { desc: 'Write the pan_tilt.py servo control module. Provides sweep(), center(), and set_angle(pan, tilt) functions.', notes: ['This module is called by main.py during SCAN mode. It sends I2C commands to the servo controller.'] },
  'FC-111': { desc: 'Add WebSocket telemetry output to main.py. Send JSON payloads with mode, target position, motor speeds, sonar distance to the dashboard backend.', notes: ['Format: {"type":"escort","mode":"FOLLOW","target_x":0.55,"speed_l":0.3,"speed_r":0.35,"sonar_cm":85}. Send every 200ms.'], deps: ['FC-153'] },

  // ── Phase 5: SO-101 Arm — Simulation ──
  'FC-240': { desc: 'Load the SO-101 URDF (Unified Robot Description Format) into PyBullet physics simulator. Verify joint definitions, link lengths, and collision meshes render correctly.', notes: ['URDF defines the arm\'s kinematic chain. PyBullet uses it for physics-accurate simulation. This enables testing motion planning before hardware arrives.'] },
  'FC-241': { desc: 'Test simple arm joint motions in PyBullet — move each of the 6 joints independently, verify range of motion matches real servo limits, confirm no self-collision.', checks: ['Joint 1 (base) rotates correctly', 'Joint 2 (shoulder) rotates correctly', 'Joint 3 (elbow) rotates correctly', 'Joint 4 (wrist pitch) rotates correctly', 'Joint 5 (wrist roll) rotates correctly', 'Joint 6 (gripper) opens/closes'], notes: ['This validates the URDF joint limits before physical assembly. Fix any issues in simulation — much cheaper than on real hardware.'] },
  'FC-242': { desc: 'Full simulation validation: test arm kinematics end-to-end, verify workspace boundaries, test pick-and-place motion sequence (home → reach → grip → move → place → home).', notes: ['The simulation should match the real arm\'s workspace. Use this to pre-plan the optic seating trajectory before recording real demonstrations.'] },
  // ── Phase 5: SO-101 Arm — Physical Build ──
  'FC-112': { desc: 'Unbox the HiWonder SO-101 kit. Inventory EVERY part against the listing. 12 servos, 2 BusLinker boards, 2 PSUs, 4 clamps, all structural parts, all screws.', links: [['HiWonder SO-101 Kit', 'https://www.hiwonder.com/products/lerobot-so-101'], ['SO-101 Assembly Guide', 'https://huggingface.co/docs/lerobot/en/so101']], checks: ['6x follower servos (HX-30HM)', '6x leader servos (HX-10HM)', '2x BusLinker V3.0', '1x 12V 5A PSU', '1x 5V PSU', '4x table clamps', 'All arm link parts', 'All screws + hardware'] },
  'FC-113': { desc: 'Individually power each of the 12 servos with the PSU and send a test command. Any servo that doesn\'t respond is DOA and needs replacement.', checks: ['Follower S1 ✓', 'Follower S2 ✓', 'Follower S3 ✓', 'Follower S4 ✓', 'Follower S5 ✓', 'Follower S6 ✓', 'Leader S1 ✓', 'Leader S2 ✓', 'Leader S3 ✓', 'Leader S4 ✓', 'Leader S5 ✓', 'Leader S6 ✓'], notes: ['DOA servos are not uncommon. Better to find out now than mid-assembly.'] },
  'FC-114': { desc: 'Assemble the LEADER arm. Mount servos S1 through S6 in sequence following the HuggingFace assembly guide. Each servo fits in a specific 3D-printed bracket.', links: [['Assembly Guide', 'https://huggingface.co/docs/lerobot/en/so101']], notes: ['The leader arm uses the lighter HX-10HM servos. It\'s used for teleoperation (human moves leader, follower mirrors).'] },
  'FC-115': { desc: 'Route all servo cables along the leader arm and secure with velcro at each joint. Loose cables can get caught in joints and strip gears.', notes: ['Leave enough slack for full range of motion. Velcro every 2 inches along the arm links.'] },
  'FC-116': { desc: 'Connect the leader arm\'s 6 servo cables to BusLinker V3.0 board #1. Connect 5V PSU to the BusLinker. Verify all servos respond to serial commands.', checks: ['All 6 servos connected to BusLinker', '5V PSU connected and on', 'USB-C to laptop connected', 'ls /dev/ttyACM* shows the device'], notes: ['The BusLinker acts as a USB-to-serial bridge. Each servo has a unique ID (1-6).'] },
  'FC-117': { desc: 'Assemble the FOLLOWER arm. Mount servos S1 through S6. The follower uses the heavier HX-30HM servos (30kg-cm torque at 12V).', notes: ['Same assembly process as the leader, but with stronger servos and the 12V PSU.'] },
  'FC-118': { desc: 'Route all servo cables along the follower arm and secure with velcro at each joint. Same as the leader — prevent cable snag in joints.', notes: ['Talha can handle this while Josh focuses on software setup.'] },
  'FC-119': { desc: 'Connect the follower arm\'s 6 servo cables to BusLinker V3.0 board #2. Connect 12V 5A PSU. Verify all servos respond.', checks: ['All 6 servos connected', '12V PSU connected and on', 'USB-C to laptop connected', 'ls /dev/ttyACM* shows BOTH devices'], notes: ['You should now see TWO ttyACM devices — one per BusLinker. Note which is leader vs follower.'] },
  'FC-120': { desc: 'Clamp both arms to the table approximately 30cm apart, facing each other. This is the training setup — leader on left, follower on right.', notes: ['Use the 4 included C-clamps. The table must be sturdy — arm movements generate torque. Mark the positions with tape.'] },
  'FC-121': { desc: 'Mount the NexiGo 1080p webcam overhead pointing down at the follower arm\'s workspace. This camera captures training data for imitation learning.', notes: ['Use a gooseneck mount, tripod, or stack of books. Camera should see the full arm workspace including the optic tray and port.'], deps: ['FC-022'] },
  'FC-122': { desc: 'Verify BOTH USB-C cables connecting BusLinker boards to the laptop are DATA-capable (not charge-only). Test with ls /dev/ttyACM*.', checks: ['Leader BusLinker: /dev/ttyACM0 appears', 'Follower BusLinker: /dev/ttyACM1 appears'], notes: ['If a device doesn\'t appear: the cable is charge-only. Swap cables until both devices show up.'], deps: ['FC-026'] },
  'FC-123': { desc: 'Verify both arms are detected by the OS. Run ls /dev/ttyACM* — should show two devices. Note which port maps to which arm.', notes: ['On Mac: may show as /dev/cu.usbmodem*. On Linux: /dev/ttyACM*. Write down the mapping.'] },
  'FC-124': { desc: 'Manually move each joint on both arms by hand. All 12 joints should be smooth with no binding, catching, or grinding.', checks: ['Leader: all 6 joints smooth', 'Follower: all 6 joints smooth'], notes: ['If a joint binds: disassemble that joint, check for overtightened screws or misaligned brackets.'] },
  'FC-125': { desc: 'Verify grippers open and close on both arms. The gripper is servo S6 on each arm. Should have 30mm+ opening for optic transceiver.', checks: ['Leader gripper opens/closes', 'Follower gripper opens/closes', 'Opening wide enough for optic module (~25mm)'] },
  'FC-126': { desc: 'Tighten ALL screws on both arms. Loose screws cause drift during training — the arm\'s position shifts over time, corrupting training data.', notes: ['Use threadlocker (blue Loctite) on critical joints if available. At minimum, ensure all screws are snug.'] },
  'FC-127': { desc: 'Install Python 3.11 and create the LeRobot virtual environment: python3 -m venv ~/lerobot-env. This is for the training laptop (Mac or Linux).', notes: ['LeRobot requires Python 3.10-3.12. On Mac: brew install python@3.11. Activate: source ~/lerobot-env/bin/activate.'] },
  'FC-128': { desc: 'Run the LeRobot install script (so101/install.sh) to install LeRobot + PyTorch + all training dependencies.', links: [['LeRobot GitHub', 'https://github.com/huggingface/lerobot']], checks: ['pip install lerobot', 'Verify: python -c "import lerobot"', 'Verify: python -c "import torch; print(torch.backends.mps.is_available())" (Mac)'], notes: ['On Mac: PyTorch MPS backend for GPU acceleration. On Linux: CUDA if you have an NVIDIA GPU.'] },
  'FC-129': { desc: 'Verify PyTorch acceleration is working. On Mac: torch.backends.mps.is_available() should return True. On Linux: torch.cuda.is_available().', notes: ['CPU training is 10-50x slower than GPU. If no acceleration: training 50 episodes may take 2+ hours instead of 20 min.'] },
  'FC-130': { desc: 'Create the LeRobot YAML config file specifying serial ports for both arms and the webcam device path. This tells LeRobot how to communicate with the hardware.', notes: ['Config maps: leader port, follower port, camera device, servo IDs. See LeRobot SO-101 docs for the template.'], links: [['LeRobot SO-101 Config', 'https://huggingface.co/docs/lerobot/en/so101']] },
  'FC-131': { desc: 'Test that the webcam streams correctly via OpenCV: python -c "import cv2; cap=cv2.VideoCapture(0); ret,frame=cap.read(); print(ret, frame.shape)"', checks: ['Camera opens successfully', 'Frame shape: (1080, 1920, 3) or similar', 'Stream at 30fps'], notes: ['If wrong camera: change device index (0, 1, 2). On Mac: may need privacy permissions for camera access.'] },
  'FC-132': { desc: 'CRITICAL: Run the LeRobot calibration routine. This maps the physical servo positions to software coordinates. Without calibration, mirroring will be wrong.', links: [['Calibration Docs', 'https://huggingface.co/docs/lerobot/en/so101']], notes: ['The calibration process asks you to move each joint to its limits. Follow the prompts exactly. Save the calibration file when done.'] },
  'FC-133': { desc: 'CRITICAL: Save the calibration file and BACK IT UP to cloud storage. If you lose this file, you have to recalibrate from scratch — and training data becomes invalid.', checks: ['Calibration file saved locally', 'Backed up to Google Drive / iCloud / GitHub'], notes: ['The calibration file maps physical servo positions to normalized joint angles. All training data depends on this mapping.'] },
  'FC-134': { desc: 'Test mirroring: move each joint on the leader arm and verify the follower arm mirrors it within ~2 degrees. All 6 joints should track.', checks: ['Joint 1 (base) mirrors', 'Joint 2 (shoulder) mirrors', 'Joint 3 (elbow) mirrors', 'Joint 4 (wrist pitch) mirrors', 'Joint 5 (wrist roll) mirrors', 'Joint 6 (gripper) mirrors'], notes: ['If a joint doesn\'t mirror: check servo ID assignment in config, check calibration, check cable connection.'] },
  'FC-135': { desc: 'Mark the workspace positions on the table with tape: HOME position, TRAY position (where optics sit), and PORT position (where the switch port is).', notes: ['Consistent positions = consistent training data. The arm needs to learn the same start/end points every episode.'] },
  'FC-136': { desc: 'Launch full teleoperation mode: move the leader arm, follower arm mirrors all movements in real-time. Practice smooth, deliberate movements.', notes: ['This is the tool for recording training data. Get comfortable with the feel before recording episodes.'] },
  'FC-137': { desc: 'Practice the optic seating task manually (via teleoperation) at least 5 times before recording. The motion should be: HOME → reach to TRAY → grip optic → lift → move to PORT → insert → release → HOME.', checks: ['Can complete the task reliably', 'Motion is smooth (no jerky movements)', 'Gripper holds optic securely', 'Optic seats fully in port'], notes: ['Smooth, consistent human demonstrations produce the best training data. Don\'t rush. Quality over quantity.'] },
  'FC-138': { desc: 'Record training episodes 1-10. Focus on basic, clean motions. Same start position, same motion path, same end position every time.', notes: ['Run: python record.py --episodes 10. Each episode is one complete optic seating task. Press Enter to start each episode.'] },
  'FC-139': { desc: 'Record episodes 11-30. Now that the motion is practiced, focus on consistency and smoothness. These should be your best demonstrations.', notes: ['Talha records while Josh monitors. Switch operators occasionally for slightly different motion styles (helps model generalize).'] },
  'FC-140': { desc: 'Record episodes 31-50. Introduce small variations: slightly different pick-up angles, different speeds, small position offsets. This builds robustness.', notes: ['Don\'t go crazy with variation — the task should still succeed every time. Just add natural human variation.'] },
  'FC-141': { desc: 'Verify the recorded dataset: check that video files exist for each episode, joint angle CSV data is complete, and frame counts match.', checks: ['50 episode directories exist', 'Each has video + joint data', 'No corrupted files', 'File sizes are consistent'], notes: ['Run the LeRobot dataset validation tool if available. Corrupted episodes should be deleted and re-recorded.'] },
  'FC-142': { desc: 'Delete any bad episodes where the arm collided, dropped the optic, or the motion was significantly off. Bad data hurts training more than less data.', notes: ['It\'s better to have 40 clean episodes than 50 with 10 bad ones.'] },
  'FC-143': { desc: 'CRITICAL: Backup the entire dataset to cloud storage or an external drive. Training takes hours — if data is lost, we\'re back to square one.', checks: ['Full dataset backed up', 'Backup verified (file count + sizes match)', 'At least 2 copies (cloud + local)'] },
  'FC-144': { desc: 'Start ACT policy training. Run: python train.py --config so101_act_config.yaml. This trains a neural network to replicate the demonstrated motions.', links: [['ACT Paper', 'https://tonyzhaozh.github.io/aloha/'], ['LeRobot Training Docs', 'https://huggingface.co/docs/lerobot/en/so101']], notes: ['Training time: 30min-2hrs depending on GPU. Monitor loss in TensorBoard. Loss should decrease over time.'] },
  'FC-145': { desc: 'Monitor training progress in TensorBoard. Loss should steadily decrease. If loss plateaus early or increases, there may be issues with the data or hyperparameters.', notes: ['Run: tensorboard --logdir runs/. Watch train/loss and val/loss. If val_loss diverges from train_loss, the model is overfitting.'] },
  'FC-146': { desc: 'Save the best checkpoint — the one with the lowest validation loss. This is the model we\'ll deploy on the arm.', notes: ['Copy the best checkpoint file to a safe location. Name it clearly: best_act_epoch42_valloss0.015.pt or similar.'] },
  'FC-147': { desc: 'CRITICAL: Load the best checkpoint and run the first autonomous test. The follower arm should execute the optic seating task without the leader arm moving.', checks: ['Arm starts from HOME', 'Reaches for optic in TRAY', 'Grips optic successfully', 'Moves to PORT position', 'Seats optic', 'Returns to HOME'], notes: ['First autonomous run is nerve-wracking. Stand by with the emergency stop. If the arm does something dangerous, cut power immediately.'] },
  'FC-148': { desc: 'Run 10 consecutive autonomous attempts. Log each attempt: success or failure, and what went wrong if failed. Calculate success rate.', notes: ['Target: 60%+ success rate (6/10). If below 50%, we need more training data or hyperparameter tuning.'] },
  'FC-149': { desc: 'If success rate is below 60%: record 20 more episodes focused on the failure mode, then retrain. Common issues: grip misalignment, insertion angle.', notes: ['Focus new episodes on the specific motion that fails. If the arm misses the grip, record extra grip approach episodes.'], deps: ['FC-148'] },
  'FC-150': { desc: 'Stretch goal: record 50+ additional episodes for maximum robustness. More data = more reliable autonomous execution.', notes: ['Only do this if time permits. Better to have a working 60% demo than spend all time chasing 90%.'] },

  // ── Phase 6: Dashboard ──
  'FC-151': { desc: 'Create a Python venv for the dashboard backend: python3 -m venv ~/dashboard-env. Keep this separate from the robot venvs.', notes: ['The dashboard runs on the laptop, not the Pi. It receives WebSocket data from the robots and serves the frontend.'] },
  'FC-152': { desc: 'Install FastAPI + uvicorn + websockets in the dashboard venv.', checks: ['pip install fastapi uvicorn websockets', 'Verify: python -c "import fastapi; print(fastapi.__version__)"'] },
  'FC-153': { desc: 'Create the backend WebSocket server and verify it accepts connections. Run on port 8080. Test with: wscat -c ws://localhost:8080/ws', checks: ['Server starts on port 8080', 'WebSocket connection accepted', 'Can send/receive JSON messages'], notes: ['Use wscat for quick testing: npm install -g wscat. Or use a browser console: new WebSocket("ws://localhost:8080/ws").'] },
  'FC-154': { desc: 'Add mock Jira data to the backend: vendor name, ticket ID, rack assignment, scheduled time. The dashboard shows which vendor the escort bot is following.', notes: ['Use the Jira MCP tool to pull real ticket examples for realistic data. Format: {vendor, ticket_id, rack, eta}.'] },
  'FC-155': { desc: 'Add mock NetBox data to the backend: device hostname, status (active/planned/decommissioning), rack position (RU), role.', notes: ['Use the NetBox MCP tool to pull real device data from CW infrastructure. Makes the demo feel real.'] },
  'FC-156': { desc: 'Create 5 sample scan report JSON files in data/scans/. Each report should contain: timestamp, rack_id, issues_found, images, severity.', notes: ['These populate the Scan Log panel on the dashboard. Show a mix of clean scans and scans with flagged issues.'] },
  'FC-157': { desc: 'Style the dashboard with Elktron design tokens. Dark theme, CoreWeave navy background, white/accent text, monospace data readouts.', links: [['Elktron Design System', 'file:///Users/rpatino/hackathon/design-system.css']], notes: ['Use the shared design-system.css for consistent colors, fonts, and spacing across all Elktron sites.'] },
  'FC-158': { desc: 'Build the Arm Status panel: 6 vertical bars showing joint angles (0-360°), gripper state (open/closed), current mode (idle/recording/autonomous).', notes: ['Joint angles update in real-time via WebSocket. Use animated bars that smoothly interpolate between values.'] },
  'FC-159': { desc: 'Build the Escort Bot panel: large mode badge showing FOLLOW / SCAN / IDLE with color coding. Blue=FOLLOW, Yellow=SCAN, Gray=IDLE.', notes: ['The mode badge should pulse when active. Add the target person\'s bounding box position as a mini-visualization.'] },
  'FC-160': { desc: 'Add sonar distance bar to the Escort Bot panel. Horizontal bar showing 0-200cm. Bar turns red below 30cm (obstacle zone).', notes: ['Animated bar that updates with WebSocket telemetry. Red zone = bot should stop.'] },
  'FC-161': { desc: 'Add vendor info to the Escort Bot panel: vendor name, Jira ticket ID, and assigned rack. This shows the real CW workflow context.', notes: ['Populated from the mock Jira data. Changes when the escort bot is assigned to a new vendor visit.'] },
  'FC-162': { desc: 'Build the Scan Log panel: a table showing completed rack scans with timestamp, rack ID, status (clean/issues), and expandable detail rows.', notes: ['Expandable rows show: specific issues found, severity, photos (placeholder), recommended action.'] },
  'FC-163': { desc: 'Build the Camera Feeds panel: 1-2 placeholder frames for live camera streams. Initially show static images, then wire up real streams when hardware is ready.', notes: ['MJPEG streaming from the Pi is simplest: stream frames as multipart HTTP. Or use WebRTC for lower latency.'] },
  'FC-164': { desc: 'Build the Training Console panel: shows current episode count, training progress bar, latest loss value, and estimated time remaining.', notes: ['Low priority — this only matters during the training phase, not during the demo.'] },
  'FC-165': { desc: 'Add a pulsing LIVE badge that appears when the dashboard is receiving real-time WebSocket data. Disappears after 3s of no data (connection lost).', notes: ['Small but important visual cue that tells judges the data is real-time, not recorded.'] },
  'FC-166': { desc: 'Make the dashboard responsive for two screen sizes: laptop (1440px) and projector (1080p). The demo may be shown on either.', notes: ['Use CSS container queries or media queries. Main concern: font sizes readable from 5-10 feet away on a projector.'] },
  'FC-167': { desc: 'Use the Jira MCP tool to pull real vendor visit tickets from CW\'s Jira. Use sanitized versions as realistic mock data.', notes: ['Look for DC ops tickets with rack assignments. Sanitize any sensitive info before using in the demo.'] },
  'FC-168': { desc: 'Use the NetBox MCP tool to pull real rack/device data from CW\'s NetBox. Use as realistic mock data for the dashboard.', notes: ['Pull: rack layouts, device hostnames, RU positions. Sanitize before using.'] },
  'FC-169': { desc: 'Wire the arm telemetry endpoint to receive REAL data from the SO-101 when hardware is ready. Replace mock data with live WebSocket stream from the arm.', notes: ['The arm sends joint angles + gripper state + mode via its own WebSocket client. Dashboard backend relays to frontend.'], deps: ['FC-136', 'FC-153'] },
  'FC-170': { desc: 'Wire the escort bot telemetry endpoint to receive REAL data from the Pi. Replace mock data with live WebSocket stream from the bot.', notes: ['The bot sends mode + target position + motor speeds + sonar distance. Backend relays to frontend.'], deps: ['FC-111', 'FC-153'] },

  // ── Phase 7: Demo Video ──
  'FC-171': { desc: 'Write the full 3-minute demo narration script. Structure: problem (30s) → solution overview (30s) → escort bot demo (45s) → arm demo (45s) → dashboard (20s) → impact (10s).', notes: ['Keep it tight. Every sentence must earn its place. Practice out loud — written scripts always run long.'] },
  'FC-172': { desc: 'Full team reads the script and approves. Everyone should understand the story and their role in the demo.', notes: ['Share in Slack. Give 24hr for feedback. Incorporate changes. Lock the script.'] },
  'FC-173': { desc: 'Assign narration sections to specific team members. Romeo: intro + problem + closing. Others: their component sections.', notes: ['Whoever built it should narrate it. Authentic knowledge shows through.'] },
  'FC-174': { desc: 'Time the script read-aloud with a stopwatch. Must be under 3 minutes. If over, CUT — don\'t speed up. Judges stop listening after 3 min.', notes: ['Read at a natural pace. If 3:30, cut 30s of content. Better to be 2:30 and clear than 3:00 and rushed.'] },
  'FC-175': { desc: 'Find a clean, well-lit recording location. Plain background, no clutter, good overhead lighting. A conference room or clean desk area works.', notes: ['Avoid: backlighting (window behind), noisy backgrounds, echo-y rooms. Phone camera + ring light is fine.'] },
  'FC-176': { desc: 'Set up recording equipment: phone on tripod, test audio levels. Record 10 seconds and play back — check for echo, hum, or low volume.', checks: ['Tripod stable', 'Camera at robot height', 'Audio clear (test recording)', 'Good lighting on the robots'] },
  'FC-177': { desc: 'Set up screen recording (OBS or QuickTime) for the dashboard demo. Full screen, high resolution, no notifications visible.', checks: ['Screen recording software ready', '1080p or higher', 'Notifications turned off', 'Dashboard running with data flowing'], notes: ['On Mac: Cmd+Shift+5 for built-in screen recording. OBS gives more control.'] },
  'FC-178': { desc: 'CRITICAL: Record the escort bot following a vendor. Get at least 5 takes. Show: bot starts following, person walks, bot follows, person stops, bot scans.', notes: ['This is money shot #1. Record from multiple angles. Wide shot + close-up of the bot. Clear, well-lit, smooth movement.'] },
  'FC-179': { desc: 'Record scan mode close-up: the pan-tilt camera sweeping across a simulated rack face. Show the camera moving and "scanning" rack equipment.', notes: ['Even if the actual scan analysis isn\'t working, the physical scanning motion looks impressive.'] },
  'FC-180': { desc: 'CRITICAL: Record the SO-101 arm autonomously seating an optic transceiver. Get at least 5 takes. Show: arm reaches, grips, moves, inserts, releases.', notes: ['This is money shot #2. Record from multiple angles: overhead (showing the webcam view) + side profile (showing the motion). If autonomy fails, record teleoperation as backup.'] },
  'FC-181': { desc: 'Record the dashboard with live data flowing. Screen capture showing all panels updating in real-time. Pan slowly across the panels.', notes: ['Show the LIVE badge pulsing. Show mode changes as the robots operate. If no live data, use the mock data — it still looks good.'] },
  'FC-182': { desc: 'Record B-roll footage: close-ups of wiring, assembly process, terminal output, Pi booting, servos calibrating. These fill transitions in the edit.', notes: ['5-10 second clips of interesting visual moments. The editor (Andrew) will use these as cutaways.'] },
  'FC-183': { desc: 'Import all footage into the video editor (iMovie or DaVinci Resolve). Organize by clip type: escort bot, arm, dashboard, B-roll, narration.', notes: ['iMovie is simpler. DaVinci is more powerful. Use whatever Andrew is comfortable with.'] },
  'FC-184': { desc: 'CRITICAL: Edit the final video to 3 minutes or under. Follow the script structure. Cut ruthlessly — every second must serve the story.', notes: ['Pacing: fast intro (problem), smooth middle (demos), punchy ending (impact). Don\'t let any section drag.'] },
  'FC-185': { desc: 'Add narration audio track, title card (Elktron logo + team name), and text overlays (component names, data labels).', notes: ['Title card: first 5 seconds. Text overlays: identify what the viewer is seeing. Keep overlays minimal and clean.'] },
  'FC-186': { desc: 'Export final video: 1080p, H.264, under 100MB file size. Test playback on a different device to verify quality.', notes: ['If file is too large: reduce bitrate, not resolution. 1080p at medium bitrate looks better than 720p at high bitrate.'] },
  'FC-187': { desc: 'Full team watches the final cut together. Everyone approves. If changes needed, make them NOW — no day-of edits.', notes: ['Watch on a big screen or projector if possible. Check audio levels, visual clarity, timing.'] },
  'FC-188': { desc: 'CRITICAL: Upload the final video to the hackathon submission platform. Verify it plays correctly. Do this the NIGHT BEFORE, not day-of.', notes: ['Save the submission link. Screenshot the confirmation. Tell the team it\'s submitted.'] },

  // ── Phase 8: Pitch Deck ──
  'FC-189': { desc: 'Create a slide deck: 5-7 slides maximum. Slides are a BACKUP to the video — they support the story, not replace it.', notes: ['Google Slides or Keynote. Use the Elktron design system colors. Big fonts, few words per slide.'] },
  'FC-190': { desc: 'Slide 1: Title. Elktron logo (or text), team name, "Build with Velocity" track, date. Clean, bold, memorable.', notes: ['One slide, 5 seconds. Set the tone. No paragraphs.'] },
  'FC-191': { desc: 'Slide 2: Problem. Unmonitored vendors on the DC floor. Manual optic seating is slow and error-prone. Physical tasks that should be automated.', notes: ['Use a compelling stat if available. "X hours per week on manual optic seating" or "Y vendor visits per month unescorted."'] },
  'FC-192': { desc: 'Slide 3: Solution diagram. Simple visual showing: Escort Bot (follows vendor) + SO-101 Arm (seats optics) + Dashboard (unified view). Three boxes, connected.', notes: ['This is the architecture slide. Keep it visual, not text-heavy. Icons + arrows + labels.'] },
  'FC-193': { desc: 'Slide 4: Escort Bot detail. Architecture diagram + demo screenshot or GIF. Highlight: Pi 5, YOLOv8n person detection, autonomous following.', notes: ['Show the tech stack but don\'t make it a spec sheet. Focus on what it DOES, not what it\'s built with.'] },
  'FC-194': { desc: 'Slide 5: SO-101 Arm detail. Pipeline diagram: teleoperation → recording → training → autonomous. Show a demo screenshot.', notes: ['The pipeline is the story: human teaches the robot, robot learns, robot executes. That\'s powerful.'] },
  'FC-195': { desc: 'Slide 6: Dashboard screenshot. Full-screen capture of the dashboard with live data. Highlight: real-time telemetry, scan logs, camera feeds.', notes: ['The dashboard ties everything together visually. Judges love seeing a polished UI.'] },
  'FC-196': { desc: 'Slide 7: Impact + Roadmap. What this saves (time, errors, manual labor). Where it goes next (more tasks, more robots, DC-wide deployment).', notes: ['End strong. "Elktron turns $400 in hardware into an autonomous DC floor assistant."'] },
  'FC-197': { desc: 'Full team reviews the slide deck. Check for typos, alignment, timing. Approve and lock.', notes: ['Review on a projector if possible. What looks good on a laptop can look bad on a big screen.'] },

  // ── Phase 9: Integration ──
  'FC-198': { desc: 'CRITICAL: Run both robots simultaneously. Escort bot following a person WHILE the arm executes optic seating. Verify no interference.', checks: ['Escort bot running on Pi', 'Arm running on laptop', 'Both on same WiFi', 'Dashboard receiving from both'], notes: ['The robots are independent systems, but they share WiFi bandwidth. Test for latency spikes.'] },
  'FC-199': { desc: 'Verify the dashboard receives live telemetry from the escort bot. Mode changes, sonar readings, and motor speeds should all update in real-time.', deps: ['FC-170'] },
  'FC-200': { desc: 'Verify the dashboard receives live telemetry from the SO-101 arm. Joint angles, gripper state, and mode should all update in real-time.', deps: ['FC-169'] },
  'FC-201': { desc: 'Attempt to stream the escort bot camera feed to the dashboard. MJPEG over HTTP is simplest. If too laggy, use a static frame refresh.', notes: ['Camera streaming is a stretch goal. A placeholder image that refreshes every 2s is acceptable for the demo.'] },
  'FC-202': { desc: 'Verify scan reports auto-populate in the dashboard scan log when the escort bot completes a scan cycle.', notes: ['The bot should POST a scan report to the backend after each SCAN mode cycle. Dashboard updates the log table.'] },
  'FC-203': { desc: 'Full end-to-end demo dry run WITHOUT recording. Walk through the entire 3-minute demo: narration, escort bot demo, arm demo, dashboard show.', checks: ['Narration flows naturally', 'Escort bot demo works', 'Arm demo works', 'Dashboard shows data', 'Total time < 3 min'] },
  'FC-204': { desc: 'Time the full demo. Must be under 3 minutes. If over, identify what to cut or condense.', notes: ['Use a stopwatch. Be honest. If it\'s 3:30, something must go.'] },
  'FC-205': { desc: 'Run the full demo 3 times back-to-back. This stress tests reliability. If anything fails 2 out of 3 times, it needs fixing or cutting.', notes: ['Better to discover failures now than during the actual demo. Note every glitch.'] },
  'FC-206': { desc: 'Failsafe drill: if the escort bot fails during demo, Romeo manually operates it or narrates what WOULD happen with pre-recorded video backup.', notes: ['Have the B-roll video ready on a second laptop. Seamless transition: "And here\'s what that looks like in action" → cut to video.'] },
  'FC-207': { desc: 'Failsafe drill: if autonomous arm execution fails, Josh switches to teleoperation mode and demonstrates the task manually.', notes: ['Teleoperation is still impressive — a human controlling a robot arm in real-time. Frame it as "here\'s how we train the robot."'] },
  'FC-208': { desc: 'Failsafe drill: if WiFi fails, run dashboard locally with mock data. The visual story is the same even without live telemetry.', notes: ['Pre-load mock data that cycles through realistic values. Judges won\'t know the difference.'] },
  'FC-209': { desc: 'Network test: Pi and laptop on the same WiFi. WebSocket connection stable for 5+ minutes with continuous data flow. No drops.', checks: ['WebSocket stays connected 5+ min', 'No data gaps', 'Latency < 200ms', 'Recovers from brief WiFi blip'] },

  // ── Phase 10: Demo Day ──
  'FC-210': { desc: 'Charge ALL batteries and power banks the night before. Do NOT leave this for demo morning.', checks: ['18650 batteries x4 fully charged', 'USB-C power bank fully charged', 'Laptop fully charged', 'Phone fully charged (for recording)'] },
  'FC-211': { desc: 'Pack everything in labeled boxes the night before. Use a packing checklist — missing one cable can derail the demo.', checks: ['Escort bot (complete)', 'SO-101 arm (both arms)', 'Laptop + charger', 'All cables', 'Power supplies', 'Demo props'] },
  'FC-212': { desc: 'Packing checklist — robots and compute: escort bot (fully assembled), both SO-101 arms, laptop (with all code), laptop charger.', checks: ['Escort bot chassis with mast', 'Pi 5 (on chassis)', 'Leader arm', 'Follower arm', 'Laptop', 'Laptop charger'] },
  'FC-213': { desc: 'Packing checklist — cables and adapters: USB-C hub, USB-C data cables x3, extension cords, power strips.', checks: ['USB-C hub', 'USB-C cables x3 (data-verified)', 'Power strip', 'Extension cord (10ft min)'] },
  'FC-214': { desc: 'Packing checklist — power: 12V PSU (arm), 5V PSU (arm), USB-C power bank (Pi), spare 18650 batteries, battery charger.', checks: ['12V 5A PSU + barrel connector', '5V PSU', 'USB-C power bank', 'Spare 18650 batteries', 'Battery charger (just in case)'] },
  'FC-215': { desc: 'Packing checklist — demo props: optic transceiver tray with sample optics, simulated switch port fixture (for arm demo).', notes: ['These are the physical props the arm manipulates. Without them, the arm demo has nothing to grab.'] },
  'FC-216': { desc: 'Packing checklist — emergency repair: small screwdriver set, velcro strips, zip ties, electrical tape, spare jumper wires.', notes: ['Murphy\'s law: something will break or come loose. These let you fix it in minutes.'] },
  'FC-217': { desc: 'Packing checklist — presentation: phone tripod, Elktron printed sign or banner, name tags or team shirts if available.', notes: ['A printed Elktron sign makes the booth look professional. Even a simple card stock printout helps.'] },
  'FC-218': { desc: 'Arrive at the venue 30 minutes before kickoff. First to set up = best table position = more time for testing.', notes: ['Everyone should know the venue address and parking situation the night before.'] },
  'FC-219': { desc: 'CRITICAL: Set up the full demo at the venue and test everything. Don\'t assume it works because it worked at home — venues have different WiFi, lighting, and power.', checks: ['Table set up', 'Robots powered on', 'WiFi connected', 'Dashboard running', 'Full demo dry run at venue'] },
  'FC-220': { desc: 'Connect to venue WiFi. SSH into the Pi. Verify the dashboard WebSocket connects. If venue WiFi is locked/unreliable, fall back to hotspot.', checks: ['Pi on venue WiFi', 'SSH works', 'Dashboard connects', 'Latency acceptable'] },
  'FC-221': { desc: 'If venue WiFi is unreliable: set up a phone hotspot. Connect both Pi and laptop to the hotspot. This is a known-good network you control.', notes: ['Test the hotspot setup at home first. Know the SSID and password. Have it pre-configured on the Pi.'] },
  'FC-222': { desc: 'CRITICAL: Full dry run at the venue before judges arrive. Run the complete demo exactly as you would present it. Fix any issues.', notes: ['This is the final rehearsal. Time it. Note any hiccups. Adjust on the spot.'] },
  'FC-223': { desc: 'Romeo: you narrate and present. You know the project inside and out. Be confident, be clear, stay on script. Make eye contact with judges.', notes: ['Speak slowly and clearly. Pause between sections. Let the robots do the talking when they\'re demonstrating.'] },
  'FC-224': { desc: 'Raphael: you operate the escort bot during the live demo. Start it, walk with the "vendor", handle any issues.', notes: ['Know the emergency stop procedure. If the bot acts weird, calmly stop it and explain what it was trying to do.'] },

  'FC-233': { desc: 'DECISION REQUIRED: Stock CSI cable is ~15cm. Max reliable CSI extension is 500mm (1.64ft) — NOT enough for 3.5ft mast. Three options: (A) Arducam CSI-to-HDMI adapter kit (~$35) — converts CSI to HDMI, run standard HDMI cable up the mast (3-5m reliable), best signal quality. (B) USB webcam — simplest, zero signal issues, slightly higher CPU load/latency. (C) Raw 1m CSI extension — risky, signal degradation likely at 1m+.', checks: ['RESEARCH DONE: CSI max reliable = 500mm', 'Option A: Order CSI-to-HDMI adapter ($35) + HDMI cable ($15)', 'Option B: Use USB webcam + USB extension cable', 'Option C: Risk raw 1m CSI (NOT recommended)', 'Make decision and update FC-081'], links: [['Arducam CSI-to-HDMI Adapter Kit (Amazon)', 'https://www.amazon.com/Arducam-Extension-Module-Raspberry-Specific/dp/B0CBXDNBM63'], ['Arducam HDMI Extension Docs', 'https://docs.arducam.com/Camera-Extension-Solution/HDMI-Extension-Kit/'], ['Pi Forums: CSI Cable Length Limits', 'https://forums.raspberrypi.com/viewtopic.php?t=262041']], notes: ['RECOMMENDED: Option A (CSI-to-HDMI adapter). Keeps IMX708 native quality + picamera2 compatibility. HDMI is designed for this distance. No code changes needed.', 'FALLBACK: Option B (USB webcam). Zero risk, but needs ~10 lines of code changes from picamera2 to cv2.VideoCapture().', 'CSI2 signals are only 200mV swing — easily swamped by noise beyond 500mm. Do NOT rely on raw CSI at 1m+.', 'MAKE THIS DECISION BY MARCH 13 — it blocks the camera mast build.'] },
  'FC-234': { desc: 'If choosing Option A (CSI-to-HDMI): order the Arducam adapter kit + a 1.5m shielded HDMI cable. Test signal integrity through the full chain: Pi 5 CSI port → adapter → HDMI cable → adapter → IMX708.', checks: ['Order Arducam CSI-to-HDMI adapter (pack of 2)', 'Order 1.5m shielded HDMI cable', 'Connect full chain: Pi → adapter → HDMI → adapter → camera', 'Run libcamera-hello for 60s', 'Check for dropped frames or artifacts', 'Measure frame rate (should match direct connection)'], links: [['Arducam CSI-to-HDMI Kit (Amazon)', 'https://www.amazon.com/Arducam-Extension-Module-Raspberry-Specific/dp/B0CBXDNBM63']], notes: ['HDMI is designed for multi-meter runs — signal should be clean. The adapter is plug-and-play, no software config needed.', 'Route the HDMI cable through the PVC pipe. It is stiffer than CSI ribbon but handles distance much better.'] },
  'FC-235': { desc: 'Fallback: use a USB webcam on the mast instead of the CSI camera. Route a USB extension cable through the PVC pipe. Requires updating main.py from picamera2 to cv2.VideoCapture().', checks: ['USB webcam selected (720p+ with autofocus)', 'USB extension cable (6ft / 2m, USB 2.0)', 'Test webcam: python -c "import cv2; c=cv2.VideoCapture(0); print(c.read()[0])"', 'Update main.py to use cv2 instead of picamera2'], notes: ['USB adds ~50ms latency vs CSI. For person following at walking speed, this is acceptable. Code change is ~10 lines.'] },
  'FC-236': { desc: 'Route the camera cable (CSI ribbon or USB) cleanly up the inside of the PVC pipe. Use zip ties or velcro at entry/exit points. Cable should not be visible or dangling.', checks: ['Cable enters PVC at base cleanly', 'Cable exits at top cleanly', 'No stress on connectors', 'No visible cable outside the pipe'], notes: ['Thread the cable BEFORE mounting the mast. Much easier. Leave a service loop at the base for strain relief.'] },
  'FC-237': { desc: 'Mount the USB-C power bank securely to the chassis. Use velcro strips for easy removal (charging). Position it centrally for weight balance.', checks: ['Power bank attached with velcro', 'Won\'t detach during movement', 'USB-C port accessible', 'Weight centered on chassis'], notes: ['Don\'t use tape — you need to remove it for charging. Velcro lets you swap quickly.'] },
  'FC-238': { desc: 'Create a clear power routing diagram showing all power connections. Print and laminate for the workbench. Include: battery → motor driver → motors, power bank → Pi, PSUs → arms.', checks: ['Diagram shows all power paths', 'Voltage and current labeled on each path', 'GND connections highlighted', 'Diagram printed/posted at workbench'], notes: ['This prevents wiring mistakes and helps new team members understand the system instantly.'] },
  'FC-239': { desc: 'Research QR code-based localization for the escort bot. Idea: print QR codes at known positions in the demo area. Bot\'s camera reads them to know its approximate position.', links: [['OpenCV QR Detection', 'https://docs.opencv.org/4.x/d5/dae/tutorial_aruco_detection.html']], notes: ['This is a stretch goal. ArUco markers (OpenCV) are easier than QR codes — designed for pose estimation. Could enable the bot to navigate to specific rack positions.', 'LOW PRIORITY: Only pursue if core demo is working well and there is time.'] },
  'FC-240': { desc: 'If implementing QR localization: print ArUco markers on card stock. Mount at demo area waypoints (rack positions). Bot reads markers to determine position + orientation.', notes: ['Each marker has a unique ID. Place at: start position, rack 1, rack 2, end position. Bot reads ID + estimates distance from marker size.'], deps: ['FC-239'] },
  'FC-241': { desc: 'Assemble the emergency repair kit. Pack: precision screwdriver set, spare jumper wires, electrical tape, velcro, zip ties, spare screws, USB cables.', checks: ['Precision screwdriver (PH0, PH1)', 'Spare jumper wires (M-F, M-M)', 'Electrical tape', 'Velcro strips', 'Zip ties (small)', 'Spare M2/M3 screws', 'Spare USB-C cable'] },
  'FC-242': { desc: 'Create a simple 2D floor plan overlay for the dashboard showing the demo area layout: rack positions, bot starting position, walking path.', notes: ['A simple SVG or canvas drawing. Shows the bot\'s position as a moving dot (updated via telemetry). Low priority but visually impressive.'] },
  'FC-243': { desc: 'Install Tailscale VPN on Pi 5 so team members can reach it remotely at 100.85.225.68. Confirmed working as of 3/17.', checks: ['Tailscale installed', 'Pi accessible at 100.85.225.68', 'SSH works over Tailscale'], notes: ['DONE: Pi reachable at 100.85.225.68 via Tailscale VPN.'] },

  'FC-246': { desc: 'Verify Python venv has all required packages working: torch, ultralytics (YOLOv8), picamera2, pillow, numpy.', checks: ['torch imports', 'ultralytics imports', 'picamera2 imports', 'pillow imports'], notes: ['DONE: All imports verified 3/17.'] },
  'FC-247': { desc: 'ROOT CAUSE: L298N motor driver +5V logic pin was not connected to Pi 5V. GPIO signals reach L298N but the driver cannot activate its H-bridge outputs without 5V logic power. Fix: connect Pi 5V pin → L298N +5V input (with regulator jumper REMOVED).', checks: ['Remove L298N 5V regulator jumper', 'Wire Pi 5V → L298N +5V pin', 'Verify motor spin with test_motors.py'], notes: ['This is THE blocker for all motor testing. GPIO signals are confirmed active but L298N outputs are 0V.', 'Found 3/17 during debug session. Test script: test_motors.py shows "signal active: YES" but no wheel movement.'], links: [['L298N Datasheet', 'https://www.sparkfun.com/datasheets/Robotics/L298_H_Bridge.pdf']] },
  'FC-248': { desc: 'Order a 3ft CSI camera ribbon cable for mounting the Arducam camera on top of the PVC mast. Standard ribbon is too short.', notes: ['DONE: Ordered 3/17. Arriving ~3/19.'] },

  'FC-251': { desc: 'Add GET /state endpoint to Pi API server. Returns current bot mode (FOLLOW/SCAN/IDLE), person bounding box, scan progress, ultrasonic distance, battery level. See models.py EscortState for the exact schema.', checks: ['Endpoint returns JSON', 'Mode field matches actual bot state', 'Dashboard escort.py can parse the response'], links: [['models.py', 'file:///Users/rpatino/hackathon/elktron-app/api/models.py']] },
