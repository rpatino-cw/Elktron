    ],
    questions: [
      'Is there anything specific you want to learn from this hackathon?',
      'Would you like to shadow a specific team member during build?',
      'Are you available to help with demo day logistics?',
    ]
  }
};

let briefingMember = null;

function renderBriefing() {
  const el = document.getElementById('briefing-view');
  const activeTasks = memberId => TASKS.filter(t => t.owner === memberId);

  // Member strip
  let html = '<div class="briefing-member-strip">';
  TEAM.filter(m => m.id !== 'andrew').forEach(m => {
    const tasks = activeTasks(m.id);
    const done = tasks.filter(t => getStatus(t.id) === 'done').length;
    html += `<div class="briefing-member-card ${briefingMember === m.id ? 'selected' : ''}" onclick="selectBriefingMember('${m.id}')">
      <span class="member-dot" style="background:${m.color}">${m.short}</span>
      <div class="briefing-member-info">
        <span class="briefing-member-name">${m.name.split(' ')[0]}</span>
        <span class="briefing-member-role">${m.role}</span>
      </div>
      <span class="briefing-member-stat">${done}/${tasks.length}</span>
    </div>`;
  });
  html += '</div>';

  if (!briefingMember) {
    html += '<div class="briefing-empty">Select a team member above to see their briefing.</div>';
    el.innerHTML = html;
    return;
  }

  const m = getMember(briefingMember);
  const data = BRIEFING_DATA[briefingMember];
  const tasks = activeTasks(briefingMember);
  if (!m || !data) { el.innerHTML = html; return; }

  html += '<div class="briefing-panel">';

  // Section 1: Your Tasks (sorted by priority)
  const prOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  const sortedTasks = [...tasks].sort((a, b) => (prOrder[a.priority] ?? 3) - (prOrder[b.priority] ?? 3));
  const notDone = sortedTasks.filter(t => getStatus(t.id) !== 'done');
  const doneTasks = sortedTasks.filter(t => getStatus(t.id) === 'done');

  html += `<div class="briefing-section">
    <div class="briefing-section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Your Tasks (${notDone.length} remaining, ${doneTasks.length} done)
    </div>`;
  [...notDone, ...doneTasks].forEach(t => {
    const s = getStatus(t.id);
    const st = STATUSES.find(x => x.id === s);
    const isDone = s === 'done';
    let dueCls = '';
    if (t.due && isDueOver(t.due) && !isDone) dueCls = 'overdue';
    else if (t.due && isDueSoon(t.due) && !isDone) dueCls = 'soon';
    html += `<div class="briefing-task-row ${isDone ? 'is-done' : ''}">
      <span class="pill-dot" style="background:${st.color};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
      <span class="briefing-task-id">${t.id}</span>
      <span class="briefing-task-text" onclick="openDrawer('${t.id}')" style="cursor:pointer">${t.text}</span>
      ${t.due ? `<span class="briefing-task-due ${dueCls}">${t.due}</span>` : ''}
    </div>`;
  });
  html += '</div>';

  // Section 2: Timeline
  const timelineTasks = [...tasks].filter(t => t.due).sort((a, b) => {
    const [am, ad] = a.due.split('/').map(Number);
    const [bm, bd] = b.due.split('/').map(Number);
    return (am * 100 + ad) - (bm * 100 + bd);
  });
  if (timelineTasks.length) {
    html += `<div class="briefing-section">
      <div class="briefing-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Timeline
      </div>`;
    let lastDate = '';
    timelineTasks.forEach(t => {
      const [mo, day] = t.due.split('/').map(Number);
      const dateStr = `March ${day}`;
      if (dateStr !== lastDate) {
        html += `<div class="briefing-timeline-date">${dateStr}</div>`;
        lastDate = dateStr;
      }
      const s = getStatus(t.id);
      const st = STATUSES.find(x => x.id === s);
      const isDone = s === 'done';
      html += `<div class="briefing-task-row ${isDone ? 'is-done' : ''}">
        <span class="pill-dot" style="background:${st.color};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
        <span class="briefing-task-id">${t.id}</span>
        <span class="briefing-task-text">${t.text}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Section 3: Links & Resources
  if (data.links && data.links.length) {
    html += `<div class="briefing-section">
      <div class="briefing-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        Links & Resources
      </div>`;
    data.links.forEach(l => {
      html += `<a class="briefing-link" href="${l.url}" target="_blank">
        <span class="briefing-link-cat">${l.cat}</span>
        ${l.label}
      </a>`;
    });
    html += '</div>';
  }

  // Section 4: Tips & Tricks
  if (data.tips && data.tips.length) {
    html += `<div class="briefing-section">
      <div class="briefing-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 01-1 1H9a1 1 0 01-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/><path d="M9 21h6M10 17v1M14 17v1"/></svg>
        Tips & Tricks
      </div>`;
    data.tips.forEach((tip, i) => {
      html += `<div class="briefing-tip">
        <span class="briefing-tip-num">${i + 1}.</span>
        <span>${tip}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Section 5: Questions to Investigate
  if (data.questions && data.questions.length) {
    html += `<div class="briefing-section">
      <div class="briefing-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        Questions to Investigate
      </div>`;
    data.questions.forEach((q, i) => {
      const key = `${briefingMember}:${i}`;
      const checked = state.briefingChecks && state.briefingChecks[key];
      html += `<div class="briefing-question">
        <div class="briefing-q-check ${checked ? 'checked' : ''}" onclick="toggleBriefingCheck('${key}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <span style="${checked ? 'opacity:0.45;text-decoration:line-through' : ''}">${q}</span>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>'; // close briefing-panel
  el.innerHTML = html;
}

function selectBriefingMember(id) {
  briefingMember = id;
  renderBriefing();
}

function toggleBriefingCheck(key) {
  if (!state.briefingChecks) state.briefingChecks = {};
  state.briefingChecks[key] = !state.briefingChecks[key];
  saveState();
  renderBriefing();
}


// ─── DRAWER FUNCTIONS ────────────────────────────────────────────────

function openDrawer(taskId) {
  const t = TASKS.find(x => x.id === taskId);
  if (!t) return;
  const details = TICKET_DETAILS[taskId] || { desc: t.text };
  const s = getStatus(taskId);
  const st = STATUSES.find(x => x.id === s);
  const pr = PRIORITIES.find(x => x.id === t.priority);
  const m = t.owner ? getMember(t.owner) : null;
  const phase = PHASES.find(p => p.id === t.phase);

  let html = `<div class="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <span class="drawer-id">${t.id}</span>
      <span class="drawer-phase-tag" style="background:${phase.color}">${phase.name}</span>
      <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-title">${t.text}</div>
      <div class="drawer-meta-grid">
        <div class="drawer-meta-item">
          <div class="drawer-meta-label">Status</div>
          <div class="drawer-meta-value">
            <span class="t-status ${st.class}" onclick="openStatusDropdown(event,'${t.id}')" style="font-size:12px">${st.label}</span>
          </div>
        </div>
        <div class="drawer-meta-item">
          <div class="drawer-meta-label">Priority</div>
          <div class="drawer-meta-value">${pr ? renderPriority(pr) : '<span style="color:var(--text-3)">None</span>'}</div>
        </div>
        <div class="drawer-meta-item">
          <div class="drawer-meta-label">Assignee</div>
          <div class="drawer-meta-value">${m ? `<span class="t-assignee-dot" style="background:${m.color};width:18px;height:18px;font-size:8px">${m.short}</span> ${m.name}` : '<span style="color:var(--text-3)">Unassigned</span>'}</div>
        </div>
        <div class="drawer-meta-item">
          <div class="drawer-meta-label">Due</div>
          <div class="drawer-meta-value">${t.due ? `<span class="t-due ${isDueSoon(t.due)?'soon':''} ${isDueOver(t.due)?'overdue':''}">${t.due}</span>` : '<span style="color:var(--text-3)">No date</span>'}</div>
        </div>
      </div>`;

  // Description
  html += `<div class="drawer-section">
    <div class="drawer-section-title">Description</div>
    <div class="drawer-desc">${formatDesc(details.desc || t.text)}</div>
  </div>`;

  // Checklist
  if (details.checks && details.checks.length) {
    html += `<div class="drawer-section">
      <div class="drawer-section-title">Checklist</div>
      <ul class="drawer-checklist">${details.checks.map(c =>
        `<li><span class="drawer-check-icon"></span> ${c}</li>`
      ).join('')}</ul>
    </div>`;
  }

  // Links
  if (details.links && details.links.length) {
    html += `<div class="drawer-section">
      <div class="drawer-section-title">Links</div>
      <ul class="drawer-links">${details.links.map(l =>
        `<li><a href="${l[1]}" target="_blank" rel="noopener">${l[0]}</a></li>`
      ).join('')}</ul>
    </div>`;
  }

  // Notes
  if (details.notes && details.notes.length) {
    html += `<div class="drawer-section">
      <div class="drawer-section-title">Notes</div>
      <div class="drawer-notes">${details.notes.map(n =>
        `<div class="drawer-note">${formatDesc(n)}</div>`
      ).join('')}</div>
    </div>`;
  }

  // Dependencies
  if (details.deps && details.deps.length) {
    html += `<div class="drawer-section">
      <div class="drawer-section-title">Dependencies</div>
      <div class="drawer-deps">${details.deps.map(d =>
        `<span class="drawer-dep" onclick="closeDrawer();setTimeout(()=>openDrawer('${d}'),200)">${d}</span>`
      ).join('')}</div>
    </div>`;
  }

  html += `</div></div>`;
  document.getElementById('drawer-container').innerHTML = html;
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer-container').innerHTML = '';
  document.body.style.overflow = '';
}

function formatDesc(text) {
  // Bold text between ** **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code between backticks
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  // Links [text](url)
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
  return text;
}

// Close drawer on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDrawer();
});


// ─── FILTERING ───────────────────────────────────────────────────────

function getFilteredTasks() {
  let list = TASKS;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.text.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) || (t.owner && getMember(t.owner)?.name.toLowerCase().includes(q)));
  }
  if (currentFilter === 'my') list = list.filter(t => t.owner === 'romeo');
  if (currentFilter === 'unclaimed') list = list.filter(t => !t.owner);
  if (currentFilter === 'urgent') list = list.filter(t => t.priority === 'critical' || t.priority === 'high');
  if (filterMember) list = list.filter(t => t.owner === filterMember);
  if (filterPhase !== null) list = list.filter(t => t.phase === filterPhase);
  if (filterStatus) list = list.filter(t => getStatus(t.id) === filterStatus);
  return list;
}


// ─── RENDER ──────────────────────────────────────────────────────────

function renderAll() {
  renderSidebar();
  renderMetrics();
  renderToolbar();
  document.getElementById('queue-view').style.display = 'none';
  document.getElementById('kanban-view').style.display = 'none';
  document.getElementById('briefing-view').style.display = 'none';
  if (currentView === 'queue') { renderQueue(); document.getElementById('queue-view').style.display=''; }
  else if (currentView === 'kanban') { renderKanban(); document.getElementById('kanban-view').style.display='flex'; }
  else if (currentView === 'briefing') { renderBriefing(); document.getElementById('briefing-view').style.display=''; }
  renderCountdown();
}

function renderCountdown() {
  const demo = new Date('2026-03-23');
  const now = new Date();
  const days = Math.max(0, Math.ceil((demo - now) / 86400000));
  document.getElementById('countdown').textContent = `${days}d to Demo Day`;
}

function renderSidebar() {
  // Team
  document.getElementById('sidebar-team').innerHTML = TEAM.map(m => {
    const count = TASKS.filter(t => t.owner === m.id).length;
    const done = TASKS.filter(t => t.owner === m.id && getStatus(t.id) === 'done').length;
    return `<div class="sidebar-member ${filterMember === m.id || (currentView === 'briefing' && briefingMember === m.id) ? 'active' : ''}"
                 onclick="${currentView === 'briefing' ? `selectBriefingMember('${m.id}')` : `toggleMemberFilter('${m.id}')`}"
                 ondragover="event.preventDefault();this.classList.add('drop-target')"
                 ondragleave="this.classList.remove('drop-target')"
                 ondrop="dropOnMember(event,'${m.id}');this.classList.remove('drop-target')">
      <div class="member-dot" style="background:${m.color}">${m.short}</div>
      <div class="member-name">${m.name.split(' ')[0]}</div>
      <div class="member-count">${done}/${count}</div>
    </div>`;
  }).join('');

  // Phases
  document.getElementById('sidebar-phases').innerHTML = PHASES.map(p => {
    const tasks = TASKS.filter(t => t.phase === p.id);
    const done = tasks.filter(t => getStatus(t.id) === 'done').length;
    return `<button class="sidebar-item ${filterPhase === p.id ? 'active' : ''}" onclick="togglePhaseFilter(${p.id})">
      <span style="width:8px;height:8px;border-radius:3px;background:${p.color};flex-shrink:0"></span>
      ${p.name}
      <span class="sidebar-badge">${done}/${tasks.length}</span>
    </button>`;
  }).join('');

  // Badges
  document.getElementById('badge-all').textContent = TASKS.length;
  document.getElementById('badge-my').textContent = TASKS.filter(t => t.owner === 'romeo').length;
  document.getElementById('badge-unclaimed').textContent = TASKS.filter(t => !t.owner).length;
  document.getElementById('badge-urgent').textContent = TASKS.filter(t => t.priority === 'critical' || t.priority === 'high').length;

  // Active states
  document.querySelectorAll('.sidebar-item[data-filter]').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === currentFilter);
  });
}

function renderMetrics() {
  const counts = { todo: 0, progress: 0, review: 0, done: 0, blocked: 0 };
  TASKS.forEach(t => counts[getStatus(t.id)]++);
  const total = TASKS.length;

  document.getElementById('metrics').innerHTML = [
    { key: 'todo', label: 'To Do', cls: 'm-todo' },
    { key: 'progress', label: 'In Progress', cls: 'm-progress' },
    { key: 'review', label: 'In Review', cls: 'm-review' },
    { key: 'done', label: 'Done', cls: 'm-done' },
    { key: 'blocked', label: 'Blocked', cls: 'm-blocked' },
  ].map(m => `<div class="metric-block ${m.cls}">
    <div class="metric-val">${counts[m.key]}</div>
    <div class="metric-label">${m.label}</div>
  </div>`).join('');

  document.getElementById('master-bar').innerHTML = ['done','progress','review','blocked','todo'].map(s =>
    `<div class="master-bar-seg s-${s}" style="flex:${counts[s]}"></div>`
  ).join('');

  // Sub tabs
  document.getElementById('sub-tabs').innerHTML = PHASES.map(p => {
    const tasks = TASKS.filter(t => t.phase === p.id);
    const done = tasks.filter(t => getStatus(t.id) === 'done').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    return `<button class="sub-tab ${filterPhase === p.id ? 'active' : ''}" onclick="togglePhaseFilter(${p.id})">${p.name.split(' ')[0]} ${pct}%</button>`;
  }).join('');
}

function renderToolbar() {
  document.getElementById('status-pills').innerHTML = STATUSES.map(s =>
    `<button class="pill-filter ${filterStatus === s.id ? 'active' : ''}" onclick="toggleStatusFilter('${s.id}')">
      <span class="pill-dot" style="background:${s.color}"></span>${s.label}
    </button>`
  ).join('');
}

function renderQueue() {
  const tasks = getFilteredTasks();
  const grouped = {};
  tasks.forEach(t => { if (!grouped[t.phase]) grouped[t.phase] = []; grouped[t.phase].push(t); });

  let html = '';
  PHASES.forEach(p => {
    const pts = grouped[p.id];
    if (!pts) return;
    const done = pts.filter(t => getStatus(t.id) === 'done').length;
    const pct = Math.round(done/pts.length*100);

    html += `<div class="phase-group" id="pg-${p.id}" style="animation-delay:${0.15 + p.id * 0.06}s">
      <div class="phase-group-header" onclick="document.getElementById('pg-${p.id}').classList.toggle('collapsed')">
        <svg class="phase-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        <span class="phase-group-color" style="background:${p.color}"></span>
        <span class="phase-group-name">${p.name}</span>
        <span class="phase-group-count">${done}/${pts.length}</span>
        <span class="phase-group-bar"><span class="phase-group-bar-fill" style="width:${pct}%"></span></span>
        ${p.due ? `<span class="t-due ${isDueSoon(p.due) ? 'soon' : ''}">${p.due}</span>` : ''}
      </div>
      ${p.desc ? `<div class="phase-group-desc">${p.desc}</div>` : ''}
      <table class="ticket-table">
        <thead><tr>
          <th></th><th>ID</th><th>Ticket</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due</th>
        </tr></thead>
        <tbody>${pts.map((t,i) => renderRow(t,i)).join('')}</tbody>
      </table>
    </div>`;
  });

  if (!html) html = '<div style="text-align:center;padding:60px;color:var(--text-3)">No tickets match.</div>';
  document.getElementById('queue-view').innerHTML = html;
}

function renderRow(t, i) {
  const s = getStatus(t.id);
  const st = STATUSES.find(x => x.id === s);
  const pr = PRIORITIES.find(x => x.id === t.priority);
  const m = t.owner ? getMember(t.owner) : null;
  const isDone = s === 'done';

  return `<tr class="ticket-row ${isDone ? 'done-row' : ''}" draggable="true" data-task="${t.id}"
              ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)"
              style="animation-delay:${i*0.02}s">
    <td><div class="t-check ${isDone ? 'checked' : ''}" onclick="cycleStatus('${t.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
    </div></td>
    <td><span class="t-id">${t.id}</span></td>
    <td><span class="t-title" onclick="openDrawer('${t.id}')">${t.text}</span></td>
    <td><button class="t-status ${st.class}" onclick="openStatusDropdown(event,'${t.id}')">${st.label}</button></td>
    <td>${renderPriority(pr)}</td>
    <td>${m ? `<span class="t-assignee" onclick="openAssignDropdown(event,'${t.id}')"><span class="t-assignee-dot" style="background:${m.color}">${m.short}</span><span class="t-assignee-name">${m.name.split(' ')[0]}</span></span>` : `<span class="t-assignee-empty" onclick="openAssignDropdown(event,'${t.id}')">+</span>`}</td>
    <td>${t.due ? `<span class="t-due ${isDueSoon(t.due) ? 'soon' : ''} ${isDueOver(t.due) ? 'overdue' : ''}">${t.due}</span>` : ''}</td>
  </tr>`;
}

function renderPriority(pr) {
  if (!pr) return '';
  const bars = [4,6,8,10].map((h,i) =>
    `<span class="priority-bar" style="height:${h}px;${i >= pr.bars ? 'opacity:0.2' : ''}"></span>`
  ).join('');
  return `<span class="t-priority ${pr.class}"><span class="priority-bars">${bars}</span> ${pr.label}</span>`;
}

function isDueSoon(d) {
  if (!d) return false;
  const [m,day] = d.split('/').map(Number);
  const due = new Date(2026, m-1, day);
  const diff = (due - new Date()) / 86400000;
  return diff >= 0 && diff <= 2;
}

function isDueOver(d) {
  if (!d) return false;
  const [m,day] = d.split('/').map(Number);
  const due = new Date(2026, m-1, day);
  return new Date() > due;
}

// ─── KANBAN ──────────────────────────────────────────────────────────

function renderKanban() {
  const tasks = getFilteredTasks();
  const cols = STATUSES.map(s => ({
    ...s,
    tasks: tasks.filter(t => getStatus(t.id) === s.id)
  }));

  document.getElementById('kanban-view').innerHTML = cols.map(col => `
    <div class="kanban-col">
      <div class="kanban-col-header">
        <span class="kanban-col-dot" style="background:${col.color}"></span>
        <span class="kanban-col-name">${col.label}</span>
        <span class="kanban-col-count">${col.tasks.length}</span>
      </div>
      <div class="kanban-col-body" data-status="${col.id}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="dropOnStatus(event,'${col.id}');this.classList.remove('drag-over')">
        ${col.tasks.map((t,i) => renderKanbanCard(t,i)).join('')}
      </div>
    </div>
  `).join('');
}

function renderKanbanCard(t, i) {
  const m = t.owner ? getMember(t.owner) : null;
  const pr = PRIORITIES.find(x => x.id === t.priority);
  const phase = PHASES.find(p => p.id === t.phase);
  return `<div class="kanban-card" draggable="true" data-task="${t.id}"
               ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)"
               style="animation-delay:${i*0.03}s;border-left:3px solid ${phase.color}">
    <div class="kanban-card-id">${t.id}</div>
    <div class="kanban-card-title" onclick="openDrawer('${t.id}')">${t.text}</div>
    <div class="kanban-card-footer">
      ${pr ? `<span class="t-priority ${pr.class}" style="font-size:10px">${pr.label}</span>` : ''}
      <span style="flex:1"></span>
      ${m ? `<span class="t-assignee-dot" style="width:20px;height:20px;font-size:8px;background:${m.color}" title="${m.name}">${m.short}</span>` : `<span class="t-assignee-empty" style="width:20px;height:20px;font-size:10px" onclick="openAssignDropdown(event,'${t.id}')">+</span>`}
    </div>
  </div>`;
}


// ─── DROPDOWNS ───────────────────────────────────────────────────────

function closeDropdowns() {
  document.querySelectorAll('.assign-dropdown,.status-dropdown').forEach(el => el.remove());
  openDropdown = null;
}

document.addEventListener('click', (e) => {
  if (openDropdown && !e.target.closest('.assign-dropdown,.status-dropdown,.t-status,.t-assignee,.t-assignee-empty')) closeDropdowns();
});

function openAssignDropdown(e, taskId) {
  e.stopPropagation(); closeDropdowns();
  const rect = e.currentTarget.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.className = 'assign-dropdown';
  dd.style.top = rect.bottom + 4 + 'px';
  dd.style.left = rect.left + 'px';

  dd.innerHTML = `<button class="assign-option" onclick="assignTask('${taskId}',null)">
    <span style="width:20px;height:20px;border-radius:50%;border:2px dashed var(--border-2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-4)">-</span>
    Unassigned
  </button>` + TEAM.map(m => `<button class="assign-option" onclick="assignTask('${taskId}','${m.id}')">
    <span class="assign-option-dot" style="background:${m.color}">${m.short}</span>
    ${m.name}
  </button>`).join('');

  document.body.appendChild(dd);
  openDropdown = dd;
}

function openStatusDropdown(e, taskId) {
  e.stopPropagation(); closeDropdowns();
  const rect = e.currentTarget.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.className = 'status-dropdown';
  dd.style.top = rect.bottom + 4 + 'px';
  dd.style.left = rect.left + 'px';

  dd.innerHTML = STATUSES.map(s => `<button class="status-option" onclick="changeStatus('${taskId}','${s.id}')">
    <span class="status-option-dot" style="background:${s.color}"></span>
    ${s.label}
  </button>`).join('');

  document.body.appendChild(dd);
  openDropdown = dd;
}


// ─── ACTIONS ─────────────────────────────────────────────────────────

function assignTask(id, owner) {
  closeDropdowns();
  setOwner(id, owner);
  const t = TASKS.find(x => x.id === id);
  const m = owner ? getMember(owner) : null;
  toast(m ? `${m.name.split(' ')[0]} assigned to ${t.id}` : `${t.id} unassigned`);
  renderAll();
}

function changeStatus(id, status) {
  closeDropdowns();
  setStatus(id, status);
  const t = TASKS.find(x => x.id === id);
  const s = STATUSES.find(x => x.id === status);
  toast(`${t.id} → ${s.label}`, status === 'done' ? '&#10003;' : null);
  renderAll();
}

function cycleStatus(id) {
  const order = ['todo','progress','review','done'];
  const cur = getStatus(id);
  const next = order[(order.indexOf(cur) + 1) % order.length];
  changeStatus(id, next);
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.topbar-tab').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  renderAll();
}

function setFilter(f) {
  currentFilter = f;
  filterMember = null; filterPhase = null; filterStatus = null;
  renderAll();
}

function toggleMemberFilter(id) {
  filterMember = filterMember === id ? null : id;
  currentFilter = 'all';
  renderAll();
}

function togglePhaseFilter(id) {
  filterPhase = filterPhase === id ? null : id;
  currentFilter = 'all';
  renderAll();
}

function toggleStatusFilter(id) {
  filterStatus = filterStatus === id ? null : id;
  renderAll();
}


// ─── DRAG & DROP ─────────────────────────────────────────────────────

let dragId = null;

function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(() => e.target.classList.add('dragging'));
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  dragId = null;
}

function dropOnMember(e, memberId) {
  e.preventDefault();
  const id = e.dataTransfer.getData('text/plain');
  if (id) assignTask(id, memberId);
}

function dropOnStatus(e, status) {
  e.preventDefault();
  const id = e.dataTransfer.getData('text/plain');
  if (id) changeStatus(id, status);
}


// ─── SEARCH ──────────────────────────────────────────────────────────

let searchTimer;
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (currentView === 'queue') renderQueue(); else renderKanban();
  }, 150);
});


// ─── TOAST ───────────────────────────────────────────────────────────

function toast(msg, icon) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = (icon ? `<span class="toast-icon">${icon}</span>` : '') + msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}


// ─── INIT ────────────────────────────────────────────────────────────

renderAll();
</script>
</body>
</html>
