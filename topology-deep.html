<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elktron Deep Topology</title>
  <link rel="stylesheet" href="design-system.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --cat-hardware: #dc2626;
      --cat-hardware-bg: rgba(220, 38, 38, 0.08);
      --cat-software: #16a34a;
      --cat-software-bg: rgba(22, 163, 74, 0.08);
      --cat-threejs: #ea580c;
      --cat-threejs-bg: rgba(234, 88, 12, 0.08);
      --cat-static: #ca8a04;
      --cat-static-bg: rgba(202, 138, 4, 0.08);
      --cat-claude: #2741E7;
      --cat-claude-bg: rgba(39, 65, 231, 0.08);
      --cat-docs: #9333ea;
      --cat-docs-bg: rgba(147, 51, 234, 0.08);
      --cat-memory: #0d9488;
      --cat-memory-bg: rgba(13, 148, 136, 0.08);
      --cat-assets: #ec4899;
      --cat-assets-bg: rgba(236, 72, 153, 0.08);
      --cat-deps: #6b7280;
      --cat-deps-bg: rgba(107, 114, 128, 0.08);
      --cat-team: #06b6d4;
      --cat-team-bg: rgba(6, 182, 212, 0.08);
      --cat-external: #374151;
      --cat-external-bg: rgba(55, 65, 81, 0.08);
    }

    body {
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- HEADER ---- */
    .topo-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .topo-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
    }
    .topo-brand {
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-primary);
    }
    .topo-title {
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: var(--tracking-tight);
    }
    .topo-subtitle {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      letter-spacing: var(--tracking-wide);
    }
    .topo-count {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-weight: var(--weight-medium);
    }
    .topo-stats {
      display: flex;
      gap: 16px;
      padding: 6px 24px 8px;
      overflow-x: auto;
      border-top: 1px solid var(--border-subtle);
    }
    .topo-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--text-tertiary);
      white-space: nowrap;
    }
    .topo-stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .topo-stat-num {
      font-family: var(--font-mono);
      color: var(--text-primary);
    }

    /* ---- SIDEBAR ---- */
    .topo-sidebar {
      position: fixed;
      top: 88px;
      left: 0;
      bottom: 0;
      width: 220px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--border-subtle);
      z-index: 90;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
      user-select: none;
    }
    .filter-row:hover { opacity: 0.8; }
    .filter-row input[type="checkbox"] {
      accent-color: var(--accent-primary);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .filter-label {
      font-size: 12px;
      font-weight: var(--weight-medium);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-tertiary);
      margin-left: auto;
    }

    .search-box {
      width: 100%;
      padding: 8px 10px;
      font-family: var(--font-sans);
      font-size: 12px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      outline: none;
      background: var(--bg-surface);
      color: var(--text-primary);
    }
    .search-box:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--glow-soft);
    }
    .search-box::placeholder {
      color: var(--text-tertiary);
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-btn {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .sidebar-btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: var(--accent-primary-muted);
    }

    /* ---- DETAIL PANEL ---- */
    .detail-panel {
      position: fixed;
      top: 88px;
      right: 0;
      bottom: 0;
      width: 300px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-left: 1px solid var(--border-subtle);
      z-index: 90;
      padding: 20px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .detail-panel.open {
      transform: translateX(0);
    }
    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .detail-close:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    .detail-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      border-radius: var(--radius-pill);
      margin-bottom: 10px;
    }
    .detail-name {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      margin-bottom: 4px;
      word-break: break-word;
    }
    .detail-path {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
      word-break: break-all;
    }
    .detail-desc {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .detail-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      margin-bottom: 16px;
    }
    .detail-section-title {
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }
    .detail-conn-list {
      list-style: none;
      padding: 0;
    }
    .detail-conn-list li {
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ---- GRAPH ---- */
    .graph-container {
      flex: 1;
      margin-top: 88px;
      margin-left: 220px;
      position: relative;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .node-circle {
      stroke: #fff;
      stroke-width: 1.5;
      cursor: pointer;
      transition: stroke-width 0.15s;
    }
    .node-circle:hover {
      stroke-width: 3;
    }
    .node-label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 9px;
      font-weight: 600;
      fill: var(--text-secondary);
      pointer-events: none;
      text-anchor: middle;
    }
    .link {
      fill: none;
      stroke-linecap: round;
    }
    .link-normal {
      stroke: rgba(10, 14, 26, 0.08);
    }
    .link-flow {
      stroke: rgba(39, 65, 231, 0.15);
      stroke-dasharray: 6 4;
    }
    .link-hierarchy {
      stroke: rgba(39, 65, 231, 0.12);
    }
    .link-strong {
      stroke: rgba(10, 14, 26, 0.12);
    }

    /* Highlight states */
    .node-dimmed .node-circle { opacity: 0.1; }
    .node-dimmed .node-label { opacity: 0.05; }
    .link-dimmed { opacity: 0.03; }
    .node-highlighted .node-circle {
      stroke-width: 3;
      filter: drop-shadow(0 0 6px rgba(39, 65, 231, 0.4));
    }
    .node-highlighted .node-label {
      fill: var(--text-primary);
      font-weight: 700;
      font-size: 11px;
    }
    .link-highlighted {
      stroke-opacity: 1 !important;
      stroke-width: 2.5 !important;
    }
    .node-search-match .node-circle {
      stroke: var(--accent-primary);
      stroke-width: 3;
      filter: drop-shadow(0 0 8px rgba(39, 65, 231, 0.5));
    }
    .node-search-match .node-label {
      fill: var(--accent-primary);
      font-weight: 700;
    }

    /* Animated flow edges */
    @keyframes dash-flow {
      to { stroke-dashoffset: -20; }
    }
    .link-flow {
      animation: dash-flow 1.5s linear infinite;
    }

    /* Legend in graph area */
    .graph-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 10px;
      color: var(--text-tertiary);
      display: flex;
      gap: 14px;
      z-index: 10;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-line {
      width: 20px;
      height: 2px;
      border-radius: 1px;
    }
    .legend-line-solid { background: rgba(10,14,26,0.15); }
    .legend-line-dashed {
      background: repeating-linear-gradient(90deg, rgba(39,65,231,0.3) 0 5px, transparent 5px 9px);
      height: 2px;
    }
    .legend-line-hierarchy { background: rgba(39,65,231,0.2); }

    /* Zoom controls */
    .zoom-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.92);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .zoom-btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="topo-header">
    <div class="topo-header-top">
      <div class="topo-brand">ELKTRON</div>
      <div style="text-align:center">
        <div class="topo-title">Deep Topology</div>
        <div class="topo-subtitle">Every file, every connection, every relationship</div>
      </div>
      <div class="topo-count" id="nodeCount">-- nodes / -- edges</div>
    </div>
    <div class="topo-stats" id="statsBar"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="topo-sidebar">
    <div>
      <input type="text" class="search-box" id="searchBox" placeholder="Search nodes...">
    </div>
    <div>
      <div class="sidebar-section-title">Categories</div>
      <div id="filterList"></div>
    </div>
    <div class="sidebar-actions">
      <button class="sidebar-btn" id="btnShowAll">Show All</button>
      <button class="sidebar-btn" id="btnResetLayout">Reset Layout</button>
      <button class="sidebar-btn" id="btnFitView">Fit View</button>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">&times;</button>
    <div id="detailContent"></div>
  </div>

  <!-- GRAPH -->
  <div class="graph-container" id="graphContainer">
    <svg id="graphSvg"></svg>
    <div class="graph-legend">
      <div class="legend-item"><div class="legend-line legend-line-solid"></div> Connection</div>
      <div class="legend-item"><div class="legend-line legend-line-dashed"></div> Data Flow</div>
      <div class="legend-item"><div class="legend-line legend-line-hierarchy"></div> Hierarchy</div>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomIn">+</button>
      <button class="zoom-btn" id="zoomOut">&minus;</button>
      <button class="zoom-btn" id="zoomReset" style="font-size:11px">1:1</button>
    </div>
  </div>

const svg = d3.select('#graphSvg');
const container = document.getElementById('graphContainer');
const width = container.clientWidth;
const height = container.clientHeight;

svg.attr('viewBox', [0, 0, width, height]);

// Compute node connection counts for sizing
const connCount = {};
nodes.forEach(n => connCount[n.id] = 0);
edges.forEach(e => {
  connCount[e.source] = (connCount[e.source] || 0) + 1;
  connCount[e.target] = (connCount[e.target] || 0) + 1;
});

// Node radius scale
const rScale = d3.scaleSqrt().domain([0, 20]).range([5, 18]).clamp(true);

// Assign initial positions based on zones
const zonePositions = {
  'center':       { x: width * 0.45, y: height * 0.45 },
  'top':          { x: width * 0.45, y: height * 0.12 },
  'left':         { x: width * 0.12, y: height * 0.45 },
  'right':        { x: width * 0.7,  y: height * 0.4 },
  'bottom-left':  { x: width * 0.18, y: height * 0.78 },
  'bottom-right': { x: width * 0.65, y: height * 0.78 },
  'far-right':    { x: width * 0.9,  y: height * 0.45 },
};

nodes.forEach(n => {
  const zp = zonePositions[n.zone || 'center'];
  n.x = zp.x + (Math.random() - 0.5) * 120;
  n.y = zp.y + (Math.random() - 0.5) * 100;
  n.r = rScale(connCount[n.id] || 0);
});

// Create simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d => d.id).distance(d => {
    const str = d.strength || 1;
    return str >= 3 ? 60 : str >= 2 ? 90 : 130;
  }).strength(d => {
    const str = d.strength || 1;
    return str >= 3 ? 0.4 : str >= 2 ? 0.2 : 0.08;
  }))
  .force('charge', d3.forceManyBody().strength(-180).distanceMax(400))
  .force('center', d3.forceCenter(width * 0.45, height * 0.48).strength(0.03))
  .force('collision', d3.forceCollide().radius(d => d.r + 8).strength(0.7))
  .force('x', d3.forceX().x(d => {
    const zp = zonePositions[d.zone || 'center'];
    return zp.x;
  }).strength(0.06))
  .force('y', d3.forceY().y(d => {
    const zp = zonePositions[d.zone || 'center'];
    return zp.y;
  }).strength(0.06))
  .alphaDecay(0.015)
  .velocityDecay(0.4);

// Zoom
const g = svg.append('g');
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');
['normal','flow','hierarchy'].forEach(t => {
  defs.append('marker')
    .attr('id', `arrow-${t}`)
    .attr('viewBox', '0 -3 6 6')
    .attr('refX', 6)
    .attr('refY', 0)
    .attr('markerWidth', 4)
    .attr('markerHeight', 4)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-3L6,0L0,3')
    .attr('fill', t === 'flow' ? 'rgba(39,65,231,0.3)' : t === 'hierarchy' ? 'rgba(39,65,231,0.2)' : 'rgba(10,14,26,0.15)');
});

// Draw edges
const linkG = g.append('g').attr('class', 'links');
const link = linkG.selectAll('line')
  .data(edges)
  .join('line')
  .attr('class', d => `link link-${d.type || 'normal'}`)
  .attr('stroke-width', d => {
    const s = d.strength || 1;
    return s >= 3 ? 1.8 : s >= 2 ? 1.2 : 0.7;
  })
  .attr('marker-end', d => `url(#arrow-${d.type || 'normal'})`);

// Draw nodes
const nodeG = g.append('g').attr('class', 'nodes');
const node = nodeG.selectAll('g')
  .data(nodes)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

node.append('circle')
  .attr('class', 'node-circle')
  .attr('r', d => d.r)
  .attr('fill', d => CATEGORIES[d.cat].color);

node.append('text')
  .attr('class', 'node-label')
  .attr('dy', d => d.r + 12)
  .text(d => d.label.length > 22 ? d.label.slice(0, 20) + '...' : d.label);

// Tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.x - (dx / dist) * (d.target.r + 2);
    })
    .attr('y2', d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return d.target.y - (dy / dist) * (d.target.r + 2);
    });

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag handlers
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.1).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// ============================================================
//  UI — Stats Bar
// ============================================================

const catCounts = {};
nodes.forEach(n => { catCounts[n.cat] = (catCounts[n.cat] || 0) + 1; });

document.getElementById('nodeCount').textContent = `${nodes.length} nodes / ${edges.length} edges`;

const statsBar = document.getElementById('statsBar');
Object.entries(CATEGORIES).forEach(([key, cat]) => {
  if (!catCounts[key]) return;
  const el = document.createElement('div');
  el.className = 'topo-stat';
  el.innerHTML = `<span class="topo-stat-dot" style="background:${cat.color}"></span>${cat.label}: <span class="topo-stat-num">${catCounts[key]}</span>`;
  statsBar.appendChild(el);
});

// ============================================================
//  UI — Filter Sidebar
// ============================================================

const filterState = {};
Object.keys(CATEGORIES).forEach(k => filterState[k] = true);

const filterList = document.getElementById('filterList');
Object.entries(CATEGORIES).forEach(([key, cat]) => {
  if (!catCounts[key]) return;
  const row = document.createElement('label');
  row.className = 'filter-row';
  row.innerHTML = `
    <input type="checkbox" checked data-cat="${key}">
    <span class="filter-label">
      <span class="filter-dot" style="background:${cat.color}"></span>
      ${cat.label}
    </span>
    <span class="filter-count">${catCounts[key]}</span>
  `;
  filterList.appendChild(row);
  row.querySelector('input').addEventListener('change', (e) => {
    filterState[key] = e.target.checked;
    applyFilters();
  });
});

function applyFilters() {
  const hiddenCats = new Set(Object.keys(filterState).filter(k => !filterState[k]));
  const hiddenIds = new Set(nodes.filter(n => hiddenCats.has(n.cat)).map(n => n.id));

  node.style('display', d => hiddenIds.has(d.id) ? 'none' : null);
  link.style('display', d => {
    const sid = typeof d.source === 'object' ? d.source.id : d.source;
    const tid = typeof d.target === 'object' ? d.target.id : d.target;
    return (hiddenIds.has(sid) || hiddenIds.has(tid)) ? 'none' : null;
  });
}

document.getElementById('btnShowAll').addEventListener('click', () => {
  Object.keys(filterState).forEach(k => filterState[k] = true);
  filterList.querySelectorAll('input').forEach(cb => cb.checked = true);
  applyFilters();
  clearHighlight();
});

// ============================================================
//  UI — Search
// ============================================================

const searchBox = document.getElementById('searchBox');
searchBox.addEventListener('input', () => {
  const q = searchBox.value.trim().toLowerCase();
  node.classed('node-search-match', false);
  if (!q) return;
  node.classed('node-search-match', d => {
    return d.label.toLowerCase().includes(q) ||
           d.id.toLowerCase().includes(q) ||
           (d.path && d.path.toLowerCase().includes(q)) ||
           d.desc.toLowerCase().includes(q);
  });
});

// ============================================================
//  UI — Click Highlight
// ============================================================

let selectedNode = null;

node.on('click', (event, d) => {
  event.stopPropagation();
  if (selectedNode === d.id) {
    clearHighlight();
    closeDetail();
    selectedNode = null;
    return;
  }
  selectedNode = d.id;
  highlightNode(d);
  showDetail(d);
});

svg.on('click', () => {
  clearHighlight();
  closeDetail();
  selectedNode = null;
});

function highlightNode(d) {
  const connectedIds = new Set([d.id]);
  const connectedEdges = new Set();

  edges.forEach((e, i) => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id || tid === d.id) {
      connectedIds.add(sid);
      connectedIds.add(tid);
      connectedEdges.add(i);
    }
  });

  node
    .classed('node-dimmed', n => !connectedIds.has(n.id))
    .classed('node-highlighted', n => connectedIds.has(n.id));

  link
    .classed('link-dimmed', (e, i) => !connectedEdges.has(i))
    .classed('link-highlighted', (e, i) => connectedEdges.has(i));
}

function clearHighlight() {
  node.classed('node-dimmed', false).classed('node-highlighted', false);
  link.classed('link-dimmed', false).classed('link-highlighted', false);
}

// ============================================================
//  UI — Detail Panel
// ============================================================

const detailPanel = document.getElementById('detailPanel');
const detailContent = document.getElementById('detailContent');
document.getElementById('detailClose').addEventListener('click', () => {
  closeDetail();
  clearHighlight();
  selectedNode = null;
});

function closeDetail() {
  detailPanel.classList.remove('open');
}

function showDetail(d) {
  const cat = CATEGORIES[d.cat];

  // Find connections
  const connections = [];
  edges.forEach(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    if (sid === d.id) {
      const target = nodes.find(n => n.id === tid);
      if (target) connections.push({ node: target, direction: 'outgoing', type: e.type });
    }
    if (tid === d.id) {
      const source = nodes.find(n => n.id === sid);
      if (source) connections.push({ node: source, direction: 'incoming', type: e.type });
    }
  });

  let html = `
    <div class="detail-type-badge" style="background:${cat.bg};color:${cat.color}">
      <span style="width:6px;height:6px;border-radius:50%;background:${cat.color}"></span>
      ${cat.label}
    </div>
    <div class="detail-name">${d.label}</div>
  `;

  if (d.path) html += `<div class="detail-path">${d.path}</div>`;
  html += `<div class="detail-desc">${d.desc}</div>`;
  if (d.meta) html += `<div class="detail-meta">${d.meta}</div>`;

  html += `<div class="detail-section-title">Connections (${connections.length})</div>`;
  html += '<ul class="detail-conn-list">';
  connections.forEach(c => {
    const cc = CATEGORIES[c.node.cat];
    const arrow = c.direction === 'outgoing' ? '&#8594;' : '&#8592;';
    html += `<li>
      <span class="detail-conn-dot" style="background:${cc.color}"></span>
      <span>${arrow}</span>
      <span>${c.node.label}</span>
      <span style="color:var(--text-tertiary);font-size:10px;margin-left:auto">${c.type}</span>
    </li>`;
  });
  html += '</ul>';

  detailContent.innerHTML = html;
  detailPanel.classList.add('open');
}

// ============================================================
//  UI — Hover Tooltip
// ============================================================

const tooltip = document.createElement('div');
tooltip.style.cssText = 'position:fixed;z-index:200;pointer-events:none;background:rgba(255,255,255,0.97);border:1px solid rgba(10,14,26,0.1);border-radius:7px;padding:8px 12px;font-size:11px;color:#0a0e1a;max-width:260px;box-shadow:0 4px 16px rgba(10,14,26,0.08);opacity:0;transition:opacity 0.15s;font-family:"Plus Jakarta Sans",sans-serif;';
document.body.appendChild(tooltip);

node.on('mouseenter', (event, d) => {
  if (selectedNode) return;
  const cat = CATEGORIES[d.cat];
  let html = `<div style="font-weight:700;margin-bottom:3px">${d.label}</div>`;
  html += `<div style="font-size:10px;color:${cat.color};font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px">${cat.label}</div>`;
  if (d.path) html += `<div style="font-family:Inconsolata,monospace;font-size:10px;color:#8890a6;margin-bottom:3px">${d.path}</div>`;
  html += `<div style="color:#4a5168;line-height:1.5">${d.desc}</div>`;
  if (d.meta) html += `<div style="font-family:Inconsolata,monospace;font-size:10px;color:#8890a6;margin-top:3px">${d.meta}</div>`;
  const conns = connCount[d.id] || 0;
  html += `<div style="font-size:10px;color:#8890a6;margin-top:4px">${conns} connections</div>`;
  tooltip.innerHTML = html;
  tooltip.style.opacity = '1';
}).on('mousemove', (event) => {
  tooltip.style.left = (event.clientX + 14) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';
}).on('mouseleave', () => {
  tooltip.style.opacity = '0';
});

// ============================================================
//  UI — Zoom Controls
// ============================================================

document.getElementById('zoomIn').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 1.4);
});
document.getElementById('zoomOut').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 0.7);
});
document.getElementById('zoomReset').addEventListener('click', () => {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

// ============================================================
//  UI — Reset / Fit
// ============================================================

document.getElementById('btnResetLayout').addEventListener('click', () => {
  nodes.forEach(n => {
    n.fx = null;
    n.fy = null;
    const zp = zonePositions[n.zone || 'center'];
    n.x = zp.x + (Math.random() - 0.5) * 120;
    n.y = zp.y + (Math.random() - 0.5) * 100;
  });
  simulation.alpha(0.8).restart();
});

document.getElementById('btnFitView').addEventListener('click', () => {
  const bounds = g.node().getBBox();
  if (!bounds.width || !bounds.height) return;
  const padX = 60, padY = 60;
  const scale = Math.min(
    width / (bounds.width + padX * 2),
    height / (bounds.height + padY * 2),
    2
  );
  const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
});

// ============================================================
//  Responsive
// ============================================================

window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  svg.attr('viewBox', [0, 0, w, h]);
});
</script>
</body>
</html>
