<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chassis Frame — Traced Outline Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    color: #d4d0cc;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: #787472;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 0.3rem; margin-bottom: 1.5rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .canvas-wrap {
    background: #0e0e11;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 1rem;
    position: relative;
  }
  canvas { width: 100%; border-radius: 3px; cursor: crosshair; }
  .sidebar {
    display: flex; flex-direction: column; gap: 1rem;
  }
  .panel {
    background: #141418;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 1.2rem;
  }
  .panel h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; color: #c9943a;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: #787472;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .stat-val {
    font-size: 0.82rem; font-weight: 500; color: #e8e6e3;
  }
  .stat-val.accent { color: #c9943a; }
  .stat-val.blue { color: #5a8fd4; }
  .region-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.4rem 0;
  }
  .region-dot {
    width: 8px; height: 8px; border-radius: 2px;
    flex-shrink: 0;
  }
  .region-text {
    font-size: 0.75rem; color: #a09890; line-height: 1.4;
  }
  .region-text strong { color: #d4d0cc; font-weight: 500; }
  .note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: #5a5550;
    line-height: 1.7; margin-top: 0.5rem;
  }
  .note em { color: #c9943a; font-style: normal; }
  .controls {
    display: flex; gap: 0.3rem; margin-top: 0.8rem; flex-wrap: wrap;
  }
  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.3rem 0.6rem; border-radius: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #787472; cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.08); color: #d4d0cc; }
  .ctrl-btn.active {
    background: rgba(201,148,58,0.12);
    border-color: rgba(201,148,58,0.3);
    color: #c9943a;
  }
  .diff-box {
    background: rgba(180,60,60,0.06);
    border: 1px solid rgba(180,60,60,0.15);
    border-radius: 4px;
    padding: 0.8rem;
    margin-top: 0.5rem;
  }
  .diff-box h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; color: #c05050;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .diff-item {
    font-size: 0.7rem; color: #a09890; line-height: 1.6;
    padding-left: 0.8rem;
    text-indent: -0.8rem;
  }
  .diff-item::before { content: "x "; color: #c05050; font-weight: 600; }
</style>
</head>
<body>

<h1>Chassis Frame — Exact Trace Analysis</h1>
<div class="subtitle">22 lines from your traced outline &mdash; rendered at true proportions</div>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="main" width="1200" height="1600"></canvas>
    <div class="controls" id="controls"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h2>Geometry Measurements</h2>
      <div id="measurements"></div>
    </div>

    <div class="panel">
      <h2>Identified Regions (5)</h2>
      <div id="regions"></div>
    </div>

    <div class="panel">
      <h2>Where My Guess Was Wrong</h2>
      <div class="diff-box">
        <h3>Corrections needed</h3>
        <div id="diffs"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Line Data</h2>
      <div class="note" id="line-info"></div>
    </div>
  </div>
</div>

<script>
// ─── Line Data ───────────────────────────────────────────
const lines = [
  { line:1, p1:{x:517,y:1114}, p2:{x:567,y:875}, bent:true, cp:{x:550,y:960} },
  { line:2, p1:{x:909,y:1108}, p2:{x:916,y:1360}, bent:true, cp:{x:913,y:1286} },
  { line:3, p1:{x:894,y:1399}, p2:{x:541,y:1401}, bent:false },
  { line:4, p1:{x:522,y:1364}, p2:{x:517,y:1114}, bent:true, cp:{x:519,y:1277} },
  { line:5, p1:{x:848,y:866}, p2:{x:909,y:1108}, bent:false },
  { line:6, p1:{x:515,y:707}, p2:{x:517,y:803}, bent:false },
  { line:7, p1:{x:896,y:701}, p2:{x:898,y:805}, bent:false },
  { line:8, p1:{x:848,y:699}, p2:{x:842,y:511}, bent:false },
  { line:9, p1:{x:565,y:701}, p2:{x:563,y:518}, bent:false },
  { line:10, p1:{x:844,y:509}, p2:{x:985,y:429}, bent:false },
  { line:11, p1:{x:413,y:437}, p2:{x:563,y:522}, bent:false },
  { line:12, p1:{x:363,y:381}, p2:{x:626,y:316}, bent:false },
  { line:13, p1:{x:759,y:311}, p2:{x:1027,y:363}, bent:false },
  { line:14, p1:{x:524,y:1364}, p2:{x:541,y:1401}, bent:true, cp:{x:517,y:1395} },
  { line:15, p1:{x:894,y:1401}, p2:{x:918,y:1360}, bent:true, cp:{x:916,y:1399} },
  { line:16, p1:{x:517,y:805}, p2:{x:567,y:877}, bent:true, cp:{x:589,y:790} },
  { line:17, p1:{x:896,y:805}, p2:{x:846,y:866}, bent:true, cp:{x:828,y:790} },
  { line:18, p1:{x:848,y:701}, p2:{x:896,y:701}, bent:false },
  { line:19, p1:{x:513,y:707}, p2:{x:565,y:703}, bent:false },
  { line:20, p1:{x:415,y:440}, p2:{x:361,y:383}, bent:true, cp:{x:348,y:448} },
  { line:21, p1:{x:985,y:433}, p2:{x:1031,y:363}, bent:true, cp:{x:1059,y:422} },
  { line:22, p1:{x:626,y:313}, p2:{x:761,y:313}, bent:true, cp:{x:698,y:357} },
];

// ─── Region Classification ──────────────────────────────
const regions = {
  frontWing: {
    name: 'Front Wing (Chevron)',
    color: '#e05555',
    lines: [12, 13, 22, 20, 21, 10, 11],
    desc: 'V-shaped front plate. Lines 12+13 form the angled arms, line 22 is the curved bridge at the peak, lines 20+21 are the rounded wing tips, lines 10+11 connect wings to body.'
  },
  body: {
    name: 'Narrow Body',
    color: '#5a8fd4',
    lines: [8, 9],
    desc: 'Straight vertical sides of the narrow center body section. Only ~280px wide (body is ~23% of image width).'
  },
  motorBulge: {
    name: 'Motor Mount Ledge',
    color: '#d4a833',
    lines: [6, 7, 18, 19, 16, 17],
    desc: 'Steps outward at motor area. Lines 18+19 are short horizontal ledges, lines 6+7 are vertical drops, lines 16+17 are curved transitions going inward toward lower section.'
  },
  lowerTaper: {
    name: 'Lower Taper',
    color: '#8855cc',
    lines: [1, 5],
    desc: 'Angled/curved sides tapering from motor area down to battery section. Left side (L1) is curved, right side (L5) is straight — asymmetry in the trace.'
  },
  batteryArea: {
    name: 'Battery Holder (Rear)',
    color: '#55bb77',
    lines: [2, 3, 4, 14, 15],
    desc: 'Rounded rectangle at bottom. Line 3 is the flat bottom edge, lines 2+4 are the sides, lines 14+15 are the rounded corners.'
  }
};

// ─── Canvas Setup ────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
canvas.width = 1200 * dpr;
canvas.height = 1600 * dpr;
canvas.style.width = '100%';
canvas.style.height = 'auto';
ctx.scale(dpr, dpr);

// ─── Drawing State ───────────────────────────────────────
let showGrid = true;
let showNumbers = true;
let showRegions = true;
let showDimensions = true;
let showCenterline = true;
let showMyGuess = false;
let highlightRegion = null;

// ─── Draw Functions ──────────────────────────────────────
function drawLine(l, color, width = 2, dash = []) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.setLineDash(dash);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(l.p1.x, l.p1.y);
  if (l.bent && l.cp) {
    ctx.quadraticCurveTo(l.cp.x, l.cp.y, l.p2.x, l.p2.y);
  } else {
    ctx.lineTo(l.p2.x, l.p2.y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawDot(x, y, r, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawLabel(x, y, text, color, align = 'left') {
  ctx.save();
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawDimension(x1, y1, x2, y2, label, offset, side) {
  ctx.save();
  const ox = side === 'right' ? offset : side === 'left' ? -offset : 0;
  const oy = side === 'bottom' ? offset : side === 'top' ? -offset : 0;

  ctx.strokeStyle = 'rgba(201,148,58,0.35)';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 3]);

  // Extension lines
  ctx.beginPath();
  if (oy !== 0) {
    ctx.moveTo(x1, y1); ctx.lineTo(x1, y1 + oy);
    ctx.moveTo(x2, y2); ctx.lineTo(x2, y2 + oy);
  } else {
    ctx.moveTo(x1, y1); ctx.lineTo(x1 + ox, y1);
    ctx.moveTo(x2, y2); ctx.lineTo(x2 + ox, y2);
  }
  ctx.stroke();

  // Dimension line
  ctx.setLineDash([]);
  ctx.beginPath();
  if (oy !== 0) {
    const dy = y1 + oy * 0.8;
    ctx.moveTo(x1, dy); ctx.lineTo(x2, dy);
    // Arrows
    ctx.moveTo(x1, dy); ctx.lineTo(x1 + 5, dy - 3); ctx.moveTo(x1, dy); ctx.lineTo(x1 + 5, dy + 3);
    ctx.moveTo(x2, dy); ctx.lineTo(x2 - 5, dy - 3); ctx.moveTo(x2, dy); ctx.lineTo(x2 - 5, dy + 3);
    ctx.stroke();
    ctx.fillStyle = '#c9943a';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, (x1 + x2) / 2, dy - 6);
  } else {
    const dx = x1 + ox * 0.8;
    ctx.moveTo(dx, y1); ctx.lineTo(dx, y2);
    ctx.moveTo(dx, y1); ctx.lineTo(dx - 3, y1 + 5); ctx.moveTo(dx, y1); ctx.lineTo(dx + 3, y1 + 5);
    ctx.moveTo(dx, y2); ctx.lineTo(dx - 3, y2 - 5); ctx.moveTo(dx, y2); ctx.lineTo(dx + 3, y2 - 5);
    ctx.stroke();
    ctx.save();
    ctx.translate(dx - 8, (y1 + y2) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#c9943a';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, 1200, 1600);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, 1200, 1600);

  // Grid
  if (showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= 1200; x += 100) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 1600); ctx.stroke();
    }
    for (let y = 0; y <= 1600; y += 100) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke();
    }
    // Axis labels
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '9px "JetBrains Mono", monospace';
    for (let x = 0; x <= 1200; x += 200) ctx.fillText(x, x + 2, 12);
    for (let y = 200; y <= 1600; y += 200) ctx.fillText(y, 4, y - 2);
  }

  // Centerline
  if (showCenterline) {
    // Vertical center of the frame
    const centerX = (363 + 1059) / 2; // ~711
    ctx.strokeStyle = 'rgba(201,148,58,0.12)';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(centerX, 250);
    ctx.lineTo(centerX, 1450);
    ctx.stroke();
    ctx.setLineDash([]);
    drawLabel(centerX + 5, 265, `CL x=${Math.round(centerX)}`, 'rgba(201,148,58,0.3)');

    // Horizontal center
    const centerY = (311 + 1401) / 2; // ~856
    ctx.strokeStyle = 'rgba(90,143,212,0.1)';
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(300, centerY);
    ctx.lineTo(1100, centerY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // My original guess (ghosted) — for comparison
  if (showMyGuess) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,80,0.25)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);

    // My guessed shape was a simple symmetric hourglass
    // Scaled to same coordinate space
    const gcx = 711, gcy = 856;
    const gScale = 55;
    const gbw = 1.6 * gScale; // body half-width = 88px
    const gmw = 2.2 * gScale; // motor half-width = 121px
    const ghl = 4.8 * gScale; // half-length = 264px

    ctx.beginPath();
    ctx.moveTo(gcx + gbw, gcy + ghl);
    ctx.lineTo(gcx + gmw, gcy + ghl - 16);
    ctx.lineTo(gcx + gmw, gcy + ghl - 77);
    ctx.lineTo(gcx + gbw, gcy + ghl - 99);
    ctx.lineTo(gcx + gbw, gcy - ghl + 99);
    ctx.lineTo(gcx + gmw, gcy - ghl + 77);
    ctx.lineTo(gcx + gmw, gcy - ghl + 16);
    ctx.lineTo(gcx + gbw, gcy - ghl);
    ctx.lineTo(gcx - gbw, gcy - ghl);
    ctx.lineTo(gcx - gmw, gcy - ghl + 16);
    ctx.lineTo(gcx - gmw, gcy - ghl + 77);
    ctx.lineTo(gcx - gbw, gcy - ghl + 99);
    ctx.lineTo(gcx - gbw, gcy + ghl - 99);
    ctx.lineTo(gcx - gmw, gcy + ghl - 77);
    ctx.lineTo(gcx - gmw, gcy + ghl + 16);
    ctx.lineTo(gcx - gbw, gcy + ghl);
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    drawLabel(gcx + gmw + 10, gcy, 'MY GUESS (wrong)', 'rgba(255,80,80,0.4)');
    ctx.restore();
  }

  // Draw regions or all lines
  if (showRegions) {
    Object.entries(regions).forEach(([key, region]) => {
      const isHighlighted = !highlightRegion || highlightRegion === key;
      const alpha = isHighlighted ? 1 : 0.15;

      region.lines.forEach(lineNum => {
        const l = lines.find(ll => ll.line === lineNum);
        if (l) {
          const c = region.color;
          // Parse hex and apply alpha
          const r = parseInt(c.slice(1,3), 16);
          const g = parseInt(c.slice(3,5), 16);
          const b = parseInt(c.slice(5,7), 16);
          drawLine(l, `rgba(${r},${g},${b},${alpha})`, isHighlighted ? 2.5 : 1.5);

          if (showNumbers && isHighlighted) {
            const mx = (l.p1.x + l.p2.x) / 2;
            const my = (l.p1.y + l.p2.y) / 2;
            if (l.bent && l.cp) {
              // Label at control point
              drawLabel(l.cp.x + 8, l.cp.y - 5, `L${l.line}`, `rgba(${r},${g},${b},0.6)`);
            } else {
              drawLabel(mx + 8, my - 5, `L${l.line}`, `rgba(${r},${g},${b},0.6)`);
            }
          }
        }
      });
    });
  } else {
    // Simple white render
    lines.forEach(l => {
      drawLine(l, 'rgba(228,224,218,0.8)', 2);
    });
  }

  // Endpoint dots
  const allPoints = new Set();
  lines.forEach(l => {
    allPoints.add(`${l.p1.x},${l.p1.y}`);
    allPoints.add(`${l.p2.x},${l.p2.y}`);
  });
  allPoints.forEach(p => {
    const [x, y] = p.split(',').map(Number);
    drawDot(x, y, 3, 'rgba(201,148,58,0.5)');
  });

  // Control points (for curved lines)
  if (showNumbers) {
    lines.forEach(l => {
      if (l.bent && l.cp) {
        drawDot(l.cp.x, l.cp.y, 2, 'rgba(255,255,255,0.2)');
        // Tangent lines to control point
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(l.p1.x, l.p1.y);
        ctx.lineTo(l.cp.x, l.cp.y);
        ctx.lineTo(l.p2.x, l.p2.y);
        ctx.stroke();
      }
    });
  }

  // Dimensions
  if (showDimensions) {
    // Overall bounding box
    drawDimension(348, 311, 1059, 311, '711px = ~6.0"', -40, 'top');
    drawDimension(1059, 311, 1059, 1401, '1090px = ~9.2"', 50, 'right');

    // Body width (narrow section)
    drawDimension(563, 600, 842, 600, '279px = ~2.4"', -30, 'top');

    // Motor ledge width
    drawDimension(513, 750, 896, 750, '383px = ~3.2"', 30, 'bottom');

    // Front wing span
    drawDimension(361, 381, 1031, 363, '670px = ~5.6"', -30, 'top');

    // Battery area width
    drawDimension(517, 1200, 916, 1200, '399px = ~3.3"', 30, 'bottom');

    // Battery box height
    drawDimension(480, 1108, 480, 1401, '293px = ~2.5"', -40, 'left');

    // Body length (narrow section)
    drawDimension(440, 518, 440, 701, '183px = ~1.5"', -40, 'left');

    // Scale note
    ctx.fillStyle = 'rgba(201,148,58,0.3)';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillText('Scale: ~119px/inch (based on 10" total = 1090px body + wings)', 100, 1520);
    ctx.fillText('Image: 1200 x 1600 px', 100, 1540);
  }

  // Region labels on canvas
  if (showRegions && !highlightRegion) {
    drawLabel(630, 280, 'FRONT WING', '#e05555', 'center');
    drawLabel(700, 620, 'BODY', '#5a8fd4', 'center');
    drawLabel(710, 760, 'MOTOR LEDGE', '#d4a833', 'center');
    drawLabel(710, 1000, 'LOWER TAPER', '#8855cc', 'center');
    drawLabel(710, 1300, 'BATTERY', '#55bb77', 'center');
  }
}

// ─── Measurements ────────────────────────────────────────
// Assuming 10" overall maps to the Y extent (~1090px) → ~109px/inch
// But total X extent = 711px for 6" width → ~119px/inch
// Average: ~114px/inch. Use 119 (more data points on X measurements img)
const PPI = 119; // pixels per inch estimate

function px2in(px) { return (px / PPI).toFixed(2); }

const measurements = [
  ['Overall height (Y)', '1090px', `~${px2in(1090)}"`],
  ['Overall width (X)', '711px', `~${px2in(711)}"`],
  ['Front wing span', '670px', `~${px2in(670)}"`],
  ['Body width (narrow)', '279px', `~${px2in(279)}"`],
  ['Motor ledge width', '383px', `~${px2in(383)}"`],
  ['Battery area width', '399px', `~${px2in(399)}"`],
  ['Battery box height', '293px', `~${px2in(293)}"`],
  ['Body length (narrow)', '183px', `~${px2in(183)}"`],
  ['Wing tip-to-body', '~150px', `~${px2in(150)}"`],
  ['Curved lines', '8 / 22', '36%'],
  ['Straight lines', '14 / 22', '64%'],
  ['Unique vertices', '22', ''],
];

const measEl = document.getElementById('measurements');
measurements.forEach(([lab, px, inches]) => {
  const row = document.createElement('div');
  row.className = 'stat-row';
  row.innerHTML = `<span class="stat-label">${lab}</span><span class="stat-val${inches.includes('"') ? ' accent' : ''}">${px} ${inches ? '= ' + inches : ''}</span>`;
  measEl.appendChild(row);
});

// ─── Regions Panel ───────────────────────────────────────
const regEl = document.getElementById('regions');
Object.entries(regions).forEach(([key, r]) => {
  const item = document.createElement('div');
  item.className = 'region-item';
  item.style.cursor = 'pointer';
  item.innerHTML = `<div class="region-dot" style="background:${r.color}"></div><div class="region-text"><strong>${r.name}</strong> — Lines ${r.lines.join(', ')}<br>${r.desc}</div>`;
  item.addEventListener('mouseenter', () => { highlightRegion = key; render(); });
  item.addEventListener('mouseleave', () => { highlightRegion = null; render(); });
  regEl.appendChild(item);
});

// ─── Diffs Panel ─────────────────────────────────────────
const diffEl = document.getElementById('diffs');
const diffs = [
  'Shape is NOT symmetric hourglass. It\'s a forward-pointing form with a V-wing at front and a rounded battery box at rear.',
  'Body is much NARROWER than I guessed (2.4" vs my 3.2"). Only 23% of total width.',
  'Front wing is a CHEVRON/V, not flat rectangular wings. Lines 12+13 angle inward to a curved peak (line 22).',
  'Wing tips have ROUNDED curves (lines 20, 21), not sharp corners.',
  'Battery area at rear is a DISTINCT rounded rectangle — not part of the main plate shape.',
  'Motor bumps are SMALL ledges (lines 18, 19 ~48px wide), not large bulges. Much subtler than I drew.',
  'Left lower taper (L1) is CURVED while right (L5) is straight — possible asymmetry or perspective.',
  'The entire frame reads top-to-bottom as: V-wing → narrow body → tiny motor ledge → taper → battery box. My guess was a uniform hourglass.'
];
diffs.forEach(d => {
  const div = document.createElement('div');
  div.className = 'diff-item';
  div.textContent = d;
  diffEl.appendChild(div);
});

// ─── Line Info ───────────────────────────────────────────
const lineInfoEl = document.getElementById('line-info');
lineInfoEl.innerHTML = `<em>22 lines</em> total: 14 straight + 8 curved (quadratic bezier)<br><br>` +
  `Curved lines: L1, L2, L4, L14, L15, L16, L17, L20, L21, L22<br>` +
  `Most curves are at: wing tips (20,21,22), motor transitions (16,17), battery corners (14,15), and tapers (1,2,4)<br><br>` +
  `<em>Bounding box:</em> x[348..1059] y[311..1401]<br>` +
  `<em>Center:</em> (703, 856)<br>` +
  `<em>Aspect ratio:</em> 1 : 1.53 (taller than wide)`;

// ─── Toggle Controls ─────────────────────────────────────
const controlsDef = [
  ['Grid', () => showGrid, v => showGrid = v],
  ['Numbers', () => showNumbers, v => showNumbers = v],
  ['Regions', () => showRegions, v => showRegions = v],
  ['Dims', () => showDimensions, v => showDimensions = v],
  ['Centerline', () => showCenterline, v => showCenterline = v],
  ['My Guess', () => showMyGuess, v => showMyGuess = v],
];

const ctrlEl = document.getElementById('controls');
controlsDef.forEach(([name, getter, setter]) => {
  const btn = document.createElement('button');
  btn.className = 'ctrl-btn' + (getter() ? ' active' : '');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    setter(!getter());
    btn.classList.toggle('active');
    render();
  });
  ctrlEl.appendChild(btn);
});

// ─── Initial Render ──────────────────────────────────────
render();
</script>
</body>
</html>
