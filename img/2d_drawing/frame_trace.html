<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKK0011 — Part Identification</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#ccc;font:13px/1.4 monospace;padding:1rem}
  h2{color:#fff;margin:0.8rem 0 0.3rem;font-size:15px}
  .photo{position:relative;display:inline-block;margin-bottom:1.5rem}
  .photo img{max-width:95vw;max-height:70vh;display:block}
  .photo svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>
<body>

<h2>1. Exploded Parts (car_parts.jpg)</h2>
<div class="photo">
  <img src="../car_parts.jpg" alt="parts"/>
  <svg viewBox="0 0 1496 1489" xmlns="http://www.w3.org/2000/svg">
  <g font-family="monospace" font-weight="bold">

    <!-- TOP HALF: Assembled car -->
    <rect x="10" y="10" width="200" height="22" rx="4" fill="#00ccff"/>
    <text x="110" y="26" text-anchor="middle" fill="#000" font-size="14">ASSEMBLED VIEW</text>

    <!-- BOTTOM HALF: Individual parts -->

    <!-- Structure E / Plate #5 — shield shape, top-left of parts area -->
    <line x1="200" y1="620" x2="200" y2="660" stroke="#33cc33" stroke-width="2"/>
    <rect x="120" y="600" width="160" height="22" rx="4" fill="#33cc33"/>
    <text x="200" y="616" text-anchor="middle" fill="#000" font-size="13">PLATE 5 (E)</text>
    <text x="200" y="636" text-anchor="middle" fill="#33cc33" font-size="11">Front Expansion</text>

    <!-- Structure A / Base Frame — large plate, bottom-left -->
    <line x1="250" y1="900" x2="250" y2="940" stroke="#00ccff" stroke-width="2"/>
    <rect x="140" y="880" width="220" height="22" rx="4" fill="#00ccff"/>
    <text x="250" y="896" text-anchor="middle" fill="#000" font-size="13">BASE PLATE (A)</text>
    <text x="250" y="920" text-anchor="middle" fill="#00ccff" font-size="11">Main Frame</text>

    <!-- Structure B / Plate #8 — small rear plate -->
    <line x1="340" y1="690" x2="340" y2="720" stroke="#ff8800" stroke-width="2"/>
    <rect x="260" y="670" width="160" height="22" rx="4" fill="#ff8800"/>
    <text x="340" y="686" text-anchor="middle" fill="#000" font-size="13">PLATE 8 (B)</text>
    <text x="340" y="708" text-anchor="middle" fill="#ff8800" font-size="11">Rear Expansion</text>

    <!-- Structure C / Battery sub-plate -->
    <line x1="220" y1="770" x2="240" y2="790" stroke="#ff66ff" stroke-width="2"/>
    <rect x="100" y="752" width="130" height="22" rx="4" fill="#ff66ff"/>
    <text x="165" y="768" text-anchor="middle" fill="#000" font-size="13">PLATE C</text>
    <text x="220" y="790" text-anchor="middle" fill="#ff66ff" font-size="11">Battery Sub</text>

    <!-- Structure D / Plate #7 — X pattern plate -->
    <line x1="500" y1="880" x2="500" y2="920" stroke="#aa44ff" stroke-width="2"/>
    <rect x="410" y="858" width="180" height="22" rx="4" fill="#aa44ff"/>
    <text x="500" y="874" text-anchor="middle" fill="#fff" font-size="13">PLATE 7 (D)</text>
    <text x="500" y="900" text-anchor="middle" fill="#aa44ff" font-size="11">Upper Support + X</text>

    <!-- Battery case -->
    <line x1="530" y1="600" x2="530" y2="630" stroke="#ffcc00" stroke-width="2"/>
    <rect x="450" y="580" width="160" height="22" rx="4" fill="#ffcc00"/>
    <text x="530" y="596" text-anchor="middle" fill="#000" font-size="13">BATTERY CASE</text>

    <!-- L-Brackets (4x black) -->
    <line x1="700" y1="620" x2="680" y2="640" stroke="#88ff88" stroke-width="2"/>
    <rect x="640" y="600" width="160" height="22" rx="4" fill="#88ff88"/>
    <text x="720" y="616" text-anchor="middle" fill="#000" font-size="13">L-BRACKETS x4</text>

    <!-- TT Motors (4x yellow) -->
    <line x1="550" y1="1050" x2="550" y2="1080" stroke="#ffaa00" stroke-width="2"/>
    <rect x="460" y="1030" width="180" height="22" rx="4" fill="#ffaa00"/>
    <text x="550" y="1046" text-anchor="middle" fill="#000" font-size="13">TT MOTORS x4</text>

    <!-- Wheels (4x blue hub) -->
    <line x1="850" y1="1050" x2="850" y2="1080" stroke="#ff3333" stroke-width="2"/>
    <rect x="770" y="1030" width="160" height="22" rx="4" fill="#ff3333"/>
    <text x="850" y="1046" text-anchor="middle" fill="#fff" font-size="13">WHEELS x4</text>

    <!-- Screws/hardware top-right -->
    <rect x="900" y="100" width="160" height="22" rx="4" fill="#666"/>
    <text x="980" y="116" text-anchor="middle" fill="#fff" font-size="13">HARDWARE</text>
    <text x="980" y="140" text-anchor="middle" fill="#888" font-size="11">Screws, nuts, pillars</text>

    <!-- Copper pillars -->
    <line x1="1050" y1="350" x2="1020" y2="370" stroke="#daa520" stroke-width="2"/>
    <rect x="1020" y="330" width="180" height="22" rx="4" fill="#daa520"/>
    <text x="1110" y="346" text-anchor="middle" fill="#000" font-size="13">COPPER PILLARS</text>

  </g>
  </svg>
</div>

    <rect x="620" y="22" width="200" height="22" rx="4" fill="#00ccff" opacity="0.9"/>
    <text x="720" y="38" text-anchor="middle" fill="#000" font-size="14">TOP-DOWN VIEW ▼</text>

    <!-- Front expansion plate #5 — right side of above view (shield shape sticking out) -->
    <line x1="1080" y1="260" x2="1060" y2="280" stroke="#33cc33" stroke-width="2"/>

    <rect x="1000" y="85" width="80" height="18" rx="3" fill="#ff3333"/>
    <text x="1040" y="98" text-anchor="middle" fill="#fff" font-size="11">WHEEL</text>
    <rect x="660" y="480" width="80" height="18" rx="3" fill="#ff3333"/>
    <text x="700" y="493" text-anchor="middle" fill="#fff" font-size="11">WHEEL</text>
    <rect x="1000" y="480" width="80" height="18" rx="3" fill="#ff3333"/>
    <text x="1040" y="493" text-anchor="middle" fill="#fff" font-size="11">WHEEL</text>

    <!-- Battery slot visible -->
    <line x1="900" y1="290" x2="920" y2="305" stroke="#ffcc00" stroke-width="2"/>
    <rect x="900" y="272" width="120" height="22" rx="4" fill="#ffcc00"/>
    <text x="960" y="288" text-anchor="middle" fill="#000" font-size="12">BATT SLOT</text>

    <!-- Copper pillars visible as gold rods -->
    <line x1="770" y1="175" x2="770" y2="195" stroke="#daa520" stroke-width="2"/>
    <rect x="680" y="155" width="180" height="22" rx="4" fill="#daa520"/>
    <text x="770" y="171" text-anchor="middle" fill="#000" font-size="12">COPPER PILLARS</text>

  </g>
  </svg>
</div>

</body>
