<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKK0011 — Plate 8 Trace</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;display:flex;flex-direction:column;align-items:center;padding:0.5rem;gap:0.3rem;min-height:100vh}
  .w{position:relative;display:inline-block}
  .w img{max-width:96vw;max-height:85vh;display:block}
  .w svg{position:absolute;top:0;left:0;width:100%;height:100%}
  .c{display:flex;gap:8px;font:12px monospace;color:#888;flex-wrap:wrap;align-items:center}
  .c label{display:flex;align-items:center;gap:3px;cursor:pointer}
  input[type=range]{width:120px}
</style>
</head>
<body>

<div class="w">
  <img id="ref" src="2d_car_reference.png" alt="ref" style="opacity:0.25"/>
  <svg viewBox="0 0 1200 778" xmlns="http://www.w3.org/2000/svg">

  <!-- PLATE 8 (Structure B) — Rear Expansion Plate -->
  <!-- Coordinates from actual pixel scanning of reference image -->
  <g id="plate8" fill="none" stroke="#ff4400" stroke-width="2" stroke-linejoin="round">

    <!-- Outer contour — D-shape with two horizontal notches -->
    <path d="
      M 802,205
      L 802,585
      L 855,585
      C 862,580 870,570 878,555
      C 886,540 893,520 898,500
      C 903,480 908,460 912,445
      L 918,435
      L 918,433
      L 828,433
      L 828,413
      L 918,413
      L 918,410
      C 920,400 920,390 920,388
      C 920,378 920,370 918,368
      L 918,368
      L 828,368
      L 828,358
      L 918,358
      L 918,355
      C 920,345 918,335 916,325
      C 910,310 905,298 898,285
      C 890,268 880,258 870,248
      C 862,238 858,228 855,215
      L 855,205
      Z
    "/>

    <!-- Mounting holes (from pixel data) -->
    <circle cx="860" cy="230" r="4" stroke-width="1"/>
    <circle cx="860" cy="560" r="4" stroke-width="1"/>
    <circle cx="870" cy="340" r="3.5" stroke-width="1"/>
    <circle cx="870" cy="448" r="3.5" stroke-width="1"/>

  </g>

  </svg>
</div>

<div class="c">
  <label>Ref opacity: <input type="range" min="0" max="100" value="25" oninput="document.getElementById('ref').style.opacity=this.value/100"></label>
  <span>|</span>
  <label><input type="checkbox" checked onchange="document.getElementById('plate8').style.display=this.checked?'':'none'">Plate 8</label>
  <span style="color:#ff4400">&#9632;</span>
</div>

</body>
</html>
