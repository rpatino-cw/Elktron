<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chassis Side — Traced Outline Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0c;
    color: #d4d0cc;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: #787472;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 0.3rem; margin-bottom: 1.5rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 2rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  .canvas-wrap {
    background: #0e0e11;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 1rem;
    position: relative;
  }
  canvas { width: 100%; border-radius: 3px; cursor: crosshair; }
  .sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .panel {
    background: #141418;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 1.2rem;
  }
  .panel h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; color: #c9943a;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.8rem;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: #787472;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .stat-val { font-size: 0.82rem; font-weight: 500; color: #e8e6e3; }
  .stat-val.accent { color: #c9943a; }
  .region-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.4rem 0; cursor: pointer;
  }
  .region-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .region-text { font-size: 0.75rem; color: #a09890; line-height: 1.4; }
  .region-text strong { color: #d4d0cc; font-weight: 500; }
  .note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: #5a5550;
    line-height: 1.7; margin-top: 0.5rem;
  }
  .note em { color: #c9943a; font-style: normal; }
  .controls { display: flex; gap: 0.3rem; margin-top: 0.8rem; flex-wrap: wrap; }
  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.3rem 0.6rem; border-radius: 3px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #787472; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.08); color: #d4d0cc; }
  .ctrl-btn.active {
    background: rgba(201,148,58,0.12);
    border-color: rgba(201,148,58,0.3);
    color: #c9943a;
  }
  .orient-note {
    background: rgba(90,143,212,0.06);
    border: 1px solid rgba(90,143,212,0.15);
    border-radius: 4px; padding: 0.8rem; margin-top: 0.5rem;
  }
  .orient-note h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem; color: #5a8fd4;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .orient-item {
    font-size: 0.7rem; color: #a09890; line-height: 1.6;
    padding-left: 0.8rem; text-indent: -0.8rem;
  }
  .orient-item::before { content: "→ "; color: #5a8fd4; font-weight: 600; }
</style>
</head>
<body>

<h1>Chassis Side — Exact Trace Analysis</h1>
<div class="subtitle">14 lines from your traced outline &mdash; left side (driver's perspective) &mdash; 4284 × 5712 px</div>

<div class="layout">
  <div class="canvas-wrap">
    <canvas id="main" width="1200" height="900"></canvas>
    <div class="controls" id="controls"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h2>Geometry Measurements</h2>
      <div id="measurements"></div>
    </div>

    <div class="panel">
      <h2>Identified Regions (6)</h2>
      <div id="regions"></div>
    </div>

    <div class="panel">
      <h2>Orientation</h2>
      <div class="orient-note">
        <h3>Side View Reference</h3>
        <div id="orient"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Line Data</h2>
      <div class="note" id="line-info"></div>
    </div>
  </div>
</div>

<script>
// ─── Raw Line Data (Stage 1 — 14 lines) ─────────────────
const rawLines = [
  { line:1,  p1:{x:1000,y:3218}, p2:{x:3631,y:3203}, bent:false },
  { line:2,  p1:{x:1047,y:2738}, p2:{x:2607,y:2730}, bent:false },
  { line:3,  p1:{x:298,y:3014},  p2:{x:1173,y:3006}, bent:false },
  { line:4,  p1:{x:3607,y:2509}, p2:{x:3615,y:3195}, bent:false },
  { line:5,  p1:{x:2757,y:2517}, p2:{x:3615,y:2517}, bent:false },
  { line:6,  p1:{x:2788,y:3203}, p2:{x:2764,y:2517}, bent:false },
  { line:7,  p1:{x:1819,y:2761}, p2:{x:1827,y:3195}, bent:false },
  { line:8,  p1:{x:2591,y:2446}, p2:{x:2615,y:2722}, bent:false },
  { line:9,  p1:{x:2394,y:2738}, p2:{x:2402,y:3211}, bent:false },
  { line:10, p1:{x:1803,y:2478}, p2:{x:1827,y:2730}, bent:false },
  { line:11, p1:{x:1157,y:2990}, p2:{x:1165,y:3266}, bent:false },
  { line:12, p1:{x:3584,y:2572}, p2:{x:3915,y:2580}, bent:false },
  { line:13, p1:{x:3915,y:2572}, p2:{x:3923,y:3124}, bent:false },
  { line:14, p1:{x:3915,y:3140}, p2:{x:3639,y:3132}, bent:false },
];

// ─── Coordinate Mapping ─────────────────────────────────
// Source area expanded for battery box: x[150..4050] y[2350..3370]
const SRC = { xMin: 100, xMax: 4100, yMin: 2350, yMax: 3370 };
const DST = { xMin: 40, xMax: 1160, yMin: 40, yMax: 860 };

function mapX(x) { return DST.xMin + (x - SRC.xMin) / (SRC.xMax - SRC.xMin) * (DST.xMax - DST.xMin); }
function mapY(y) { return DST.yMin + (y - SRC.yMin) / (SRC.yMax - SRC.yMin) * (DST.yMax - DST.yMin); }

const lines = rawLines.map(l => ({
  line: l.line,
  p1: { x: mapX(l.p1.x), y: mapY(l.p1.y) },
  p2: { x: mapX(l.p2.x), y: mapY(l.p2.y) },
  bent: l.bent,
  raw: l
}));

// ─── Region Classification ──────────────────────────────
const regions = {
  plates: {
    name: 'Acrylic Plates',
    color: '#5a8fd4',
    lines: [1, 2],
    desc: 'L1 = bottom plate lower edge (full chassis span, 2631px). L2 = top plate upper edge (front ~60% only, 1560px — ends before switch enclosure).'
  },
  sensorBar: {
    name: 'Sensor Bar (Front)',
    color: '#e05555',
    lines: [3],
    desc: 'L3 = IR line-tracking sensor bar extending from chassis front. Black PCB strip with 5 IR sensors, 875px long.'
  },
  switchEnclosure: {
    name: 'Switch / Power Enclosure',
    color: '#55bb77',
    lines: [4, 5],
    desc: 'L4 = vertical inner edge (686px tall, plate-to-plate). L5 = horizontal top edge (858px). Black enclosure integrated into the chassis rear — houses power switch, USB port.'
  },
  batteryBox: {
    name: 'Battery Box (Rear — External)',
    color: '#cc6633',
    lines: [12, 13, 14],
    desc: 'L12 = top edge connecting to enclosure. L13 = outer right edge (552px tall). L14 = bottom edge connecting back. Battery holder mounted BEHIND the chassis frame — extends past the main plates.'
  },
  standoffs: {
    name: 'Brass Standoffs (Plate Connectors)',
    color: '#d4a833',
    lines: [6, 7, 9, 11],
    desc: 'Vertical hex standoffs connecting top + bottom plates. L6 = rear (686px, motor/enclosure divider). L7 = center (434px, between motors). L9 = mid-rear (473px). L11 = front (276px, near front motor).'
  },
  upperPosts: {
    name: 'Upper Tall Posts',
    color: '#8855cc',
    lines: [8, 10],
    desc: 'Brass posts rising ABOVE the top plate. L8 = rear post (276px). L10 = center post (252px). For mounting a second deck, camera mast, or accessories.'
  },
};

// ─── Canvas Setup ────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
canvas.width = 1200 * dpr;
canvas.height = 900 * dpr;
canvas.style.width = '100%';
canvas.style.height = 'auto';
ctx.scale(dpr, dpr);

// ─── Drawing State ───────────────────────────────────────
let showGrid = true;
let showNumbers = true;
let showRegions = true;
let showDimensions = true;
let showZones = false;
let highlightRegion = null;

// ─── Draw Functions ──────────────────────────────────────
function drawLine(l, color, width = 2, dash = []) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.setLineDash(dash);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(l.p1.x, l.p1.y);
  ctx.lineTo(l.p2.x, l.p2.y);
  ctx.stroke();
  ctx.restore();
}

function drawDot(x, y, r, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawLabel(x, y, text, color, align = 'left') {
  ctx.save();
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawDimension(x1, y1, x2, y2, label, offset, side) {
  ctx.save();
  const ox = side === 'right' ? offset : side === 'left' ? -offset : 0;
  const oy = side === 'bottom' ? offset : side === 'top' ? -offset : 0;

  ctx.strokeStyle = 'rgba(201,148,58,0.35)';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 3]);

  ctx.beginPath();
  if (oy !== 0) {
    ctx.moveTo(x1, y1); ctx.lineTo(x1, y1 + oy);
    ctx.moveTo(x2, y2); ctx.lineTo(x2, y2 + oy);
  } else {
    ctx.moveTo(x1, y1); ctx.lineTo(x1 + ox, y1);
    ctx.moveTo(x2, y2); ctx.lineTo(x2 + ox, y2);
  }
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.beginPath();
  if (oy !== 0) {
    const dy = y1 + oy * 0.8;
    ctx.moveTo(x1, dy); ctx.lineTo(x2, dy);
    ctx.moveTo(x1, dy); ctx.lineTo(x1 + 5, dy - 3); ctx.moveTo(x1, dy); ctx.lineTo(x1 + 5, dy + 3);
    ctx.moveTo(x2, dy); ctx.lineTo(x2 - 5, dy - 3); ctx.moveTo(x2, dy); ctx.lineTo(x2 - 5, dy + 3);
    ctx.stroke();
    ctx.fillStyle = '#c9943a';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, (x1 + x2) / 2, dy - 6);
  } else {
    const dx = x1 + ox * 0.8;
    ctx.moveTo(dx, y1); ctx.lineTo(dx, y2);
    ctx.moveTo(dx, y1); ctx.lineTo(dx - 3, y1 + 5); ctx.moveTo(dx, y1); ctx.lineTo(dx + 3, y1 + 5);
    ctx.moveTo(dx, y2); ctx.lineTo(dx - 3, y2 - 5); ctx.moveTo(dx, y2); ctx.lineTo(dx + 3, y2 - 5);
    ctx.stroke();
    ctx.save();
    ctx.translate(dx - 8, (y1 + y2) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#c9943a';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

// ─── Render ─────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, 1200, 900);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, 1200, 900);

  // Grid
  if (showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= 1200; x += 100) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 900); ctx.stroke();
    }
    for (let y = 0; y <= 900; y += 100) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '9px "JetBrains Mono", monospace';
    for (let x = 0; x <= 1200; x += 200) ctx.fillText(x, x + 2, 12);
    for (let y = 200; y <= 900; y += 200) ctx.fillText(y, 4, y - 2);
  }

  // Zone backgrounds
  if (showZones) {
    const zoneDefs = [
      { name: 'FRONT MOTOR', x1: 1000, y1: 2730, x2: 1830, y2: 3220, color: 'rgba(212,168,51,0.08)' },
      { name: 'REAR MOTOR', x1: 1830, y1: 2730, x2: 2600, y2: 3220, color: 'rgba(212,168,51,0.08)' },
      { name: 'SWITCH ENCL', x1: 2750, y1: 2500, x2: 3630, y2: 3210, color: 'rgba(85,187,119,0.08)' },
      { name: 'BATTERY BOX', x1: 3580, y1: 2560, x2: 3930, y2: 3150, color: 'rgba(204,102,51,0.10)' },
      { name: 'SENSOR', x1: 280, y1: 2960, x2: 1180, y2: 3060, color: 'rgba(224,85,85,0.08)' },
      { name: 'UPPER POSTS', x1: 1780, y1: 2430, x2: 2630, y2: 2740, color: 'rgba(136,85,204,0.08)' },
    ];
    zoneDefs.forEach(z => {
      const x = mapX(z.x1), y = mapY(z.y1);
      const w = mapX(z.x2) - x, h = mapY(z.y2) - y;
      ctx.fillStyle = z.color;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = z.color.replace(/[\d.]+\)$/, '0.25)');
      ctx.lineWidth = 0.8;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '9px "JetBrains Mono", monospace';
      ctx.fillText(z.name, x + 4, y + 11);
    });
  }

  // Draw regions or plain lines
  if (showRegions) {
    Object.entries(regions).forEach(([key, region]) => {
      const isHighlighted = !highlightRegion || highlightRegion === key;
      const alpha = isHighlighted ? 1 : 0.15;

      region.lines.forEach(lineNum => {
        const l = lines.find(ll => ll.line === lineNum);
        if (l) {
          const c = region.color;
          const r = parseInt(c.slice(1,3), 16);
          const g = parseInt(c.slice(3,5), 16);
          const b = parseInt(c.slice(5,7), 16);
          drawLine(l, `rgba(${r},${g},${b},${alpha})`, isHighlighted ? 2.5 : 1.5);

          if (showNumbers && isHighlighted) {
            const mx = (l.p1.x + l.p2.x) / 2;
            const my = (l.p1.y + l.p2.y) / 2;
            drawLabel(mx + 8, my - 5, `L${l.line}`, `rgba(${r},${g},${b},0.6)`);
          }
        }
      });
    });
  } else {
    lines.forEach(l => drawLine(l, 'rgba(228,224,218,0.8)', 2));
  }

  // Endpoint dots
  const allPoints = new Set();
  lines.forEach(l => {
    allPoints.add(`${l.p1.x.toFixed(1)},${l.p1.y.toFixed(1)}`);
    allPoints.add(`${l.p2.x.toFixed(1)},${l.p2.y.toFixed(1)}`);
  });
  allPoints.forEach(p => {
    const [x, y] = p.split(',').map(Number);
    drawDot(x, y, 3, 'rgba(201,148,58,0.5)');
  });

  // Dimensions
  if (showDimensions) {
    const L = n => lines.find(l => l.line === n);

    // Bottom plate full span (L1)
    drawDimension(L(1).p1.x, L(1).p1.y, L(1).p2.x, L(1).p2.y, '2631px — bottom plate', 28, 'bottom');

    // Top plate span (L2)
    drawDimension(L(2).p1.x, L(2).p1.y, L(2).p2.x, L(2).p2.y, '1560px — top plate', -22, 'top');

    // Sensor bar (L3)
    drawDimension(L(3).p1.x, L(3).p1.y, L(3).p2.x, L(3).p2.y, '875px sensor', 20, 'bottom');

    // Center standoff height (L7) — plate gap
    drawDimension(L(7).p1.x, L(7).p1.y, L(7).p2.x, L(7).p2.y, '434px gap', -35, 'left');

    // Battery box outer edge (L13)
    drawDimension(L(13).p1.x, L(13).p1.y, L(13).p2.x, L(13).p2.y, '552px batt', 30, 'right');

    // Battery box top (L12)
    drawDimension(L(12).p1.x, L(12).p1.y, L(12).p2.x, L(12).p2.y, '331px', -18, 'top');

    // Upper post (L10)
    drawDimension(L(10).p1.x, L(10).p1.y, L(10).p2.x, L(10).p2.y, '252px post', -28, 'left');

    // Scale note
    ctx.fillStyle = 'rgba(201,148,58,0.3)';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillText('Source: 4284 × 5712 px · All dims in source pixels · Hand-held photo — slight perspective distortion', 40, 885);
  }

  // Region labels on canvas
  if (showRegions && !highlightRegion) {
    drawLabel(mapX(600), mapY(3080), 'SENSOR BAR', '#e05555');
    drawLabel(mapX(1800), mapY(3140), 'BOTTOM PLATE', '#5a8fd4');
    drawLabel(mapX(1500), mapY(2690), 'TOP PLATE', '#5a8fd4');
    drawLabel(mapX(3050), mapY(2850), 'SWITCH ENCL', '#55bb77');
    drawLabel(mapX(3700), mapY(2850), 'BATTERY', '#cc6633');
    drawLabel(mapX(2000), mapY(2970), 'STANDOFFS', '#d4a833');
    drawLabel(mapX(2100), mapY(2420), 'UPPER POSTS', '#8855cc');
  }
}

// ─── Measurements ────────────────────────────────────────
function rawLen(l) {
  const dx = l.p2.x - l.p1.x, dy = l.p2.y - l.p1.y;
  return Math.round(Math.sqrt(dx * dx + dy * dy));
}

const measurements = [
  ['Bottom plate span (L1)', `${rawLen(rawLines[0])}px`, 'full length'],
  ['Top plate span (L2)', `${rawLen(rawLines[1])}px`, 'front 60%'],
  ['Sensor bar (L3)', `${rawLen(rawLines[2])}px`, 'extends beyond front'],
  ['Switch encl height (L4)', `${rawLen(rawLines[3])}px`, 'inner right edge'],
  ['Switch encl width (L5)', `${rawLen(rawLines[4])}px`, 'top edge'],
  ['Rear standoff (L6)', `${rawLen(rawLines[5])}px`, 'motor/encl divider'],
  ['Center standoff (L7)', `${rawLen(rawLines[6])}px`, 'between motors'],
  ['Rear upper post (L8)', `${rawLen(rawLines[7])}px`, 'above top plate'],
  ['Mid-rear standoff (L9)', `${rawLen(rawLines[8])}px`, 'plate-to-plate'],
  ['Center upper post (L10)', `${rawLen(rawLines[9])}px`, 'above top plate'],
  ['Front standoff (L11)', `${rawLen(rawLines[10])}px`, 'near front motor'],
  ['Battery top (L12)', `${rawLen(rawLines[11])}px`, 'external box'],
  ['Battery outer edge (L13)', `${rawLen(rawLines[12])}px`, 'external box'],
  ['Battery bottom (L14)', `${rawLen(rawLines[13])}px`, 'external box'],
  ['Total lines', '14', 'all straight'],
  ['Unique vertices', '28', ''],
];

const measEl = document.getElementById('measurements');
measurements.forEach(([lab, val, note]) => {
  const row = document.createElement('div');
  row.className = 'stat-row';
  row.innerHTML = `<span class="stat-label">${lab}</span><span class="stat-val${note ? ' accent' : ''}">${val} — ${note}</span>`;
  measEl.appendChild(row);
});

// ─── Regions Panel ───────────────────────────────────────
const regEl = document.getElementById('regions');
Object.entries(regions).forEach(([key, r]) => {
  const item = document.createElement('div');
  item.className = 'region-item';
  item.innerHTML = `<div class="region-dot" style="background:${r.color}"></div><div class="region-text"><strong>${r.name}</strong> — Lines ${r.lines.join(', ')}<br>${r.desc}</div>`;
  item.addEventListener('mouseenter', () => { highlightRegion = key; render(); });
  item.addEventListener('mouseleave', () => { highlightRegion = null; render(); });
  regEl.appendChild(item);
});

// ─── Orientation Panel ──────────────────────────────────
const orientEl = document.getElementById('orient');
[
  'View: LEFT SIDE (driver\'s perspective) — camera facing passenger side',
  'Front (sensor bar) = LEFT on canvas',
  'Rear (battery box) = FAR RIGHT on canvas',
  'Top plate ABOVE, bottom plate BELOW',
  'Two DC motors with yellow gearboxes visible between plates',
  'Switch/power enclosure integrated at chassis rear (L4, L5)',
  'Battery box sits BEHIND the chassis frame — external mount (L12, L13, L14)',
  'Brass standoffs at 4 positions connecting plates (L6, L7, L9, L11)',
  'Two tall posts extend above the top plate for 2nd deck (L8, L10)',
  'Wires (red/black) visible at front and rear — not traced',
].forEach(d => {
  const div = document.createElement('div');
  div.className = 'orient-item';
  div.textContent = d;
  orientEl.appendChild(div);
});

// ─── Line Info ──────────────────────────────────────────
document.getElementById('line-info').innerHTML =
  `<em>14 lines</em> total — all straight (no curves in side profile)<br><br>` +
  `<em>Horizontal (4):</em> L1 (bottom plate), L2 (top plate), L3 (sensor bar), L5 (encl top), L12 (batt top), L14 (batt bottom)<br>` +
  `<em>Vertical (8):</em> L4 (encl edge), L6–L11 (standoffs + posts), L13 (batt outer)<br><br>` +
  `<em>Bounding box:</em> x[298..3923] y[2446..3266]<br>` +
  `<em>Trace area:</em> 3625 × 820 px (wide landscape — side profile)<br>` +
  `<em>New in this trace:</em> L12–L14 capture the battery box extending past the main chassis frame`;

// ─── Toggle Controls ────────────────────────────────────
[
  ['Grid', () => showGrid, v => showGrid = v],
  ['Numbers', () => showNumbers, v => showNumbers = v],
  ['Regions', () => showRegions, v => showRegions = v],
  ['Dims', () => showDimensions, v => showDimensions = v],
  ['Zones', () => showZones, v => showZones = v],
].forEach(([name, getter, setter]) => {
  const btn = document.createElement('button');
  btn.className = 'ctrl-btn' + (getter() ? ' active' : '');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    setter(!getter());
    btn.classList.toggle('active');
    render();
  });
  document.getElementById('controls').appendChild(btn);
});

// ─── Initial Render ─────────────────────────────────────
render();
</script>
</body>
</html>
