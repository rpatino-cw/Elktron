<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Status — Elktron</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #faf8f5;
  --cream: #f5f0ea;
  --sand: #e8dfd4;
  --amber: #d4a574;
  --sky: #7eb8d8;
  --dark: #2a2520;
  --dark-mid: #4a4540;
  --dark-soft: #8a8580;
  --green: #6db889;
  --green-bg: #e8f5ee;
  --yellow: #d4b474;
  --yellow-bg: #faf3e4;
  --red: #d47474;
  --red-bg: #fceaea;
  --blue: #7494d4;
  --blue-bg: #e8eff8;
}

body {
  background: var(--white);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.header {
  padding: 2rem 2rem 1.5rem;
  border-bottom: 1px solid var(--sand);
  position: sticky;
  top: 0;
  background: rgba(250, 248, 245, 0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
}

.header h1 span { color: var(--amber); }

.last-updated {
  font-size: 0.75rem;
  color: var(--dark-soft);
}

/* SUMMARY CARDS */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1rem;
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--sand);
}

.stat {
  text-align: center;
  padding: 1rem;
  border-radius: 12px;
}

.stat-number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}

.stat-delivered { background: var(--green-bg); }
.stat-delivered .stat-number { color: var(--green); }
.stat-delivered .stat-label { color: var(--green); }

.stat-transit { background: var(--yellow-bg); }
.stat-transit .stat-number { color: var(--yellow); }
.stat-transit .stat-label { color: var(--yellow); }

.stat-pending { background: var(--red-bg); }
.stat-pending .stat-number { color: var(--red); }
.stat-pending .stat-label { color: var(--red); }

.stat-owned { background: var(--blue-bg); }
.stat-owned .stat-number { color: var(--blue); }
.stat-owned .stat-label { color: var(--blue); }

.stat-cost { background: var(--cream); }
.stat-cost .stat-number { color: var(--dark); }
.stat-cost .stat-label { color: var(--dark-soft); }

/* SECTIONS */
.sections {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem;
}

.section {
  margin-bottom: 2.5rem;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--sand);
}

.section-icon {
  font-size: 1.2rem;
}

.section-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.section-cost {
  margin-left: auto;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--dark-mid);
  font-variant-numeric: tabular-nums;
}

/* ITEMS */
.item {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 1rem;
  align-items: center;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  margin-bottom: 0.3rem;
  cursor: pointer;
  transition: background 0.15s ease;
}

.item:hover { background: var(--cream); }

.item-status {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-delivered { background: var(--green); }
.status-transit { background: var(--yellow); }
.status-pending { background: var(--red); }
.status-owned { background: var(--blue); }
.status-pickup { background: var(--amber); }

.item-info { min-width: 0; }

.item-name {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-detail {
  font-size: 0.72rem;
  color: var(--dark-soft);
  margin-top: 0.1rem;
}

.item-who {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--dark-mid);
  white-space: nowrap;
}

.item-eta {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.eta-delivered { background: var(--green-bg); color: var(--green); }
.eta-transit { background: var(--yellow-bg); color: var(--yellow); }
.eta-pending { background: var(--red-bg); color: var(--red); }
.eta-owned { background: var(--blue-bg); color: var(--blue); }
.eta-pickup { background: #faf0e4; color: var(--amber); }

/* LEGEND */
.legend {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  padding: 1rem 2rem;
  border-top: 1px solid var(--sand);
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  color: var(--dark-soft);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* ACTION ITEMS */
.action-box {
  margin-top: 1rem;
  padding: 1.2rem 1.5rem;
  border-radius: 12px;
  background: var(--red-bg);
  border: 1px solid rgba(212, 116, 116, 0.2);
}

.action-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 0.5rem;
}

.action-item {
  font-size: 0.85rem;
  color: var(--dark);
  padding: 0.25rem 0;
  line-height: 1.5;
}

@media (max-width: 700px) {
  .item { grid-template-columns: auto 1fr auto; }
  .item-who { display: none; }
  .summary { grid-template-columns: repeat(3, 1fr); }
}

/* ─── THREE.JS CANVAS ─────────────────────────────────── */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.page-layer { position: relative; z-index: 1; }

@media (prefers-reduced-motion: reduce) {
  #bg-canvas { display: none; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="page-layer">

<div class="header">
  <div class="header-row">
    <h1><span>Parts</span> Status</h1>
    <div class="last-updated">Updated: March 12, 2026</div>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="sections" id="sections"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot status-delivered"></div> Delivered</div>
  <div class="legend-item"><div class="legend-dot status-transit"></div> In Transit</div>
  <div class="legend-item"><div class="legend-dot status-pending"></div> Still Needed</div>
  <div class="legend-item"><div class="legend-dot status-pickup"></div> Pickup Ready</div>
  <div class="legend-item"><div class="legend-dot status-owned"></div> Already Owned</div>
</div>

<script>
const PARTS = {
  escort: {
    title: 'Escort Bot',
    cost: '~$103',
    items: [
      { name: 'LK-COKOINO 4WD Chassis Kit', price: '~$25', who: 'Alex', status: 'transit', eta: '3/11', detail: 'Amazon — 4 motors, 4 wheels, chassis plates, screws' },
      { name: 'Arducam 120° Wide Camera (IMX708)', price: '$59.99', who: 'Romeo', status: 'transit', eta: '3/14', detail: 'Amazon — CSI camera module for Pi 5. LAST ESCORT PART.' },
      { name: 'Arducam Pan-Tilt Platform', price: '$26.99', who: 'Romeo', status: 'transit', eta: '3/12', detail: 'Amazon — 2 servos + controller + mounting bracket' },
      { name: 'Pi 5 Active Cooler', price: '$9.98', who: 'Romeo', status: 'delivered', eta: 'Arrived', detail: 'Amazon — Prevents thermal throttle under TFLite load' },
      { name: 'WWZMDiB L298N Motor Driver 2-Pack', price: '$6.98', who: 'Romeo', status: 'transit', eta: '3/12', detail: 'Amazon — H-bridge for 4 DC motors' },
      { name: 'ELEGOO HC-SR04 Ultrasonic 5-Pack', price: '$8.99', who: 'Romeo', status: 'transit', eta: '3/12', detail: 'Amazon — Distance sensing. Keep 2, rest spares.' },
      { name: 'DIYables HC-SR04 2-Pack', price: '$6.99', who: 'Romeo', status: 'transit', eta: '3/12', detail: 'Amazon — Backup ultrasonic sensors' },
      { name: 'QTEATAK 18650 Battery Holders 8-Pack', price: '$9.99', who: 'Romeo', status: 'transit', eta: '3/12', detail: 'Amazon — Need 1 for chassis, rest spares' },
      { name: 'PVC Pipe 1" x 4ft + T-connector', price: '~$8', who: 'TBD', status: 'pickup', eta: 'HD Cart', detail: 'Home Depot — For camera mast. Needs someone to pick up.' },
    ]
  },

    title: 'SO-101 Robot Arm',
    cost: '~$295',
    items: [
      { name: 'HiWonder LeRobot SO-ARM101 Kit', price: '~$270', who: 'Romeo', status: 'transit', eta: '~3/18', detail: 'hiwonder.com — Ships from China. LONG POLE. 6 biz days.' },
      { name: 'NexiGo N60 1080P Webcam', price: '~$25', who: 'Romeo', status: 'transit', eta: '3/11', detail: 'Amazon — Overhead camera for training data' },
    ]
  },
  power: {
    title: 'Power & Batteries',
    cost: '~$48',
    items: [
      { name: 'Samsung 30Q 18650 Batteries + Charger', price: '~$18', who: 'Romeo', status: 'transit', eta: '3/11', detail: 'Amazon — Start charging IMMEDIATELY on arrival (4-6 hrs)' },
      { name: 'MakerFocus Pi Battery Pack 10000mAh', price: '~$30', who: 'Romeo', status: 'transit', eta: '3/11', detail: 'Amazon — USB-C powers Pi 5 on the bot' },

  },

    items: [
      { name: 'Raspberry Pi 5', price: '—', who: 'Romeo', status: 'owned', eta: 'Have', detail: 'Main compute for escort bot' },
      { name: 'Raspberry Pi 4', price: '—', who: 'Romeo', status: 'owned', eta: 'Have', detail: 'Backup / dashboard display' },
      { name: 'Raspberry Pi (Alex)', price: '—', who: 'Alex', status: 'owned', eta: 'Have', detail: 'Backup Pi' },
      { name: 'Raspberry Pi Pico', price: '—', who: 'Romeo', status: 'owned', eta: 'Have', detail: 'Backup microcontroller' },
      { name: 'SIM Card', price: '—', who: 'Romeo', status: 'owned', eta: 'Have', detail: 'For mobile hotspot if needed' },
      { name: 'Velcro Strips', price: '—', who: 'Romeo', status: 'owned', eta: 'Have', detail: 'For mounting components' },
    ]
  },
  needed: {
    title: 'Still Needed',
    cost: '~$8-25',
    items: [
      { name: 'MicroSD Card 32-64GB', price: '~$8', who: 'Romeo', status: 'pending', eta: 'Check', detail: 'Check if Romeo has one. If not: Samsung EVO Select 64GB.' },
      { name: 'USB-C Power Bank 20000mAh (optional)', price: '~$25', who: 'TBD', status: 'pending', eta: 'Optional', detail: 'Best Buy — only if MakerFocus 10000mAh isn\'t enough' },
    ]
  }
};

const ETA_CLASS = {
  delivered: 'eta-delivered',
  transit: 'eta-transit',
  pending: 'eta-pending',
  owned: 'eta-owned',
  pickup: 'eta-pickup',

// Render summary
const allItems = Object.values(PARTS).flatMap(s => s.items);
const counts = { delivered: 0, transit: 0, pending: 0, owned: 0, pickup: 0 };
allItems.forEach(i => counts[i.status]++);

document.getElementById('summary').innerHTML = `
  <div class="stat stat-delivered"><div class="stat-number">${counts.delivered}</div><div class="stat-label">Delivered</div></div>
  <div class="stat stat-transit"><div class="stat-number">${counts.transit}</div><div class="stat-label">In Transit</div></div>
  <div class="stat stat-pending"><div class="stat-number">${counts.pending + counts.pickup}</div><div class="stat-label">Still Needed</div></div>
  <div class="stat stat-owned"><div class="stat-number">${counts.owned}</div><div class="stat-label">Already Owned</div></div>
  <div class="stat stat-cost"><div class="stat-number">~$468</div><div class="stat-label">Total Budget</div></div>
`;

// Render sections
const sectionsEl = document.getElementById('sections');
Object.entries(PARTS).forEach(([key, section]) => {
  const items = section.items.map(item => `
    <div class="item">
      <div class="item-status status-${item.status}"></div>

  sectionsEl.innerHTML += `

// Action items
sectionsEl.innerHTML += `

    <div class="action-item">5. <strong>SO-101 arm kit (~3/18)</strong> — Long pole. If delayed past 3/19, arm demo uses pre-recorded video as fallback.</div>
  </div>
`;
</script>

</div><!-- end .page-layer -->

<!-- ─── THREE.JS ──────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg-canvas');
if (canvas && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(
    -window.innerWidth / 2, window.innerWidth / 2,
    window.innerHeight / 2, -window.innerHeight / 2, 0.1, 10
  );
  camera.position.z = 1;

  const DOT_COUNT = 350;
  const positions = new Float32Array(DOT_COUNT * 3);
  const phases = new Float32Array(DOT_COUNT);
  for (let i = 0; i < DOT_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * window.innerWidth;
    positions[i * 3 + 1] = (Math.random() - 0.5) * window.innerHeight;
    positions[i * 3 + 2] = 0;
    phases[i] = Math.random() * Math.PI * 2;
  }

  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  dotGeo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

  const dotMat = new THREE.ShaderMaterial({
    transparent: true, depthTest: false,
    uniforms: {
      time: { value: 0 },
      mouse: { value: new THREE.Vector2(9999, 9999) },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      baseColor: { value: new THREE.Color(0xd4a574) },
    },
    vertexShader: `
      attribute float phase;
      uniform float time;
      uniform vec2 mouse;
      uniform vec2 resolution;
      varying float vAlpha;
      varying float vGlow;
      void main() {
        vec3 pos = position;
        pos.y += sin(time * 0.4 + phase) * 3.0;
        pos.x += cos(time * 0.3 + phase * 1.3) * 2.0;
        float dist = distance(pos.xy, mouse);
        vGlow = smoothstep(200.0, 0.0, dist);
        vAlpha = 0.07 + sin(time * 0.5 + phase) * 0.03 + vGlow * 0.3;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = 2.0 + vGlow * 3.0;
      }
    `,
    fragmentShader: `
      uniform vec3 baseColor;
      varying float vAlpha;
      varying float vGlow;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float soft = 1.0 - smoothstep(0.2, 0.5, d);
        vec3 col = mix(baseColor, vec3(0.75, 0.7, 0.65), 1.0 - vGlow);
        gl_FragColor = vec4(col, vAlpha * soft);
      }
    `
  });
  scene.add(new THREE.Points(dotGeo, dotMat));

  const LINE_COUNT = 50;
  const linePositions = new Float32Array(LINE_COUNT * 6);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lineMat = new THREE.LineBasicMaterial({ color: 0xd4a574, transparent: true, opacity: 0.04, depthTest: false });
  scene.add(new THREE.LineSegments(lineGeo, lineMat));

  function updateLines() {
    const pos = dotGeo.attributes.position.array;
    let idx = 0;
    for (let i = 0; i < DOT_COUNT && idx < LINE_COUNT * 6; i++) {
      for (let j = i + 1; j < DOT_COUNT && idx < LINE_COUNT * 6; j++) {
        const dx = pos[i*3] - pos[j*3], dy = pos[i*3+1] - pos[j*3+1];
        if (Math.sqrt(dx*dx + dy*dy) < 110) {
          linePositions[idx++] = pos[i*3]; linePositions[idx++] = pos[i*3+1]; linePositions[idx++] = 0;
          linePositions[idx++] = pos[j*3]; linePositions[idx++] = pos[j*3+1]; linePositions[idx++] = 0;
        }
      }
    }
    for (let k = idx; k < LINE_COUNT * 6; k++) linePositions[k] = 0;
    lineGeo.attributes.position.needsUpdate = true;
  }

  let mouseX = 9999, mouseY = 9999;
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX - window.innerWidth / 2;
    mouseY = -(e.clientY - window.innerHeight / 2);
  });

  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.left = -w / 2; camera.right = w / 2;
    camera.top = h / 2; camera.bottom = -h / 2;
    camera.updateProjectionMatrix();
    dotMat.uniforms.resolution.value.set(w, h);
  });

  const clock = new THREE.Clock();
  let f = 0;
  (function animate() {
    requestAnimationFrame(animate);
    dotMat.uniforms.time.value = clock.getElapsedTime();
    dotMat.uniforms.mouse.value.set(mouseX, mouseY);
    if (f++ % 4 === 0) updateLines();
    renderer.render(scene, camera);
  })();
}
</script>
</body>
</html>
