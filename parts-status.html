<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Parts & Inventory — Elktron</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&family=Inconsolata:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
body{font-family:var(--font-sans);background:var(--bg-dark);color:var(--text-primary);line-height:1.5;padding:0 0 80px;-webkit-tap-highlight-color:transparent}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(5,8,16,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-accent);z-index:200}
.nav-back{color:var(--text-secondary);text-decoration:none;font-size:0.75rem;font-weight:500;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.nav-back:hover{color:var(--accent-secondary)}
.nav-title{font-size:0.625rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-tertiary)}

/* HEADER */
header{background:rgba(10,14,26,0.9);padding:68px 20px 16px;border-bottom:1px solid var(--border-accent);position:sticky;top:52px;z-index:100;backdrop-filter:blur(12px)}
header h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em;color:#fff}
header h1 span{color:var(--accent-secondary)}
.header-sub{font-size:0.75rem;color:var(--text-tertiary);margin-top:2px}
.header-stats{display:flex;gap:16px;margin-top:10px;font-family:var(--font-mono);font-size:0.6875rem;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%}
.dot-delivered{background:var(--status-success)}
.dot-transit{background:var(--status-warning)}
.dot-need{background:var(--status-error)}
.dot-owned{background:var(--accent-secondary)}

/* FILTERS */
.filters{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;background:rgba(10,14,26,0.7);border-bottom:1px solid var(--border-subtle);position:sticky;top:120px;z-index:99;backdrop-filter:blur(12px)}
.filter-btn{font-size:0.6875rem;padding:5px 12px;border:1px solid var(--border-accent);border-radius:100px;background:transparent;color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--font-sans)}
.filter-btn.active{background:var(--accent-primary);color:#fff;border-color:var(--accent-primary)}
.filter-btn:hover:not(.active){border-color:var(--glow-strong)}
.filter-btn .count{display:inline-block;margin-left:4px;opacity:0.6}

/* PROGRESS */
.progress-wrap{padding:12px 20px 0}
.progress-bar{height:3px;background:var(--glow-medium);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent-gradient);border-radius:2px;transition:width 0.4s}
.progress-label{font-size:0.625rem;color:var(--text-tertiary);margin-top:4px;text-align:right;font-family:var(--font-mono)}

/* SECTION DIVIDERS */
.section-divider{display:flex;align-items:center;gap:10px;padding:20px 20px 8px}
.section-badge{font-size:0.5625rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:3px 10px;border-radius:100px}
.badge-escort{background:var(--accent-primary-muted);color:var(--accent-secondary)}
.badge-arm{background:rgba(124,58,237,0.1);color:#a78bfa}
.badge-owned{background:var(--status-success-muted);color:var(--status-success)}
.badge-needed{background:var(--status-error-muted);color:var(--status-error)}
.badge-amazon{background:rgba(255,153,0,0.15);color:#ff9900}
.badge-homedepot{background:rgba(249,99,2,0.15);color:#f96302}
.section-line{flex:1;height:1px;background:var(--border-accent)}

/* CATEGORY */
.category{padding:14px 20px 6px;font-size:0.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary)}

/* ITEMS */
.item{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:opacity 0.2s,background 0.15s;-webkit-user-select:none;user-select:none}
.item:active{background:var(--accent-primary-muted)}
.item.checked{opacity:0.4}
.item.checked .item-name{text-decoration:line-through;text-decoration-color:var(--text-tertiary)}

.checkbox{width:20px;height:20px;border:2px solid var(--border-accent);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.item.checked .checkbox{background:var(--accent-primary);border-color:var(--accent-primary)}
.checkbox svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none;opacity:0;transition:opacity 0.15s}
.item.checked .checkbox svg{opacity:1}

.item-content{flex:1;min-width:0}
.item-top{display:flex;align-items:baseline;gap:8px}
.item-name{font-size:0.875rem;font-weight:500;color:var(--text-primary);line-height:1.3}
.item-price{font-family:var(--font-mono);font-size:0.75rem;color:var(--status-warning);font-weight:500;white-space:nowrap;margin-left:auto;flex-shrink:0}
.item-detail{font-size:0.75rem;color:var(--text-tertiary);margin-top:2px;line-height:1.4}
.item-who{font-size:0.6875rem;color:var(--text-secondary);margin-top:2px}
.item-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:0.5rem;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
.tag-delivered{background:var(--status-success-muted);color:var(--status-success)}
.tag-transit{background:var(--status-warning-muted);color:var(--status-warning)}
.tag-high{background:var(--status-error-muted);color:var(--status-error)}
.tag-medium{background:var(--status-warning-muted);color:var(--status-warning)}
.tag-low{background:var(--bg-elevated);color:var(--text-tertiary)}
.tag-ordered{background:var(--status-success-muted);color:var(--status-success)}
.tag-owned{background:var(--accent-primary-muted);color:var(--accent-secondary)}
.tag-pickup{background:var(--status-warning-muted);color:var(--status-warning)}

.item-link{display:inline-block;margin-top:4px;font-size:0.6875rem;color:var(--accent-secondary);text-decoration:none}
.item-link:hover{text-decoration:underline}

/* LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:16px 20px;border-top:1px solid var(--border-accent);justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.6875rem;color:var(--text-tertiary)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);color:var(--text-primary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:200;border-top:1px solid var(--border-accent)}
.bottom-left{font-size:0.75rem}
.bottom-left .amount{font-size:1.125rem;font-weight:700;color:var(--status-warning)}
.bottom-right{display:flex;gap:8px}
.btn{font-size:0.6875rem;padding:7px 14px;border:1px solid var(--border-accent);border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);transition:all 0.15s}
.btn:hover{border-color:var(--glow-strong);color:var(--text-primary)}
.btn-accent{background:var(--accent-primary);border-color:var(--accent-primary);color:#fff}
.btn-accent:hover{background:var(--accent-primary-hover)}

.hidden{display:none!important}
@media(min-width:640px){body{max-width:640px;margin:0 auto}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Hub</a>
  <span class="nav-title">Parts & Inventory</span>
</nav>

<header>
  <h1><span>Parts</span> & Inventory</h1>
  <div class="header-sub">Escort Bot + SO-101 Arm — Demo Day March 26</div>
  <div class="header-stats">
    <div class="stat"><div class="dot dot-delivered"></div><span id="deliveredCount">0</span> delivered</div>
    <div class="stat"><div class="dot dot-transit"></div><span id="transitCount">0</span> in transit</div>
    <div class="stat"><div class="dot dot-need"></div><span id="needCount">0</span> to buy</div>
    <div class="stat"><div class="dot dot-owned"></div><span id="ownedCount">0</span> owned</div>
  </div>
</header>

<div class="filters" id="filters"></div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div id="list"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Delivered</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> In Transit</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Still Needed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6CA1E5"></div> Already Owned</div>
</div>

<div class="bottom-bar">
  <div class="bottom-left">
    <div style="font-size:0.5625rem;opacity:0.5;text-transform:uppercase;letter-spacing:0.1em">Remaining</div>
    <div class="amount">$<span id="bottomTotal">0</span></div>
  </div>
  <div class="bottom-right">
    <button class="btn" onclick="resetAll()">Reset</button>
    <button class="btn" onclick="copyList()">Copy List</button>
    <button class="btn btn-accent" onclick="shareList()">Share</button>
  </div>
</div>

<script>
const ITEMS = [
  // ===== ESCORT BOT — DELIVERED =====
  { name: "LK-COKOINO 4WD Chassis Kit", price: 26.99, category: "Chassis", group: "escort", status: "delivered", who: "Alex",
    detail: "4x TT motors, 4x wheels, acrylic frame, standoffs. Alex has it.", link: "https://www.amazon.com/Arduino-LK-COKOINO-Raspberry-Building/dp/B0B5JPJ9R4" },
  { name: "L298N Motor Driver (2-pack)", price: 6.98, category: "Motor Control", group: "escort", status: "delivered", who: "Romeo",
    detail: "WWZMDiB dual H-Bridge. DELIVERED 3/12. GPIO 17/27 (left), 22/23 (right). Have a spare." },
  { name: "HC-SR04 Ultrasonic (DIYables 2-pack)", price: 6.99, category: "Sensors", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/12. ECHO pin 5V — NEEDS voltage divider (1k + 2k resistors)." },
  { name: "Arducam Pan/Tilt Platform", price: 26.99, category: "Vision", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/12. I2C controlled, 12-bit PWM, 180° pan+tilt, 2 servos included." },
  { name: "Pi 5 Active Cooler (Official)", price: 9.98, category: "Compute", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/11. PWM blower + heatsink + thermal tape." },
  { name: "18650 Battery Holder Bundle (8-pack)", price: 9.99, category: "Power", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/12. QTEATAK 1/2/3/4 slot holders, 2 of each." },
  { name: "USB-C Right-Angle Adapter (2-pack)", price: 8.49, category: "Power", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/12. Silkland 90° adapter. Keeps cable flush on chassis." },
  { name: "CanaKit 3.5A Pi PSU + PiSwitch", price: 12.99, category: "Power", group: "escort", status: "delivered", who: "Romeo",
    detail: "DELIVERED 3/12. FOR BENCH TESTING ONLY — not for the bot." },

  // ===== ESCORT BOT — IN TRANSIT =====
  { name: "Arducam Camera Module 3 Wide (IMX708)", price: 59.99, category: "Vision", group: "escort", status: "transit", who: "Romeo",
    detail: "120° wide-angle, autofocus, Pi 5 compatible. 12MP. ETA Sat 3/15.", link: "https://www.amazon.com/s?k=arducam+imx708" },
  { name: "HC-SR04 Ultrasonic (ELEGOO 5-pack)", price: 8.99, category: "Sensors", group: "escort", status: "transit", who: "Romeo",
    detail: "Arriving 3/13. Includes 20 dupont cables." },
  { name: "18650 Batteries (4-pack)", price: 22.98, category: "Power", group: "escort", status: "transit", who: "Romeo",
    detail: "QOJH 3.7V 3000mAh. 2 in bot + 2 hot-swap spares. ETA Sat 3/15." },
  { name: "18650 Dual-Slot Charger", price: 8.59, category: "Power", group: "escort", status: "transit", who: "Romeo",
    detail: "ACEBOTT smart charger. CHARGE NIGHT BEFORE DEMO (4 hours). ETA Sat 3/15." },
  { name: "Anker PowerCore 10K (USB-C)", price: 21.99, category: "Power", group: "escort", status: "transit", who: "Romeo",
    detail: "5V/3A. Powers Pi 5. ~3-4 hours runtime under CV load. ETA 3/13.", link: "https://www.amazon.com/dp/B0D5CLSMFB" },

  // ===== ESCORT BOT — NEED TO BUY =====
  { name: "Resistor Assortment Kit", price: 3, category: "Voltage Divider", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "MUST include 1kΩ + 2kΩ. HC-SR04 ECHO 5V→3.3V divider. WITHOUT THIS GPIO 24 FRIES.", link: "https://www.amazon.com/s?k=resistor+assortment+kit+1k+2k" },
  { name: "Half-Size Breadboard (400 pts)", price: 4, category: "Prototyping", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Mounts voltage divider circuit. Half-size fits on chassis.", link: "https://www.amazon.com/s?k=half+size+breadboard+400" },
  { name: "Jumper Wires M-F x20 (20cm)", price: 5, category: "Wiring", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "GPIO → L298N (4), HC-SR04 (4), common GND (1), spares (11).", link: "https://www.amazon.com/s?k=female+to+male+jumper+wires+20cm" },
  { name: "Jumper Wires M-M x10 (20cm)", price: 3, category: "Wiring", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Breadboard connections, voltage divider, motor leads.", link: "https://www.amazon.com/s?k=male+to+male+jumper+wires+20cm" },
  { name: "Short USB-C Cable (6-12 inches)", price: 5, category: "Wiring", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Power bank → right-angle adapter → Pi. Must support 5V/3A.", link: "https://www.amazon.com/s?k=short+usb+c+cable+6+inch" },
  { name: "1\" Schedule 40 PVC Pipe (3-4 ft)", price: 3, category: "Mast", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Raises camera to mid-rack height. Free cuts at Home Depot.", store: "homedepot" },
  { name: "1\" PVC T-Connector", price: 1, category: "Mast", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Mounts pipe vertically. Horizontal arm bolts to chassis.", store: "homedepot" },
  { name: "1\" PVC 90° Elbow", price: 1, category: "Mast", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Top of mast — angles camera toward rack face.", store: "homedepot" },
  { name: "Hose Clamps x2 (1\" diameter)", price: 2, category: "Mast", group: "escort", status: "need", priority: "high", who: "TBD",
    detail: "Secures T-connector to acrylic chassis frame.", store: "homedepot" },
  { name: "Second USB-C Power Bank (backup)", price: 22, category: "Power", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "Demo is 2-5pm (3 hours). One bank might not last.", link: "https://www.amazon.com/dp/B0D5CLSMFB" },
  { name: "Velcro Cable Ties (50-pack)", price: 5, category: "Mounting", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "Strap power bank, battery holder, wires, breadboard.", link: "https://www.amazon.com/s?k=reusable+velcro+cable+ties" },
  { name: "Double-Sided Foam Tape (3M)", price: 5, category: "Mounting", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "Mount L298N + breadboard to chassis. Dampen vibration.", link: "https://www.amazon.com/s?k=3m+double+sided+foam+tape" },
  { name: "Rubber Bumper Pads (20-pack)", price: 3, category: "Mounting", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "All 4 chassis corners — protects acrylic when bot bumps racks.", link: "https://www.amazon.com/s?k=self+adhesive+rubber+bumper+pads" },
  { name: "Electrical Tape (1 roll)", price: 3, category: "Insulation", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "Insulate solder joints, tape wires, color-mark GPIO leads." },
  { name: "Heat Shrink Tubing Assortment", price: 5, category: "Insulation", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "Voltage divider solder joints, motor wire splices." },
  { name: "Ethernet Cable (6ft Cat6)", price: 5, category: "Shared", group: "escort", status: "need", priority: "medium", who: "TBD",
    detail: "SSH into Pi from laptop. Faster than WiFi for dev." },

  // ===== SO-101 ARM =====
  { name: "HiWonder LeRobot SO-ARM101 Kit", price: 270, category: "Arm Kit", group: "arm", status: "transit", who: "Romeo",
    detail: "Ships from China. LONG POLE. 6 biz days. ETA ~3/18." },
  { name: "NexiGo N60 1080P Webcam", price: 25, category: "Vision", group: "arm", status: "transit", who: "Romeo",
    detail: "Overhead camera for training data. ETA 3/11." },

  // ===== ALREADY OWNED =====
  { name: "Raspberry Pi 5 (8GB)", price: 0, category: "Compute", group: "owned", status: "owned", who: "Alex",
    detail: "Main compute for escort bot. Alex bringing to build sessions." },
  { name: "Raspberry Pi 4 (backup)", price: 0, category: "Compute", group: "owned", status: "owned", who: "Romeo",
    detail: "Backup / dashboard display." },
  { name: "MicroSD Card", price: 0, category: "Compute", group: "owned", status: "owned", who: "Romeo",
    detail: "Flash with Raspberry Pi OS Bookworm Lite 64-bit." },
  { name: "Raspberry Pi Pico", price: 0, category: "Compute", group: "owned", status: "owned", who: "Romeo",
    detail: "Backup microcontroller." },
  { name: "Velcro Strips", price: 0, category: "Mounting", group: "owned", status: "owned", who: "Romeo",
    detail: "For mounting components." },
  { name: "Laptop (Mac M-series)", price: 0, category: "Shared", group: "owned", status: "owned", who: "Romeo",
    detail: "Training + demo display." },
];

// ===== STATE =====
let checkedItems = JSON.parse(localStorage.getItem('elktron-parts') || '{}');
let activeFilter = 'all';

// ===== RENDER =====
function render() {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';

  let filtered = ITEMS;
  if (activeFilter === 'need') filtered = ITEMS.filter(i => i.status === 'need');
  else if (activeFilter === 'transit') filtered = ITEMS.filter(i => i.status === 'transit');
  else if (activeFilter === 'delivered') filtered = ITEMS.filter(i => i.status === 'delivered');
  else if (activeFilter === 'owned') filtered = ITEMS.filter(i => i.status === 'owned');
  else if (activeFilter === 'high') filtered = ITEMS.filter(i => i.priority === 'high');
  else if (activeFilter === 'escort') filtered = ITEMS.filter(i => i.group === 'escort');
  else if (activeFilter === 'arm') filtered = ITEMS.filter(i => i.group === 'arm');

  // Group by group then category
  const groups = ['escort', 'arm', 'owned'];
  const groupLabels = { escort: 'Escort Bot', arm: 'SO-101 Arm', owned: 'Already Owned' };
  const groupBadges = { escort: 'badge-escort', arm: 'badge-arm', owned: 'badge-owned' };

  for (const group of groups) {
    const groupItems = filtered.filter(i => i.group === group);
    if (groupItems.length === 0) continue;

    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.innerHTML = '<span class="section-badge ' + groupBadges[group] + '">' + groupLabels[group] + '</span><div class="section-line"></div>';
    listEl.appendChild(divider);

    const cats = [...new Set(groupItems.map(i => i.category))];
    for (const cat of cats) {
      const catEl = document.createElement('div');
      catEl.className = 'category';
      catEl.textContent = cat;
      listEl.appendChild(catEl);

      const catItems = groupItems.filter(i => i.category === cat);
      for (const item of catItems) {
        const idx = ITEMS.indexOf(item);
        const isChecked = checkedItems[idx] || item.status === 'owned' || item.status === 'delivered';

        const el = document.createElement('div');
        el.className = 'item' + (isChecked ? ' checked' : '');
        el.dataset.idx = idx;

        let tags = '';
        if (item.status === 'delivered') tags += '<span class="tag tag-delivered">DELIVERED</span>';
        else if (item.status === 'transit') tags += '<span class="tag tag-transit">IN TRANSIT</span>';
        else if (item.status === 'ordered') tags += '<span class="tag tag-ordered">ORDERED</span>';
        else if (item.status === 'owned') tags += '<span class="tag tag-owned">OWNED</span>';
        else if (item.priority === 'high') tags += '<span class="tag tag-high">HIGH PRIORITY</span>';
        else if (item.priority === 'medium') tags += '<span class="tag tag-medium">MEDIUM</span>';
        else if (item.priority === 'low') tags += '<span class="tag tag-low">OPTIONAL</span>';

        if (item.store === 'homedepot') tags += ' <span class="tag" style="background:rgba(249,99,2,0.15);color:#f96302">HOME DEPOT</span>';

        let linkHtml = '';
        if (item.link) linkHtml = '<a class="item-link" href="' + item.link + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">View product →</a>';

        let whoHtml = item.who ? '<div class="item-who">Owner: ' + item.who + '</div>' : '';

        el.innerHTML =
          '<div class="checkbox"><svg viewBox="0 0 14 14"><polyline points="2.5 7 5.5 10.5 11.5 3.5"/></svg></div>' +
          '<div class="item-content">' +
            '<div class="item-top"><span class="item-name">' + item.name + '</span>' +
            (item.price > 0 ? '<span class="item-price">$' + item.price.toFixed(2) + '</span>' : '') +
            '</div>' +
            '<div class="item-detail">' + item.detail + '</div>' +
            whoHtml +
            '<div class="item-tags">' + tags + '</div>' +
            linkHtml +
          '</div>';
        listEl.appendChild(el);
      }
    }
  }
  updateStats();
}

// Event delegation
document.getElementById('list').addEventListener('click', function(e) {
  var item = e.target.closest('.item');
  if (!item || e.target.closest('.item-link')) return;
  var idx = parseInt(item.dataset.idx, 10);
  if (isNaN(idx)) return;
  checkedItems[idx] = !checkedItems[idx];
  item.classList.toggle('checked', checkedItems[idx] || ITEMS[idx].status === 'owned' || ITEMS[idx].status === 'delivered');
  localStorage.setItem('elktron-parts', JSON.stringify(checkedItems));
  updateStats();
});

function updateStats() {
  var delivered = ITEMS.filter(function(i) { return i.status === 'delivered'; }).length;
  var transit = ITEMS.filter(function(i) { return i.status === 'transit'; }).length;
  var need = ITEMS.filter(function(i) { return i.status === 'need'; }).length;
  var owned = ITEMS.filter(function(i) { return i.status === 'owned'; }).length;
  var secured = delivered + transit + owned;
  var total = ITEMS.length;
  var remaining = ITEMS.filter(function(i) { return i.status === 'need'; }).reduce(function(s, i) { return s + i.price; }, 0);

  document.getElementById('deliveredCount').textContent = delivered;
  document.getElementById('transitCount').textContent = transit;
  document.getElementById('needCount').textContent = need;
  document.getElementById('ownedCount').textContent = owned;
  document.getElementById('bottomTotal').textContent = remaining.toFixed(0);

  var pct = Math.round((secured / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = secured + '/' + total + ' items secured (' + pct + '%)';
}

// ===== FILTERS =====
function renderFilters() {
  var needCount = ITEMS.filter(function(i) { return i.status === 'need'; }).length;
  var transitCount = ITEMS.filter(function(i) { return i.status === 'transit'; }).length;
  var highCount = ITEMS.filter(function(i) { return i.priority === 'high'; }).length;
  var escortCount = ITEMS.filter(function(i) { return i.group === 'escort'; }).length;
  var armCount = ITEMS.filter(function(i) { return i.group === 'arm'; }).length;

  var filters = [
    { id: 'all', label: 'All', count: ITEMS.length },
    { id: 'need', label: 'Need', count: needCount },
    { id: 'high', label: 'High Priority', count: highCount },
    { id: 'transit', label: 'In Transit', count: transitCount },
    { id: 'escort', label: 'Escort Bot', count: escortCount },
    { id: 'arm', label: 'SO-101 Arm', count: armCount },
  ];

  document.getElementById('filters').innerHTML = filters.map(function(f) {
    return '<button class="filter-btn ' + (f.id === activeFilter ? 'active' : '') + '" onclick="setFilter(\'' + f.id + '\')">' + f.label + '<span class="count">' + f.count + '</span></button>';
  }).join('');
}

function setFilter(id) { activeFilter = id; renderFilters(); render(); }

// ===== ACTIONS =====
function resetAll() {
  if (confirm('Reset all checkboxes?')) {
    checkedItems = {};
    localStorage.setItem('elktron-parts', '{}');
    render();
  }
}

function copyList() {
  var needItems = ITEMS.filter(function(i) { return i.status === 'need' && !checkedItems[ITEMS.indexOf(i)]; });
  var text = "ELKTRON — PARTS NEEDED\n========================\n\n" +
    needItems.map(function(i) { return "[ ] " + i.name + " — $" + i.price.toFixed(2) + "\n    " + i.detail; }).join('\n\n');
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.querySelectorAll('.btn')[1];
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  });
}

function shareList() {
  var needItems = ITEMS.filter(function(i) { return i.status === 'need' && !checkedItems[ITEMS.indexOf(i)]; });
  var total = needItems.reduce(function(s, i) { return s + i.price; }, 0);
  var text = 'Elktron — ' + needItems.length + ' items left ($' + total.toFixed(0) + ')\n\n' +
    needItems.map(function(i) { return '- ' + i.name + ' $' + i.price.toFixed(2); }).join('\n');
  if (navigator.share) navigator.share({ title: 'Elktron Parts List', text: text });
  else navigator.clipboard.writeText(text).then(function() { alert('List copied to clipboard'); });
}

// ===== INIT =====
renderFilters();
render();
</script>
</body>
</html>
