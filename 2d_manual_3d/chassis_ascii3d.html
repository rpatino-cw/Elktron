<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK-COKOINO 4WD Chassis — ASCII 3D Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--surface:#141418;--border:rgba(255,255,255,0.06);
  --amber:#c9943a;--amber-dim:rgba(201,148,58,0.3);
  --text:#e8e4dc;--text-dim:rgba(232,228,220,0.5);
}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.2rem;font-weight:600;color:var(--amber)}
.header .sub{font-size:0.75rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.controls{display:flex;gap:0.5rem;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;gap:0.35rem;align-items:center}
.ctrl-label{font-size:0.65rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;margin-right:0.3rem;text-transform:uppercase;letter-spacing:0.05em}
.ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:0.3rem 0.6rem;border-radius:4px;font-size:0.7rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.15s}
.ctrl-btn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.ctrl-btn:hover{border-color:var(--amber)}
.sep{width:1px;height:20px;background:var(--border);margin:0 0.4rem}
.main{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;padding:0.5rem}
#ascii{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.15;white-space:pre;color:var(--amber);letter-spacing:0;tab-size:1}
.footer{padding:0.5rem 1.5rem;border-top:1px solid var(--border);font-size:0.65rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>LK-COKOINO 4WD Chassis — ASCII 3D Preview</h1>
    <div class="sub">Stage 4 &middot; Isometric wireframe from merged Stage 3 dimensions</div>
  </div>
</div>
<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Spin</span>
    <button class="ctrl-btn active" id="btnSpin" onclick="toggleSpin()">Auto</button>
    <button class="ctrl-btn" onclick="nudge(-1)">← Left</button>
    <button class="ctrl-btn" onclick="nudge(1)">→ Right</button>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Pitch</span>
    <button class="ctrl-btn active" onclick="setPitch('1')">Bird</button>
    <button class="ctrl-btn" onclick="setPitch('2')">Low</button>
    <button class="ctrl-btn" onclick="setPitch('3')">Eye</button>
    <button class="ctrl-btn" onclick="setPitch('4')">Under</button>
    <button class="ctrl-btn" onclick="adjustPitch(1)">↑</button>
    <button class="ctrl-btn" onclick="adjustPitch(-1)">↓</button>
  </div>
  <div class="sep"></div>
  <div class="ctrl-group">
    <button class="ctrl-btn active" id="btnLabels" onclick="toggleLabels()">Labels</button>
    <button class="ctrl-btn active" id="btnGround" onclick="toggleGround()">Ground</button>
  </div>
</div>
<div class="main"><pre id="ascii"></pre></div>
<div class="footer">
  <span>260x130mm &middot; arrow front &middot; 4 TT motors + wheels &middot; battery &middot; sensor bar</span>
  <span id="info"></span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PARTS — exact port from chassis_ascii.py
// [x, y, z, w, d, h, label]  Origin: front-left-bottom. X=right, Y=back, Z=up.
// ═══════════════════════════════════════════════════════════════
const PARTS = [
  [0,   0,   0,  130, 260, 3,  'BOTTOM PLATE'],
  [0,   5,  45,  130, 154, 3,  'TOP PLATE'],
  // Standoffs
  [18,  82,  3,   4,   4, 42, ''],
  [108, 82,  3,   4,   4, 42, ''],
  [18, 140,  3,   4,   4, 42, ''],
  [108,140,  3,   4,   4, 42, 'STANDOFF'],
  // Upper posts
  [18,  82, 48,   4,   4, 14, ''],
  [108,155, 48,   4,   4, 15, 'POST'],
  // Motors
  [-10, 30,  5,  30,  50, 35, 'MTR'],
  [110, 30,  5,  30,  50, 35, 'MTR'],
  [-10,110,  5,  30,  50, 35, ''],
  [110,110,  5,  30,  50, 35, ''],
  // Wheels
  [-18, 35, -15,  25,  40, 65, 'WHL'],
  [123, 35, -15,  25,  40, 65, 'WHL'],
  [-18,115, -15,  25,  40, 65, ''],
  [123,115, -15,  25,  40, 65, ''],
  // Battery box
  [30, 260,  4,  70,  33, 44, 'BATT'],
  // Sensor bar
  [30, -82, 27,  70,  86,  5, 'SENSOR'],
  // Head / front wing — per merged blueprint (276mm wide, extends 147mm forward)
  [-73, -147, 0, 276, 147, 3, 'HEAD'],
  // Switch base
  [0,  175, 68, 130,  85,  3, 'SWITCH'],
];

const CX = 65, CY = 130, CZ = 35;

const EDGE_MAP = [
  [0,1],[1,2],[2,3],[3,0],  // bottom face
  [4,5],[5,6],[6,7],[7,4],  // top face
  [0,4],[1,5],[2,6],[3,7],  // verticals
];

const PRESETS = {
  '1': ['Bird Eye',  0.52],
  '2': ['Low Angle', 0.17],
  '3': ['Eye Level', 0.0],
  '4': ['Under',    -0.17],
};

// ═══════════════════════════════════════════════════════════════
// CHARACTER SELECTION — per component type
// ═══════════════════════════════════════════════════════════════
function pickChars(label) {
  if (label.includes('PLATE') || label.includes('SWITCH') || label.includes('HEAD'))
    return ['═', '║', '╬'];
  if (label.includes('STANDOFF') || label.includes('POST') || label === '')
    return ['│', '│', '+'];
  if (label.includes('WHL'))
    return ['●', '●', '●'];
  if (label.includes('MTR'))
    return ['█', '█', '█'];
  if (label.includes('BATT'))
    return ['▓', '▓', '▓'];
  if (label.includes('SENSOR'))
    return ['░', '░', '░'];
  return ['─', '│', '+'];
}

// ═══════════════════════════════════════════════════════════════
// PROJECTION — exact port from Python
// ═══════════════════════════════════════════════════════════════
function project(x, y, z, yaw, pitch, w, h) {
  x -= CX; y -= CY; z -= CZ;
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const rx = x*cy - y*sy;
  const ry = x*sy + y*cy;
  const rz = z;
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const ry2 = ry*cp - rz*sp;
  const rz2 = ry*sp + rz*cp;
  const sx = rx;
  const ssy = -rz2;
  const depth = ry2;
  const s = (w * 0.85) / 350;
  const bx = Math.round(w/2 + sx * s);
  const by = Math.round(h/2 + ssy * s * 0.45);
  return [bx, by, depth];
}

// ═══════════════════════════════════════════════════════════════
// BRESENHAM — exact port
// ═══════════════════════════════════════════════════════════════
function bresenham(x0, y0, x1, y1) {
  const pts = [];
  let dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
  const sx = x0 < x1 ? 1 : -1;
  const sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    pts.push([x0, y0]);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
    if (pts.length > 5000) break;
  }
  return pts;
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let spinning = true;
let frameNum = 0;
let currentPitch = 0.52;
let presetName = 'Bird Eye';
let showLabels = true;
let showGround = true;
let animId = null;

function toggleSpin() {
  spinning = !spinning;
  document.getElementById('btnSpin').classList.toggle('active', spinning);
  if (spinning) startLoop();
}
function nudge(dir) {
  spinning = false;
  document.getElementById('btnSpin').classList.toggle('active', false);
  frameNum += dir * 2;
  renderFrame();
}
function setPitch(key) {
  const [name, val] = PRESETS[key];
  currentPitch = val;
  presetName = name;
  document.querySelectorAll('.ctrl-group')[1].querySelectorAll('.ctrl-btn').forEach(b => {
    b.classList.remove('active');
  });
  // Find the matching preset button
  const labels = {'1':0,'2':1,'3':2,'4':3};
  const btns = document.querySelectorAll('.ctrl-group')[1].querySelectorAll('.ctrl-btn');
  if (labels[key] !== undefined && btns[labels[key]]) btns[labels[key]].classList.add('active');
  renderFrame();
}
function adjustPitch(dir) {
  currentPitch = Math.max(-0.5, Math.min(1.3, currentPitch + dir * 0.05));
  presetName = '';
  for (const [k, [name, val]] of Object.entries(PRESETS)) {
    if (Math.abs(currentPitch - val) < 0.01) { presetName = name; break; }
  }
  renderFrame();
}
function toggleLabels() { showLabels = !showLabels; document.getElementById('btnLabels').classList.toggle('active'); renderFrame(); }
function toggleGround() { showGround = !showGround; document.getElementById('btnGround').classList.toggle('active'); renderFrame(); }

// ═══════════════════════════════════════════════════════════════
// RENDER — exact port from Python render_frame()
// ═══════════════════════════════════════════════════════════════
function renderFrame() {
  // Terminal-like dimensions
  const tw = 160, th = 50;
  const buf = [];
  const zb = [];
  for (let r = 0; r < th; r++) {
    buf.push(new Array(tw).fill(' '));
    zb.push(new Array(tw).fill(-9999));
  }

  function plot(bx, by, d, ch) {
    if (bx >= 0 && bx < tw && by >= 0 && by < th && d >= zb[by][bx]) {
      zb[by][bx] = d;
      buf[by][bx] = ch;
    }
  }

  const framesPerRev = 48;
  const yaw = (frameNum / framesPerRev) * 2 * Math.PI;

  // Sort parts back-to-front
  const sorted = [...PARTS].sort((a, b) => {
    const [,,da] = project(a[0]+a[3]/2, a[1]+a[4]/2, a[2]+a[5]/2, yaw, currentPitch, tw, th);
    const [,,db] = project(b[0]+b[3]/2, b[1]+b[4]/2, b[2]+b[5]/2, yaw, currentPitch, tw, th);
    return da - db;
  });

  for (const part of sorted) {
    const [x, y, z, w, d, h, label] = part;
    const [hch, vch, cch] = pickChars(label);

    const corners = [
      [x,y,z], [x+w,y,z], [x+w,y+d,z], [x,y+d,z],
      [x,y,z+h], [x+w,y,z+h], [x+w,y+d,z+h], [x,y+d,z+h],
    ];
    const proj = corners.map(c => project(c[0], c[1], c[2], yaw, currentPitch, tw, th));

    for (const [a, b] of EDGE_MAP) {
      const pa = proj[a], pb = proj[b];
      const avgD = (pa[2] + pb[2]) / 2;
      const isVert = (a < 4 && b >= 4) || (a >= 4 && b < 4);
      const ch = isVert ? vch : hch;
      for (const [px, py] of bresenham(pa[0], pa[1], pb[0], pb[1])) {
        plot(px, py, avgD, ch);
      }
    }

    // Corner markers
    for (const p of proj) {
      plot(p[0], p[1], p[2] + 0.1, cch);
    }

    // Labels above top center
    if (label && showLabels) {
      const [cx, cy, cd] = project(x+w/2, y+d/2, z+h+5, yaw, currentPitch, tw, th);
      const sx = cx - Math.floor(label.length / 2);
      for (let i = 0; i < label.length; i++) {
        plot(sx + i, cy, 9999, label[i]);
      }
    }
  }

  // Ground dots
  if (showGround) {
    for (let gy = -40; gy < 310; gy += 20) {
      for (let gx = -30; gx < 160; gx += 20) {
        const [bx, by, d] = project(gx, gy, -2, yaw, currentPitch, tw, th);
        plot(bx, by, -9999, '·');
      }
    }
  }

  // Build output string
  const lines = buf.map(row => row.join('').replace(/\s+$/, ''));
  document.getElementById('ascii').textContent = lines.join('\n');

  // Info
  const pitchDeg = Math.round(currentPitch * 180 / Math.PI);
  const pitchLabel = presetName ? `${presetName} ${pitchDeg}°` : `${pitchDeg}°`;
  document.getElementById('info').textContent = `Pitch: ${pitchLabel} · Frame ${frameNum % framesPerRev}/${framesPerRev}`;
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
function startLoop() {
  if (animId) return;
  function tick() {
    if (!spinning) { animId = null; return; }
    frameNum++;
    renderFrame();
    animId = setTimeout(tick, 150);
  }
  tick();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { adjustPitch(1); e.preventDefault(); }
  if (e.key === 'ArrowDown') { adjustPitch(-1); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { nudge(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { nudge(1); e.preventDefault(); }
  if (e.key === '1') setPitch('1');
  if (e.key === '2') setPitch('2');
  if (e.key === '3') setPitch('3');
  if (e.key === '4') setPitch('4');
  if (e.key === ' ') { toggleSpin(); e.preventDefault(); }
  if (e.key === 'l' || e.key === 'L') toggleLabels();
  if (e.key === 'g' || e.key === 'G') toggleGround();
});

// Initial render + start spinning
renderFrame();
startLoop();
</script>
</body>
</html>
