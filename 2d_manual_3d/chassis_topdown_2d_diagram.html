<!DOCTYPE html>
<html lang="en">

<title>LK-COKOINO Chassis — Top-Down 2D Blueprint</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #141418;

  body {

    height: 100vh;
    width: 100vw;
  }

  #grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  #grid-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 30%, var(--bg) 75%);
  }

  #canvas-container {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }
  canvas#board { display: block; }

  .ui-overlay {
    position: fixed; z-index: 10; pointer-events: none;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .ui-overlay.visible { opacity: 1; transform: translateY(0); }

  .title-block { top: 0.8rem; left: 1rem; }
  .title-block h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.03em; }
  .title-block .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; color: var(--text-dim);
    margin-top: 0.2rem; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .toolbar {
    position: fixed; top: 0.6rem; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 0.25rem; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 0.3rem 0.4rem;
  }
  .tb-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 0.25rem 0.5rem; border: 1px solid transparent;
    border-radius: 3px; background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all 0.15s ease;
  }
  .tb-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .tb-btn.active { color: var(--accent); border-color: rgba(201,148,58,0.4); background: rgba(201,148,58,0.08); }
  .tb-sep { width: 1px; height: 14px; background: var(--border); margin: 0 0.15rem; }

  .comp-panel {
    position: fixed; top: 2.5rem; right: 0.8rem; z-index: 15;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.7rem;
    width: 220px; max-height: 80vh; overflow-y: auto;
    pointer-events: all;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .comp-panel.visible { opacity: 1; transform: translateY(0); }
  .comp-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.5rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);

  .part-item {

    padding: 0.3rem 0.2rem; cursor: pointer;
    border-radius: 3px; transition: background 0.15s;

  .part-item.active { background: rgba(201,148,58,0.08); }
  .part-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
  .part-name { font-size: 0.65rem; font-weight: 500; color: var(--text); line-height: 1.3; }
  .part-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.45rem; color: var(--text-dim); line-height: 1.4; margin-top: 0.1rem;

  .specs-panel {
    position: fixed; bottom: 0.8rem; left: 0.8rem; z-index: 15;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.5rem 0.6rem;
    width: 200px; pointer-events: all;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;

  .specs-panel.visible { opacity: 1; transform: translateY(0); }
  .specs-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.3rem; padding-bottom: 0.2rem;
    border-bottom: 1px solid var(--border);
  }
  .spec-row {
    display: flex; justify-content: space-between; padding: 0.15rem 0; font-size: 0.6rem;
  }
  .spec-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.48rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em;
  }
  .spec-val { font-weight: 500; color: var(--text); font-size: 0.6rem; }

  .tooltip {
    position: fixed; z-index: 25;
    background: var(--surface); border: 1px solid var(--border);
    padding: 0.4rem 0.6rem; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; color: var(--text);
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s; max-width: 260px;
  }
  .tooltip.active { opacity: 1; }
  .tooltip .tt-label { font-weight: 600; margin-bottom: 0.1rem; }
  .tooltip .tt-detail { color: var(--text-dim); font-size: 0.48rem; white-space: normal; }

  .loading-screen {
    position: fixed; inset: 0; z-index: 100; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1.2rem;
    transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-bar { width: 120px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>

<script>
// ─── Config ──────────────────────────────────────────────
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

const dpr = Math.min(window.devicePixelRatio || 1, 2);

const CW = 1600;
const CH = 900;

// ─── Pixel→mm Conversion ─────────────────────────────────
// Body origin in image pixels: (189, 263) — top-left corner of body frame
// Body: 335px wide (X) = 260mm, 267px tall (Y) = 130mm
// mm_per_px_x = 260/335 = 0.776, mm_per_px_y = 130/267 = 0.487
const PX_ORIGIN = { x: 189, y: 263 };
const MM_PER_PX_X = 0.776;
const MM_PER_PX_Y = 0.487;

function pxToMm(px_x, px_y) {
  return {
    x: (px_x - PX_ORIGIN.x) * MM_PER_PX_X,
    y: (px_y - PX_ORIGIN.y) * MM_PER_PX_Y
  };
}

// ─── Raw Trace Data (51 lines from Stage 1) ──────────────
const rawLines = [

  {line:2,  p1:{x:188,y:262}, p2:{x:96,y:107},  bent:false, cp:null},

  {line:10, p1:{x:264,y:264}, p2:{x:259,y:528}, bent:true,  cp:{x:185,y:398}},
  {line:11, p1:{x:523,y:267}, p2:{x:715,y:230}, bent:false, cp:null},
  {line:12, p1:{x:536,y:529}, p2:{x:712,y:561}, bent:false, cp:null},
  {line:13, p1:{x:715,y:229}, p2:{x:716,y:560}, bent:true,  cp:{x:814,y:367}},
  {line:14, p1:{x:809,y:215}, p2:{x:1068,y:216},bent:false, cp:null},
  {line:15, p1:{x:808,y:577}, p2:{x:1067,y:580},bent:false, cp:null},
  {line:16, p1:{x:1066,y:581},p2:{x:1069,y:217},bent:true,  cp:{x:1131,y:394}},
  {line:17, p1:{x:1087,y:232},p2:{x:1166,y:232},bent:false, cp:null},
  {line:18, p1:{x:1085,y:560},p2:{x:1163,y:561},bent:false, cp:null},
  {line:19, p1:{x:1165,y:232},p2:{x:1164,y:562},bent:false, cp:null},
  {line:20, p1:{x:228,y:180}, p2:{x:517,y:179}, bent:false, cp:null},
  {line:21, p1:{x:225,y:65},  p2:{x:518,y:64},  bent:false, cp:null},
  {line:22, p1:{x:519,y:62},  p2:{x:516,y:182}, bent:false, cp:null},

  {line:50, p1:{x:713,y:561}, p2:{x:810,y:579}, bent:true,  cp:{x:762,y:563}},
  {line:51, p1:{x:713,y:227}, p2:{x:810,y:209}, bent:true,  cp:{x:770,y:235}},

// Convert all trace lines to mm
const traceLines = rawLines.map(l => {
  const p1 = pxToMm(l.p1.x, l.p1.y);
  const p2 = pxToMm(l.p2.x, l.p2.y);
  const cp = l.cp ? pxToMm(l.cp.x, l.cp.y) : null;
  return { line: l.line, p1, p2, bent: l.bent, cp };
});

// ─── Region Classification ───────────────────────────────
const regions = {
  head:       { lines: [2,4,5,6,7,8,9],             color: '#e05555' },
  body:       { lines: [1,3,10],                     color: '#5a8fd4' },
  transition: { lines: [11,12,50,51],                color: '#8855cc' },
  rear:       { lines: [13,14,15,16],                color: '#6688cc' },
  battery:    { lines: [17,18,19],                   color: '#cc6633' },
  flTire:     { lines: [20,21,22,23],                color: '#55bb77' },
  frTire:     { lines: [32,33,34,35],                color: '#55bb77' },
  rlTire:     { lines: [24,25,26,27],                color: '#44aa66' },
  rrTire:     { lines: [28,29,30,31],                color: '#44aa66' },
  motors:     { lines: [37,38,39,40,41,42,36,43,44,45,46,47,48,49], color: '#e8c955' },
};

function getLineColor(lineNum) {
  for (const [, r] of Object.entries(regions)) {
    if (r.lines.includes(lineNum)) return r.color;
  }
  return '#ffffff';
}

// ─── View Layout ─────────────────────────────────────────
// mm range from trace data:
// X: ~-148 (wing front) to ~613 (battery right edge)
// Y: ~-97 (tires top) to ~224 (tires bottom)
const VIEW = { xMin: -165, xMax: 630, yMin: -115, yMax: 240 };
const VIEW_W = VIEW.xMax - VIEW.xMin;
const VIEW_H = VIEW.yMax - VIEW.yMin;

const MARGIN = { top: 70, right: 260, bottom: 50, left: 60 };
const DRAW_W = CW - MARGIN.left - MARGIN.right;
const DRAW_H = CH - MARGIN.top - MARGIN.bottom;

const SCALE = Math.min(DRAW_W / VIEW_W, DRAW_H / VIEW_H) * 0.95;
const OX = MARGIN.left + (DRAW_W - VIEW_W * SCALE) / 2 - VIEW.xMin * SCALE;
const OY = MARGIN.top + (DRAW_H - VIEW_H * SCALE) / 2 - VIEW.yMin * SCALE;

function mmX(mm) { return OX + mm * SCALE; }
function mmY(mm) { return OY + mm * SCALE; }
function mmW(mm) { return mm * SCALE; }

// ─── Component definitions (computed from trace mm coords) ──
// Motor block zones (from approved Stage 2 zone rects, converted to mm)
const motorZones = [
  { label: 'FL Motor', x: pxToMm(266, 210).x, y: pxToMm(266, 210).y,
    w: (486-266)*MM_PER_PX_X, h: (262-210)*MM_PER_PX_Y },
  { label: 'RL Motor', x: pxToMm(268, 526).x, y: pxToMm(268, 526).y,
    w: (488-268)*MM_PER_PX_X, h: (580-526)*MM_PER_PX_Y },
  { label: 'FR Motor', x: pxToMm(832, 210).x, y: pxToMm(832, 210).y,
    w: (1052-832)*MM_PER_PX_X, h: (262-210)*MM_PER_PX_Y },
  { label: 'RR Motor', x: pxToMm(833, 526).x, y: pxToMm(833, 526).y,
    w: (1053-833)*MM_PER_PX_X, h: (580-526)*MM_PER_PX_Y },
];

// Tire bounding boxes (from trace lines, converted to mm)
const tireBoxes = {
  fl: { x: pxToMm(222,62).x, y: pxToMm(222,62).y, w: (519-222)*MM_PER_PX_X, h: (182-62)*MM_PER_PX_Y },
  fr: { x: pxToMm(792,63).x, y: pxToMm(792,63).y, w: (1091-792)*MM_PER_PX_X, h: (180-63)*MM_PER_PX_Y },
  rl: { x: pxToMm(223,607).x, y: pxToMm(223,607).y, w: (519-223)*MM_PER_PX_X, h: (726-607)*MM_PER_PX_Y },
  rr: { x: pxToMm(795,609).x, y: pxToMm(795,609).y, w: (1092-795)*MM_PER_PX_X, h: (725-609)*MM_PER_PX_Y },

// Battery box (from trace lines L17-L19)

  x: pxToMm(1085,232).x, y: pxToMm(1085,232).y,
  w: (1166-1085)*MM_PER_PX_X, h: (562-232)*MM_PER_PX_Y

// Rear frame (from trace lines L14-L16)
const rearBox = {

const parts = [
  { id: 'body-frame', name: 'Body Frame', hex: '#5a8fd4',
    desc: '260×130mm acrylic plate. Main chassis platform.',
    type: 'rect', rect: { x: 0, y: 0, w: 260, h: 130 },
    specs: ['260 × 130 mm', '3mm acrylic', '4WD base'] },
  { id: 'head-wing', name: 'Head / Front Wing', hex: '#e05555',
    desc: 'Wing-shaped front assembly with curved tips.',
    type: 'trace', traceLines: [2,4,5,6,7,8,9],
    specs: ['~148mm depth', 'Curved wing tips', 'Sensor mount'] },
  { id: 'rear-frame', name: 'Rear Frame', hex: '#6688cc',
    desc: 'Rear section with curved left edge. Connected via transition.',
    type: 'trace', traceLines: [13,14,15,16],
    specs: [`${Math.round(rearBox.w)}×${Math.round(rearBox.h)}mm`, 'Curved left contour'] },
  { id: 'transition', name: 'Transition Zone', hex: '#8855cc',

  { id: 'battery-box', name: 'Battery Box', hex: '#cc6633',

    type: 'rect', rect: batteryBox,
    specs: [`${Math.round(batteryBox.w)}×${Math.round(batteryBox.h)}mm`, '2× 18650', '7.4V'] },
  { id: 'fl-tire', name: 'Front-Left Tire', hex: '#55bb77',

  { id: 'motors', name: 'Motor Blocks (4×)', hex: '#e8c955',
    desc: '4 identical TT motor housings between tires and body.',
    type: 'motors', zones: motorZones,
    specs: [`${Math.round(motorZones[0].w)}×${Math.round(motorZones[0].h)}mm each`, 'TT DC gearmotor', '3–6V, ~200 RPM'] },
];

// ─── State ───────────────────────────────────────────────
let showLabels = true;
let showDims = true;
let showFills = true;
let showGrid = false;
let showCenter = false;
let showTrace = false;
let showPartsPanel = true;
let hoveredPart = null;
let selectedPart = null;
const hitboxes = [];

// ─── Canvas Setup ────────────────────────────────────────
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const ratio = CW / CH;
  let w, h;
  if (maxW / maxH > ratio) { h = maxH; w = h * ratio; }
  else { w = maxW; h = w / ratio; }
  canvas.width = CW * dpr;
  canvas.height = CH * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

// ─── Drawing Helpers ─────────────────────────────────────
function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawRect(x, y, w, h, hex, alpha, isActive) {
  const px = mmX(x), py = mmY(y), pw = mmW(w), ph = mmW(h);
  if (showFills) {
    ctx.fillStyle = rgba(hex, alpha * 0.1);
    ctx.fillRect(px, py, pw, ph);
  }
  ctx.strokeStyle = rgba(hex, alpha * 0.8);
  ctx.lineWidth = isActive ? 2.5 : 1.2;
  ctx.strokeRect(px, py, pw, ph);
  if (isActive) {
    ctx.shadowColor = rgba(hex, 0.3);
    ctx.shadowBlur = 12;
    ctx.strokeRect(px, py, pw, ph);
    ctx.shadowBlur = 0;
  }
  return { px, py, pw, ph };
}

function drawTraceLine(tl, hex, alpha) {
  ctx.beginPath();
  ctx.moveTo(mmX(tl.p1.x), mmY(tl.p1.y));
  if (tl.bent && tl.cp) {
    ctx.quadraticCurveTo(mmX(tl.cp.x), mmY(tl.cp.y), mmX(tl.p2.x), mmY(tl.p2.y));
  } else {
    ctx.lineTo(mmX(tl.p2.x), mmY(tl.p2.y));
  }
  ctx.strokeStyle = rgba(hex, alpha * 0.8);
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawDimH(x1, x2, y, label, offset) {
  // Horizontal dimension line at y + offset
  const sx1 = mmX(x1), sx2 = mmX(x2), sy = mmY(y) + offset;
  ctx.save();
  // Extension lines
  ctx.strokeStyle = rgba('#c9943a', 0.25);
  ctx.lineWidth = 0.7;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(sx1, mmY(y)); ctx.lineTo(sx1, sy);
  ctx.moveTo(sx2, mmY(y)); ctx.lineTo(sx2, sy);
  ctx.stroke();
  // Measurement line
  ctx.setLineDash([]);
  ctx.strokeStyle = rgba('#c9943a', 0.45);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx1, sy); ctx.lineTo(sx2, sy);
  // Arrows
  ctx.moveTo(sx1, sy); ctx.lineTo(sx1 + 4, sy - 3); ctx.moveTo(sx1, sy); ctx.lineTo(sx1 + 4, sy + 3);
  ctx.moveTo(sx2, sy); ctx.lineTo(sx2 - 4, sy - 3); ctx.moveTo(sx2, sy); ctx.lineTo(sx2 - 4, sy + 3);
  ctx.stroke();
  // Label
  ctx.fillStyle = '#c9943a';
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, (sx1 + sx2) / 2, sy - 4);
  ctx.restore();
}

function drawDimV(x, y1, y2, label, offset) {
  const sx = mmX(x) + offset, sy1 = mmY(y1), sy2 = mmY(y2);
  ctx.save();
  ctx.strokeStyle = rgba('#c9943a', 0.25);
  ctx.lineWidth = 0.7;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(mmX(x), sy1); ctx.lineTo(sx, sy1);
  ctx.moveTo(mmX(x), sy2); ctx.lineTo(sx, sy2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = rgba('#c9943a', 0.45);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx, sy1); ctx.lineTo(sx, sy2);
  ctx.moveTo(sx, sy1); ctx.lineTo(sx - 3, sy1 + 4); ctx.moveTo(sx, sy1); ctx.lineTo(sx + 3, sy1 + 4);
  ctx.moveTo(sx, sy2); ctx.lineTo(sx - 3, sy2 - 4); ctx.moveTo(sx, sy2); ctx.lineTo(sx + 3, sy2 - 4);
  ctx.stroke();
  ctx.save();
  ctx.translate(sx - 6, (sy1 + sy2) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#c9943a';
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, 0, 0);
  ctx.restore();
  ctx.restore();
}

function addHitbox(id, px, py, pw, ph) {
  hitboxes.push({ id, x: px, y: py, w: pw, h: ph });
}

// ─── Render ──────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, CW, CH);
  hitboxes.length = 0;

  // mm Grid
  if (showGrid) {
    ctx.lineWidth = 0.5;
    for (let mm = Math.ceil(VIEW.xMin / 50) * 50; mm <= VIEW.xMax; mm += 50) {
      ctx.strokeStyle = mm === 0 ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.025)';
      ctx.beginPath(); ctx.moveTo(mmX(mm), mmY(VIEW.yMin)); ctx.lineTo(mmX(mm), mmY(VIEW.yMax)); ctx.stroke();
    }
    for (let mm = Math.ceil(VIEW.yMin / 50) * 50; mm <= VIEW.yMax; mm += 50) {
      ctx.strokeStyle = mm === 0 || mm === 130 ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.025)';
      ctx.beginPath(); ctx.moveTo(mmX(VIEW.xMin), mmY(mm)); ctx.lineTo(mmX(VIEW.xMax), mmY(mm)); ctx.stroke();
    }
  }

  // Centerline
  if (showCenter) {
    ctx.strokeStyle = 'rgba(201,148,58,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(mmX(VIEW.xMin + 10), mmY(65));
    ctx.lineTo(mmX(VIEW.xMax - 10), mmY(65));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Direction labels
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◀ FRONT', mmX(-130), mmY(65));
  ctx.fillText('REAR ▶', mmX(605), mmY(65));
  ctx.fillText('LEFT', mmX(130), mmY(VIEW.yMin + 5));
  ctx.fillText('RIGHT', mmX(130), mmY(VIEW.yMax - 5));

  // Draw raw trace lines (toggle)
  if (showTrace) {
    traceLines.forEach(tl => {
      const col = getLineColor(tl.line);
      drawTraceLine(tl, col, 0.35);
      // Endpoint dots
      ctx.fillStyle = rgba(col, 0.3);
      ctx.beginPath(); ctx.arc(mmX(tl.p1.x), mmY(tl.p1.y), 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(mmX(tl.p2.x), mmY(tl.p2.y), 2, 0, Math.PI*2); ctx.fill();
    });
  }

  const globalDimmed = hoveredPart || selectedPart;

  // Draw each part
  parts.forEach(p => {
    const isActive = hoveredPart === p.id || selectedPart === p.id;
    const dimmed = globalDimmed && !isActive;
    const alpha = dimmed ? 0.1 : isActive ? 1 : 0.65;

    if (p.type === 'rect') {
      const r = p.rect;
      const { px, py, pw, ph } = drawRect(r.x, r.y, r.w, r.h, p.hex, alpha, isActive);
      addHitbox(p.id, px, py, pw, ph);
      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}8px "JetBrains Mono", monospace`;
        ctx.fillStyle = rgba(p.hex, alpha * 0.8);
        ctx.textAlign = 'center';
        ctx.fillText(p.name.toUpperCase(), px + pw / 2, py + ph / 2 + 3);
      }
    }

    if (p.type === 'trace') {
      // Draw the actual traced lines for this component
      const pLines = p.traceLines.map(n => traceLines.find(t => t.line === n)).filter(Boolean);
      pLines.forEach(tl => {
        ctx.lineWidth = isActive ? 2.5 : 1.5;
        drawTraceLine(tl, p.hex, alpha);
      });
      // Hitbox from bounding box of all points
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      pLines.forEach(tl => {
        [tl.p1, tl.p2].forEach(pt => {
          minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x);
          minY = Math.min(minY, pt.y); maxY = Math.max(maxY, pt.y);
        });
        if (tl.cp) {
          minX = Math.min(minX, tl.cp.x); maxX = Math.max(maxX, tl.cp.x);
          minY = Math.min(minY, tl.cp.y); maxY = Math.max(maxY, tl.cp.y);
        }
      });
      addHitbox(p.id, mmX(minX), mmY(minY), mmW(maxX - minX), mmW(maxY - minY));

      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}8px "JetBrains Mono", monospace`;
        ctx.fillStyle = rgba(p.hex, alpha * 0.7);
        ctx.textAlign = 'center';
        const cx = mmX((minX + maxX) / 2);
        const cy = mmY((minY + maxY) / 2);
        ctx.fillText(p.name.toUpperCase(), cx, cy);
      }
    }

    if (p.type === 'motors') {
      p.zones.forEach(z => {
        const { px, py, pw, ph } = drawRect(z.x, z.y, z.w, z.h, p.hex, alpha, isActive);
        addHitbox(p.id, px, py, pw, ph);
        if (showLabels && !dimmed) {
          ctx.font = '7px "JetBrains Mono", monospace';
          ctx.fillStyle = rgba(p.hex, alpha * 0.7);
          ctx.textAlign = 'center';
          ctx.fillText(z.label, px + pw / 2, py + ph / 2 + 3);
        }
      });
    }
  });

  // Dimensions
  if (showDims) {
    drawDimH(0, 260, 130, '260mm', 20);
    drawDimV(260, 0, 130, '130mm', 18);
    drawDimH(batteryBox.x, batteryBox.x + batteryBox.w, batteryBox.y, `${Math.round(batteryBox.w)}mm`, -14);
    drawDimH(tireBoxes.fl.x, tireBoxes.fl.x + tireBoxes.fl.w, tireBoxes.fl.y, `${Math.round(tireBoxes.fl.w)}mm`, -14);
    drawDimH(motorZones[0].x, motorZones[0].x + motorZones[0].w, motorZones[0].y, `${Math.round(motorZones[0].w)}mm mtr`, -10);
  }

  updateSpecsPanel();
}

// ─── Specs Panel ─────────────────────────────────────────
function updateSpecsPanel() {
  const list = document.getElementById('specs-list');
  const active = selectedPart || hoveredPart;
  const part = active ? parts.find(p => p.id === active) : null;
  if (!part) {
    list.innerHTML = `
      <div class="spec-row"><span class="spec-label">Body</span><span class="spec-val">260×130mm</span></div>
      <div class="spec-row"><span class="spec-label">Tires</span><span class="spec-val">4× ~${Math.round(tireBoxes.fl.w)}×${Math.round(tireBoxes.fl.h)}mm</span></div>
      <div class="spec-row"><span class="spec-label">Motors</span><span class="spec-val">4× ${Math.round(motorZones[0].w)}×${Math.round(motorZones[0].h)}mm</span></div>
      <div class="spec-row"><span class="spec-label">Battery</span><span class="spec-val">${Math.round(batteryBox.w)}×${Math.round(batteryBox.h)}mm</span></div>
      <div class="spec-row"><span class="spec-label">Lines</span><span class="spec-val">51 traced</span></div>`;
  } else {
    list.innerHTML = part.specs.map(s => `<div class="spec-row"><span class="spec-val">${s}</span></div>`).join('');
  }
}

// ─── Parts Panel ─────────────────────────────────────────
function buildPartsPanel() {
  const list = document.getElementById('comp-list');
  list.innerHTML = '';
  parts.forEach(p => {
    const item = document.createElement('div');
    item.className = 'part-item';
    item.dataset.id = p.id;
    item.innerHTML = `
      <div class="part-dot" style="background:${p.hex}"></div>
      <div><div class="part-name">${p.name}</div><div class="part-desc">${p.desc}</div></div>`;
    item.addEventListener('mouseenter', () => { hoveredPart = p.id; render(); updateItems(); });
    item.addEventListener('mouseleave', () => { hoveredPart = null; render(); updateItems(); });
    item.addEventListener('click', () => { selectedPart = selectedPart === p.id ? null : p.id; render(); updateItems(); });
    list.appendChild(item);
  });
}

function updateItems() {
  document.querySelectorAll('.part-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === (selectedPart || hoveredPart));
  });
}

// ─── Canvas Interaction ──────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * CW / rect.width, y: (e.clientY - rect.top) * CH / rect.height };
}

canvas.addEventListener('mousemove', e => {
  const pos = getPos(e);
  let found = null;
  for (let i = hitboxes.length - 1; i >= 0; i--) {
    const h = hitboxes[i];
    if (pos.x >= h.x && pos.x <= h.x + h.w && pos.y >= h.y && pos.y <= h.y + h.h) { found = h.id; break; }
  }
  if (found !== hoveredPart) { hoveredPart = found; render(); updateItems(); }
  if (found) {
    const part = parts.find(p => p.id === found);
    tooltip.innerHTML = `<div class="tt-label">${part.name}</div><div class="tt-detail">${part.desc}</div>`;
    tooltip.classList.add('active');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else { tooltip.classList.remove('active'); canvas.style.cursor = 'default'; }
});

canvas.addEventListener('click', e => {
  const pos = getPos(e);
  let found = null;
  for (let i = hitboxes.length - 1; i >= 0; i--) {
    const h = hitboxes[i];
    if (pos.x >= h.x && pos.x <= h.x + h.w && pos.y >= h.y && pos.y <= h.y + h.h) { found = h.id; break; }
  }
  selectedPart = selectedPart === found ? null : found;
  render(); updateItems();
});

// ─── Toolbar ─────────────────────────────────────────────
function toggleBtn(id, key) {
  document.getElementById(id).addEventListener('click', () => {
    window[key] = !window[key];
    document.getElementById(id).classList.toggle('active', window[key]);
    render();
    if (key === 'showPartsPanel') document.getElementById('comp-panel').classList.toggle('visible', showPartsPanel);
  });
}
toggleBtn('tb-labels', 'showLabels');
toggleBtn('tb-dims', 'showDims');
toggleBtn('tb-fills', 'showFills');
toggleBtn('tb-grid', 'showGrid');
toggleBtn('tb-center', 'showCenter');
toggleBtn('tb-trace', 'showTrace');
toggleBtn('tb-parts', 'showPartsPanel');

// ─── Init ────────────────────────────────────────────────
function init() {
  const fill = document.getElementById('loading-fill');
  fill.style.width = '40%';
  setTimeout(() => { fill.style.width = '80%'; }, 150);
  setTimeout(() => {
    fill.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('ui-title').classList.add('visible');
      document.getElementById('comp-panel').classList.add('visible');
      document.getElementById('specs-panel').classList.add('visible');
      buildPartsPanel();
      resize();
    }, 250);
  }, 400);
}

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
