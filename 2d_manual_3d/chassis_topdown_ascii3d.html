<!DOCTYPE html>

<style>

// Convert all to mm (same as Stage 3)
const traceLines = rawLines.map(l => {
  const p1 = pxToMm(l.p1.x, l.p1.y);
  const p2 = pxToMm(l.p2.x, l.p2.y);
  const cp = l.cp ? pxToMm(l.cp.x, l.cp.y) : null;
  return { line: l.line, p1, p2, bent: l.bent, cp };

// Region classification (same as Stage 3)
const regions = {
  head:       { lines: [2,4,5,6,7,8,9],             color: '#e05555' },
  body:       { lines: [1,3,10],                     color: '#5a8fd4' },

  battery:    { lines: [17,18,19],                   color: '#cc6633' },
  flTire:     { lines: [20,21,22,23],                color: '#55bb77' },
  frTire:     { lines: [32,33,34,35],                color: '#55bb77' },
  rlTire:     { lines: [24,25,26,27],                color: '#44aa66' },
  rrTire:     { lines: [28,29,30,31],                color: '#44aa66' },
  motors:     { lines: [37,38,39,40,41,42,36,43,44,45,46,47,48,49], color: '#e8c955' },
};

function getLineColor(lineNum) {
  for (const [, r] of Object.entries(regions)) {
    if (r.lines.includes(lineNum)) return r.color;
  }
  return '#ffffff';
}

// ═══════════════════════════════════════════════════════════
// Component definitions — COMPUTED from Stage 3 trace data
// ═══════════════════════════════════════════════════════════

// Motor zones (from Stage 2 approved zone rects → mm)
const motorZones = [
  { label: 'FL Motor', x: pxToMm(266,210).x, y: pxToMm(266,210).y,
    w: (486-266)*MM_PER_PX_X, h: (262-210)*MM_PER_PX_Y },
  { label: 'RL Motor', x: pxToMm(268,526).x, y: pxToMm(268,526).y,
    w: (488-268)*MM_PER_PX_X, h: (580-526)*MM_PER_PX_Y },
  { label: 'FR Motor', x: pxToMm(832,210).x, y: pxToMm(832,210).y,
    w: (1052-832)*MM_PER_PX_X, h: (262-210)*MM_PER_PX_Y },
  { label: 'RR Motor', x: pxToMm(833,526).x, y: pxToMm(833,526).y,
    w: (1053-833)*MM_PER_PX_X, h: (580-526)*MM_PER_PX_Y },
];

// Tire bounding boxes (from trace lines → mm)
const tireBoxes = {
  fl: { x: pxToMm(222,62).x, y: pxToMm(222,62).y, w: (519-222)*MM_PER_PX_X, h: (182-62)*MM_PER_PX_Y },
  fr: { x: pxToMm(792,63).x, y: pxToMm(792,63).y, w: (1091-792)*MM_PER_PX_X, h: (180-63)*MM_PER_PX_Y },
  rl: { x: pxToMm(223,607).x, y: pxToMm(223,607).y, w: (519-223)*MM_PER_PX_X, h: (726-607)*MM_PER_PX_Y },
  rr: { x: pxToMm(795,609).x, y: pxToMm(795,609).y, w: (1092-795)*MM_PER_PX_X, h: (725-609)*MM_PER_PX_Y },
};

// Battery box (from trace lines L17-L19 → mm)
const batteryBox = {
  x: pxToMm(1085,232).x, y: pxToMm(1085,232).y,
  w: (1166-1085)*MM_PER_PX_X, h: (562-232)*MM_PER_PX_Y
};

// Rear frame bounding box
const rearBox = {
  x: pxToMm(809,215).x, y: pxToMm(809,215).y,
  w: (1069-809)*MM_PER_PX_X, h: (581-215)*MM_PER_PX_Y
};

// Body frame
const bodyBox = { x: 0, y: 0, w: 260, h: 130 };

// ═══════════════════════════════════════════════════════════
// Canvas + Isometric projection
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const CW = 1600, CH = 1000;

let showLabels = true;
let showDims = true;
let showFills = true;
let showWireframe = false;
let showTrace = false;
let explodeOffset = 0;
let rotAngle = 0;

// In the 2D diagram: X = chassis length (left=front), Y = chassis width (top=left side)
// In 3D: we map 2D_X → 3D_X, 2D_Y → 3D_Y, add Z for height
// Center the model roughly around its center for better rotation
const MODEL_CX = 130; // half of body X
const MODEL_CY = 65;  // half of body Y

function isoProject(x, y, z) {
  // Center the model
  const cx = x - MODEL_CX;
  const cy = y - MODEL_CY;

  // Rotate around Z axis
  const cos = Math.cos(rotAngle);
  const sin = Math.sin(rotAngle);
  const rx = cx * cos - cy * sin;
  const ry = cx * sin + cy * cos;

  // Isometric projection
  const isoX = (rx - ry) * 0.866;
  const isoY = (rx + ry) * 0.5 - z;

  const scale = 1.5;
  return {
    x: CW / 2 + isoX * scale,
    y: CH / 2 + 60 + isoY * scale
  };
}

// ═══════════════════════════════════════════════════════════
// Drawing helpers
// ═══════════════════════════════════════════════════════════

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// Draw a 3D box at mm position (x,y = top-down footprint, z = height above ground)
// w,d = footprint width/depth from 2D, h = 3D extrusion height
function drawBox(ox, oy, oz, w, d, h, color, label, alpha) {
  const a = alpha || 1;
  const v = [
    isoProject(ox,     oy,     oz),
    isoProject(ox + w, oy,     oz),
    isoProject(ox + w, oy + d, oz),
    isoProject(ox,     oy + d, oz),
    isoProject(ox,     oy,     oz + h),
    isoProject(ox + w, oy,     oz + h),
    isoProject(ox + w, oy + d, oz + h),
    isoProject(ox,     oy + d, oz + h),
  ];

  // Fill visible faces
  if (showFills) {
    // Top
    ctx.fillStyle = rgba(color, 0.12 * a);
    ctx.beginPath();
    ctx.moveTo(v[4].x, v[4].y); ctx.lineTo(v[5].x, v[5].y);
    ctx.lineTo(v[6].x, v[6].y); ctx.lineTo(v[7].x, v[7].y);
    ctx.closePath(); ctx.fill();

    // Right side
    ctx.fillStyle = rgba(color, 0.07 * a);
    ctx.beginPath();
    ctx.moveTo(v[1].x, v[1].y); ctx.lineTo(v[2].x, v[2].y);
    ctx.lineTo(v[6].x, v[6].y); ctx.lineTo(v[5].x, v[5].y);
    ctx.closePath(); ctx.fill();

    // Front side
    ctx.fillStyle = rgba(color, 0.09 * a);
    ctx.beginPath();
    ctx.moveTo(v[0].x, v[0].y); ctx.lineTo(v[1].x, v[1].y);
    ctx.lineTo(v[5].x, v[5].y); ctx.lineTo(v[4].x, v[4].y);
    ctx.closePath(); ctx.fill();

    // Left side
    ctx.fillStyle = rgba(color, 0.06 * a);
    ctx.beginPath();
    ctx.moveTo(v[0].x, v[0].y); ctx.lineTo(v[3].x, v[3].y);
    ctx.lineTo(v[7].x, v[7].y); ctx.lineTo(v[4].x, v[4].y);
    ctx.closePath(); ctx.fill();

    // Back side
    ctx.fillStyle = rgba(color, 0.05 * a);
    ctx.beginPath();
    ctx.moveTo(v[3].x, v[3].y); ctx.lineTo(v[2].x, v[2].y);
    ctx.lineTo(v[6].x, v[6].y); ctx.lineTo(v[7].x, v[7].y);
    ctx.closePath(); ctx.fill();
  }

  // Wireframe edges
  ctx.strokeStyle = rgba(color, (showWireframe ? 0.6 : 0.35) * a);
  ctx.lineWidth = showWireframe ? 1.2 : 0.8;

  // Top quad
  ctx.beginPath();
  ctx.moveTo(v[4].x, v[4].y); ctx.lineTo(v[5].x, v[5].y);
  ctx.lineTo(v[6].x, v[6].y); ctx.lineTo(v[7].x, v[7].y);
  ctx.closePath(); ctx.stroke();

  // Bottom quad
  ctx.beginPath();
  ctx.moveTo(v[0].x, v[0].y); ctx.lineTo(v[1].x, v[1].y);
  ctx.lineTo(v[2].x, v[2].y); ctx.lineTo(v[3].x, v[3].y);
  ctx.closePath(); ctx.stroke();

  // Vertical edges
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    ctx.moveTo(v[i].x, v[i].y); ctx.lineTo(v[i+4].x, v[i+4].y);
  }
  ctx.stroke();

  // Label
  if (showLabels && label) {
    const center = isoProject(ox + w/2, oy + d/2, oz + h + 5);
    ctx.fillStyle = rgba(color, 0.7 * a);
    ctx.font = '8px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, center.x, center.y);
  }
}

// Draw a 3D trace line (extruded from z to z+h)
function draw3DTraceLine(tl, z, h, color, alpha) {
  const a = alpha || 1;
  // Bottom line
  ctx.beginPath();
  const b1 = isoProject(tl.p1.x, tl.p1.y, z);
  const b2 = isoProject(tl.p2.x, tl.p2.y, z);
  ctx.moveTo(b1.x, b1.y);
  if (tl.bent && tl.cp) {
    // Approximate bezier with segments for iso projection
    const steps = 12;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const mx = (1-t)*(1-t)*tl.p1.x + 2*(1-t)*t*tl.cp.x + t*t*tl.p2.x;
      const my = (1-t)*(1-t)*tl.p1.y + 2*(1-t)*t*tl.cp.y + t*t*tl.p2.y;
      const p = isoProject(mx, my, z);
      ctx.lineTo(p.x, p.y);
    }
  } else {
    ctx.lineTo(b2.x, b2.y);
  }
  ctx.strokeStyle = rgba(color, 0.3 * a);
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Top line
  ctx.beginPath();
  const t1 = isoProject(tl.p1.x, tl.p1.y, z + h);
  const t2 = isoProject(tl.p2.x, tl.p2.y, z + h);
  ctx.moveTo(t1.x, t1.y);
  if (tl.bent && tl.cp) {
    const steps = 12;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const mx = (1-t)*(1-t)*tl.p1.x + 2*(1-t)*t*tl.cp.x + t*t*tl.p2.x;
      const my = (1-t)*(1-t)*tl.p1.y + 2*(1-t)*t*tl.cp.y + t*t*tl.p2.y;
      const p = isoProject(mx, my, z + h);
      ctx.lineTo(p.x, p.y);
    }
  } else {
    ctx.lineTo(t2.x, t2.y);
  }
  ctx.strokeStyle = rgba(color, 0.5 * a);
  ctx.lineWidth = 1;
  ctx.stroke();

  // Vertical edges at endpoints
  ctx.strokeStyle = rgba(color, 0.25 * a);
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(b1.x, b1.y); ctx.lineTo(t1.x, t1.y);
  ctx.moveTo(b2.x, b2.y); ctx.lineTo(t2.x, t2.y);
  ctx.stroke();
}

// Draw a flat 2D trace line at Z height (for trace overlay)
function drawFlatTrace(tl, z, color, alpha) {
  ctx.beginPath();
  const p1 = isoProject(tl.p1.x, tl.p1.y, z);
  ctx.moveTo(p1.x, p1.y);
  if (tl.bent && tl.cp) {
    const steps = 12;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const mx = (1-t)*(1-t)*tl.p1.x + 2*(1-t)*t*tl.cp.x + t*t*tl.p2.x;
      const my = (1-t)*(1-t)*tl.p1.y + 2*(1-t)*t*tl.cp.y + t*t*tl.p2.y;
      const p = isoProject(mx, my, z);
      ctx.lineTo(p.x, p.y);
    }
  } else {
    const p2 = isoProject(tl.p2.x, tl.p2.y, z);
    ctx.lineTo(p2.x, p2.y);
  }
  ctx.strokeStyle = rgba(color, alpha);
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

// Dimension line in 3D
function drawDim3D(p1, p2, label, nx, ny, nz, dist) {
  const a = isoProject(...p1);
  const b = isoProject(...p2);
  const oa = isoProject(p1[0]+nx*dist, p1[1]+ny*dist, p1[2]+nz*dist);
  const ob = isoProject(p2[0]+nx*dist, p2[1]+ny*dist, p2[2]+nz*dist);

  ctx.save();
  ctx.strokeStyle = 'rgba(201,148,58,0.2)';
  ctx.lineWidth = 0.6;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y); ctx.lineTo(oa.x, oa.y);
  ctx.moveTo(b.x, b.y); ctx.lineTo(ob.x, ob.y);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(201,148,58,0.4)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(oa.x, oa.y); ctx.lineTo(ob.x, ob.y);
  ctx.stroke();

  // Arrows
  const dx = ob.x - oa.x, dy = ob.y - oa.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const ax = dx/len * 5, ay = dy/len * 5;
  ctx.beginPath();
  ctx.moveTo(oa.x, oa.y); ctx.lineTo(oa.x + ax - ay*0.4, oa.y + ay + ax*0.4);
  ctx.moveTo(oa.x, oa.y); ctx.lineTo(oa.x + ax + ay*0.4, oa.y + ay - ax*0.4);
  ctx.moveTo(ob.x, ob.y); ctx.lineTo(ob.x - ax - ay*0.4, ob.y - ay + ax*0.4);
  ctx.moveTo(ob.x, ob.y); ctx.lineTo(ob.x - ax + ay*0.4, ob.y - ay - ax*0.4);
  ctx.stroke();

  ctx.fillStyle = '#c9943a';
  ctx.font = '8px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, (oa.x + ob.x) / 2, (oa.y + ob.y) / 2 - 5);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// Z-layer assignments (mm above ground)
// Tires sit on ground, motors between tires, plate on motors
// ═══════════════════════════════════════════════════════════

const Z_TIRES = 0;          // ground level
const TIRE_H = 26;          // tire height (wheel diameter)
const Z_MOTORS = 4;         // motors slightly above ground
const MOTOR_H = 18;         // motor block height
const Z_BODY_PLATE = 13;    // bottom acrylic plate
const PLATE_H = 3;          // 3mm acrylic
const Z_STANDOFF = Z_BODY_PLATE + PLATE_H; // 16mm
const STANDOFF_H = 45;      // 45mm standoffs
const Z_TOP_PLATE = Z_STANDOFF + STANDOFF_H; // 61mm
const Z_BATTERY = Z_BODY_PLATE + PLATE_H; // on top of bottom plate
const BATTERY_H = 22;       // battery box height
const Z_HEAD = Z_BODY_PLATE; // head/wing is part of body plate
const Z_REAR = Z_BODY_PLATE; // rear frame at same level

// ═══════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════

function render() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, CW, CH);

  const e = explodeOffset;

  // Ground grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let i = -4; i <= 18; i++) {
    const p1 = isoProject(i * 50 - 100, -120, 0);
    const p2 = isoProject(i * 50 - 100, 280, 0);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  }
  for (let j = -3; j <= 7; j++) {
    const p1 = isoProject(-200, j * 50 - 50, 0);
    const p2 = isoProject(800, j * 50 - 50, 0);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  }

  // Axes
  const o = isoProject(0, 0, 0);
  const axX = isoProject(40, 0, 0);
  const axY = isoProject(0, 40, 0);
  const axZ = isoProject(0, 0, 40);
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(224,85,85,0.25)'; ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(axX.x, axX.y); ctx.stroke();
  ctx.strokeStyle = 'rgba(85,187,119,0.25)'; ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(axY.x, axY.y); ctx.stroke();
  ctx.strokeStyle = 'rgba(90,143,212,0.25)'; ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(axZ.x, axZ.y); ctx.stroke();
  ctx.font = '7px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(224,85,85,0.3)'; ctx.fillText('X', axX.x + 3, axX.y);
  ctx.fillStyle = 'rgba(85,187,119,0.3)'; ctx.fillText('Y', axY.x + 3, axY.y);
  ctx.fillStyle = 'rgba(90,143,212,0.3)'; ctx.fillText('Z', axZ.x + 3, axZ.y);

  // ─── Trace overlay (all 51 lines projected at body plate Z) ──
  if (showTrace) {
    traceLines.forEach(tl => {
      const col = getLineColor(tl.line);
      drawFlatTrace(tl, Z_BODY_PLATE + e * 0.5, col, 0.25);
    });
  }

  // ─── Layer 1: Tires (on ground) ──────────────────────────
  const tireFade = 1;
  // FL tire
  drawBox(tireBoxes.fl.x, tireBoxes.fl.y, Z_TIRES - e*0.5,
    tireBoxes.fl.w, tireBoxes.fl.h, TIRE_H,
    '#55bb77', 'FL Tire', tireFade);
  // FR tire
  drawBox(tireBoxes.fr.x, tireBoxes.fr.y, Z_TIRES - e*0.5,
    tireBoxes.fr.w, tireBoxes.fr.h, TIRE_H,
    '#55bb77', 'FR Tire', tireFade);
  // RL tire
  drawBox(tireBoxes.rl.x, tireBoxes.rl.y, Z_TIRES - e*0.5,
    tireBoxes.rl.w, tireBoxes.rl.h, TIRE_H,
    '#44aa66', 'RL Tire', tireFade);
  // RR tire
  drawBox(tireBoxes.rr.x, tireBoxes.rr.y, Z_TIRES - e*0.5,
    tireBoxes.rr.w, tireBoxes.rr.h, TIRE_H,
    '#44aa66', 'RR Tire', tireFade);

  // ─── Layer 2: Motors ─────────────────────────────────────
  motorZones.forEach(m => {
    drawBox(m.x, m.y, Z_MOTORS - e*0.3,
      m.w, m.h, MOTOR_H,
      '#e8c955', m.label, 1);
  });

  // ─── Layer 3: Bottom plate (body frame) ──────────────────
  drawBox(bodyBox.x, bodyBox.y, Z_BODY_PLATE,
    bodyBox.w, bodyBox.h, PLATE_H,
    '#5a8fd4', 'Body Plate (260×130)', 1);

  // ─── Layer 3b: Head/wing trace lines (extruded at plate level) ──
  const headLines = [2,4,5,6,7,8,9];
  headLines.forEach(n => {
    const tl = traceLines.find(t => t.line === n);
    if (tl) draw3DTraceLine(tl, Z_BODY_PLATE + e*0.2, PLATE_H, '#e05555', 1);
  });

  // ─── Layer 3c: Transition lines ──────────────────────────
  [11,12,50,51].forEach(n => {
    const tl = traceLines.find(t => t.line === n);
    if (tl) draw3DTraceLine(tl, Z_BODY_PLATE + e*0.3, PLATE_H, '#8855cc', 1);
  });

  // ─── Layer 3d: Rear frame trace lines ────────────────────
  [13,14,15,16].forEach(n => {
    const tl = traceLines.find(t => t.line === n);
    if (tl) draw3DTraceLine(tl, Z_BODY_PLATE + e*0.4, PLATE_H, '#6688cc', 1);
  });

  // ─── Layer 4: Battery box ────────────────────────────────
  drawBox(batteryBox.x, batteryBox.y, Z_BATTERY + e*0.3,
    batteryBox.w, batteryBox.h, BATTERY_H,
    '#cc6633', 'Battery', 1);

  // ─── Layer 5: Standoffs (4 posts) ────────────────────────
  const standoffPositions = [
    { x: 53, y: 5 }, { x: 53, y: 119 },
    { x: 200, y: 5 }, { x: 200, y: 119 },
  ];
  standoffPositions.forEach((s, i) => {
    drawBox(s.x, s.y, Z_STANDOFF + e*0.8,
      6, 6, STANDOFF_H,
      '#888888', i === 0 ? 'Standoff' : '', 0.7);
  });

  // ─── Layer 6: Top plate ──────────────────────────────────
  drawBox(53, 0, Z_TOP_PLATE + e*1.2,
    154, 130, PLATE_H,
    '#7eaadd', 'Top Plate (154×130)', 1);

  // ─── Dimensions ──────────────────────────────────────────
  if (showDims) {
    // Body length
    drawDim3D(
      [0, 0, Z_BODY_PLATE], [260, 0, Z_BODY_PLATE],
      '260mm', 0, -1, 0, 30
    );
    // Body width
    drawDim3D(
      [0, 0, Z_BODY_PLATE], [0, 130, Z_BODY_PLATE],
      '130mm', -1, 0, 0, 30
    );
    // Total height (ground to top of top plate)
    const topZ = Z_TOP_PLATE + PLATE_H + e * 1.2;
    drawDim3D(
      [270, 140, 0], [270, 140, topZ],
      `${Math.round(topZ)}mm H`, 1, 1, 0, 15
    );
    // Standoff height
    drawDim3D(
      [210, -10, Z_STANDOFF + e*0.8],
      [210, -10, Z_STANDOFF + STANDOFF_H + e*0.8],
      '45mm', -1, 0, 0, 15
    );
    // Battery box width
    drawDim3D(
      [batteryBox.x, batteryBox.y + batteryBox.h + 5, Z_BATTERY + e*0.3],
      [batteryBox.x + batteryBox.w, batteryBox.y + batteryBox.h + 5, Z_BATTERY + e*0.3],
      `${Math.round(batteryBox.w)}mm`, 0, 1, 0, 10
    );
  }

  // Direction labels
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.font = '9px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  const frontP = isoProject(-80, 65, Z_BODY_PLATE);
  const rearP = isoProject(750, 65, Z_BODY_PLATE);
  ctx.fillText('◀ FRONT', frontP.x, frontP.y);
  ctx.fillText('REAR ▶', rearP.x, rearP.y);
}

// ═══════════════════════════════════════════════════════════
// Info panel (computed from actual data)
// ═══════════════════════════════════════════════════════════

function buildInfoPanel() {
  const panel = document.getElementById('info-panel');
  const flW = Math.round(tireBoxes.fl.w);
  const flH = Math.round(tireBoxes.fl.h);
  const mW = Math.round(motorZones[0].w);
  const mH = Math.round(motorZones[0].h);
  const bW = Math.round(batteryBox.w);
  const bH = Math.round(batteryBox.h);

  panel.innerHTML = `
    <div class="panel-title">3D Dimensions (from trace)</div>
    <div class="panel-row"><span class="panel-label">Body plate</span><span class="panel-val">260×130×${PLATE_H}mm</span></div>
    <div class="panel-row"><span class="panel-label">Top plate</span><span class="panel-val">154×130×${PLATE_H}mm</span></div>
    <div class="panel-row"><span class="panel-label">FL/FR Tire</span><span class="panel-val">${flW}×${flH}×${TIRE_H}mm</span></div>
    <div class="panel-row"><span class="panel-label">Motor (×4)</span><span class="panel-val">${mW}×${mH}×${MOTOR_H}mm</span></div>
    <div class="panel-row"><span class="panel-label">Battery box</span><span class="panel-val">${bW}×${bH}×${BATTERY_H}mm</span></div>
    <div class="panel-row"><span class="panel-label">Standoffs</span><span class="panel-val">6×6×${STANDOFF_H}mm ×4</span></div>
    <div class="panel-row"><span class="panel-label">Plate Z</span><span class="panel-val">${Z_BODY_PLATE}mm</span></div>
    <div class="panel-row"><span class="panel-label">Top plate Z</span><span class="panel-val">${Z_TOP_PLATE}mm</span></div>
    <div class="panel-row"><span class="panel-label">Total height</span><span class="panel-val">~${Z_TOP_PLATE + PLATE_H}mm</span></div>
    <div style="margin-top:0.6rem; padding-top:0.4rem; border-top:1px solid var(--border);">
      <div class="panel-title" style="margin-bottom:0.4rem">Legend</div>
      <div class="color-row"><div class="color-dot" style="background:#5a8fd4"></div><span class="color-label">Body plate</span></div>
      <div class="color-row"><div class="color-dot" style="background:#7eaadd"></div><span class="color-label">Top plate</span></div>
      <div class="color-row"><div class="color-dot" style="background:#e05555"></div><span class="color-label">Head / wing</span></div>
      <div class="color-row"><div class="color-dot" style="background:#8855cc"></div><span class="color-label">Transition</span></div>
      <div class="color-row"><div class="color-dot" style="background:#6688cc"></div><span class="color-label">Rear frame</span></div>
      <div class="color-row"><div class="color-dot" style="background:#55bb77"></div><span class="color-label">Tires</span></div>
      <div class="color-row"><div class="color-dot" style="background:#e8c955"></div><span class="color-label">Motors</span></div>
      <div class="color-row"><div class="color-dot" style="background:#cc6633"></div><span class="color-label">Battery box</span></div>
      <div class="color-row"><div class="color-dot" style="background:#888"></div><span class="color-label">Standoffs</span></div>
    </div>
    <div style="margin-top:0.6rem; padding-top:0.4rem; border-top:1px solid var(--border);">
      <div class="panel-title" style="margin-bottom:0.3rem">Controls</div>
      <div class="color-label" style="font-size:0.48rem; line-height:1.6;">
        ◀ ▶ or Arrow keys: Rotate<br>
        E: Toggle explode view<br>
        T: Toggle trace overlay
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// Controls
// ═══════════════════════════════════════════════════════════

function bind(id, key) {
  document.getElementById(id).addEventListener('click', () => {
    window[key] = !window[key];
    document.getElementById(id).classList.toggle('active', window[key]);
    render();
  });
}
bind('tb-labels', 'showLabels');
bind('tb-dims', 'showDims');
bind('tb-fills', 'showFills');
bind('tb-wireframe', 'showWireframe');
bind('tb-trace', 'showTrace');

document.getElementById('tb-explode').addEventListener('click', () => {
  const target = explodeOffset > 0 ? 0 : 30;
  document.getElementById('tb-explode').classList.toggle('active', target > 0);
  const start = explodeOffset;
  const t0 = performance.now();
  (function anim(now) {
    const t = Math.min((now - t0) / 400, 1);
    explodeOffset = start + (target - start) * (1 - Math.pow(1 - t, 3));
    render();
    if (t < 1) requestAnimationFrame(anim);
  })(t0);
});

function animateRotation(target) {
  const start = rotAngle;
  const t0 = performance.now();
  (function anim(now) {
    const t = Math.min((now - t0) / 350, 1);
    rotAngle = start + (target - start) * (1 - Math.pow(1 - t, 3));
    render();
    if (t < 1) requestAnimationFrame(anim);
  })(t0);
}

document.getElementById('tb-rotate-l').addEventListener('click', () => animateRotation(rotAngle - Math.PI / 6));
document.getElementById('tb-rotate-r').addEventListener('click', () => animateRotation(rotAngle + Math.PI / 6));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') animateRotation(rotAngle - Math.PI / 6);
  if (e.key === 'ArrowRight') animateRotation(rotAngle + Math.PI / 6);
  if (e.key === 'e' || e.key === 'E') document.getElementById('tb-explode').click();
  if (e.key === 't' || e.key === 'T') document.getElementById('tb-trace').click();
});

// ═══════════════════════════════════════════════════════════
// Resize + Init
// ═══════════════════════════════════════════════════════════

function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const ratio = CW / CH;
  let w, h;
  if (maxW / maxH > ratio) { h = maxH; w = h * ratio; }
  else { w = maxW; h = w / ratio; }
  canvas.width = CW * dpr;
  canvas.height = CH * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

function init() {
  const fill = document.getElementById('loading-fill');
  fill.style.width = '40%';
  setTimeout(() => { fill.style.width = '80%'; }, 150);
  setTimeout(() => {
    fill.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('ui-title').classList.add('visible');
      document.getElementById('info-panel').classList.add('visible');
      buildInfoPanel();
      resize();
    }, 250);
  }, 400);
}

window.addEventListener('resize', resize);
init();
</script>
