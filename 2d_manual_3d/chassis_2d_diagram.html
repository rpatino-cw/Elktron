<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK-COKOINO Chassis — 2D Component Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6e3;
    --text-dim: #787472;
    --accent: #c9943a;
    --blue: #5a8fd4;
    --red: #e05555;
    --green: #55bb77;
    --orange: #cc6633;
    --gold: #d4a833;
    --purple: #8855cc;
    --motor: #e8c955;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    background-position: center center;
  }
  #grid-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 30%, var(--bg) 75%);
  }

  #canvas-container {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }
  canvas#board { display: block; }

  .ui-overlay {
    position: fixed; z-index: 10; pointer-events: none;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .ui-overlay.visible { opacity: 1; transform: translateY(0); }

  .title-block { top: 0.8rem; left: 1rem; }
  .title-block h1 {
    font-size: 1rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
  }
  .title-block .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; color: var(--text-dim);
    margin-top: 0.2rem; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .toolbar {
    position: fixed; top: 0.6rem; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 0.25rem; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 0.3rem 0.4rem;
  }
  .tb-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 0.25rem 0.5rem; border: 1px solid transparent;
    border-radius: 3px; background: transparent;
    color: var(--text-dim); cursor: pointer;
    transition: all 0.15s ease;
  }
  .tb-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .tb-btn.active { color: var(--accent); border-color: rgba(201,148,58,0.4); background: rgba(201,148,58,0.08); }
  .tb-sep { width: 1px; height: 14px; background: var(--border); margin: 0 0.15rem; }

  .comp-panel {
    position: fixed; top: 2.5rem; right: 0.8rem; z-index: 15;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.7rem;
    width: 240px; max-height: 80vh; overflow-y: auto;
    pointer-events: all;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .comp-panel.visible { opacity: 1; transform: translateY(0); }
  .comp-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.5rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .part-item {
    display: flex; align-items: flex-start; gap: 0.5rem;
    padding: 0.35rem 0.2rem; cursor: pointer;
    border-radius: 3px; transition: background 0.15s;
  }
  .part-item:hover { background: rgba(255,255,255,0.03); }
  .part-item.active { background: rgba(201,148,58,0.08); }
  .part-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
  .part-name {
    font-size: 0.7rem; font-weight: 500; color: var(--text); line-height: 1.3;
  }
  .part-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--text-dim); line-height: 1.5; margin-top: 0.15rem;
  }

  .specs-panel {
    position: fixed; bottom: 0.8rem; left: 0.8rem; z-index: 15;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.7rem;
    width: 240px; pointer-events: all;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .specs-panel.visible { opacity: 1; transform: translateY(0); }
  .specs-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.4rem; padding-bottom: 0.25rem;
    border-bottom: 1px solid var(--border);
  }
  .spec-row {
    display: flex; justify-content: space-between; padding: 0.2rem 0;
    font-size: 0.65rem;
  }
  .spec-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em;
  }
  .spec-val { font-weight: 500; color: var(--text); font-size: 0.65rem; }

  .tooltip {
    position: fixed; z-index: 25;
    background: var(--surface); border: 1px solid var(--border);
    padding: 0.5rem 0.7rem; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--text);
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s; white-space: nowrap;
    max-width: 280px;
  }
  .tooltip.active { opacity: 1; }
  .tooltip .tt-label { font-weight: 600; margin-bottom: 0.15rem; }
  .tooltip .tt-detail { color: var(--text-dim); font-size: 0.5rem; white-space: normal; }

  .loading-screen {
    position: fixed; inset: 0; z-index: 100; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1.2rem;
    transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-bar {
    width: 120px; height: 2px;
    background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.3s ease;
  }
  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .view-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-text">Rendering diagram</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loading-fill"></div></div>
</div>

<div id="grid-bg"></div>
<div id="canvas-container"><canvas id="board"></canvas></div>

<div class="ui-overlay title-block" id="ui-title">
  <h1>LK-COKOINO 4WD Chassis</h1>
  <div class="subtitle">Stage 3 &mdash; 2D Component Diagram &mdash; Multi-View (Side + Front + Top)</div>
</div>

<div class="toolbar" id="toolbar">
  <button class="tb-btn active" id="tb-labels">Labels</button>
  <button class="tb-btn active" id="tb-dims">Dims</button>
  <button class="tb-btn active" id="tb-fills">Fills</button>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="tb-side">Side</button>
  <button class="tb-btn active" id="tb-front">Front</button>
  <button class="tb-btn active" id="tb-top">Top</button>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="tb-parts">Parts</button>
</div>

<div class="comp-panel" id="comp-panel">
  <div class="comp-panel-title">Components (9)</div>
  <div id="comp-list"></div>
</div>

<div class="specs-panel" id="specs-panel">
  <div class="specs-title">Component Specs</div>
  <div id="specs-list"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ─── Config ──────────────────────────────────────────────
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const dpr = Math.min(window.devicePixelRatio || 1, 2);

// Canvas layout: 1600 x 900
const CW = 1600;
const CH = 900;

// ─── Layout Regions ──────────────────────────────────────
// Side view: full width bottom
const SIDE = { x: 80, y: 480, w: 1440, h: 380 };
// Front view: upper left
const FRONT = { x: 80, y: 40, w: 620, h: 400 };
// Top-down view: upper right
const TOP = { x: 780, y: 40, w: 740, h: 400 };

// ─── Side View Scale ─────────────────────────────────────
// Physical: 260mm chassis + 33mm battery = ~305mm visible range
const SIDE_TOTAL_W = 310; // mm (260 chassis + 33 battery + padding)
const SIDE_TOTAL_H = 85;  // mm
const SIDE_SCALE = Math.min(SIDE.w / SIDE_TOTAL_W, SIDE.h / SIDE_TOTAL_H) * 0.82;
const SIDE_OX = SIDE.x + (SIDE.w - SIDE_TOTAL_W * SIDE_SCALE) / 2 + 8 * SIDE_SCALE;
const SIDE_OY = SIDE.y + (SIDE.h - SIDE_TOTAL_H * SIDE_SCALE) / 2 + 15;

function smmX(mm) { return SIDE_OX + mm * SIDE_SCALE; }
function smmY(mm) { return SIDE_OY + (SIDE_TOTAL_H - mm) * SIDE_SCALE; }

// ─── Front View Scale ────────────────────────────────────
// Front: head-on view. X=width (0=left of 160mm span), Y=height (0=ground)
// 160mm visible width (130mm body + 15mm wing each side), 100mm height
const FRONT_W = 190;  // total view width incl wheels
const FRONT_H = 100;
const FRONT_SCALE = Math.min(FRONT.w / FRONT_W, FRONT.h / FRONT_H) * 0.72;
const FRONT_OX = FRONT.x + (FRONT.w - FRONT_W * FRONT_SCALE) / 2;
const FRONT_OY = FRONT.y + (FRONT.h - FRONT_H * FRONT_SCALE) / 2 + 15;

function fmmX(mm) { return FRONT_OX + mm * FRONT_SCALE; }
function fmmY(mm) { return FRONT_OY + (FRONT_H - mm) * FRONT_SCALE; }

// ─── Top-Down View Scale ─────────────────────────────────
// Top: bird's eye. X=length (0=front body edge, 260=rear), Y=width (0=left, 130=right)
// Range: head bridge at ~-25, battery rear at ~293, wing tips at ~-10/140
const TOP_L = 340;   // -35 to +305
const TOP_W_MM = 175; // -22 to 153 (wing tips + motor overhang + padding)
const TOP_SCALE = Math.min(TOP.w / TOP_L, TOP.h / TOP_W_MM) * 0.80;
const TOP_OX = TOP.x + (TOP.w - TOP_L * TOP_SCALE) / 2 + 35 * TOP_SCALE;
const TOP_OY = TOP.y + (TOP.h - TOP_W_MM * TOP_SCALE) / 2 + 22 * TOP_SCALE;

function tmmX(mm) { return TOP_OX + mm * TOP_SCALE; }
function tmmY(mm) { return TOP_OY + mm * TOP_SCALE; }

// ─── Component Data (mm) ────────────────────────────────
const parts = [
  {
    id: 'bottom-plate', name: 'Bottom Acrylic Plate',
    hex: '#5a8fd4',
    desc: '3mm clear acrylic. Full chassis length.',
    side: { x: 0, y: 0, w: 260, h: 3 },
    front: { x: -15, y: 0, w: 160, h: 3 },
    top: null, // drawn as custom planform outline
    specs: ['260 × 130 mm', '3mm thick', 'Clear acrylic', '4WD base']
  },
  {
    id: 'top-plate', name: 'Top Acrylic Plate',
    hex: '#5a8fd4',
    desc: 'Shorter than bottom — covers front ~60%. Pi + motor driver mount here.',
    side: { x: 5, y: 45, w: 154, h: 3 },
    front: { x: 0, y: 45, w: 130, h: 3 },
    top: { x: 5, y: 0, w: 154, h: 130 },
    specs: ['155 × 130 mm', '3mm thick', 'Clear acrylic', 'Component deck']
  },
  {
    id: 'battery-box', name: 'Battery Box',
    hex: '#cc6633',
    desc: 'External battery holder mounted behind chassis. 2× 18650 Li-ion.',
    side: { x: 260, y: 4, w: 33, h: 44 },
    front: null,
    top: { x: 260, y: 30, w: 33, h: 70 },
    specs: ['33 × 44mm face', '2× 18650', 'External mount', '7.4V nominal']
  },
  {
    id: 'front-motor', name: 'Front DC Motors',
    hex: '#e8c955',
    desc: 'TT gear motors with yellow gearbox. Drive front wheels.',
    side: { x: 30, y: 5, w: 50, h: 35 },
    front: { x: 15, y: -25, w: 100, h: 25 },
    front_pair: [
      { x: 0, y: -25, w: 35, h: 25 },
      { x: 95, y: -25, w: 35, h: 25 },
    ],
    top: null,
    top_pair: [
      { x: 30, y: -10, w: 50, h: 25 },
      { x: 30, y: 115, w: 50, h: 25 },
    ],
    specs: ['TT DC motor', 'Yellow gearbox', '3-6V', '200 RPM']
  },
  {
    id: 'rear-motor', name: 'Rear DC Motors',
    hex: '#e8c955',
    desc: 'Same TT gear motors. Drive rear wheels. Both sides same config.',
    side: { x: 110, y: 5, w: 50, h: 35 },
    front: null,
    top: null,
    top_pair: [
      { x: 110, y: -10, w: 50, h: 25 },
      { x: 110, y: 115, w: 50, h: 25 },
    ],
    specs: ['TT DC motor', 'Yellow gearbox', '3-6V', '200 RPM']
  },
  {
    id: 'standoffs', name: 'Brass Standoffs',
    hex: '#d4a833',
    desc: 'M3 hex brass standoffs connecting top and bottom plates.',
    side_standoffs: [
      { x: 82, y: 3, h: 42 },
      { x: 140, y: 3, h: 42 },
    ],
    front_standoffs: [
      { x: 18, y: 3, h: 42 },
      { x: 108, y: 3, h: 42 },
    ],
    specs: ['M3 hex brass', '42mm height', '4 positions', 'Plate connectors']
  },
  {
    id: 'upper-posts', name: 'Upper Tall Posts',
    hex: '#8855cc',
    desc: 'Posts above top plate for camera mast and second deck.',
    side_posts: [
      { x: 82, y: 48, h: 14 },
      { x: 155, y: 48, h: 15 },
    ],
    front_posts: [
      { x: 18, y: 48, h: 14 },
      { x: 108, y: 48, h: 15 },
    ],
    specs: ['~14-15mm tall', '2 positions', 'Mast anchor', 'Above top plate']
  },
  {
    id: 'switch-enclosure', name: 'Switch / Power Area',
    hex: '#55bb77',
    desc: 'Rear section with standoffs and top base plate. Power switch + USB.',
    side_enclosure: {
      standoffL: { x: 175, y: 3, h: 65 },
      standoffR: { x: 258, y: 3, h: 65 },
      topBase: { x: 175, y: 68, w: 85, h: 3 },
    },
    specs: ['2 standoffs + base', 'Power switch', 'USB port', '65mm tall']
  },
];

// ─── State ───────────────────────────────────────────────
let showLabels = true;
let showDims = true;
let showFills = true;
let showSide = true;
let showFront = true;
let showTop = true;
let showPartsPanel = true;
let hoveredPart = null;
let selectedPart = null;
const hitboxes = [];

// ─── Canvas Setup ────────────────────────────────────────
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const ratio = CW / CH;
  let w, h;
  if (maxW / maxH > ratio) { h = maxH; w = h * ratio; }
  else { w = maxW; h = w / ratio; }
  canvas.width = CW * dpr;
  canvas.height = CH * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

// ─── Drawing Helpers ─────────────────────────────────────
function setAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawDimLine(x1, y1, x2, y2, label, offset, side) {
  ctx.save();
  const ox = side === 'right' ? offset : side === 'left' ? -offset : 0;
  const oy = side === 'bottom' ? offset : side === 'top' ? -offset : 0;

  ctx.strokeStyle = setAlpha('#c9943a', 0.3);
  ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  if (oy !== 0) {
    ctx.moveTo(x1, y1); ctx.lineTo(x1, y1 + oy);
    ctx.moveTo(x2, y2); ctx.lineTo(x2, y2 + oy);
  } else {
    ctx.moveTo(x1, y1); ctx.lineTo(x1 + ox, y1);
    ctx.moveTo(x2, y2); ctx.lineTo(x2 + ox, y2);
  }
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.strokeStyle = setAlpha('#c9943a', 0.5);
  ctx.lineWidth = 1;
  ctx.beginPath();
  if (oy !== 0) {
    const dy = y1 + oy * 0.8;
    ctx.moveTo(x1, dy); ctx.lineTo(x2, dy);
    ctx.moveTo(x1, dy); ctx.lineTo(x1 + 4, dy - 3); ctx.moveTo(x1, dy); ctx.lineTo(x1 + 4, dy + 3);
    ctx.moveTo(x2, dy); ctx.lineTo(x2 - 4, dy - 3); ctx.moveTo(x2, dy); ctx.lineTo(x2 - 4, dy + 3);
    ctx.stroke();
    ctx.fillStyle = '#c9943a';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, (x1 + x2) / 2, dy - 5);
  } else {
    const dx = x1 + ox * 0.8;
    ctx.moveTo(dx, y1); ctx.lineTo(dx, y2);
    ctx.moveTo(dx, y1); ctx.lineTo(dx - 3, y1 + 4); ctx.moveTo(dx, y1); ctx.lineTo(dx + 3, y1 + 4);
    ctx.moveTo(dx, y2); ctx.lineTo(dx - 3, y2 - 4); ctx.moveTo(dx, y2); ctx.lineTo(dx + 3, y2 - 4);
    ctx.stroke();
    ctx.save();
    ctx.translate(dx - 7, (y1 + y2) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#c9943a';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }
  ctx.restore();
}

function drawRect(x, y, w, h, hex, alpha, isActive) {
  if (showFills) {
    ctx.fillStyle = setAlpha(hex, alpha * 0.12);
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 2);
    ctx.fill();
  }
  ctx.strokeStyle = setAlpha(hex, alpha * 0.8);
  ctx.lineWidth = isActive ? 2 : 1.2;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 2);
  ctx.stroke();
  if (isActive) {
    ctx.shadowColor = setAlpha(hex, 0.3);
    ctx.shadowBlur = 12;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

function drawStandoff(cx, y1, y2, hex, alpha, isActive) {
  const sw = 6;
  if (showFills) {
    ctx.fillStyle = setAlpha(hex, alpha * 0.25);
    ctx.fillRect(cx - sw/2, y1, sw, y2 - y1);
  }
  ctx.strokeStyle = setAlpha(hex, alpha * 0.7);
  ctx.lineWidth = isActive ? 2 : 1;
  ctx.strokeRect(cx - sw/2, y1, sw, y2 - y1);
  ctx.beginPath(); ctx.setLineDash([2, 3]);
  ctx.moveTo(cx, y1 + 4); ctx.lineTo(cx, y2 - 4);
  ctx.strokeStyle = setAlpha(hex, alpha * 0.3); ctx.stroke();
  ctx.setLineDash([]);
  if (isActive) {
    ctx.shadowColor = setAlpha(hex, 0.3);
    ctx.shadowBlur = 8;
    ctx.strokeRect(cx - sw/2, y1, sw, y2 - y1);
    ctx.shadowBlur = 0;
  }
}

function addHitbox(id, x, y, w, h) {
  hitboxes.push({ id, x, y, w, h });
}

// ─── Render ──────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(0, 0, CW, CH);
  hitboxes.length = 0;

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= CW; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke();
  }
  for (let y = 0; y <= CH; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }

  // View separators
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  // Horizontal separator
  ctx.beginPath(); ctx.moveTo(40, 460); ctx.lineTo(CW - 40, 460); ctx.stroke();
  // Vertical separator (upper area)
  ctx.beginPath(); ctx.moveTo(720, 20); ctx.lineTo(720, 450); ctx.stroke();
  ctx.setLineDash([]);

  // View labels
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.textAlign = 'left';
  if (showSide) ctx.fillText('SIDE VIEW (LEFT)', SIDE.x, SIDE.y - 8);
  if (showFront) ctx.fillText('FRONT VIEW', FRONT.x, FRONT.y + 12);
  if (showTop) ctx.fillText('TOP-DOWN VIEW', TOP.x, TOP.y + 12);

  // Draw views
  if (showSide) renderSideView();
  if (showFront) renderFrontView();
  if (showTop) renderTopView();

  // Update UI panels
  updateSpecsPanel();
}

// ─── Side View ───────────────────────────────────────────
function renderSideView() {
  // Ground line
  const groundY = smmY(-8);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(SIDE.x - 10, groundY);
  ctx.lineTo(SIDE.x + SIDE.w + 10, groundY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Direction indicators
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◀ FRONT', smmX(-75), smmY(42));
  ctx.fillText('REAR ▶', smmX(280), smmY(42));
  ctx.textAlign = 'left';

  parts.forEach(p => {
    const isActive = hoveredPart === p.id || selectedPart === p.id;
    const dimmed = (hoveredPart || selectedPart) && !isActive;
    const alpha = dimmed ? 0.15 : isActive ? 1 : 0.7;

    // Rectangular parts
    if (p.side) {
      const d = p.side;
      const px = smmX(d.x);
      const py = smmY(d.y + d.h);
      const pw = d.w * SIDE_SCALE;
      const ph = d.h * SIDE_SCALE;
      drawRect(px, py, pw, ph, p.hex, alpha, isActive);
      addHitbox(p.id, px, py, pw, ph);

      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}9px "JetBrains Mono", monospace`;
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        ctx.fillText(p.name.toUpperCase(), px + pw / 2, py - 6);
        ctx.textAlign = 'left';
      }
    }

    // Standoffs
    if (p.side_standoffs) {
      p.side_standoffs.forEach(s => {
        const cx = smmX(s.x);
        const y1 = smmY(s.y + s.h);
        const y2 = smmY(s.y);
        drawStandoff(cx, y1, y2, p.hex, alpha, isActive);
        addHitbox(p.id, cx - 5, y1, 10, y2 - y1);
      });
      if (showLabels && !dimmed) {
        ctx.font = '8px "JetBrains Mono", monospace';
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        ctx.fillText('STANDOFFS', smmX(111), smmY(22));
        ctx.textAlign = 'left';
      }
    }

    // Upper posts
    if (p.side_posts) {
      p.side_posts.forEach(s => {
        const cx = smmX(s.x);
        const y1 = smmY(s.y + s.h);
        const y2 = smmY(s.y);
        drawStandoff(cx, y1, y2, p.hex, alpha, isActive);
        addHitbox(p.id, cx - 5, y1, 10, y2 - y1);
      });
      if (showLabels && !dimmed) {
        ctx.font = '8px "JetBrains Mono", monospace';
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        ctx.fillText('UPPER POSTS', smmX(118), smmY(66));
        ctx.textAlign = 'left';
      }
    }

    // Switch enclosure
    if (p.side_enclosure) {
      const enc = p.side_enclosure;
      // Left standoff
      drawStandoff(smmX(enc.standoffL.x), smmY(enc.standoffL.y + enc.standoffL.h), smmY(enc.standoffL.y), p.hex, alpha, isActive);
      // Right standoff
      drawStandoff(smmX(enc.standoffR.x), smmY(enc.standoffR.y + enc.standoffR.h), smmY(enc.standoffR.y), p.hex, alpha, isActive);
      // Top base
      const tb = enc.topBase;
      drawRect(smmX(tb.x), smmY(tb.y + tb.h), tb.w * SIDE_SCALE, tb.h * SIDE_SCALE, p.hex, alpha, isActive);
      addHitbox(p.id, smmX(enc.standoffL.x) - 5, smmY(enc.standoffL.y + enc.standoffL.h), smmX(enc.standoffR.x) - smmX(enc.standoffL.x) + 10, smmY(enc.standoffL.y) - smmY(enc.standoffL.y + enc.standoffL.h));

      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}9px "JetBrains Mono", monospace`;
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        ctx.fillText('SWITCH / POWER', smmX(216), smmY(73));
        ctx.textAlign = 'left';
      }
    }
  });

  // Dimensions
  if (showDims) {
    drawDimLine(smmX(0), smmY(0), smmX(260), smmY(0), '260mm', 25, 'bottom');
    drawDimLine(smmX(5), smmY(48), smmX(159), smmY(48), '154mm', -18, 'top');
    drawDimLine(smmX(260), smmY(4), smmX(293), smmY(4), '33mm batt', 18, 'bottom');
    drawDimLine(smmX(-5), smmY(0), smmX(-5), smmY(45), '45mm gap', -30, 'left');
  }
}

// ─── Top-Down View ───────────────────────────────────────
function renderTopView() {
  // Direction indicators
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('▲ FRONT', tmmX(130), tmmY(-15));
  ctx.fillText('▼ REAR', tmmX(130), tmmY(148));
  ctx.fillText('◀ LEFT', tmmX(-30), tmmY(65));
  ctx.fillText('RIGHT ▶', tmmX(290), tmmY(65));
  ctx.textAlign = 'left';

  // ── 1) Chassis body planform (bottom plate outline) ──
  // Re-derived from blueprint top-down trace (Stage 2.8, topRaw lines):
  //   Head = top_frontWing region (L10,L11,L12,L13,L20,L21,L22)
  //   Topology: Body front → narrowing walls (L8/L9) → body-to-wing diagonals
  //   (L10/L11) → wing tip curves (L20/L21) → wing diagonals (L12/L13) →
  //   concave bridge (L22).
  //
  //   Bridge L22: concave (cp behind line, center dips backward ~3mm)
  //   Wing tips L20/L21: bezier curves bulging outward past body edges
  //
  // Physical dimensions:
  //   Body: 260 × 130mm. Head plate: ~160mm wide at wing tips.
  //   Bridge: ~46mm wide, centered, most forward point (x=-25).
  //   Wing tips: ~10mm past body each side, at x≈-21.
  //   Narrowing: body tapers from 130mm to ~95mm before head starts.
  //
  // Proportional ratios from trace pixel data (perspective-robust):
  //   Bridge depth / total head depth: 100%  (x=-25)
  //   Wing tip depth: 84%  (x=-21)
  //   Junction depth: 66%  (x=-17)
  //   Narrow point depth: 46%  (x=-12)
  //   Bridge width: 46mm centered (y=38 to y=84)
  //   Concavity: 3mm (bridge edges at -25, center at -22)

  const bpPart = parts.find(p => p.id === 'bottom-plate');
  const bpActive = hoveredPart === 'bottom-plate' || selectedPart === 'bottom-plate';
  const bpDimmed = (hoveredPart || selectedPart) && !bpActive;
  const bpAlpha = bpDimmed ? 0.15 : bpActive ? 1 : 0.7;

  // Draw planform with bezier curves for head shape
  ctx.beginPath();

  // ── HEAD (front, extends forward of body) ──
  ctx.moveTo(tmmX(0), tmmY(0));                            // body front-left corner

  ctx.lineTo(tmmX(-12), tmmY(18));                         // L9: narrowing wall left
  ctx.lineTo(tmmX(-17), tmmY(-7));                         // L11: body-to-wing diagonal left

  ctx.quadraticCurveTo(                                    // L20: left wing tip curve
    tmmX(-16), tmmY(-17),                                  //   cp bulges outward-left
    tmmX(-21), tmmY(-10)                                   //   wing tip left
  );

  ctx.lineTo(tmmX(-25), tmmY(38));                         // L12: wing to bridge-left

  ctx.quadraticCurveTo(                                    // L22: bridge (concave)
    tmmX(-22), tmmY(61),                                   //   cp behind = center dips back
    tmmX(-25), tmmY(84)                                    //   bridge-right
  );

  ctx.lineTo(tmmX(-21), tmmY(140));                        // L13: bridge-right to wing tip right

  ctx.quadraticCurveTo(                                    // L21: right wing tip curve
    tmmX(-16), tmmY(147),                                  //   cp bulges outward-right
    tmmX(-17), tmmY(137)                                   //   junction-right
  );

  ctx.lineTo(tmmX(-12), tmmY(112));                        // L10: wing-to-body diagonal right
  ctx.lineTo(tmmX(0), tmmY(130));                          // L8: narrowing wall right → body front-right

  // ── BODY (simple rectangle to rear) ──
  ctx.lineTo(tmmX(260), tmmY(130));                        // right edge to rear-right
  ctx.lineTo(tmmX(260), tmmY(0));                          // rear edge to rear-left

  ctx.closePath();                                         // back to body front-left

  if (showFills) {
    ctx.fillStyle = setAlpha(bpPart.hex, bpAlpha * 0.1);
    ctx.fill();
  }
  ctx.strokeStyle = setAlpha(bpPart.hex, bpAlpha * 0.7);
  ctx.lineWidth = bpActive ? 2 : 1.2;
  ctx.stroke();

  // Hitbox for bottom plate (bounding rect of planform)
  addHitbox('bottom-plate', tmmX(-25), tmmY(-10), (285) * TOP_SCALE, (150) * TOP_SCALE);

  if (showLabels && !bpDimmed) {
    ctx.font = `${bpActive ? 'bold ' : ''}9px "JetBrains Mono", monospace`;
    ctx.fillStyle = setAlpha(bpPart.hex, bpAlpha);
    ctx.textAlign = 'center';
    ctx.fillText('BOTTOM PLATE (PLANFORM)', tmmX(130), tmmY(65));
    ctx.textAlign = 'left';
  }

  // ── 2) Standard top rectangles (top plate, battery) ──
  parts.forEach(p => {
    const isActive = hoveredPart === p.id || selectedPart === p.id;
    const dimmed = (hoveredPart || selectedPart) && !isActive;
    const alpha = dimmed ? 0.15 : isActive ? 1 : 0.7;

    if (p.top) {
      const d = p.top;
      const px = tmmX(d.x);
      const py = tmmY(d.y);
      const pw = d.w * TOP_SCALE;
      const ph = d.h * TOP_SCALE;
      drawRect(px, py, pw, ph, p.hex, alpha, isActive);
      addHitbox(p.id, px, py, pw, ph);

      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}9px "JetBrains Mono", monospace`;
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        ctx.fillText(p.name.toUpperCase(), px + pw / 2, py + ph / 2 + 3);
        ctx.textAlign = 'left';
      }
    }

    // ── 3) Motor pairs from top (left + right of chassis) ──
    if (p.top_pair) {
      p.top_pair.forEach(d => {
        const px = tmmX(d.x);
        const py = tmmY(d.y);
        const pw = d.w * TOP_SCALE;
        const ph = d.h * TOP_SCALE;
        drawRect(px, py, pw, ph, p.hex, alpha, isActive);
        addHitbox(p.id, px, py, pw, ph);
      });
      if (showLabels && !dimmed) {
        ctx.font = `${isActive ? 'bold ' : ''}8px "JetBrains Mono", monospace`;
        ctx.fillStyle = setAlpha(p.hex, alpha);
        ctx.textAlign = 'center';
        // Label on each side
        const d0 = p.top_pair[0];
        const d1 = p.top_pair[1];
        ctx.fillText('MTR L', tmmX(d0.x + d0.w / 2), tmmY(d0.y + d0.h / 2) + 3);
        ctx.fillText('MTR R', tmmX(d1.x + d1.w / 2), tmmY(d1.y + d1.h / 2) + 3);
        ctx.textAlign = 'left';
      }
    }
  });

  // ── 4) Standoff positions from top (small circles) ──
  const standoffPart = parts.find(p => p.id === 'standoffs');
  if (standoffPart) {
    const isActive = hoveredPart === 'standoffs' || selectedPart === 'standoffs';
    const dimmed = (hoveredPart || selectedPart) && !isActive;
    const alpha = dimmed ? 0.15 : isActive ? 1 : 0.7;
    // 4 standoff positions: front-left, front-right, rear-left, rear-right
    const standoffPos = [
      { x: 82, y: 18 }, { x: 82, y: 108 },
      { x: 140, y: 18 }, { x: 140, y: 108 },
    ];
    standoffPos.forEach(s => {
      const cx = tmmX(s.x);
      const cy = tmmY(s.y);
      const r = 4 * TOP_SCALE;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      if (showFills) {
        ctx.fillStyle = setAlpha(standoffPart.hex, alpha * 0.3);
        ctx.fill();
      }
      ctx.strokeStyle = setAlpha(standoffPart.hex, alpha * 0.8);
      ctx.lineWidth = isActive ? 2 : 1;
      ctx.stroke();
      addHitbox('standoffs', cx - r, cy - r, r * 2, r * 2);
    });
  }

  // ── 5) Switch/power enclosure area (rear section) ──
  const switchPart = parts.find(p => p.id === 'switch-enclosure');
  if (switchPart) {
    const isActive = hoveredPart === 'switch-enclosure' || selectedPart === 'switch-enclosure';
    const dimmed = (hoveredPart || selectedPart) && !isActive;
    const alpha = dimmed ? 0.15 : isActive ? 1 : 0.7;
    // Top view: switch base spans rear section
    const sx = tmmX(175);
    const sy = tmmY(10);
    const sw = 85 * TOP_SCALE;
    const sh = 110 * TOP_SCALE;
    ctx.strokeStyle = setAlpha(switchPart.hex, alpha * 0.4);
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.setLineDash([]);
    addHitbox('switch-enclosure', sx, sy, sw, sh);

    if (showLabels && !dimmed) {
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = setAlpha(switchPart.hex, alpha);
      ctx.textAlign = 'center';
      ctx.fillText('SWITCH AREA', sx + sw / 2, sy + sh / 2 + 3);
      ctx.textAlign = 'left';
    }
  }

  // ── 6) Dimensions ──
  if (showDims) {
    drawDimLine(tmmX(0), tmmY(-20), tmmX(260), tmmY(-20), '260mm length', -18, 'top');
    drawDimLine(tmmX(-15), tmmY(0), tmmX(-15), tmmY(130), '130mm width', -25, 'left');
    drawDimLine(tmmX(-25), tmmY(145), tmmX(0), tmmY(145), '25mm head', 18, 'bottom');
    drawDimLine(tmmX(260), tmmY(145), tmmX(293), tmmY(145), '33mm batt', 18, 'bottom');
  }
}

// ─── Hit Testing ─────────────────────────────────────────
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousemove', function(e) {
  const { x, y } = getCanvasCoords(e);
  let found = null;
  for (let i = hitboxes.length - 1; i >= 0; i--) {
    const hb = hitboxes[i];
    if (x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h) {
      found = hb.id;
      break;
    }
  }

  if (found !== hoveredPart) {
    hoveredPart = found;
    render();
    // Update panel highlight
    document.querySelectorAll('.part-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === hoveredPart);
    });
  }

  // Tooltip
  if (hoveredPart) {
    const part = parts.find(p => p.id === hoveredPart);
    tooltip.innerHTML = `<div class="tt-label">${part.name}</div><div class="tt-detail">${part.desc}</div>`;
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
    tooltip.classList.add('active');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('active');
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('click', function(e) {
  const { x, y } = getCanvasCoords(e);
  let found = null;
  for (let i = hitboxes.length - 1; i >= 0; i--) {
    const hb = hitboxes[i];
    if (x >= hb.x && x <= hb.x + hb.w && y >= hb.y && y <= hb.y + hb.h) {
      found = hb.id;
      break;
    }
  }
  selectedPart = (selectedPart === found) ? null : found;
  render();
});

canvas.addEventListener('mouseleave', function() {
  hoveredPart = null;
  tooltip.classList.remove('active');
  render();
});

// ─── Specs Panel ─────────────────────────────────────────
function updateSpecsPanel() {
  const partId = selectedPart || hoveredPart;
  const specsPanelEl = document.getElementById('specs-panel');
  if (!partId) {
    specsPanelEl.classList.remove('visible');
    return;
  }
  const part = parts.find(p => p.id === partId);
  if (!part) return;

  const html = part.specs.map(s =>
    `<div class="spec-row"><span class="spec-label">${s.split(' ')[0]}</span><span class="spec-val">${s}</span></div>`
  ).join('');
  document.getElementById('specs-list').innerHTML = `<div style="font-weight:600;font-size:0.7rem;margin-bottom:0.4rem;color:${part.hex}">${part.name}</div>` + html;
  specsPanelEl.classList.add('visible');
}

// ─── Build Parts Panel ───────────────────────────────────
function buildPartsPanel() {
  const list = document.getElementById('comp-list');
  list.innerHTML = parts.map(p => `
    <div class="part-item" data-id="${p.id}">
      <div class="part-dot" style="background:${p.hex}"></div>
      <div>
        <div class="part-name">${p.name}</div>
        <div class="part-desc">${p.desc}</div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.part-item').forEach(el => {
    el.addEventListener('mouseenter', () => {
      hoveredPart = el.dataset.id;
      render();
      document.querySelectorAll('.part-item').forEach(e => e.classList.toggle('active', e.dataset.id === hoveredPart));
    });
    el.addEventListener('mouseleave', () => {
      hoveredPart = null;
      render();
      document.querySelectorAll('.part-item').forEach(e => e.classList.remove('active'));
    });
    el.addEventListener('click', () => {
      selectedPart = (selectedPart === el.dataset.id) ? null : el.dataset.id;
      render();
    });
  });
}

// ─── Toolbar ─────────────────────────────────────────────
function setupToolbar() {
  const toggles = {
    'tb-labels': () => { showLabels = !showLabels; },
    'tb-dims': () => { showDims = !showDims; },
    'tb-fills': () => { showFills = !showFills; },
    'tb-side': () => { showSide = !showSide; },
    'tb-front': () => { showFront = !showFront; },
    'tb-top': () => { showTop = !showTop; },
    'tb-parts': () => {
      showPartsPanel = !showPartsPanel;
      document.getElementById('comp-panel').classList.toggle('visible', showPartsPanel);
    },
  };

  Object.keys(toggles).forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
      toggles[id]();
      document.getElementById(id).classList.toggle('active');
      render();
    });
  });
}

// ─── Keyboard Shortcuts ──────────────────────────────────
document.addEventListener('keydown', function(e) {
  switch (e.key.toLowerCase()) {
    case 'l': document.getElementById('tb-labels').click(); break;
    case 'd': document.getElementById('tb-dims').click(); break;
    case 'f': document.getElementById('tb-fills').click(); break;
    case '1': document.getElementById('tb-side').click(); break;
    case '2': document.getElementById('tb-front').click(); break;
    case '3': document.getElementById('tb-top').click(); break;
    case 'p': document.getElementById('tb-parts').click(); break;
    case 'escape': selectedPart = null; render(); break;
  }
});

// ─── Init ────────────────────────────────────────────────
const loadBar = document.getElementById('loading-fill');
let progress = 0;
const loadInterval = setInterval(() => {
  progress += Math.random() * 30;
  loadBar.style.width = Math.min(progress, 85) + '%';
  if (progress >= 85) clearInterval(loadInterval);
}, 80);

window.addEventListener('load', () => {
  resize();
  buildPartsPanel();
  setupToolbar();

  // Show UI
  loadBar.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('ui-title').classList.add('visible');
    document.getElementById('comp-panel').classList.add('visible');
  }, 400);
});

window.addEventListener('resize', resize);
</script>
</body>
</html>
