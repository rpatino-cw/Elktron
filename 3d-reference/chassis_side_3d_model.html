<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK-COKOINO Chassis — 3D Model</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0b0e;
    --surface: #16151a;
    --border: rgba(255,255,255,0.06);
    --text: #e8e6e3;
    --text-dim: #6e6b68;
    --accent: #c9943a;
    --blue: #5a8fd4;
    --red: #e05555;
    --green: #55bb77;
    --orange: #cc6633;
    --gold: #d4a833;
    --purple: #8855cc;
    --motor: #e8c955;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container { position: fixed; inset: 0; z-index: 1; }
  canvas { display: block; }

  .ui-overlay {
    position: fixed; z-index: 10; pointer-events: none;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .ui-overlay.visible { opacity: 1; transform: translateY(0); }

  .title-block { top: 2rem; left: 2.5rem; }
  .title-block h1 {
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 700; letter-spacing: -0.03em; line-height: 1.1;
  }
  .title-block .subtitle {
    font-size: 0.68rem; color: var(--text-dim);
    margin-top: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .parts-panel {
    position: fixed; top: 2rem; right: 1rem; z-index: 10;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem;
    width: 220px; max-height: 80vh; overflow-y: auto;
    pointer-events: all; opacity: 0; transform: translateX(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .parts-panel.visible { opacity: 1; transform: translateX(0); }
  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.5rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
  }
  .part-btn {
    display: flex; align-items: center; gap: 0.4rem;
    width: 100%; padding: 0.3rem 0.2rem;
    background: none; border: none; color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem; cursor: pointer; border-radius: 3px;
    transition: background 0.15s;
    text-align: left;
  }
  .part-btn:hover { background: rgba(255,255,255,0.03); }
  .part-btn.active { background: rgba(201,148,58,0.1); }
  .part-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }

  .specs-block { bottom: 2rem; left: 2.5rem; }
  .spec-row { display: flex; gap: 1.5rem; margin-bottom: 0.3rem; }
  .spec-row .label {
    font-size: 0.6rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em; min-width: 5rem;
  }
  .spec-row .value { font-size: 0.7rem; font-weight: 500; }

  .toolbar {
    position: fixed; bottom: 2rem; right: 1rem; z-index: 10;
    display: flex; gap: 0.3rem; pointer-events: all;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .toolbar.visible { opacity: 1; }
  .tb-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; padding: 0.35rem 0.6rem;
    border-radius: 4px; cursor: pointer; transition: all 0.15s;
  }
  .tb-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }
  .tb-btn.active { color: var(--accent); border-color: var(--accent); }

  .tooltip {
    position: fixed; z-index: 20; pointer-events: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.4rem 0.6rem;
    opacity: 0; transition: opacity 0.15s;
    max-width: 200px;
  }
  .tooltip.active { opacity: 1; }
  .tt-name { font-size: 0.7rem; font-weight: 600; margin-bottom: 0.15rem; }
  .tt-desc { font-size: 0.55rem; color: var(--text-dim); line-height: 1.4; }

  #loading {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .load-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .load-bar {
    width: 140px; height: 2px; background: rgba(255,255,255,0.06);
    border-radius: 1px; overflow: hidden;
  }
  .load-fill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="load-text">Building chassis</div>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
</div>

<div id="canvas-container"></div>

<div class="ui-overlay title-block" id="title">
  <h1>LK-COKOINO 4WD Chassis</h1>
  <div class="subtitle">Stage 4 &mdash; Interactive 3D Model &mdash; 260 &times; 130 &times; 85 mm</div>
</div>

<div class="parts-panel" id="parts-panel">
  <div class="panel-title">Components</div>
  <div id="parts-list"></div>
</div>

<div class="ui-overlay specs-block" id="specs">
  <div class="spec-row"><span class="label">Chassis</span><span class="value">260 &times; 130 mm</span></div>
  <div class="spec-row"><span class="label">Height</span><span class="value">~85 mm (to enclosure top)</span></div>
  <div class="spec-row"><span class="label">Motors</span><span class="value">4&times; TT DC 3-6V</span></div>
  <div class="spec-row"><span class="label">Material</span><span class="value">Clear acrylic + brass</span></div>
</div>

<div class="toolbar" id="toolbar">
  <button class="tb-btn active" id="tb-labels">Labels</button>
  <button class="tb-btn" id="tb-wireframe">Wire</button>
  <button class="tb-btn" id="tb-explode">Explode</button>
  <button class="tb-btn active" id="tb-autorot">Spin</button>
  <button class="tb-btn" id="tb-reset">Reset</button>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-desc" id="tt-desc"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0b0e);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(350, 200, 350);
camera.lookAt(0, 30, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 30, 0);
controls.minDistance = 100;
controls.maxDistance = 800;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// ─── Lighting ───────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.35);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0xb0c4de, 0x2a1f0e, 0.4);
scene.add(hemi);

const key = new THREE.DirectionalLight(0xfff5e6, 1.2);
key.position.set(200, 300, 200);
key.castShadow = true;
key.shadow.mapSize.width = 2048;
key.shadow.mapSize.height = 2048;
key.shadow.camera.left = -200;
key.shadow.camera.right = 200;
key.shadow.camera.top = 200;
key.shadow.camera.bottom = -200;
key.shadow.bias = -0.0002;
scene.add(key);

const fill = new THREE.DirectionalLight(0xd4e5ff, 0.4);
fill.position.set(-150, 100, -100);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffeedd, 0.3);
rim.position.set(0, 50, -250);
scene.add(rim);

// ─── Ground ─────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a090d,
  roughness: 0.95,
  metalness: 0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -6;
ground.receiveShadow = true;
scene.add(ground);

// Subtle grid
const gridHelper = new THREE.GridHelper(600, 30, 0x1a1a1f, 0x121215);
gridHelper.position.y = -5.9;
scene.add(gridHelper);

// ─── Component Data (from approved 2D diagram) ─────────
// All dimensions in mm. Origin = front-left-bottom of chassis.
// Three.js coords: X = width (left-right), Y = height (up), Z = depth (front-back)
// Chassis is 260mm long (X), 130mm wide (Z), ~85mm tall (Y)

const PARTS = [
  {
    id: 'bottom-plate', name: 'Bottom Acrylic Plate',
    color: 0x5a8fd4, hex: '#5a8fd4',
    desc: '3mm clear acrylic, 260 x 130mm. Motor mounts and standoff holes.',
    build: (g) => {
      const geo = new THREE.BoxGeometry(260, 3, 130);
      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x8ab4e8, roughness: 0.15, metalness: 0,
        transmission: 0.6, thickness: 3, ior: 1.5,
        transparent: true, opacity: 0.7
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(130, 1.5, 0);
      mesh.castShadow = true; mesh.receiveShadow = true;
      g.add(mesh);
      return mesh;
    }
  },
  {
    id: 'top-plate', name: 'Top Acrylic Plate',
    color: 0x5a8fd4, hex: '#5a8fd4',
    desc: '3mm clear acrylic, 155 x 130mm. Pi, motor driver mount here.',
    build: (g) => {
      const geo = new THREE.BoxGeometry(154, 3, 130);
      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x8ab4e8, roughness: 0.15, metalness: 0,
        transmission: 0.6, thickness: 3, ior: 1.5,
        transparent: true, opacity: 0.7
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(5 + 77, 46.5, 0);
      mesh.castShadow = true; mesh.receiveShadow = true;
      g.add(mesh);
      return mesh;
    }
  },
  {
    id: 'sensor-mount', name: 'Sensor Mount Pole (L11)',
    color: 0xd4a833, hex: '#d4a833',
    desc: 'Front mount pole, 3mm to 27mm height. Sensor bar anchor.',
    build: (g) => {
      const h = 27 - 3;
      const geo = new THREE.CylinderGeometry(2.5, 2.5, h, 8);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xd4a833, roughness: 0.3, metalness: 0.8
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(3, 3 + h / 2, 0);
      mesh.castShadow = true;
      g.add(mesh);
      return mesh;
    }
  },
  {
    id: 'sensor-bar', name: 'IR Sensor Bar',
    color: 0xe05555, hex: '#e05555',
    desc: '5-channel IR line tracker. 86mm long, 82mm overhang past front.',
    build: (g) => {
      // PCB bar
      const geo = new THREE.BoxGeometry(86, 5, 20);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e, roughness: 0.6, metalness: 0.1
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(-82 + 43, 29.5, 0);
      mesh.castShadow = true;
      g.add(mesh);

      // IR LEDs (5 small cylinders on bottom)
      const ledGeo = new THREE.CylinderGeometry(1.5, 1.5, 1, 8);
      const ledMat = new THREE.MeshStandardMaterial({
        color: 0xe05555, roughness: 0.4, metalness: 0.2,
        emissive: 0xe05555, emissiveIntensity: 0.3
      });
      for (let i = 0; i < 5; i++) {
        const led = new THREE.Mesh(ledGeo, ledMat);
        led.position.set(-82 + 10 + i * 17, 27, 0);
        g.add(led);
      }
      return mesh;
    }
  },
  {
    id: 'standoff-l7', name: 'Brass Standoff (L7)',
    color: 0xd4a833, hex: '#d4a833',
    desc: 'M3 hex brass standoff, 42mm. Connects plates at x=82.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(3, 3, 42, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xd4a833, roughness: 0.25, metalness: 0.85
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(82, 3 + 21, 30);
      mesh.castShadow = true;
      g.add(mesh);
      // Mirror to other side
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'standoff-l9', name: 'Brass Standoff (L9)',
    color: 0xd4a833, hex: '#d4a833',
    desc: 'M3 hex brass standoff, 42mm. Connects plates at x=140.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(3, 3, 42, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xd4a833, roughness: 0.25, metalness: 0.85
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(140, 3 + 21, 30);
      mesh.castShadow = true;
      g.add(mesh);
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'upper-post-1', name: 'Upper Post (center)',
    color: 0x8855cc, hex: '#8855cc',
    desc: 'Brass post above top plate, 14mm at x=82. Mast mount point.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(2.5, 2.5, 14, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x8855cc, roughness: 0.3, metalness: 0.7
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(82, 48 + 7, 30);
      mesh.castShadow = true;
      g.add(mesh);
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'upper-post-2', name: 'Upper Post (rear)',
    color: 0x8855cc, hex: '#8855cc',
    desc: 'Brass post above top plate, 15mm at x=155.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(2.5, 2.5, 15, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x8855cc, roughness: 0.3, metalness: 0.7
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(155, 48 + 7.5, 30);
      mesh.castShadow = true;
      g.add(mesh);
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'switch-standoff-l', name: 'Switch Standoff (left)',
    color: 0x55bb77, hex: '#55bb77',
    desc: 'Rear enclosure standoff at x=175, 65mm tall.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(3, 3, 65, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x55bb77, roughness: 0.3, metalness: 0.6
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(175, 3 + 32.5, 30);
      mesh.castShadow = true;
      g.add(mesh);
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'switch-standoff-r', name: 'Switch Standoff (right)',
    color: 0x55bb77, hex: '#55bb77',
    desc: 'Rear enclosure standoff at x=258, 65mm tall.',
    build: (g) => {
      const geo = new THREE.CylinderGeometry(3, 3, 65, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x55bb77, roughness: 0.3, metalness: 0.6
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(258, 3 + 32.5, 30);
      mesh.castShadow = true;
      g.add(mesh);
      const m2 = mesh.clone();
      m2.position.z = -30;
      g.add(m2);
      return mesh;
    }
  },
  {
    id: 'switch-top', name: 'Switch Enclosure Top Plate',
    color: 0x55bb77, hex: '#55bb77',
    desc: 'Top base connecting rear standoffs. 85mm wide at y=68.',
    build: (g) => {
      const geo = new THREE.BoxGeometry(85, 3, 70);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x55bb77, roughness: 0.5, metalness: 0.3,
        transparent: true, opacity: 0.8
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(175 + 42.5, 69.5, 0);
      mesh.castShadow = true;
      g.add(mesh);
      return mesh;
    }
  },
  {
    id: 'battery-box', name: 'Battery Box',
    color: 0xcc6633, hex: '#cc6633',
    desc: 'External battery holder, 33 x 44mm. 2x 18650 Li-ion.',
    build: (g) => {
      const geo = new THREE.BoxGeometry(33, 44, 60);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a, roughness: 0.8, metalness: 0.1
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(260 + 16.5, 4 + 22, 0);
      mesh.castShadow = true;
      g.add(mesh);

      // Battery cap detail
      const capGeo = new THREE.BoxGeometry(33, 2, 60);
      const capMat = new THREE.MeshStandardMaterial({
        color: 0xcc6633, roughness: 0.5, metalness: 0.2
      });
      const cap = new THREE.Mesh(capGeo, capMat);
      cap.position.set(260 + 16.5, 4 + 44 + 1, 0);
      g.add(cap);
      return mesh;
    }
  },
  {
    id: 'front-motor-l', name: 'Front Motor (left)',
    color: 0xe8c955, hex: '#e8c955',
    desc: 'TT DC gear motor, yellow gearbox, 3-6V.',
    build: (g) => {
      return buildMotor(g, 30 + 25, 5 + 17.5, 50);
    }
  },
  {
    id: 'front-motor-r', name: 'Front Motor (right)',
    color: 0xe8c955, hex: '#e8c955',
    desc: 'TT DC gear motor, yellow gearbox, 3-6V.',
    build: (g) => {
      return buildMotor(g, 30 + 25, 5 + 17.5, -50);
    }
  },
  {
    id: 'rear-motor-l', name: 'Rear Motor (left)',
    color: 0xe8c955, hex: '#e8c955',
    desc: 'TT DC gear motor, yellow gearbox, 3-6V.',
    build: (g) => {
      return buildMotor(g, 110 + 25, 5 + 17.5, 50);
    }
  },
  {
    id: 'rear-motor-r', name: 'Rear Motor (right)',
    color: 0xe8c955, hex: '#e8c955',
    desc: 'TT DC gear motor, yellow gearbox, 3-6V.',
    build: (g) => {
      return buildMotor(g, 110 + 25, 5 + 17.5, -50);
    }
  }
];

function buildMotor(group, cx, cy, cz) {
  const motorGroup = new THREE.Group();

  // Motor body (gray)
  const bodyGeo = new THREE.BoxGeometry(28, 20, 18);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x555555, roughness: 0.7, metalness: 0.3
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  motorGroup.add(body);

  // Gearbox (yellow)
  const gearGeo = new THREE.BoxGeometry(22, 14, 18);
  const gearMat = new THREE.MeshStandardMaterial({
    color: 0xe8c955, roughness: 0.5, metalness: 0.1
  });
  const gear = new THREE.Mesh(gearGeo, gearMat);
  gear.position.x = -25;
  motorGroup.add(gear);

  // Axle
  const axleGeo = new THREE.CylinderGeometry(2, 2, 10, 8);
  const axleMat = new THREE.MeshStandardMaterial({
    color: 0x999999, roughness: 0.3, metalness: 0.8
  });
  const axle = new THREE.Mesh(axleGeo, axleMat);
  axle.rotation.x = Math.PI / 2;
  axle.position.set(-25, 0, cz > 0 ? 14 : -14);
  motorGroup.add(axle);

  // Wheel
  const wheelGeo = new THREE.CylinderGeometry(32, 32, 12, 24);
  const wheelMat = new THREE.MeshStandardMaterial({
    color: 0x111111, roughness: 0.9, metalness: 0
  });
  const wheel = new THREE.Mesh(wheelGeo, wheelMat);
  wheel.rotation.x = Math.PI / 2;
  wheel.position.set(-25, 0, cz > 0 ? 22 : -22);
  motorGroup.add(wheel);

  // Tire tread ring
  const treadGeo = new THREE.TorusGeometry(32, 3, 8, 24);
  const treadMat = new THREE.MeshStandardMaterial({
    color: 0x222222, roughness: 0.95, metalness: 0
  });
  const tread = new THREE.Mesh(treadGeo, treadMat);
  tread.rotation.x = Math.PI / 2;
  tread.position.copy(wheel.position);
  motorGroup.add(tread);

  motorGroup.position.set(cx, cy, cz);
  motorGroup.castShadow = true;
  group.add(motorGroup);
  return body;
}

// ─── Build All Parts ────────────────────────────────────
const chassisGroup = new THREE.Group();
// Center the chassis so origin is at center
chassisGroup.position.set(-130, 0, 0);
scene.add(chassisGroup);

const partMeshes = {};
const partGroups = {};

document.getElementById('load-fill').style.width = '30%';

PARTS.forEach((p, i) => {
  const mesh = p.build(chassisGroup);
  mesh.userData = { partId: p.id, name: p.name, desc: p.desc, color: p.color };
  partMeshes[p.id] = mesh;
});

document.getElementById('load-fill').style.width = '70%';

// ─── Labels (CSS2DRenderer-like, done manually) ────────
let showLabels = true;
let showWireframe = false;
let exploded = false;
let autoRotate = true;

const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:fixed;inset:0;z-index:5;pointer-events:none;';
document.body.appendChild(labelContainer);

const labelEls = {};
const labelParts = ['bottom-plate','top-plate','sensor-bar','battery-box','switch-top','front-motor-l','rear-motor-l'];

labelParts.forEach(id => {
  const p = PARTS.find(pp => pp.id === id);
  if (!p) return;
  const el = document.createElement('div');
  el.style.cssText = `position:absolute;font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:${p.hex};letter-spacing:0.05em;white-space:nowrap;opacity:0.85;text-shadow:0 0 4px rgba(0,0,0,0.8);transition:opacity 0.3s;`;
  el.textContent = p.name;
  labelContainer.appendChild(el);
  labelEls[id] = el;
});

function updateLabels() {
  Object.entries(labelEls).forEach(([id, el]) => {
    const mesh = partMeshes[id];
    if (!mesh || !showLabels) { el.style.display = 'none'; return; }
    el.style.display = '';
    const pos = new THREE.Vector3();
    mesh.getWorldPosition(pos);
    pos.y += 10;
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = 'translate(-50%, -100%)';
  });
}

// ─── Parts Panel ────────────────────────────────────────
const partsList = document.getElementById('parts-list');
let selectedPart = null;

PARTS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'part-btn';
  btn.dataset.id = p.id;
  btn.innerHTML = `<span class="part-dot" style="background:${p.hex}"></span>${p.name}`;
  btn.onclick = () => {
    selectedPart = selectedPart === p.id ? null : p.id;
    document.querySelectorAll('.part-btn').forEach(b => b.classList.toggle('active', b.dataset.id === selectedPart));
    highlightPart(selectedPart);
  };
  partsList.appendChild(btn);
});

function highlightPart(id) {
  PARTS.forEach(p => {
    const mesh = partMeshes[p.id];
    if (!mesh || !mesh.material) return;
    if (id && p.id !== id) {
      mesh.material.opacity = Math.min(mesh.material.opacity || 1, 0.15);
      mesh.material.transparent = true;
    } else {
      // Restore
      if (p.id === 'bottom-plate' || p.id === 'top-plate') {
        mesh.material.opacity = 0.7;
      } else if (p.id === 'switch-top') {
        mesh.material.opacity = 0.8;
      } else {
        mesh.material.opacity = 1;
        mesh.material.transparent = false;
      }
    }
    mesh.material.needsUpdate = true;
  });
}

// ─── Explode ────────────────────────────────────────────
const explodeOffsets = {
  'top-plate': new THREE.Vector3(0, 30, 0),
  'sensor-mount': new THREE.Vector3(-20, 0, 0),
  'sensor-bar': new THREE.Vector3(-30, 15, 0),
  'switch-top': new THREE.Vector3(0, 25, 0),
  'battery-box': new THREE.Vector3(25, 0, 0),
};

const originalPositions = {};
PARTS.forEach(p => {
  const mesh = partMeshes[p.id];
  if (mesh) originalPositions[p.id] = mesh.position.clone();
});

function toggleExplode() {
  exploded = !exploded;
  PARTS.forEach(p => {
    const mesh = partMeshes[p.id];
    if (!mesh) return;
    const orig = originalPositions[p.id];
    const offset = explodeOffsets[p.id];
    if (orig && offset) {
      const target = exploded ? orig.clone().add(offset) : orig.clone();
      mesh.position.copy(target);
    }
  });
}

// ─── Raycaster ──────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPart = null;
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttDesc = document.getElementById('tt-desc');

const rayTargets = [];
chassisGroup.traverse(child => {
  if (child.isMesh && child.userData.partId) rayTargets.push(child);
});

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(rayTargets);

  if (hits.length > 0) {
    const ud = hits[0].object.userData;
    hoveredPart = ud.partId;
    renderer.domElement.style.cursor = 'pointer';
    ttName.textContent = ud.name;
    ttName.style.color = '#' + ud.color.toString(16).padStart(6, '0');
    ttDesc.textContent = ud.desc;
    tooltip.classList.add('active');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    hoveredPart = null;
    renderer.domElement.style.cursor = 'default';
    tooltip.classList.remove('active');
  }
});

renderer.domElement.addEventListener('click', (e) => {
  if (hoveredPart) {
    selectedPart = selectedPart === hoveredPart ? null : hoveredPart;
    document.querySelectorAll('.part-btn').forEach(b => b.classList.toggle('active', b.dataset.id === selectedPart));
    highlightPart(selectedPart);
  } else {
    selectedPart = null;
    document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
    highlightPart(null);
  }
});

// ─── Toolbar ────────────────────────────────────────────
document.getElementById('tb-labels').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
});

document.getElementById('tb-wireframe').addEventListener('click', function() {
  showWireframe = !showWireframe;
  this.classList.toggle('active', showWireframe);
  chassisGroup.traverse(child => {
    if (child.isMesh && child.material) {
      child.material.wireframe = showWireframe;
    }
  });
});

document.getElementById('tb-explode').addEventListener('click', function() {
  toggleExplode();
  this.classList.toggle('active', exploded);
});

document.getElementById('tb-autorot').addEventListener('click', function() {
  autoRotate = !autoRotate;
  controls.autoRotate = autoRotate;
  this.classList.toggle('active', autoRotate);
});

document.getElementById('tb-reset').addEventListener('click', () => {
  camera.position.set(350, 200, 350);
  controls.target.set(0, 30, 0);
  controls.update();
  if (exploded) { toggleExplode(); document.getElementById('tb-explode').classList.remove('active'); }
  selectedPart = null;
  highlightPart(null);
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
});

// ─── Animation Loop ─────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

// ─── Resize ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Init ───────────────────────────────────────────────
document.getElementById('load-fill').style.width = '100%';
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('title').classList.add('visible');
  document.getElementById('specs').classList.add('visible');
  document.getElementById('parts-panel').classList.add('visible');
  document.getElementById('toolbar').classList.add('visible');
  animate();
}, 400);

</script>
</body>
</html>
