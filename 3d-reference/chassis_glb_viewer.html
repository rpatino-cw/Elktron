<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK-COKOINO 4WD Chassis — GLB Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; color: #e8e6e3; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }
#canvas-container { position: absolute; inset: 0; }
canvas { display: block; }

/* ── Loading overlay ── */
#loading {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0c;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s ease-out;
}
#loading.done { opacity: 0; pointer-events: none; }
#loading h2 { font-size: 14px; font-weight: 500; color: #c9943a; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
.loader-bar { width: 200px; height: 2px; background: rgba(201,148,58,0.15); border-radius: 1px; overflow: hidden; }
.loader-fill { height: 100%; width: 0%; background: #c9943a; border-radius: 1px; transition: width 0.3s; }
#load-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #58554f; margin-top: 10px; }

/* ── Sidebar ── */
#sidebar {
  position: absolute; top: 0; right: 0; width: 320px; height: 100vh;
  background: rgba(10,10,12,0.92); backdrop-filter: blur(12px);
  border-left: 1px solid rgba(201,148,58,0.15);
  overflow-y: auto; z-index: 10; padding: 24px 20px;
  scrollbar-width: thin; scrollbar-color: #333 transparent;
}
#sidebar h1 { font-size: 15px; font-weight: 600; color: #c9943a; margin-bottom: 4px; letter-spacing: 0.5px; }
#sidebar .subtitle { font-size: 10px; color: #78756f; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }

.panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.panel-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: #c9943a; margin-bottom: 10px; }

.ctrl-row { display: flex; gap: 8px; flex-wrap: wrap; }
.ctrl-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 10px;
  background: rgba(201,148,58,0.08); border: 1px solid rgba(201,148,58,0.2);
  color: #c9943a; border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(201,148,58,0.18); }
.ctrl-btn.active { background: rgba(201,148,58,0.25); border-color: #c9943a; }

.stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.stat-key { color: #78756f; }
.stat-val { font-family: 'JetBrains Mono', monospace; color: #c9943a; font-size: 11px; }

/* ── Hover label ── */
.hover-label {
  position: absolute; pointer-events: none; z-index: 20;
  background: rgba(10,10,12,0.88); border: 1px solid rgba(201,148,58,0.4);
  border-radius: 6px; padding: 6px 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c9943a;
  white-space: nowrap; transform: translate(-50%, -100%); margin-top: -12px;
  opacity: 0; transition: opacity 0.15s;
}
.hover-label.visible { opacity: 1; }

/* ── Mesh list ── */
.mesh-item {
  display: flex; align-items: center; gap: 8px; padding: 5px 8px;
  border-radius: 4px; cursor: pointer; transition: background 0.15s; font-size: 11px;
}
.mesh-item:hover { background: rgba(201,148,58,0.08); }
.mesh-item.selected { background: rgba(201,148,58,0.15); }
.mesh-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Header ── */
#header { position: absolute; top: 20px; left: 24px; z-index: 10; }
#header h2 { font-size: 13px; font-weight: 600; color: #c9943a; letter-spacing: 0.5px; }
#header p { font-size: 10px; color: #58554f; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* ── Footer ── */
#footer {
  position: absolute; bottom: 12px; left: 24px; z-index: 10;
  font-size: 10px; color: #3a3836; font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<div id="loading">
  <h2>Loading 3D Model</h2>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div id="load-pct">0%</div>
</div>

<div id="canvas-container"></div>

<div id="header">
  <h2>LK-COKOINO 4WD Chassis</h2>
  <p>Stage 5 — GLB Model &middot; Meshy AI</p>
</div>

<div id="sidebar">
  <h1>CHASSIS 3D</h1>
  <div class="subtitle">GLB Model Viewer &middot; Stage 5</div>

  <div class="panel">
    <div class="panel-title">Controls</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-autorotate">Auto Rotate</button>
      <button class="ctrl-btn" id="btn-wireframe">Wireframe</button>
      <button class="ctrl-btn" id="btn-normals">Normals</button>
      <button class="ctrl-btn" id="btn-reset">Reset Camera</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Model Info</div>
    <div id="model-stats"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Meshes</div>
    <div id="mesh-list" style="max-height: 300px; overflow-y: auto;"></div>
  </div>

  <div class="panel" id="selected-panel" style="display:none;">
    <div class="panel-title">Selected</div>
    <div id="selected-info"></div>
  </div>
</div>

<div class="hover-label" id="hover-label"></div>

<div id="footer">Orbit: drag &middot; Zoom: scroll &middot; Pan: right-drag &middot; Hover for mesh names</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ═══════════════════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 500);
camera.position.set(3, 2.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0.3, 0);

// ── Lighting — 3-point + ambient ──
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.8);
keyLight.position.set(3, 5, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 20;
keyLight.shadow.camera.left = -5;
keyLight.shadow.camera.right = 5;
keyLight.shadow.camera.top = 5;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.bias = -0.0002;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0c4de, 0.6);
fillLight.position.set(-3, 2, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffd700, 0.4);
rimLight.position.set(0, 2, -4);
scene.add(rimLight);

// Subtle warm underlight for dramatic effect
const underLight = new THREE.PointLight(0xc9943a, 0.3, 10);
underLight.position.set(0, -1, 0);
scene.add(underLight);

// ── Ground plane ──
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111113, roughness: 1.0, metalness: 0.0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ── Grid ──
const grid = new THREE.GridHelper(10, 20, 0x1a1a1e, 0x131315);
grid.position.y = 0;
scene.add(grid);

// ── Post-processing ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.2, 0.4, 0.9
);
composer.addPass(bloomPass);

// ═══════════════════════════════════════════════════════════
//  LOAD GLB MODEL
// ═══════════════════════════════════════════════════════════
const loader = new GLTFLoader();
const loaderFill = document.getElementById('loader-fill');
const loadPct = document.getElementById('load-pct');
const loadingEl = document.getElementById('loading');

let modelRoot = null;
const meshList = [];
const originalMaterials = new Map();

loader.load(
  '../glb/Meshy_AI_Modular_robot_car_0315155200_generate.glb',
  (gltf) => {
    modelRoot = gltf.scene;

    // Auto-center and scale to fit view
    const box = new THREE.Box3().setFromObject(modelRoot);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim; // fit within ~2 unit radius

    modelRoot.scale.setScalar(scale);
    modelRoot.position.sub(center.multiplyScalar(scale));
    // Lift so bottom sits on ground
    const scaledBox = new THREE.Box3().setFromObject(modelRoot);
    modelRoot.position.y -= scaledBox.min.y;

    // Enable shadows and collect meshes
    let meshCount = 0, triCount = 0, vertCount = 0;
    modelRoot.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        meshList.push(child);
        originalMaterials.set(child.uuid, child.material);
        meshCount++;
        if (child.geometry.index) {
          triCount += child.geometry.index.count / 3;
        } else if (child.geometry.attributes.position) {
          triCount += child.geometry.attributes.position.count / 3;
        }
        if (child.geometry.attributes.position) {
          vertCount += child.geometry.attributes.position.count;
        }
      }
    });

    scene.add(modelRoot);

    // Update model stats
    const statsEl = document.getElementById('model-stats');
    const sizeInfo = box.getSize(new THREE.Vector3());
    statsEl.innerHTML = `
      <div class="stat-row"><span class="stat-key">Meshes</span><span class="stat-val">${meshCount}</span></div>
      <div class="stat-row"><span class="stat-key">Triangles</span><span class="stat-val">${Math.round(triCount).toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-key">Vertices</span><span class="stat-val">${vertCount.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-key">Original Size</span><span class="stat-val">${sizeInfo.x.toFixed(1)} x ${sizeInfo.y.toFixed(1)} x ${sizeInfo.z.toFixed(1)}</span></div>
      <div class="stat-row"><span class="stat-key">File</span><span class="stat-val">26 MB GLB</span></div>
      <div class="stat-row"><span class="stat-key">Source</span><span class="stat-val">Meshy AI</span></div>
    `;

    // Build mesh list in sidebar
    buildMeshList();

    // Animations
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(modelRoot);
      gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      window._mixer = mixer;
    }

    // Adjust camera to fit model
    const finalBox = new THREE.Box3().setFromObject(modelRoot);
    const finalCenter = finalBox.getCenter(new THREE.Vector3());
    const finalSize = finalBox.getSize(new THREE.Vector3());
    const fov = camera.fov * (Math.PI / 180);
    const dist = Math.max(finalSize.x, finalSize.z) / (2 * Math.tan(fov / 2)) + finalSize.y;
    camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
    controls.target.copy(finalCenter);
    controls.update();

    // Hide loader
    setTimeout(() => loadingEl.classList.add('done'), 300);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      loaderFill.style.width = pct + '%';
      loadPct.textContent = pct + '%';
    }
  },
  (error) => {
    console.error('GLB load failed:', error);
    loadPct.textContent = 'Load failed — serve via HTTP (see console)';
    loadPct.style.color = '#c25050';
    console.info(
      '%cTo serve locally, run from hackathon/:\n  python3 -m http.server 8080\nThen open:\n  http://localhost:8080/3d-reference/chassis_glb_viewer.html',
      'color: #c9943a; font-size: 13px;'
    );
  }
);

// ═══════════════════════════════════════════════════════════
//  INTERACTION — Raycaster + Hover
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const hoverLabel = document.getElementById('hover-label');
let hoveredMesh = null;
let selectedMesh = null;

function onMouseMove(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshList, false);

  // Reset previous
  if (hoveredMesh && hoveredMesh !== selectedMesh) {
    restoreMaterial(hoveredMesh);
    hoveredMesh = null;
    hoverLabel.classList.remove('visible');
  }

  if (hits.length > 0) {
    const hit = hits[0].object;
    if (hit !== hoveredMesh) {
      hoveredMesh = hit;
      if (hit !== selectedMesh) highlightMesh(hit, 0.08);
    }

    // Position label
    const worldPos = hits[0].point.clone();
    worldPos.y += 0.15;
    const screenPos = worldPos.project(camera);
    const x = (screenPos.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * renderer.domElement.clientHeight;

    const name = hit.name || hit.parent?.name || `mesh_${meshList.indexOf(hit)}`;
    hoverLabel.textContent = name;
    hoverLabel.style.left = x + 'px';
    hoverLabel.style.top = y + 'px';
    hoverLabel.classList.add('visible');
    renderer.domElement.style.cursor = 'pointer';
  } else {
    renderer.domElement.style.cursor = 'default';
    hoverLabel.classList.remove('visible');
  }
}

function onClick() {
  if (selectedMesh) {
    restoreMaterial(selectedMesh);
  }
  if (hoveredMesh) {
    selectedMesh = hoveredMesh;
    highlightMesh(selectedMesh, 0.2);
    showSelectedInfo(selectedMesh);
    highlightMeshItem(selectedMesh);
  } else {
    selectedMesh = null;
    document.getElementById('selected-panel').style.display = 'none';
    document.querySelectorAll('.mesh-item.selected').forEach(el => el.classList.remove('selected'));
  }
}

function highlightMesh(mesh, intensity) {
  if (mesh.material) {
    const m = mesh.material.clone();
    m.emissive = new THREE.Color(0xc9943a);
    m.emissiveIntensity = intensity;
    mesh.material = m;
  }
}

function restoreMaterial(mesh) {
  const orig = originalMaterials.get(mesh.uuid);
  if (orig) mesh.material = orig;
}

function showSelectedInfo(mesh) {
  const panel = document.getElementById('selected-panel');
  const info = document.getElementById('selected-info');
  panel.style.display = 'block';

  const name = mesh.name || mesh.parent?.name || 'Unnamed';
  const geo = mesh.geometry;
  const verts = geo.attributes.position ? geo.attributes.position.count : 0;
  const tris = geo.index ? geo.index.count / 3 : verts / 3;
  const box = new THREE.Box3().setFromObject(mesh);
  const size = box.getSize(new THREE.Vector3());

  info.innerHTML = `
    <div class="stat-row"><span class="stat-key">Name</span><span class="stat-val">${name}</span></div>
    <div class="stat-row"><span class="stat-key">Vertices</span><span class="stat-val">${verts.toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-key">Triangles</span><span class="stat-val">${Math.round(tris).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-key">Bounding Box</span><span class="stat-val">${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-key">Material</span><span class="stat-val">${mesh.material?.type || 'none'}</span></div>
  `;
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

// ═══════════════════════════════════════════════════════════
//  SIDEBAR — Mesh List
// ═══════════════════════════════════════════════════════════
function buildMeshList() {
  const listEl = document.getElementById('mesh-list');
  listEl.innerHTML = '';
  const colors = ['#2a7ab5','#b5a642','#c25050','#1a8a4a','#888888','#d4a017','#6a6a6a','#9a5ab5'];

  meshList.forEach((mesh, i) => {
    const name = mesh.name || mesh.parent?.name || `mesh_${i}`;
    const div = document.createElement('div');
    div.className = 'mesh-item';
    div.dataset.index = i;
    div.innerHTML = `
      <span class="mesh-dot" style="background:${colors[i % colors.length]}"></span>
      <span style="flex:1">${name}</span>
    `;
    div.addEventListener('click', () => {
      if (selectedMesh) restoreMaterial(selectedMesh);
      selectedMesh = mesh;
      highlightMesh(mesh, 0.2);
      showSelectedInfo(mesh);
      highlightMeshItem(mesh);
      // Focus camera
      const box = new THREE.Box3().setFromObject(mesh);
      const center = box.getCenter(new THREE.Vector3());
      controls.target.lerp(center, 0.5);
    });
    listEl.appendChild(div);
  });
}

function highlightMeshItem(mesh) {
  const idx = meshList.indexOf(mesh);
  document.querySelectorAll('.mesh-item').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.index) === idx);
  });
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-autorotate').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  controls.autoRotateSpeed = 1.5;
  this.classList.toggle('active', controls.autoRotate);
});

let isWireframe = false;
document.getElementById('btn-wireframe').addEventListener('click', function() {
  isWireframe = !isWireframe;
  this.classList.toggle('active', isWireframe);
  meshList.forEach(mesh => {
    if (mesh.material) {
      const m = mesh.material.clone();
      m.wireframe = isWireframe;
      mesh.material = m;
      originalMaterials.set(mesh.uuid, m);
    }
  });
});

let showNormals = false;
const normalMat = new THREE.MeshNormalMaterial();
document.getElementById('btn-normals').addEventListener('click', function() {
  showNormals = !showNormals;
  this.classList.toggle('active', showNormals);
  meshList.forEach(mesh => {
    if (showNormals) {
      mesh.material = normalMat;
    } else {
      restoreMaterial(mesh);
    }
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!modelRoot) return;
  const box = new THREE.Box3().setFromObject(modelRoot);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const fov = camera.fov * (Math.PI / 180);
  const dist = Math.max(size.x, size.z) / (2 * Math.tan(fov / 2)) + size.y;
  camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
  controls.target.copy(center);
  controls.update();
});

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (window._mixer) window._mixer.update(delta);
  controls.update();
  composer.render();
}

function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloomPass.resolution.set(w, h);
}

window.addEventListener('resize', onResize);
onResize();
animate();
</script>
</body>
</html>
