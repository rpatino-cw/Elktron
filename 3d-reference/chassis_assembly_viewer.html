<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LK-COKOINO 4WD — Assembly Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #08080a; --surface: rgba(255,255,255,0.025); --border: rgba(255,255,255,0.06);
  --gold: #c9943a; --gold-dim: rgba(201,148,58,0.15); --gold-glow: rgba(201,148,58,0.35);
  --text: #e8e6e3; --text-dim: #78756f; --text-muted: #3a3836;
}
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }
#canvas-container { position: absolute; inset: 0; }
canvas { display: block; }

#loading {
  position: fixed; inset: 0; z-index: 100; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1);
}
#loading.done { opacity: 0; pointer-events: none; }
#loading h2 { font-size: 13px; font-weight: 500; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
.loader-bar { width: 200px; height: 2px; background: var(--gold-dim); border-radius: 1px; overflow: hidden; }
.loader-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.3s; }
#load-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 10px; }

#sidebar {
  position: absolute; top: 0; right: 0; width: 340px; height: 100vh;
  background: rgba(8,8,10,0.94); backdrop-filter: blur(16px);
  border-left: 1px solid var(--border); overflow-y: auto; z-index: 10;
  padding: 24px 20px; scrollbar-width: thin; scrollbar-color: #222 transparent;
}
#sidebar h1 { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 2px; letter-spacing: 0.5px; }
.subtitle { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.panel-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gold); margin-bottom: 10px; }

.ctrl-row { display: flex; gap: 6px; flex-wrap: wrap; }
.ctrl-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 5px 10px;
  background: rgba(201,148,58,0.06); border: 1px solid rgba(201,148,58,0.18);
  color: var(--gold); border-radius: 4px; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
}
.ctrl-btn:hover { background: rgba(201,148,58,0.15); }
.ctrl-btn.active { background: rgba(201,148,58,0.25); border-color: var(--gold); }

.slider-wrap { margin-top: 10px; }
.slider-wrap label { font-size: 10px; color: var(--text-dim); display: block; margin-bottom: 4px; }
.slider-wrap input[type=range] {
  width: 100%; height: 3px; -webkit-appearance: none; background: var(--gold-dim);
  border-radius: 2px; outline: none;
}
.slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--gold); cursor: pointer;
}

.mesh-item {
  display: flex; align-items: center; gap: 8px; padding: 5px 8px;
  border-radius: 4px; cursor: pointer; transition: background 0.15s; font-size: 11px;
}
.mesh-item:hover { background: rgba(201,148,58,0.06); }
.mesh-item.active { background: rgba(201,148,58,0.15); }
.mesh-item.isolated { opacity: 0.3; }
.mesh-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.mesh-info { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); margin-left: auto; }

.stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.stat-key { color: var(--text-dim); }
.stat-val { font-family: 'JetBrains Mono', monospace; color: var(--gold); font-size: 11px; }

.hover-label {
  position: absolute; pointer-events: none; z-index: 20;
  background: rgba(8,8,10,0.92); border: 1px solid var(--gold-glow);
  border-radius: 6px; padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--gold);
  white-space: nowrap; transform: translate(-50%, -100%); margin-top: -14px;
  opacity: 0; transition: opacity 0.15s;
}
.hover-label.visible { opacity: 1; }
.hover-label .sub { color: var(--text-dim); font-size: 9px; display: block; margin-top: 2px; }

#header { position: absolute; top: 20px; left: 24px; z-index: 10; }
#header h2 { font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; }
#header p { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

#footer {
  position: absolute; bottom: 12px; left: 24px; z-index: 5;
  font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
}

#selected-panel { display: none; }
</style>
</head>
<body>

<div id="loading">
  <h2>Loading GLB Model</h2>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div id="load-pct">0%</div>
</div>

<div id="canvas-container"></div>

<div id="header">
  <h2>LK-COKOINO 4WD Chassis</h2>
  <p>Assembly Viewer &middot; GLB Exploded View</p>
</div>

<div id="sidebar">
  <h1>ASSEMBLY</h1>
  <div class="subtitle">GLB Model &middot; Exploded View</div>

  <div class="panel">
    <div class="panel-title">Controls</div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-autorotate">Auto Rotate</button>
      <button class="ctrl-btn" id="btn-wireframe">Wireframe</button>
      <button class="ctrl-btn" id="btn-normals">Normals</button>
      <button class="ctrl-btn" id="btn-reset">Reset Camera</button>
      <button class="ctrl-btn" id="btn-showall">Show All</button>
    </div>
    <div class="slider-wrap">
      <label>Explode: <span id="explode-val">0%</span></label>
      <input type="range" id="explode-slider" min="0" max="100" value="0">
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Model Info</div>
    <div id="model-stats"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Parts <span id="mesh-count" style="color:var(--text-dim);font-weight:400"></span></div>
    <div id="mesh-list" style="max-height: 400px; overflow-y: auto;"></div>
  </div>

  <div class="panel" id="selected-panel">
    <div class="panel-title">Selected</div>
    <div id="selected-info"></div>
  </div>
</div>

<div class="hover-label" id="hover-label"></div>

<div id="footer">Orbit: drag &middot; Zoom: scroll &middot; Pan: right-drag &middot; Click mesh to select &middot; Dbl-click to isolate &middot; E = explode &middot; R = reset</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════════
//  SCENE — no post-processing, direct render
// ═══════════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08080a);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
camera.position.set(3, 2.5, 4);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: 'high-performance',
  stencil: false,
  depth: true,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap; // PCF, not PCFSoft — faster
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.rotateSpeed = 0.8;
controls.zoomSpeed = 1.2;
controls.panSpeed = 0.8;
controls.target.set(0, 0.3, 0);

// ── Lighting — 3 lights total (was 4+ambient, removed point light) ──
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.8);
keyLight.position.set(3, 5, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 15;
const sd = 4;
keyLight.shadow.camera.left = -sd;
keyLight.shadow.camera.right = sd;
keyLight.shadow.camera.top = sd;
keyLight.shadow.camera.bottom = -sd;
keyLight.shadow.bias = -0.0003;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0c4de, 0.5);
fillLight.position.set(-3, 2, 3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffd700, 0.35);
rimLight.position.set(0, 2, -4);
scene.add(rimLight);

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshLambertMaterial({ color: 0x111113 }) // Lambert, not Standard
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

scene.add(new THREE.GridHelper(10, 20, 0x1a1a1e, 0x131315));

// ═══════════════════════════════════════════════════════════
//  MATERIAL SYSTEM — zero-clone, pre-built materials
// ═══════════════════════════════════════════════════════════

// Single shared ghost material (reused for ALL ghosted meshes)
const ghostMaterial = new THREE.MeshLambertMaterial({
  color: 0x444444,
  transparent: true,
  opacity: 0.07,
  depthWrite: false,
});

// Single shared normal-viz material
const normalMaterial = new THREE.MeshNormalMaterial();

// Per-mesh highlight state: we modify emissive on the ORIGINAL material
// instead of cloning. This means zero allocations on hover.
const HIGHLIGHT_COLOR = new THREE.Color(0xc9943a);
const NO_EMISSIVE = new THREE.Color(0x000000);

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let modelRoot = null;
const meshEntries = [];    // { mesh, name, origMat, restPos, explodeDir, localDir, tris, verts, sizeStr }
let modelCenter = new THREE.Vector3();

// Interaction state — exactly one of: null, entry
let hoveredEntry = null;
let selectedEntry = null;
let isolatedEntry = null;

// View mode
let viewMode = 'normal';  // 'normal' | 'wireframe' | 'normals'

// Explode
let explodeAmount = 0;
const EXPLODE_MAX = 2.0;

// Pre-allocated math objects for explode (ZERO allocations per frame)
const _explodeWorldOffset = new THREE.Vector3();
const _explodeLocalOffset = new THREE.Vector3();
const _parentRotInverse = new THREE.Matrix4();
const _parentWorldInverse = new THREE.Matrix4();

// Pre-allocated for raycasting
const _raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();
const _projectVec = new THREE.Vector3();

// Cached flat array of meshes for raycaster
let raycastTargets = [];

// DOM refs cached once
const hoverLabel = document.getElementById('hover-label');
const explodeValEl = document.getElementById('explode-val');
const explodeSliderEl = document.getElementById('explode-slider');
const selectedPanelEl = document.getElementById('selected-panel');
const selectedInfoEl = document.getElementById('selected-info');
const meshListEl = document.getElementById('mesh-list');
const loadingEl = document.getElementById('loading');
const loaderFill = document.getElementById('loader-fill');
const loadPct = document.getElementById('load-pct');

const palette = ['#5a8fd4','#e05555','#4ec9b0','#d4a833','#cc6633','#9a5ab5','#4caf50','#b5a642','#c25050','#6688cc'];

// ═══════════════════════════════════════════════════════════
//  LOAD GLB
// ═══════════════════════════════════════════════════════════
new GLTFLoader().load(
  '../glb/Meshy_AI_Modular_robot_car_0315155200_generate.glb',
  (gltf) => {
    modelRoot = gltf.scene;

    // Auto-center and scale
    const box = new THREE.Box3().setFromObject(modelRoot);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim;

    modelRoot.scale.setScalar(scale);
    modelRoot.position.sub(center.multiplyScalar(scale));

    // Lift bottom to ground
    const scaledBox = new THREE.Box3().setFromObject(modelRoot);
    modelRoot.position.y -= scaledBox.min.y;

    scene.add(modelRoot);

    // Force world matrix update before reading positions
    modelRoot.updateMatrixWorld(true);

    // Compute model center
    const finalBox = new THREE.Box3().setFromObject(modelRoot);
    modelCenter = finalBox.getCenter(new THREE.Vector3());

    // Collect meshes — compute everything once
    let totalTris = 0, totalVerts = 0;
    const _mBox = new THREE.Box3();
    const _mCenter = new THREE.Vector3();
    const _mSize = new THREE.Vector3();
    const _dir = new THREE.Vector3();

    modelRoot.traverse(child => {
      if (!child.isMesh) return;

      child.castShadow = true;
      child.receiveShadow = true;

      // Freeze original material reference
      const origMat = child.material;

      _mBox.setFromObject(child);
      _mBox.getCenter(_mCenter);
      _mBox.getSize(_mSize);

      // Explode direction in world space
      _dir.copy(_mCenter).sub(modelCenter);
      if (_dir.lengthSq() < 0.0001) _dir.set(0, 1, 0);
      _dir.normalize();

      // Pre-compute local-space explode direction (avoids matrix inversion per frame)
      const localDir = _dir.clone();
      if (child.parent) {
        _parentWorldInverse.copy(child.parent.matrixWorld).invert();
        _parentRotInverse.extractRotation(_parentWorldInverse);
        localDir.applyMatrix4(_parentRotInverse);
      }

      const geo = child.geometry;
      const verts = geo.attributes.position ? geo.attributes.position.count : 0;
      const tris = geo.index ? Math.floor(geo.index.count / 3) : Math.floor(verts / 3);
      totalTris += tris;
      totalVerts += verts;

      const name = child.name || child.parent?.name || `part_${meshEntries.length}`;
      const sizeStr = `${_mSize.x.toFixed(2)} x ${_mSize.y.toFixed(2)} x ${_mSize.z.toFixed(2)}`;

      meshEntries.push({
        mesh: child,
        name,
        origMat,
        restPos: child.position.clone(),
        explodeDir: _dir.clone(),   // world-space direction
        localDir,                    // parent-local direction (pre-computed)
        tris,
        verts,
        sizeStr,
      });
    });

    // Build raycast target list once
    raycastTargets = meshEntries.map(e => e.mesh);

    // Stats
    document.getElementById('model-stats').innerHTML =
      `<div class="stat-row"><span class="stat-key">Meshes</span><span class="stat-val">${meshEntries.length}</span></div>` +
      `<div class="stat-row"><span class="stat-key">Triangles</span><span class="stat-val">${totalTris.toLocaleString()}</span></div>` +
      `<div class="stat-row"><span class="stat-key">Vertices</span><span class="stat-val">${totalVerts.toLocaleString()}</span></div>` +
      `<div class="stat-row"><span class="stat-key">Source</span><span class="stat-val">Meshy AI GLB</span></div>`;

    document.getElementById('mesh-count').textContent = `(${meshEntries.length})`;
    buildMeshList();

    // Camera fit
    const fCenter = finalBox.getCenter(new THREE.Vector3());
    const fSize = finalBox.getSize(new THREE.Vector3());
    fitCamera(fCenter, fSize);

    setTimeout(() => loadingEl.classList.add('done'), 300);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      loaderFill.style.width = pct + '%';
      loadPct.textContent = pct + '%';
    }
  },
  (error) => {
    console.error('GLB load failed:', error);
    loadPct.textContent = 'Failed — run: python3 -m http.server 8080';
    loadPct.style.color = '#c25050';
  }
);

// ═══════════════════════════════════════════════════════════
//  CAMERA FIT
// ═══════════════════════════════════════════════════════════
let savedCameraPos = new THREE.Vector3(3, 2.5, 4);
let savedTarget = new THREE.Vector3(0, 0.3, 0);

function fitCamera(center, size) {
  const fov = camera.fov * (Math.PI / 180);
  const dist = Math.max(size.x, size.z) / (2 * Math.tan(fov / 2)) + size.y;
  camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
  controls.target.copy(center);
  savedCameraPos.copy(camera.position);
  savedTarget.copy(center);
}

// ═══════════════════════════════════════════════════════════
//  MATERIAL MANAGEMENT — no cloning, emissive-based highlight
// ═══════════════════════════════════════════════════════════

function setHighlight(entry, intensity) {
  if (!entry) return;
  const mat = entry.origMat;
  if (mat.emissive) {
    mat.emissive.copy(intensity > 0 ? HIGHLIGHT_COLOR : NO_EMISSIVE);
    mat.emissiveIntensity = intensity;
  }
}

function clearHighlight(entry) {
  if (!entry) return;
  const mat = entry.origMat;
  if (mat.emissive) {
    mat.emissive.copy(NO_EMISSIVE);
    mat.emissiveIntensity = 0;
  }
}

function applyViewMaterial(entry) {
  // Returns the correct material for current view mode
  if (viewMode === 'normals') return normalMaterial;
  return entry.origMat;
}

// ═══════════════════════════════════════════════════════════
//  EXPLODE — zero allocations, uses pre-computed localDir
// ═══════════════════════════════════════════════════════════

function setExplode(pct) {
  explodeAmount = pct / 100;
  explodeValEl.textContent = pct + '%';
  explodeSliderEl.value = pct;

  const dist = explodeAmount * EXPLODE_MAX;
  for (let i = 0; i < meshEntries.length; i++) {
    const e = meshEntries[i];
    // localDir was pre-computed during load — no matrix ops here
    e.mesh.position.x = e.restPos.x + e.localDir.x * dist;
    e.mesh.position.y = e.restPos.y + e.localDir.y * dist;
    e.mesh.position.z = e.restPos.z + e.localDir.z * dist;
  }
}

// ═══════════════════════════════════════════════════════════
//  INTERACTION — clean state transitions
// ═══════════════════════════════════════════════════════════

// Throttled raycast: runs at most once per frame
let raycastScheduled = false;
let mouseClientX = 0, mouseClientY = 0;

function onPointerMove(e) {
  mouseClientX = e.clientX;
  mouseClientY = e.clientY;
  if (!raycastScheduled) {
    raycastScheduled = true;
    requestAnimationFrame(doRaycast);
  }
}

function doRaycast() {
  raycastScheduled = false;
  if (raycastTargets.length === 0) return;

  const rect = renderer.domElement.getBoundingClientRect();
  _mouse.x = ((mouseClientX - rect.left) / rect.width) * 2 - 1;
  _mouse.y = -((mouseClientY - rect.top) / rect.height) * 2 + 1;

  _raycaster.setFromCamera(_mouse, camera);
  const hits = _raycaster.intersectObjects(raycastTargets, false);

  const hitEntry = hits.length > 0
    ? meshEntries.find(e => e.mesh === hits[0].object)
    : null;

  // Same hover? Skip all work
  if (hitEntry === hoveredEntry) {
    // Still update label position if hovering
    if (hitEntry && hits.length > 0) {
      updateLabelPosition(hits[0].point);
    }
    return;
  }

  // Unhover previous
  if (hoveredEntry && hoveredEntry !== selectedEntry) {
    clearHighlight(hoveredEntry);
  }

  hoveredEntry = hitEntry;

  if (hitEntry) {
    if (hitEntry !== selectedEntry) {
      setHighlight(hitEntry, 0.08);
    }
    // Build label content
    hoverLabel.innerHTML = `${hitEntry.name}<span class="sub">${hitEntry.tris.toLocaleString()} tris &middot; ${hitEntry.sizeStr}</span>`;
    updateLabelPosition(hits[0].point);
    hoverLabel.classList.add('visible');
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoverLabel.classList.remove('visible');
    renderer.domElement.style.cursor = 'default';
  }
}

function updateLabelPosition(worldPoint) {
  _projectVec.copy(worldPoint);
  _projectVec.y += 0.12;
  _projectVec.project(camera);
  const x = (_projectVec.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
  const y = (-_projectVec.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
  hoverLabel.style.left = x + 'px';
  hoverLabel.style.top = y + 'px';
}

function onPointerDown(e) {
  // Ignore if user is dragging (orbit)
  this._downX = e.clientX;
  this._downY = e.clientY;
}

function onPointerUp(e) {
  // Only treat as click if pointer barely moved (not an orbit drag)
  const dx = e.clientX - (this._downX || 0);
  const dy = e.clientY - (this._downY || 0);
  if (dx * dx + dy * dy > 25) return; // 5px threshold

  handleClick();
}

function handleClick() {
  // Deselect previous
  if (selectedEntry) {
    clearHighlight(selectedEntry);
    selectedEntry = null;
    selectedPanelEl.style.display = 'none';
  }

  if (hoveredEntry) {
    selectedEntry = hoveredEntry;
    setHighlight(selectedEntry, 0.2);
    showSelectedInfo(selectedEntry);
    updateSidebarHighlight();
  } else {
    showAllMeshes();
  }
}

function onDblClick() {
  if (!hoveredEntry) return;
  if (isolatedEntry === hoveredEntry) {
    showAllMeshes();
  } else {
    isolatePart(hoveredEntry);
  }
}

// ═══════════════════════════════════════════════════════════
//  ISOLATE / SHOW ALL — no material cloning
// ═══════════════════════════════════════════════════════════

function isolatePart(entry) {
  isolatedEntry = entry;

  for (let i = 0; i < meshEntries.length; i++) {
    const e = meshEntries[i];
    if (e === entry) {
      e.mesh.material = applyViewMaterial(e);
      e.mesh.visible = true;
      clearHighlight(e);
    } else {
      // Use shared ghost material — no cloning
      e.mesh.material = ghostMaterial;
      e.mesh.visible = true;
    }
  }

  updateSidebarHighlight();
}

function showAllMeshes() {
  isolatedEntry = null;
  selectedEntry = null;
  hoveredEntry = null;
  selectedPanelEl.style.display = 'none';

  for (let i = 0; i < meshEntries.length; i++) {
    const e = meshEntries[i];
    e.mesh.material = applyViewMaterial(e);
    e.mesh.visible = true;
    clearHighlight(e);
  }

  updateSidebarHighlight();
}

function showSelectedInfo(entry) {
  selectedPanelEl.style.display = 'block';
  selectedInfoEl.innerHTML =
    `<div class="stat-row"><span class="stat-key">Name</span><span class="stat-val">${entry.name}</span></div>` +
    `<div class="stat-row"><span class="stat-key">Vertices</span><span class="stat-val">${entry.verts.toLocaleString()}</span></div>` +
    `<div class="stat-row"><span class="stat-key">Triangles</span><span class="stat-val">${entry.tris.toLocaleString()}</span></div>` +
    `<div class="stat-row"><span class="stat-key">Size</span><span class="stat-val">${entry.sizeStr}</span></div>` +
    `<div class="stat-row"><span class="stat-key">Material</span><span class="stat-val">${entry.origMat?.type || 'unknown'}</span></div>`;
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════

// Cache sidebar item elements for O(1) updates
let sidebarItems = [];

function buildMeshList() {
  meshListEl.innerHTML = '';
  sidebarItems = [];

  for (let i = 0; i < meshEntries.length; i++) {
    const entry = meshEntries[i];
    const div = document.createElement('div');
    div.className = 'mesh-item';
    div.innerHTML =
      `<span class="mesh-dot" style="background:${palette[i % palette.length]}"></span>` +
      `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${entry.name}">${entry.name}</span>` +
      `<span class="mesh-info">${entry.tris.toLocaleString()}\u25B3</span>`;

    div.addEventListener('click', (e) => {
      e.stopPropagation();
      if (selectedEntry) clearHighlight(selectedEntry);
      selectedEntry = entry;
      setHighlight(entry, 0.2);
      showSelectedInfo(entry);
      updateSidebarHighlight();
    });
    div.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      if (isolatedEntry === entry) showAllMeshes();
      else isolatePart(entry);
    });

    meshListEl.appendChild(div);
    sidebarItems.push(div);
  }
}

function updateSidebarHighlight() {
  for (let i = 0; i < sidebarItems.length; i++) {
    const el = sidebarItems[i];
    const entry = meshEntries[i];
    const isActive = entry === selectedEntry || entry === isolatedEntry;
    const isGhosted = isolatedEntry && entry !== isolatedEntry;
    el.classList.toggle('active', isActive);
    el.classList.toggle('isolated', isGhosted);
  }
}

// ═══════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════

document.getElementById('btn-autorotate').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  controls.autoRotateSpeed = 1.5;
  this.classList.toggle('active', controls.autoRotate);
});

document.getElementById('btn-wireframe').addEventListener('click', function() {
  if (viewMode === 'wireframe') {
    viewMode = 'normal';
    this.classList.remove('active');
  } else {
    viewMode = 'wireframe';
    this.classList.add('active');
    document.getElementById('btn-normals').classList.remove('active');
  }
  // Toggle wireframe on original materials (no clone needed)
  const wf = viewMode === 'wireframe';
  for (let i = 0; i < meshEntries.length; i++) {
    meshEntries[i].origMat.wireframe = wf;
    if (!isolatedEntry || meshEntries[i] === isolatedEntry) {
      meshEntries[i].mesh.material = meshEntries[i].origMat;
    }
  }
});

document.getElementById('btn-normals').addEventListener('click', function() {
  if (viewMode === 'normals') {
    viewMode = 'normal';
    this.classList.remove('active');
  } else {
    viewMode = 'normals';
    this.classList.add('active');
    document.getElementById('btn-wireframe').classList.remove('active');
    // Restore wireframe=false on originals
    for (let i = 0; i < meshEntries.length; i++) {
      meshEntries[i].origMat.wireframe = false;
    }
  }
  for (let i = 0; i < meshEntries.length; i++) {
    const e = meshEntries[i];
    if (!isolatedEntry || e === isolatedEntry) {
      e.mesh.material = applyViewMaterial(e);
    }
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!modelRoot) return;
  showAllMeshes();
  setExplode(0);
  viewMode = 'normal';
  document.getElementById('btn-wireframe').classList.remove('active');
  document.getElementById('btn-normals').classList.remove('active');
  for (let i = 0; i < meshEntries.length; i++) {
    meshEntries[i].origMat.wireframe = false;
  }
  camera.position.copy(savedCameraPos);
  controls.target.copy(savedTarget);
});

document.getElementById('btn-showall').addEventListener('click', showAllMeshes);

explodeSliderEl.addEventListener('input', function() {
  setExplode(parseInt(this.value));
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'e' || e.key === 'E') {
    setExplode(explodeAmount > 0.5 ? 0 : 100);
  } else if (e.key === 'r' || e.key === 'R') {
    document.getElementById('btn-reset').click();
  } else if (e.key === 'Escape') {
    showAllMeshes();
  }
});

// Pointer events on canvas
const canvas = renderer.domElement;
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('dblclick', onDblClick);

// ═══════════════════════════════════════════════════════════
//  RENDER LOOP — continuous, simple, no post-processing
// ═══════════════════════════════════════════════════════════

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

window.addEventListener('resize', onResize);
onResize();
animate();
</script>
</body>
</html>
