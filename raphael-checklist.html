<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raphael's Checklist — Elktron</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #faf8f5;
  --cream: #f5f0ea;
  --sand: #e8dfd4;
  --amber: #d4a574;
  --sky: #7eb8d8;
  --peach: #f0c4a8;
  --dark: #2a2520;
  --dark-mid: #4a4540;
  --dark-soft: #8a8580;
  --green: #6db889;
  --green-light: #e8f5ee;
  --red: #d47474;
  --red-light: #fceaea;
}

body {
  background: var(--white);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* HEADER */
.header {
  padding: 2rem 2rem 1.5rem;
  border-bottom: 1px solid var(--sand);
  position: sticky;
  top: 0;
  background: rgba(250, 248, 245, 0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--dark);
}

.header h1 span { color: var(--amber); }

.role-badge {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sky);
  padding: 0.4rem 1rem;
  border: 1px solid var(--sky);
  border-radius: 100px;
}

.progress-bar-wrap {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--sand);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--green));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--dark-mid);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* QUICK INFO */
.quick-info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--sand);
}

.info-card {
  padding: 1rem 1.2rem;
  border-radius: 12px;
  background: var(--cream);
}

.info-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dark-soft);
  margin-bottom: 0.3rem;
}

.info-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--dark);
}

/* PHASES */
.phases {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem;
}

.phase {
  margin-bottom: 2rem;
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--sand);
}

.phase-number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: white;
  background: var(--amber);
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
}

.phase-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--dark);
}

.phase-date {
  font-size: 0.75rem;
  color: var(--dark-soft);
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

/* TASKS */
.task {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  margin-bottom: 0.35rem;
  transition: background 0.2s ease;
  cursor: pointer;
}

.task:hover { background: var(--cream); }

.task.done { opacity: 0.55; }
.task.done .task-text { text-decoration: line-through; }

.task-check {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border: 2px solid var(--sand);
  border-radius: 6px;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  cursor: pointer;
}

.task.done .task-check {
  background: var(--green);
  border-color: var(--green);
}

.task.done .task-check::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}

.task-content { flex: 1; }

.task-text {
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--dark);
}

.task-note {
  font-size: 0.75rem;
  color: var(--dark-soft);
  margin-top: 0.15rem;
  line-height: 1.4;
}

.task-tag {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 2px;
}

.tag-pair { background: #e8f0f8; color: #4a7da8; }
.tag-solo { background: #f0e8f5; color: #8a6aaa; }
.tag-critical { background: var(--red-light); color: var(--red); }

/* FOOTER */
.footer {
  text-align: center;
  padding: 2rem;
  color: var(--dark-soft);
  font-size: 0.75rem;
  border-top: 1px solid var(--sand);
}

@media (max-width: 600px) {
  .header h1 { font-size: 1.4rem; }
  .phases { padding: 1rem; }
  .task { padding: 0.6rem 0.5rem; }
}

/* ─── THREE.JS CANVAS ─────────────────────────────────── */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
.page-layer { position: relative; z-index: 1; }

@media (prefers-reduced-motion: reduce) {
  #bg-canvas { display: none; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="page-layer">

<div class="header">
  <div class="header-top">
    <h1><span>Raphael's</span> Checklist</h1>
    <div class="role-badge">Escort Bot Co-Pilot</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>
</div>

<div class="quick-info">
  <div class="info-card">
    <div class="info-label">Partner</div>
    <div class="info-value">Alex Murillo</div>
  </div>
  <div class="info-card">
    <div class="info-label">Focus</div>
    <div class="info-value">Escort bot build + floor testing</div>
  </div>
  <div class="info-card">
    <div class="info-label">Demo Day</div>
    <div class="info-value">March 23, 2026</div>
  </div>
  <div class="info-card">
    <div class="info-label">Rule</div>
    <div class="info-value">Stuck >2 hrs? Ask Romeo.</div>
  </div>
</div>

<div class="phases" id="phases"></div>

<div class="footer">
  Elktron Hackathon 2026 — CoreWeave "More. Better. Faster."<br>
  Progress auto-saves to your browser.
</div>

<script>
const PHASES = [
  {

      { id: 'a3', text: 'Confirm your availability March 20–23', note: 'Post in team DM — any conflicts?' },
      { id: 'a4', text: 'Do you have a car? Can you pick up PVC pipe from Home Depot?', note: '1" PVC x 4ft + T-connector. Already in HD cart ($8.09).', tag: 'solo', tagLabel: 'SOLO' },
    ]
  },
  {
    id: 'hardware',
    number: '1',
    title: 'Hardware Intake',
    date: 'March 12–14',
    tasks: [
      { id: 'h1', text: 'Help Alex verify the LK-COKOINO chassis kit contents', note: '4 motors, 4 wheels, chassis plates, screws, standoffs', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'h2', text: 'Verify L298N motor driver boards light up when powered', note: 'Romeo will hand you the 2-pack. Plug 12V, check LED.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'h3', text: 'Verify HC-SR04 ultrasonic sensors (pick 2 best from 7)', note: 'Simple test: hold in front of wall, check if trigger/echo pins work', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'h4', text: 'Label every part with masking tape (write what it is)', note: 'Prevents mix-ups during assembly. Label everything.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'h5', text: 'Set up a "war room" — dedicated table, good lighting, power strips', note: 'Ask Romeo where. Needs space for 2 people + parts.', tag: 'pair', tagLabel: 'WITH ALEX' },
    ]
  },
  {
    id: 'chassis',
    number: '2',
    title: 'Chassis Assembly',
    date: 'March 13–15',
    tasks: [
      { id: 'c1', text: 'Unpack LK-COKOINO kit — lay out ALL parts on table', note: 'Match against the included parts list. Report anything missing.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c2', text: 'Mount 4 motors onto bottom chassis plate', note: 'Use the screws from the kit. Motors face outward.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c3', text: 'Attach 4 wheels to motor shafts', note: 'Press-fit. Make sure they\'re snug and spin freely.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c4', text: 'Assemble chassis layers (bottom + standoffs + top plate)', note: 'Standoffs go between plates. Leave room for L298N + Pi mount.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c5', text: 'Mount L298N motor driver to chassis', note: 'Use standoffs or velcro. Keep it accessible for wiring.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c6', text: 'Mount Raspberry Pi 5 on top plate', note: 'Use standoffs. GPIO pins must be accessible. Active cooler attached.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'c7', text: 'Test: chassis rolls freely on flat surface', note: 'Push it by hand — all 4 wheels should spin, no drag.', tag: 'solo', tagLabel: 'SOLO' },
    ]
  },
  {
    id: 'wiring',
    number: '3',
    title: 'Wiring',
    date: 'March 14–16',
    tasks: [
      { id: 'w1', text: 'Read WIRING.md completely before touching wires', note: 'In escort-bot/WIRING.md — GPIO pin map, L298N diagram, voltage divider', tag: 'critical', tagLabel: 'READ FIRST' },
      { id: 'w2', text: 'Wire motors to L298N (4 motors, 2 channels)', note: 'Left motors → OUT1/OUT2, Right motors → OUT3/OUT4. See WIRING.md.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'w3', text: 'Wire L298N control pins to Pi 5 GPIO', note: 'IN1=GPIO17, IN2=GPIO27, IN3=GPIO22, IN4=GPIO23, ENA=GPIO12, ENB=GPIO13', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'w4', text: 'Build HC-SR04 voltage divider on breadboard', note: '1kΩ + 2kΩ divider on ECHO pin (5V → 3.3V). TRIG=GPIO24, ECHO=GPIO25', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'w5', text: 'Wire HC-SR04 ultrasonic sensor', note: 'VCC=5V, TRIG=GPIO24, ECHO through divider to GPIO25, GND=GND', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'w6', text: 'Connect 18650 battery holder to L298N power input', note: '2x 18650 in series = ~7.4V. Red to 12V, Black to GND on L298N.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'w7', text: 'Connect USB-C power bank to Pi 5', note: 'Separate power: motors run on 18650, Pi runs on power bank.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'w8', text: 'Double-check ALL connections against WIRING.md diagram', note: 'Wrong wiring can fry the Pi. Check twice, power once.', tag: 'critical', tagLabel: 'CRITICAL' },
    ]
  },
  {
    id: 'mast',
    number: '4',
    title: 'Mast & Camera Mount',
    date: 'March 15–17',
    tasks: [
      { id: 'm1', text: 'Cut PVC pipe to ~3.5 ft (adjust for rack height visibility)', note: 'Use a hacksaw or pipe cutter. Sand edges smooth.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'm2', text: 'Attach T-connector to chassis base', note: 'Drill or velcro the T-connector onto the top chassis plate center.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'm3', text: 'Insert mast pipe into T-connector', note: 'Should be snug. Add tape if loose. Must not wobble.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'm4', text: 'Mount Arducam pan-tilt platform at top of mast', note: 'Velcro or zip-tie. Must support camera weight without sagging.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'm5', text: 'Mount Arducam IMX708 camera onto pan-tilt bracket', note: 'Screw mount. Route CSI cable down the inside of PVC pipe.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'm6', text: 'Test: mast stays vertical when bot moves', note: 'Push bot around — mast should not sway more than ~10 degrees.', tag: 'solo', tagLabel: 'SOLO' },
    ]
  },
  {
    id: 'testing',
    number: '5',
    title: 'Software Testing',
    date: 'March 16–19',
    tasks: [
      { id: 't1', text: 'Run test_camera.py — verify person detection works', note: 'SSH into Pi: python3 test_camera.py. Look for "Person detected" in output.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 't2', text: 'Run motors manually — verify all 4 wheels spin correct direction', note: 'python3 -c "from gpiozero import Motor; ..." — see PI-SETUP.md', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 't3', text: 'Run ultrasonic test — verify distance readings', note: 'Should read ~30cm when hand is 30cm away. Accuracy within 2cm.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 't4', text: 'First integrated test: run main.py with all hardware connected', note: 'Stand 2m in front of bot. It should turn toward you and approach.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 't5', text: 'Tuning: adjust Kp (proportional gain) if steering is jerky', note: 'In main.py — start with Kp=0.5, increase if too sluggish, decrease if oscillating.', tag: 'pair', tagLabel: 'WITH ALEX' },

    ]
  },
  {
    id: 'floor',
    number: '6',
    title: 'DC Floor Testing',
    date: 'March 20–22',
    tasks: [
      { id: 'f1', text: 'Bring bot to DC floor for real-world test', note: 'Charge all batteries. Bring laptop for SSH.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'f2', text: 'Test person-following in a real aisle', note: 'Walk slowly. Bot should follow at ~1m distance, stop when you stop.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'f3', text: 'Test SCAN mode — bot should pan camera up/down rack', note: 'Trigger SCAN mode, verify camera sweeps full 42U height.', tag: 'pair', tagLabel: 'WITH ALEX' },
      { id: 'f4', text: 'Note any issues: lighting, reflections, aisle width, floor surface', note: 'Write them down — these feed back into final tuning.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'f5', text: 'Help film the escort bot demo footage (2-3 clips)', note: 'Romeo will direct. You operate the bot or walk as the "vendor."', tag: 'pair', tagLabel: 'WITH ROMEO' },
    ]
  },
  {
    id: 'demo',
    number: '7',
    title: 'Demo Day Prep',
    date: 'March 22–23',
    tasks: [
      { id: 'd1', text: 'Clean up wiring — zip ties, velcro, tuck loose cables', note: 'The bot should look deliberate, not hacked together.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'd2', text: 'Charge ALL batteries to 100% night before', note: '18650s + power bank. Bring chargers as backup.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'd3', text: 'Pack: bot, chargers, laptop, extra cables, tape, tools', note: 'Make a checklist. Nothing worse than forgetting a cable.', tag: 'solo', tagLabel: 'SOLO' },
      { id: 'd4', text: 'Be available as demo support — hold things, reset bot, manage crowd', note: 'Demo day is about smooth execution. Be ready to help.', tag: 'pair', tagLabel: 'WITH TEAM' },
    ]
  }
];

const phaseContainer = document.getElementById('phases');
const STORAGE_KEY = 'raphael-checklist-v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function render() {
  const state = loadState();
  let totalTasks = 0, doneTasks = 0;

  phaseContainer.innerHTML = '';

  PHASES.forEach(phase => {
    const el = document.createElement('div');
    el.className = 'phase';

    let tasksHtml = '';
    phase.tasks.forEach(task => {
      const isDone = state[task.id] || false;
      if (isDone) doneTasks++;
      totalTasks++;

      const tagHtml = task.tag
        ? `<div class="task-tag tag-${task.tag}">${task.tagLabel}</div>`
        : '';

      tasksHtml += `
        <div class="task ${isDone ? 'done' : ''}" data-id="${task.id}">
          <div class="task-check"></div>
          <div class="task-content">
            <div class="task-text">${task.text}</div>
            ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
          </div>
          ${tagHtml}
        </div>
      `;
    });

    el.innerHTML = `
      <div class="phase-header">
        <div class="phase-number">Phase ${phase.number}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-date">${phase.date}</div>
      </div>
      ${tasksHtml}
    `;

    phaseContainer.appendChild(el);
  });

  // Progress
  const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneTasks} / ${totalTasks} (${pct}%)`;

  // Click handlers
  document.querySelectorAll('.task').forEach(taskEl => {
    taskEl.addEventListener('click', () => {
      const id = taskEl.dataset.id;
      const state = loadState();
      state[id] = !state[id];
      saveState(state);
      render();
    });
  });
}

render();
</script>

</div><!-- end .page-layer -->

  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"

</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg-canvas');
if (canvas && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(
    -window.innerWidth / 2, window.innerWidth / 2,
    window.innerHeight / 2, -window.innerHeight / 2, 0.1, 10
  );
  camera.position.z = 1;

  const DOT_COUNT = 350;
  const positions = new Float32Array(DOT_COUNT * 3);
  const phases = new Float32Array(DOT_COUNT);
  for (let i = 0; i < DOT_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * window.innerWidth;
    positions[i * 3 + 1] = (Math.random() - 0.5) * window.innerHeight;
    positions[i * 3 + 2] = 0;
    phases[i] = Math.random() * Math.PI * 2;
  }

  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  dotGeo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

  const dotMat = new THREE.ShaderMaterial({
    transparent: true, depthTest: false,
    uniforms: {
      time: { value: 0 },
      mouse: { value: new THREE.Vector2(9999, 9999) },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      baseColor: { value: new THREE.Color(0x7eb8d8) },
    },
    vertexShader: `
      attribute float phase;
      uniform float time;
      uniform vec2 mouse;
      uniform vec2 resolution;
      varying float vAlpha;
      varying float vGlow;
      void main() {
        vec3 pos = position;
        pos.y += sin(time * 0.4 + phase) * 3.0;
        pos.x += cos(time * 0.3 + phase * 1.3) * 2.0;
        float dist = distance(pos.xy, mouse);
        vGlow = smoothstep(200.0, 0.0, dist);
        vAlpha = 0.07 + sin(time * 0.5 + phase) * 0.03 + vGlow * 0.3;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = 2.0 + vGlow * 3.0;
      }
    `,
    fragmentShader: `
      uniform vec3 baseColor;
      varying float vAlpha;
      varying float vGlow;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float soft = 1.0 - smoothstep(0.2, 0.5, d);
        vec3 col = mix(baseColor, vec3(0.7, 0.75, 0.8), 1.0 - vGlow);
        gl_FragColor = vec4(col, vAlpha * soft);
      }
    `
  });
  scene.add(new THREE.Points(dotGeo, dotMat));

  const LINE_COUNT = 50;
  const linePositions = new Float32Array(LINE_COUNT * 6);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lineMat = new THREE.LineBasicMaterial({ color: 0x7eb8d8, transparent: true, opacity: 0.04, depthTest: false });
  scene.add(new THREE.LineSegments(lineGeo, lineMat));

  function updateLines() {
    const pos = dotGeo.attributes.position.array;
    let idx = 0;
    for (let i = 0; i < DOT_COUNT && idx < LINE_COUNT * 6; i++) {
      for (let j = i + 1; j < DOT_COUNT && idx < LINE_COUNT * 6; j++) {
        const dx = pos[i*3] - pos[j*3], dy = pos[i*3+1] - pos[j*3+1];
        if (Math.sqrt(dx*dx + dy*dy) < 110) {
          linePositions[idx++] = pos[i*3]; linePositions[idx++] = pos[i*3+1]; linePositions[idx++] = 0;
          linePositions[idx++] = pos[j*3]; linePositions[idx++] = pos[j*3+1]; linePositions[idx++] = 0;
        }
      }
    }
    for (let k = idx; k < LINE_COUNT * 6; k++) linePositions[k] = 0;
    lineGeo.attributes.position.needsUpdate = true;
  }

  let mouseX = 9999, mouseY = 9999;
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX - window.innerWidth / 2;
    mouseY = -(e.clientY - window.innerHeight / 2);
  });

  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.left = -w / 2; camera.right = w / 2;
    camera.top = h / 2; camera.bottom = -h / 2;
    camera.updateProjectionMatrix();
    dotMat.uniforms.resolution.value.set(w, h);
  });

  const clock = new THREE.Clock();
  let f = 0;
  (function animate() {
    requestAnimationFrame(animate);
    dotMat.uniforms.time.value = clock.getElapsedTime();
    dotMat.uniforms.mouse.value.set(mouseX, mouseY);
    if (f++ % 4 === 0) updateLines();
    renderer.render(scene, camera);
  })();
}
</script>
</body>
