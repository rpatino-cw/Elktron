<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Elktron — Shopping List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="color-scheme" content="light">
<style>
  :root {
    --bg: #f4f1ec;
    --fg: #1a1a18;
    --muted: #6b6860;
    --accent: #c44b1a;
    --accent-light: #e8d5c4;
    --green: #2d7a3a;
    --green-light: #d4ebd8;
    --green-bg: #edf7ef;
    --yellow: #b8860b;
    --yellow-light: #fdf3d7;
    --border: #d6d1c8;
    --card: #faf8f5;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    padding: 0 0 120px;
    -webkit-tap-highlight-color: transparent;
  }

  /* HEADER */
  header {
    background: var(--fg);
    color: var(--bg);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    will-change: transform;
    contain: layout style;
    transform: translateZ(0);
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .sub {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot-need { background: var(--accent); }
  .dot-done { background: var(--green); }
  .dot-total { background: var(--yellow); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 68px;
    z-index: 99;
    will-change: transform;
    contain: layout style;
    transform: translateZ(0);
    -webkit-overflow-scrolling: touch;
  }
  .filter-btn {
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .filter-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .filter-btn .count {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.6;
  }

  /* STORE BADGE */
  .store-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 16px 8px;
  }
  .store-badge {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--fg);
    color: var(--bg);
  }
  .store-badge.amazon { background: #ff9900; color: #111; }
  .store-badge.homedepot { background: #f96302; color: #fff; }
  .store-badge.owned { background: var(--green); color: #fff; }
  .store-divider .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CATEGORY */
  .category {
    padding: 14px 16px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  /* ITEMS */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid transparent;
    transition: opacity 0.2s ease-out;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    contain: content;
    content-visibility: auto;
    contain-intrinsic-size: auto 80px;
  }
  .item:active {
    background: rgba(0,0,0,0.03);
  }
  .item.checked {
    opacity: 0.45;
  }
  .item.checked .item-name {
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease-out, border-color 0.15s ease-out;
  }
  .item.checked .checkbox {
    background: var(--green);
    border-color: var(--green);
  }
  .checkbox svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    stroke-width: 2.5;
    fill: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .item.checked .checkbox svg {
    opacity: 1;
  }

  .item-content { flex: 1; min-width: 0; }
  .item-top { display: flex; align-items: baseline; gap: 8px; }
  .item-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }
  .item-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    margin-left: auto;
    flex-shrink: 0;
  }
  .item-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }
  .item-tags {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-high { background: #fde8e0; color: var(--accent); }
  .tag-medium { background: var(--yellow-light); color: var(--yellow); }
  .tag-low { background: #e8e6e1; color: var(--muted); }
  .tag-ordered { background: var(--green-bg); color: var(--green); }
  .tag-owned { background: var(--green-light); color: var(--green); }

  .item-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    color: #2563eb;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .item-link:hover { border-bottom-color: #2563eb; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--fg);
    color: var(--bg);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    will-change: transform;
    contain: layout style;
    transform: translateZ(0);
  }
  .bottom-left {
    font-size: 12px;
  }
  .bottom-left .amount {
    font-size: 18px;
    font-weight: 700;
    color: #ff9900;
  }
  .bottom-right {
    display: flex;
    gap: 8px;
  }
  .btn {
    font-size: 11px;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: transparent;
    color: var(--bg);
    cursor: pointer;
    transition: background 0.15s ease-out;
  }
  .btn:active { background: rgba(255,255,255,0.1); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 12px 16px 0;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease-out;
  }
  .progress-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  @media (min-width: 600px) {
    body { max-width: 540px; margin: 0 auto; }
    header, .filters { border-radius: 0; }
  }
</style>
</head>
<body>

<header>
  <h1>Elktron Escort Bot</h1>
  <div class="sub">Shopping List &mdash; Demo March 23</div>
  <div class="header-stats">
    <div class="stat"><div class="dot dot-need"></div><span id="needCount">0</span> to buy</div>
    <div class="stat"><div class="dot dot-done"></div><span id="doneCount">0</span> ordered/owned</div>
    <div class="stat"><div class="dot dot-total"></div>$<span id="totalRemaining">0</span> left</div>
  </div>
</header>

<div class="filters" id="filters"></div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div id="list"></div>

<div class="bottom-bar">
  <div class="bottom-left">
    <div style="font-size:10px;opacity:0.5">REMAINING</div>
    <div class="amount">$<span id="bottomTotal">0</span></div>
  </div>
  <div class="bottom-right">
    <button class="btn" onclick="resetAll()">Reset</button>
    <button class="btn" onclick="copyList()">Copy List</button>
    <button class="btn btn-accent" onclick="shareList()">Share</button>
  </div>
</div>

<script>
const ITEMS = [
  // ===== OWNED / DELIVERED =====
  { name: "Raspberry Pi 5 (8GB)", price: 0, category: "Compute", store: "owned", status: "owned", priority: "done",
    detail: "Main compute. Runs YOLOv8n at ~20 FPS." },
  { name: "Raspberry Pi 4 (backup)", price: 0, category: "Compute", store: "owned", status: "owned", priority: "done",
    detail: "Backup if Pi 5 has issues." },
  { name: "MicroSD card", price: 0, category: "Compute", store: "owned", status: "owned", priority: "done",
    detail: "Flash with Raspberry Pi OS Bookworm Lite 64-bit." },
  { name: "Pi 5 Active Cooler (Official)", price: 0, category: "Compute", store: "owned", status: "owned", priority: "done",
    detail: "PWM blower + heatsink + thermal tape. DELIVERED 3/11.",
    link: "https://www.raspberrypi.com/products/active-cooler/" },
  { name: "Laptop (Mac M-series)", price: 0, category: "Shared", store: "owned", status: "owned", priority: "done",
    detail: "Training + demo display." },

  // ===== ORDERED — ARRIVING =====
  { name: "LK-COKOINO 4WD Chassis Kit", price: 26.99, category: "Chassis", store: "amazon", status: "ordered", priority: "done",
    detail: "Raphael ordering. Bare chassis: acrylic frame, 4x TT motors, 4x wheels, battery holder, standoffs. NO motor driver, NO sensors.",
    link: "https://www.amazon.com/Arduino-LK-COKOINO-Raspberry-Building/dp/B0B5JPJ9R4",
    arrival: "Raphael bringing" },
  { name: "L298N Motor Driver (2-pack)", price: 9.99, category: "Motor Control", store: "amazon", status: "ordered", priority: "done",
    detail: "WWZMDiB dual H-Bridge. GPIO 17/27 (left), 22/23 (right). Have a spare.",
    arrival: "3/12" },
  { name: "HC-SR04 Ultrasonic (DIYables 2-pack)", price: 6.99, category: "Sensors", store: "amazon", status: "ordered", priority: "done",
    detail: "ECHO pin is 5V — NEEDS voltage divider (1k + 2k resistors).",
    arrival: "3/12" },
  { name: "HC-SR04 Ultrasonic (ELEGOO 5-pack)", price: 9.99, category: "Sensors", store: "amazon", status: "ordered", priority: "done",
    detail: "Spares. Same 5V ECHO warning.",
    arrival: "3/14" },
  { name: "Arducam Camera Module 3 Wide (IMX708)", price: 29.99, category: "Vision", store: "amazon", status: "ordered", priority: "done",
    detail: "120° wide-angle, autofocus, Pi 5 compatible. Includes 15-22 pin FFC + acrylic case.",
    arrival: "Sat 3/15" },
  { name: "Arducam Pan/Tilt Platform", price: 12.99, category: "Vision", store: "amazon", status: "ordered", priority: "done",
    detail: "2x MG90S servos. Pan GPIO 12, Tilt GPIO 13.",
    arrival: "3/12" },
  { name: "18650 Batteries (4-pack)", price: 33.86, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "QOJH 3.7V 3000mAh, button top, protected. 2 in bot + 2 hot-swap spares.",
    arrival: "Sat 3/15" },
  { name: "18650 Dual-Slot Charger", price: 0, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "ACEBOTT smart charger. CHARGE NIGHT BEFORE DEMO (4 hours).",
    arrival: "Sat 3/15" },
  { name: "18650 Battery Holder Bundle (8-pack)", price: 7.99, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "QTEATAK 1/2/3/4 slot holders, 2 of each. Flexibility if chassis holder breaks.",
    arrival: "3/12" },
  { name: "Anker PowerCore 10K (USB-C)", price: 22.00, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "5V/3A USB-C. Powers Pi 5. ~3-4 hours runtime under CV load.",
    link: "https://www.amazon.com/Anker-Travel-Ready-Technology-High-Speed-Output%EF%BC%89%EF%BC%891pack/dp/B0D5CLSMFB",
    arrival: "Fri 3/14" },
  { name: "USB-C Right-Angle Adapter (2-pack)", price: 9.11, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "Silkland 90° adapter. Keeps cable flush on chassis.",
    arrival: "3/12" },
  { name: "CanaKit 3.5A Pi Power Supply + PiSwitch", price: 13.93, category: "Power", store: "amazon", status: "ordered", priority: "done",
    detail: "Wall adapter with on/off switch. FOR BENCH TESTING ONLY — not portable.",
    arrival: "3/12" },

  // ===== NEED TO BUY — AMAZON =====
  { name: "Jumper Wires M-F x20 (20cm)", price: 5, category: "Wiring", store: "amazon", status: "need", priority: "high",
    detail: "GPIO → L298N (4), HC-SR04 (4), common GND (1), spares (11).",
    link: "https://www.amazon.com/s?k=female+to+male+jumper+wires+20cm" },
  { name: "Jumper Wires M-M x10 (20cm)", price: 3, category: "Wiring", store: "amazon", status: "need", priority: "high",
    detail: "Breadboard connections, voltage divider, motor leads.",
    link: "https://www.amazon.com/s?k=male+to+male+jumper+wires+20cm" },
  { name: "Short USB-C Cable (6-12 inches)", price: 5, category: "Wiring", store: "amazon", status: "need", priority: "high",
    detail: "Power bank → right-angle adapter → Pi. Must support 5V/3A. SHORT so it doesn't flop on chassis.",
    link: "https://www.amazon.com/s?k=short+usb+c+cable+6+inch" },
  { name: "Resistor Assortment Kit", price: 3, category: "Voltage Divider", store: "amazon", status: "need", priority: "high",
    detail: "MUST include 1kOhm + 2kOhm. For HC-SR04 ECHO pin 5V→3.3V divider. WITHOUT THIS YOU WILL FRY GPIO 24.",
    link: "https://www.amazon.com/s?k=resistor+assortment+kit+1k+2k" },
  { name: "Half-Size Breadboard (400 pts)", price: 4, category: "Prototyping", store: "amazon", status: "need", priority: "high",
    detail: "Mounts voltage divider circuit. Half-size fits on chassis.",
    link: "https://www.amazon.com/s?k=half+size+breadboard+400" },
  { name: "Second USB-C Power Bank (backup)", price: 22, category: "Power", store: "amazon", status: "need", priority: "medium",
    detail: "Same Anker 10K. Demo is 2-5pm (3 hours). One bank might not last. Swap takes 10 seconds.",
    link: "https://www.amazon.com/Anker-Travel-Ready-Technology-High-Speed-Output%EF%BC%89%EF%BC%891pack/dp/B0D5CLSMFB" },
  { name: "Velcro Cable Ties (50-pack)", price: 5, category: "Mounting", store: "amazon", status: "need", priority: "medium",
    detail: "Strap power bank, battery holder, wires along mast, breadboard to chassis.",
    link: "https://www.amazon.com/s?k=reusable+velcro+cable+ties" },
  { name: "Double-Sided Foam Tape (3M)", price: 5, category: "Mounting", store: "amazon", status: "need", priority: "medium",
    detail: "Mount L298N + breadboard to chassis. Dampen vibration under Pi.",
    link: "https://www.amazon.com/s?k=3m+double+sided+foam+tape" },
  { name: "Rubber Bumper Pads (20-pack)", price: 3, category: "Mounting", store: "amazon", status: "need", priority: "medium",
    detail: "Self-adhesive. All 4 chassis corners — protects acrylic when bot bumps racks.",
    link: "https://www.amazon.com/s?k=self+adhesive+rubber+bumper+pads" },
  { name: "Electrical Tape (1 roll)", price: 3, category: "Insulation", store: "amazon", status: "need", priority: "medium",
    detail: "Insulate solder joints, tape wires, color-mark GPIO leads.",
    link: "https://www.amazon.com/s?k=electrical+tape+black" },
  { name: "Heat Shrink Tubing Assortment", price: 5, category: "Insulation", store: "amazon", status: "need", priority: "medium",
    detail: "Voltage divider solder joints, motor wire splices. Needs lighter to shrink.",
    link: "https://www.amazon.com/s?k=heat+shrink+tubing+assortment" },
  { name: "Ethernet Cable (Cat5e/6, 6ft)", price: 5, category: "Shared", store: "amazon", status: "need", priority: "medium",
    detail: "SSH into Pi from laptop. Faster + more reliable than WiFi for dev.",
    link: "https://www.amazon.com/s?k=ethernet+cable+6ft+cat6" },

  // ===== NEED TO BUY — HOME DEPOT =====
  { name: "1\" Schedule 40 PVC Pipe (3-4 ft)", price: 3, category: "Mast", store: "homedepot", status: "need", priority: "high",
    detail: "Raises camera from 4\" to 36-48\" (mid-rack height). Free cuts at Home Depot. WITHOUT THIS, RACK SCANS ARE USELESS." },
  { name: "1\" PVC T-Connector x1", price: 1, category: "Mast", store: "homedepot", status: "need", priority: "high",
    detail: "Mounts pipe vertically. Horizontal arm bolts to chassis frame." },
  { name: "1\" PVC 90° Elbow x1", price: 1, category: "Mast", store: "homedepot", status: "need", priority: "high",
    detail: "Top of mast — angles camera toward rack face. Pan/tilt mounts here." },
  { name: "1\" PVC End Cap x1", price: 0.50, category: "Mast", store: "homedepot", status: "need", priority: "low",
    detail: "Bottom of T-connector. Optional extra stability." },
  { name: "PVC Cement (small can)", price: 4, category: "Mast", store: "homedepot", status: "need", priority: "low",
    detail: "Glues fittings permanently. OR skip and use friction fit + zip ties." },
  { name: "Hose Clamps x2 (1\" diameter)", price: 2, category: "Mast", store: "homedepot", status: "need", priority: "high",
    detail: "Secures T-connector to acrylic chassis frame. Alt: heavy-duty zip ties." },
];

// ===== STATE =====
let checkedItems = JSON.parse(localStorage.getItem('fc-shopping') || '{}');
let activeFilter = 'all';

// ===== RENDER =====
function render() {
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';

  // Group by store, then category
  const stores = ['amazon', 'homedepot', 'owned'];
  const storeLabels = { amazon: 'Amazon', homedepot: 'Home Depot', owned: 'Owned / Delivered' };

  let filtered = ITEMS;
  if (activeFilter === 'need') filtered = ITEMS.filter(i => i.status === 'need');
  else if (activeFilter === 'ordered') filtered = ITEMS.filter(i => i.status === 'ordered');
  else if (activeFilter === 'owned') filtered = ITEMS.filter(i => i.status === 'owned');
  else if (activeFilter === 'high') filtered = ITEMS.filter(i => i.priority === 'high');
  else if (activeFilter === 'amazon') filtered = ITEMS.filter(i => i.store === 'amazon' && i.status === 'need');
  else if (activeFilter === 'homedepot') filtered = ITEMS.filter(i => i.store === 'homedepot' && i.status === 'need');

  for (const store of stores) {
    const storeItems = filtered.filter(i => i.store === store);
    if (storeItems.length === 0) continue;

    // Store header
    const divider = document.createElement('div');
    divider.className = 'store-divider';
    divider.innerHTML = `<span class="store-badge ${store}">${storeLabels[store]}</span><div class="line"></div>`;
    listEl.appendChild(divider);

    // Group by category
    const cats = [...new Set(storeItems.map(i => i.category))];
    for (const cat of cats) {
      const catEl = document.createElement('div');
      catEl.className = 'category';
      catEl.textContent = cat;
      listEl.appendChild(catEl);

      const catItems = storeItems.filter(i => i.category === cat);
      for (const item of catItems) {
        const idx = ITEMS.indexOf(item);
        const isChecked = checkedItems[idx] || item.status === 'owned' || item.status === 'ordered';

        const el = document.createElement('div');
        el.className = 'item' + (isChecked ? ' checked' : '');
        el.dataset.idx = idx;

        let tags = '';
        if (item.status === 'ordered') tags += `<span class="tag tag-ordered">ORDERED${item.arrival ? ' — ' + item.arrival : ''}</span>`;
        else if (item.status === 'owned') tags += `<span class="tag tag-owned">OWNED</span>`;
        else if (item.priority === 'high') tags += `<span class="tag tag-high">HIGH PRIORITY</span>`;
        else if (item.priority === 'medium') tags += `<span class="tag tag-medium">MEDIUM</span>`;
        else if (item.priority === 'low') tags += `<span class="tag tag-low">OPTIONAL</span>`;

        let linkHtml = '';
        if (item.link) {
          linkHtml = `<a class="item-link" href="${item.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open on ${item.store === 'amazon' ? 'Amazon' : 'web'} &rarr;</a>`;
        }

        el.innerHTML = `
          <div class="checkbox">
            <svg viewBox="0 0 14 14"><polyline points="2.5 7 5.5 10.5 11.5 3.5"/></svg>
          </div>
          <div class="item-content">
            <div class="item-top">
              <span class="item-name">${item.name}</span>
              ${item.price > 0 ? `<span class="item-price">$${item.price.toFixed(2)}</span>` : ''}
            </div>
            <div class="item-detail">${item.detail}</div>
            <div class="item-tags">${tags}</div>
            ${linkHtml}
          </div>
        `;
        listEl.appendChild(el);
      }
    }
  }

  updateStats();
}

// Event delegation — single listener on list container
document.getElementById('list').addEventListener('click', (e) => {
  const item = e.target.closest('.item');
  if (!item) return;
  // Don't toggle when clicking links
  if (e.target.closest('.item-link')) return;
  const idx = parseInt(item.dataset.idx, 10);
  if (isNaN(idx)) return;

  checkedItems[idx] = !checkedItems[idx];
  // Toggle class directly — no DOM rebuild
  item.classList.toggle('checked', checkedItems[idx] || ITEMS[idx].status === 'owned' || ITEMS[idx].status === 'ordered');
  localStorage.setItem('fc-shopping', JSON.stringify(checkedItems));
  updateStats();
});

function updateStats() {
  const needItems = ITEMS.filter(i => i.status === 'need');
  const doneItems = ITEMS.filter(i => i.status === 'ordered' || i.status === 'owned');
  const checkedNeed = needItems.filter((item, i) => checkedItems[ITEMS.indexOf(item)]);

  const totalNeed = needItems.length - checkedNeed.length;
  const totalDone = doneItems.length + checkedNeed.length;
  const remaining = needItems.filter(item => !checkedItems[ITEMS.indexOf(item)]).reduce((s, i) => s + i.price, 0);

  document.getElementById('needCount').textContent = totalNeed;
  document.getElementById('doneCount').textContent = totalDone;
  document.getElementById('totalRemaining').textContent = remaining.toFixed(0);
  document.getElementById('bottomTotal').textContent = remaining.toFixed(0);

  const pct = Math.round((totalDone / ITEMS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${totalDone}/${ITEMS.length} items secured (${pct}%)`;
}

// ===== FILTERS =====
function renderFilters() {
  const needCount = ITEMS.filter(i => i.status === 'need').length;
  const orderedCount = ITEMS.filter(i => i.status === 'ordered').length;
  const highCount = ITEMS.filter(i => i.priority === 'high' && i.status === 'need').length;
  const amzCount = ITEMS.filter(i => i.store === 'amazon' && i.status === 'need').length;
  const hdCount = ITEMS.filter(i => i.store === 'homedepot' && i.status === 'need').length;

  const filters = [
    { id: 'all', label: 'All', count: ITEMS.length },
    { id: 'need', label: 'Need', count: needCount },
    { id: 'high', label: 'High Priority', count: highCount },
    { id: 'amazon', label: 'Amazon', count: amzCount },
    { id: 'homedepot', label: 'Home Depot', count: hdCount },
    { id: 'ordered', label: 'Ordered', count: orderedCount },
  ];

  const el = document.getElementById('filters');
  el.innerHTML = filters.map(f =>
    `<button class="filter-btn ${f.id === activeFilter ? 'active' : ''}" onclick="setFilter('${f.id}')">${f.label}<span class="count">${f.count}</span></button>`
  ).join('');
}

function setFilter(id) {
  activeFilter = id;
  renderFilters();
  render();
}

// ===== ACTIONS =====
function resetAll() {
  if (confirm('Reset all checkboxes?')) {
    checkedItems = {};
    localStorage.setItem('fc-shopping', '{}');
    render();
  }
}

function copyList() {
  const needItems = ITEMS.filter(i => i.status === 'need' && !checkedItems[ITEMS.indexOf(i)]);
  const text = "ESCORT BOT — SHOPPING LIST\n" +
    "========================\n\n" +
    needItems.map(i => `[ ] ${i.name} — $${i.price.toFixed(2)} (${i.store === 'amazon' ? 'Amazon' : 'Home Depot'})\n    ${i.detail}`).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn:nth-child(2)');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function shareList() {
  const needItems = ITEMS.filter(i => i.status === 'need' && !checkedItems[ITEMS.indexOf(i)]);
  const total = needItems.reduce((s, i) => s + i.price, 0);
  const text = `Elktron Escort Bot — ${needItems.length} items left ($${total.toFixed(0)})\n\n` +
    needItems.map(i => `- ${i.name} $${i.price.toFixed(2)}`).join('\n');

  if (navigator.share) {
    navigator.share({ title: 'Elktron Shopping List', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('List copied to clipboard'));
  }
}

// ===== INIT =====
renderFilters();
render();
</script>
</body>
</html>
