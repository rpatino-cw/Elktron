<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    /* ---- Layout ---- */
    body { background: var(--bg-primary); overflow-x: hidden; }

    .page-wrapper {
      padding-top: var(--nav-height);
    }

    /* ---- Nav overrides ---- */
    .fc-nav-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
    }

    /* ---- Breadcrumb ---- */
    .breadcrumb-bar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-8);
      border-bottom: 1px solid var(--border-subtle);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
    .breadcrumb-bar span { color: var(--text-tertiary); }
    .breadcrumb-bar .current { color: var(--accent-primary); font-weight: var(--weight-semibold); }

    /* ---- Stats bar ---- */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      padding: var(--space-4) var(--space-8);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .stat-count {
      font-family: var(--font-mono);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
    }
    .stat-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-round);
      flex-shrink: 0;
    }

    /* ---- Search ---- */
    .search-bar {
      padding: var(--space-4) var(--space-8);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .search-bar input {
      max-width: 400px;
    }
    .search-results-count {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-family: var(--font-mono);
    }
    .search-clear {
      font-size: var(--text-xs);
      color: var(--accent-primary);
      cursor: pointer;
      font-weight: var(--weight-semibold);
      display: none;
    }
    .search-clear:hover { color: var(--accent-primary-hover); }

    /* ---- Legend ---- */
    .legend-bar {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-3) var(--space-8);
      border-bottom: 1px solid var(--border-subtle);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ---- Tree container ---- */
    .tree-container {
      padding: var(--space-6) var(--space-4);
      overflow: auto;
      min-height: calc(100vh - 240px);
    }

    /* ---- D3 Tree Styles ---- */
    .node-group { cursor: pointer; }

    .node-circle {
      stroke-width: 2px;
      transition: r 0.15s var(--ease-out);
    }
    .node-group:hover .node-circle {
      r: 7;
    }

    .node-label {
      font-family: var(--font-mono);
      font-size: 12px;
      fill: var(--text-primary);
    }
    .node-label-desc {
      font-family: var(--font-sans);
      font-size: 10px;
      fill: var(--text-tertiary);
    }
    .node-count {
      font-family: var(--font-mono);
      font-size: 9px;
      fill: var(--text-tertiary);
    }

    .link {
      fill: none;
      stroke: var(--border-default);
      stroke-width: 1.2px;
    }

    /* ---- Tooltip ---- */
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: var(--space-3) var(--space-4);
      box-shadow: var(--shadow-lg);
      z-index: var(--z-overlay);
      max-width: 320px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip-name {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      margin-bottom: 2px;

    .tooltip-desc {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .tooltip-meta {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      margin-top: 4px;
      font-family: var(--font-mono);
    }

    /* ---- Highlight matched nodes ---- */
    .node-match .node-label {
      font-weight: 700;
      fill: var(--accent-primary);
    }
    .node-dimmed .node-label,
    .node-dimmed .node-label-desc,

    }

    }

    }

      gap: var(--space-2);

      .breadcrumb-bar { padding: var(--space-3) var(--space-4); }
      .tree-container { padding: var(--space-4) var(--space-2); }
    }

</head>

// ============================================================
// COLOR MAP
// ============================================================
const typeColors = {
  folder:  "#2741E7",
  py:      "#16a34a",
  html:    "#e07020",
  threejs: "#e07020",
  md:      "#7c3aed",
  asset:   "#9ca3af"
};

function nodeColor(d) { return typeColors[d.data.type] || "#9ca3af"; }

// ============================================================
// STATS
// ============================================================
function computeStats(node) {
  let folders = 0, files = 0, py = 0, html = 0, md = 0, threejs = 0;
  function walk(n) {
    if (n.type === "folder") { folders++; if (n.children) n.children.forEach(walk); }
    else {
      files++;
      if (n.type === "py") py++;
      else if (n.type === "html") html++;
      else if (n.type === "threejs") { html++; threejs++; }
      else if (n.type === "md") md++;
    }
  }
  walk(node);
  return { folders, files, py, html, md, threejs };
}

function renderStats() {
  const s = computeStats(treeData);
  const bar = document.getElementById("statsBar");
  const items = [
    { color: "#2741E7", count: s.folders, label: "Folders" },
    { color: "#9ca3af", count: s.files, label: "Files" },
    { color: "#16a34a", count: s.py, label: "Python" },
    { color: "#e07020", count: s.html, label: "HTML" },
    { color: "#e07020", count: s.threejs, label: "Three.js" },
    { color: "#7c3aed", count: s.md, label: "Markdown" },
  ];
  bar.innerHTML = items.map(i => `
    <div class="stat-item">
      <div class="stat-dot" style="background:${i.color}"></div>
      <span class="stat-count">${i.count}</span>
      <span class="stat-label">${i.label}</span>
    </div>
  `).join("");
}
renderStats();

// ============================================================
// COUNT CHILDREN PER FOLDER
// ============================================================
function countDescendants(node) {
  if (!node.children) return 0;
  let count = 0;
  function walk(n) {
    if (n.children) n.children.forEach(c => { count++; walk(c); });
  }
  walk(node);
  return count;
}

// ============================================================
// D3 TREE
// ============================================================
const margin = { top: 20, right: 200, bottom: 20, left: 40 };
const nodeHeight = 26;

const svg = d3.select("#treeSvg");
const gLinks = svg.append("g").attr("class", "links-group");
const gNodes = svg.append("g").attr("class", "nodes-group");

const root = d3.hierarchy(treeData);

// Start with top-level folders expanded, deeper ones collapsed
root.descendants().forEach(d => {
  if (d.depth > 1 && d.children) {
    d._children = d.children;
    d.children = null;
  }
});

const tooltip = document.getElementById("tooltip");
const tooltipName = document.getElementById("tooltipName");
const tooltipDesc = document.getElementById("tooltipDesc");
const tooltipMeta = document.getElementById("tooltipMeta");

let i = 0;
const duration = 400;

function update(source) {
  // Recompute tree layout
  const nodes = root.descendants();
  const links = root.links();

  // Assign y positions (vertical layout — each node gets a row)
  let index = 0;
  root.eachBefore(d => {
    d.x = index * nodeHeight;
    d.y = d.depth * 220;
    index++;
  });

  const height = (index + 1) * nodeHeight + margin.top + margin.bottom;
  const maxY = d3.max(nodes, d => d.y) || 0;
  const width = maxY + margin.left + margin.right + 300;

  svg
    .transition().duration(duration)
    .attr("width", width)
    .attr("height", height)
    .attr("viewBox", `0 0 ${width} ${height}`);

  // ---- LINKS ----
  const link = gLinks.selectAll("path.link").data(links, d => d.target.data.name + d.target.depth);

  const linkEnter = link.enter()
    .append("path")
    .attr("class", "link")
    .attr("d", () => {
      const o = { x: source.x0 ?? source.x, y: source.y0 ?? source.y };
      return diagonal({ source: o, target: o });
    });

  link.merge(linkEnter)
    .transition().duration(duration)
    .attr("d", d => diagonal(d));

  link.exit()
    .transition().duration(duration)
    .attr("d", () => {
      const o = { x: source.x, y: source.y };
      return diagonal({ source: o, target: o });
    })
    .remove();

  // ---- NODES ----
  const node = gNodes.selectAll("g.node-group").data(nodes, d => d.id || (d.id = ++i));

  const nodeEnter = node.enter()
    .append("g")
    .attr("class", "node-group")
    .attr("transform", `translate(${(source.y0 ?? source.y) + margin.left},${(source.x0 ?? source.x) + margin.top})`)
    .on("click", (event, d) => {
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else if (d._children) {
        d.children = d._children;
        d._children = null;
      }
      update(d);
    })
    .on("mouseenter", (event, d) => {
      tooltipName.textContent = d.data.name;
      tooltipDesc.textContent = d.data.desc || "";
      const typeName = d.data.type === "threejs" ? "HTML (Three.js)" :
                       d.data.type === "py" ? "Python" :
                       d.data.type === "html" ? "HTML" :
                       d.data.type === "md" ? "Markdown" :
                       d.data.type === "folder" ? "Folder" : "Asset";
      const childCount = d.data.type === "folder" ? ` | ${countDescendants(d.data)} items` : "";
      tooltipMeta.textContent = typeName + childCount;
      tooltip.classList.add("visible");
    })
    .on("mousemove", (event) => {
      tooltip.style.left = (event.clientX + 14) + "px";
      tooltip.style.top = (event.clientY - 10) + "px";
    })
    .on("mouseleave", () => {
      tooltip.classList.remove("visible");
    });

  // Circle
  nodeEnter.append("circle")
    .attr("class", "node-circle")
    .attr("r", 5)
    .attr("fill", d => d.data.type === "folder" ? (d._children ? nodeColor(d) : "#fff") : nodeColor(d))
    .attr("stroke", d => nodeColor(d));

  // Three.js ring
  nodeEnter.filter(d => d.data.type === "threejs")
    .append("circle")
    .attr("r", 8)
    .attr("fill", "none")
    .attr("stroke", "#e07020")
    .attr("stroke-width", 1.5)
    .attr("stroke-dasharray", "2,2");

  // Label
  nodeEnter.append("text")
    .attr("class", "node-label")
    .attr("dy", "0.35em")
    .attr("x", d => d.data.type === "threejs" ? 14 : 12)
    .text(d => d.data.name);

  // Description
  nodeEnter.append("text")
    .attr("class", "node-label-desc")
    .attr("dy", "0.35em")
    .attr("x", d => {
      const nameLen = d.data.name.length * 7.2 + (d.data.type === "threejs" ? 14 : 12) + 8;
      return nameLen;
    })
    .text(d => d.data.desc && d.data.type !== "folder" ? d.data.desc : "");

  // Folder file count badge
  nodeEnter.filter(d => d.data.type === "folder")
    .append("text")
    .attr("class", "node-count")
    .attr("dy", "0.35em")
    .attr("x", d => d.data.name.length * 7.2 + 20)
    .text(d => `(${countDescendants(d.data)})`);

  // Update
  const nodeUpdate = node.merge(nodeEnter);

  nodeUpdate.transition().duration(duration)
    .attr("transform", d => `translate(${d.y + margin.left},${d.x + margin.top})`);

  nodeUpdate.select("circle.node-circle")
    .attr("fill", d => d.data.type === "folder" ? (d._children ? nodeColor(d) : "#fff") : nodeColor(d))
    .attr("stroke", d => nodeColor(d));

  // Exit
  const nodeExit = node.exit()
    .transition().duration(duration)
    .attr("transform", `translate(${source.y + margin.left},${source.x + margin.top})`)
    .remove();

  nodeExit.select("circle").attr("r", 0);
  nodeExit.select("text").style("fill-opacity", 0);

  // Stash old positions
  nodes.forEach(d => {
    d.x0 = d.x;
    d.y0 = d.y;
  });
}

function diagonal(d) {
  return `M${d.source.y + margin.left},${d.source.x + margin.top}
          C${(d.source.y + d.target.y) / 2 + margin.left},${d.source.x + margin.top}
           ${(d.source.y + d.target.y) / 2 + margin.left},${d.target.x + margin.top}
           ${d.target.y + margin.left},${d.target.x + margin.top}`;
}

// Initial render
root.x0 = 0;
root.y0 = 0;
update(root);

// ============================================================
// EXPAND / COLLAPSE ALL
// ============================================================
document.getElementById("expandAll").addEventListener("click", () => {
  root.descendants().forEach(d => {
    if (d._children) {
      d.children = d._children;
      d._children = null;
    }
  });
  update(root);
});

document.getElementById("collapseAll").addEventListener("click", () => {
  root.descendants().forEach(d => {
    if (d.depth > 0 && d.children) {
      d._children = d.children;
      d.children = null;
    }
  });
  update(root);
});

// ============================================================
// SEARCH
// ============================================================
const searchInput = document.getElementById("searchInput");
const searchCount = document.getElementById("searchCount");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  const query = searchInput.value.trim().toLowerCase();

  if (!query) {
    clearSearch();
    return;
  }

  searchClear.style.display = "inline";

  // Expand all to search
  root.descendants().forEach(d => {
    if (d._children) {
      d.children = d._children;
      d._children = null;
    }
  });
  update(root);

  // Find matches
  const allNodes = root.descendants();
  const matchSet = new Set();

  allNodes.forEach(d => {
    if (d.data.name.toLowerCase().includes(query) || (d.data.desc && d.data.desc.toLowerCase().includes(query))) {
      // Mark this node and all ancestors
      let node = d;
      while (node) {
        matchSet.add(node);
        node = node.parent;
      }
    }
  });

  const matchCount = allNodes.filter(d => d.data.name.toLowerCase().includes(query) || (d.data.desc && d.data.desc.toLowerCase().includes(query))).length;
  searchCount.textContent = `${matchCount} match${matchCount !== 1 ? "es" : ""}`;

  // Apply classes
  d3.selectAll(".node-group")
    .classed("node-match", d => d.data.name.toLowerCase().includes(query) || (d.data.desc && d.data.desc.toLowerCase().includes(query)))
    .classed("node-dimmed", d => !matchSet.has(d));

  d3.selectAll("path.link")
    .classed("link-dimmed", d => !matchSet.has(d.target));
});

searchClear.addEventListener("click", clearSearch);

function clearSearch() {
  searchInput.value = "";
  searchCount.textContent = "";
  searchClear.style.display = "none";
  d3.selectAll(".node-group").classed("node-match", false).classed("node-dimmed", false);
  d3.selectAll("path.link").classed("link-dimmed", false);
}

// Keyboard shortcut: Escape clears search
document.addEventListener("keydown", e => {
  if (e.key === "Escape") clearSearch();
  if (e.key === "/" && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
</body>
</html>
