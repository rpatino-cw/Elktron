<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiring Wizard — Escort Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--bg-card:#fffdf8;--bg-dark:#1a1f36;--bg-board:#1e2740;
  --text:#1a1f36;--text-mid:#4a5168;--text-light:#8890a6;
  --accent:#2741E7;--accent-hover:#4260f5;--accent-glow:rgba(39,65,231,.5);
  --wire-red:#e53935;--wire-black:#2a2a2a;--wire-blue:#1e88e5;
  --wire-green:#43a047;--wire-purple:#8e24aa;--wire-orange:#f57c00;
  --wire-grey:#78909c;--wire-yellow:#fdd835;--wire-brown:#795548;
  --pin-5v:#e53935;--pin-3v3:#f57c00;--pin-gnd:#2a2a2a;
  --pin-gpio:#43a047;--pin-spi:#8e24aa;--pin-i2c:#1e88e5;
  --pin-uart:#f57c00;--pin-pwm:#e91e63;--pin-inactive:#c5c0b5;
  --warn-bg:#fff3cd;--warn-border:#ffc107;--warn-text:#856404;
  --danger-bg:#f8d7da;--danger-border:#dc3545;--danger-text:#721c24;
  --success-bg:#d4edda;--success-border:#28a745;--success-text:#155724;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 16px rgba(26,31,54,.1);
  --shadow-lg:0 8px 32px rgba(26,31,54,.15);
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'Inconsolata',monospace;
  --ease-out-quart:cubic-bezier(.25,1,.5,1);
  --ease-out-expo:cubic-bezier(.16,1,.3,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg-dark);padding:0 24px;height:48px;display:flex;align-items:center;gap:24px}
.nav-brand{font-weight:800;font-size:1rem;color:#fff;letter-spacing:.04em}
.nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.8125rem;font-weight:600;transition:color .2s;letter-spacing:.02em}
.nav a:hover,.nav a.active{color:#fff}

/* LAYOUT */
.wizard{display:flex;flex-direction:column;height:calc(100vh - 48px)}
.header{padding:20px 32px 8px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;flex-direction:column;gap:2px}
.step-label{font-size:.75rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.step-title{font-size:1.75rem;font-weight:800;color:var(--text);line-height:1.15}

/* PROGRESS */
.progress-wrap{flex-shrink:0;padding:8px 32px 16px}
.progress-track{height:4px;background:rgba(26,31,54,.06);border-radius:2px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));border-radius:2px;transition:width .6s var(--ease-out-expo)}
.step-count{font-size:.6875rem;font-weight:700;color:var(--text-light);letter-spacing:.06em;margin-top:6px;text-align:right}

/* DIAGRAM AREA */
.diagram-area{flex:1;display:flex;align-items:center;justify-content:center;padding:0 32px;overflow:hidden;position:relative;min-height:0}
.diagram-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(16px);transition:opacity .5s var(--ease-out-quart),transform .5s var(--ease-out-quart)}
.diagram-wrap.visible{opacity:1;transform:translateY(0)}
.diagram-wrap svg{width:100%;height:100%;max-width:100%;max-height:100%}

/* INFO PANEL */
.info-panel{flex-shrink:0;padding:8px 32px 8px;max-height:200px;overflow-y:auto}
.info-box{background:var(--bg-card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);transition:opacity .4s var(--ease-out-quart) .15s,transform .4s var(--ease-out-quart) .15s}
.info-box.visible{opacity:1;transform:translateY(0)}
.info-text{font-size:.9375rem;line-height:1.7;color:var(--text)}
.info-text strong{font-weight:700;color:var(--accent)}
.info-text .pin-ref{display:inline-block;background:var(--bg-dark);color:#fff;padding:1px 8px;border-radius:4px;font-family:var(--mono);font-size:.8125rem;font-weight:700;margin:0 2px}
.info-why{margin-top:8px;padding-top:8px;border-top:1px solid rgba(26,31,54,.06);font-size:.8125rem;color:var(--text-mid);line-height:1.5}

/* CALLOUTS */
.callout{border-radius:var(--radius-sm);padding:12px 16px;margin-top:10px;font-size:.8125rem;line-height:1.5;font-weight:600}
.callout-warn{background:var(--warn-bg);border-left:4px solid var(--warn-border);color:var(--warn-text)}
.callout-danger{background:var(--danger-bg);border-left:4px solid var(--danger-border);color:var(--danger-text)}
.callout-success{background:var(--success-bg);border-left:4px solid var(--success-border);color:var(--success-text)}

/* TEST CMD */
.test-cmd{margin-top:10px;background:var(--bg-dark);border-radius:var(--radius-sm);padding:10px 14px;font-family:var(--mono);font-size:.8rem;color:#a5d6a7;cursor:pointer;position:relative;transition:background .15s}
.test-cmd:hover{background:#252b42}
.test-cmd::after{content:'copy';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--font);font-size:.625rem;color:rgba(255,255,255,.35);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.test-cmd.copied::after{content:'copied!';color:#a5d6a7}

/* CONTROLS */
.controls{flex-shrink:0;padding:12px 32px 24px;display:flex;gap:12px;justify-content:space-between;align-items:center}
.btn{padding:14px 32px;border-radius:var(--radius-sm);font-family:var(--font);font-weight:700;font-size:.9375rem;border:none;cursor:pointer;transition:all .2s var(--ease-out-quart)}
.btn-back{background:transparent;color:var(--text-mid);border:2px solid rgba(26,31,54,.1)}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.btn-next{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
.btn-next:hover{background:var(--accent-hover);transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow)}
.btn-next:active{transform:translateY(0);transition-duration:.1s}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* STEP INDICATORS */
.step-pips{display:flex;gap:4px;align-items:center}
.pip{width:6px;height:6px;border-radius:50%;background:rgba(26,31,54,.1);transition:all .4s var(--ease-out-quart)}
.pip.done{background:var(--accent);opacity:.5}
.pip.current{background:var(--accent);width:20px;border-radius:3px;opacity:1}

/* INTERSTITIAL */
.interstitial{position:fixed;inset:0;z-index:200;background:rgba(26,31,54,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;padding:32px;opacity:0;pointer-events:none;transition:opacity .4s var(--ease-out-quart)}
.interstitial.show{opacity:1;pointer-events:auto}
.interstitial h2{color:#fff;font-size:2.25rem;font-weight:800;text-align:center;letter-spacing:-.02em}
.interstitial p{color:rgba(255,255,255,.75);font-size:1.0625rem;text-align:center;max-width:480px;line-height:1.7}
.interstitial p strong{color:#fff}
.interstitial .btn-next{font-size:1.0625rem;padding:16px 44px}
.danger-badge{width:72px;height:72px;border-radius:50%;background:var(--danger-border);display:flex;align-items:center;justify-content:center;font-size:2.25rem;font-weight:800;color:#fff;animation:dangerPulse 1.5s ease infinite}

/* CHECKLIST */
.checklist{list-style:none;padding:0;max-width:560px;width:100%;margin:0 auto}
.checklist li{padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:4px;font-size:.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--bg-card);transition:all .2s var(--ease-out-quart);user-select:none}
.checklist li:hover{background:#eee9df}
.checklist li.checked{background:var(--success-bg);color:var(--success-text)}
.checklist li .ck{width:20px;height:20px;border-radius:50%;border:2px solid rgba(26,31,54,.15);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;transition:all .2s}
.checklist li.checked .ck{background:var(--success-border);border-color:var(--success-border);color:#fff}

/* ANIMATIONS */
@keyframes drawWire{from{stroke-dashoffset:var(--len,600)}to{stroke-dashoffset:0}}
@keyframes dangerPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(220,53,69,.4)}50%{transform:scale(1.06);box-shadow:0 0 0 16px rgba(220,53,69,0)}}
@keyframes pinGlow{0%,100%{filter:drop-shadow(0 0 3px var(--glow-color,var(--accent-glow)))}50%{filter:drop-shadow(0 0 10px var(--glow-color,var(--accent-glow)))}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.wire-draw{stroke-dasharray:var(--len,600);stroke-dashoffset:var(--len,600);animation:drawWire var(--dur,1.2s) var(--ease-out-quart) var(--del,0s) forwards}
.pin-active{animation:pinGlow 2s ease-in-out infinite}
.stagger{opacity:0;animation:fadeUp .5s var(--ease-out-quart) var(--del,0s) forwards}

/* RESPONSIVE */
@media(max-width:768px){
  .step-title{font-size:1.25rem}
  .header,.progress-wrap,.info-panel,.controls{padding-left:16px;padding-right:16px}
  .diagram-area{padding:0 12px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">ELKTRON</div>
  <a href="../hub.html">Hub</a>
  <a href="assembly.html">Assembly</a>
  <a href="wiring-guide.html">Wiring 3D</a>
  <a href="wiring-wizard.html" class="active">Wiring Wizard</a>
</nav>

<div class="wizard">
  <div class="header">
    <div class="header-left">
      <div class="step-label" id="stepLabel">STEP 1 OF 14</div>
      <div class="step-title" id="stepTitle">Lay Out Your Parts</div>
    </div>
    <div class="step-pips" id="pips"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="diagram-area"><div class="diagram-wrap" id="diagramWrap"></div></div>
  <div class="info-panel"><div class="info-box" id="infoBox"></div></div>
  <div class="controls">
    <button class="btn btn-back" id="btnBack" disabled>Back</button>
    <button class="btn btn-next" id="btnNext">Done — Next Step</button>
  </div>
</div>

<div class="interstitial" id="interstitial">
  <div class="danger-badge">!</div>
  <h2>STOP — Read This Carefully</h2>
  <p>The HC-SR04 ECHO pin outputs <strong>5 volts</strong>. Your Raspberry Pi GPIO pins can only handle <strong>3.3 volts</strong>. Without a voltage divider, you <strong>will permanently damage your Pi</strong>.</p>
  <button class="btn btn-next" onclick="dismissInterstitial()">I Understand — Show Me How</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PI 5 GPIO HEADER — Full 40-pin layout (BCM numbering)
// ═══════════════════════════════════════════════════════════════
// Each pin: [physical_pin, label, type]
// Types: '5v','3v3','gnd','gpio','spi','i2c','uart','pwm','id'
const PI_PINS = [
  // Left column (odd physical pins) — top to bottom
  // Right column (even physical pins)
  // Format: [pin#, label, type, bcm#_or_null]
  [1,'3V3','3v3',null],    [2,'5V','5v',null],
  [3,'GPIO2','i2c',2],     [4,'5V','5v',null],
  [5,'GPIO3','i2c',3],     [6,'GND','gnd',null],
  [7,'GPIO4','gpio',4],    [8,'GPIO14','uart',14],
  [9,'GND','gnd',null],    [10,'GPIO15','uart',15],
  [11,'GPIO17','gpio',17], [12,'GPIO18','pwm',18],
  [13,'GPIO27','gpio',27], [14,'GND','gnd',null],
  [15,'GPIO22','gpio',22], [16,'GPIO23','gpio',23],
  [17,'3V3','3v3',null],   [18,'GPIO24','gpio',24],
  [19,'GPIO10','spi',10],  [20,'GND','gnd',null],
  [21,'GPIO9','spi',9],    [22,'GPIO25','gpio',25],
  [23,'GPIO11','spi',11],  [24,'GPIO8','spi',8],
  [25,'GND','gnd',null],   [26,'GPIO7','spi',7],
  [27,'ID_SD','id',0],     [28,'ID_SC','id',1],
  [29,'GPIO5','gpio',5],   [30,'GND','gnd',null],
  [31,'GPIO6','gpio',6],   [32,'GPIO12','pwm',12],
  [33,'GPIO13','pwm',13],  [34,'GND','gnd',null],
  [35,'GPIO19','gpio',19], [36,'GPIO16','gpio',16],
  [37,'GPIO26','gpio',26], [38,'GPIO20','gpio',20],
  [39,'GND','gnd',null],   [40,'GPIO21','gpio',21],
];

const PIN_COLORS = {
  '5v':'var(--pin-5v)','3v3':'var(--pin-3v3)','gnd':'var(--pin-gnd)',
  'gpio':'var(--pin-gpio)','spi':'var(--pin-spi)','i2c':'var(--pin-i2c)',
  'uart':'var(--pin-uart)','pwm':'var(--pin-pwm)','id':'var(--text-light)'
};

// ═══════════════════════════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════════════════════════
function mkSvg(w,h,content){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox',`0 0 ${w} ${h}`);
  s.style.maxWidth='100%';s.style.maxHeight='100%';
  s.innerHTML=content;return s;
}

// Draw the full Pi 5 GPIO header. highlightPins = array of physical pin numbers to glow.
// Returns SVG fragment starting at (ox, oy). Board width ~120, height ~260.
function piHeader(ox,oy,highlightPins=[],showLabels=true){
  const bw=130,bh=280,pinR=5,pinGap=13,colGap=18,padX=20,padTop=22;
  let s=`<rect x="${ox}" y="${oy}" width="${bw}" height="${bh}" rx="8" fill="var(--bg-board)" stroke="#3a4260" stroke-width="1.5"/>`;
  // Board label
  s+=`<text x="${ox+bw/2}" y="${oy+14}" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="9" fill="rgba(255,255,255,.5)" letter-spacing=".08em">RASPBERRY PI 5</text>`;
  // Pin 1 marker
  const p1x=ox+padX, p1y=oy+padTop;
  s+=`<rect x="${p1x-pinR-2}" y="${p1y-pinR-2}" width="${(pinR+2)*2}" height="${(pinR+2)*2}" rx="2" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="2,2"/>`;

  for(let i=0;i<PI_PINS.length;i+=2){
    const row=i/2;
    const leftPin=PI_PINS[i], rightPin=PI_PINS[i+1];
    const cy=oy+padTop+row*pinGap;
    const lx=ox+padX, rx_=ox+padX+colGap;
    const lHighlight=highlightPins.includes(leftPin[0]);
    const rHighlight=highlightPins.includes(rightPin[0]);

    // Left pin
    const lColor=lHighlight?PIN_COLORS[leftPin[2]]:'var(--pin-inactive)';
    s+=`<circle cx="${lx}" cy="${cy}" r="${pinR}" fill="${lColor}" ${lHighlight?'class="pin-active" style="--glow-color:'+PIN_COLORS[leftPin[2]]+'"':'opacity=".4"'}/>`;
    // Right pin
    const rColor=rHighlight?PIN_COLORS[rightPin[2]]:'var(--pin-inactive)';
    s+=`<circle cx="${rx_}" cy="${cy}" r="${pinR}" fill="${rColor}" ${rHighlight?'class="pin-active" style="--glow-color:'+PIN_COLORS[rightPin[2]]+'"':'opacity=".4"'}/>`;

    // Pin numbers (always show)
    s+=`<text x="${lx-pinR-3}" y="${cy+3}" text-anchor="end" font-family="var(--mono)" font-size="7" font-weight="600" fill="${lHighlight?'#fff':'rgba(255,255,255,.25)'}">${leftPin[0]}</text>`;
    s+=`<text x="${rx_+pinR+3}" y="${cy+3}" text-anchor="start" font-family="var(--mono)" font-size="7" font-weight="600" fill="${rHighlight?'#fff':'rgba(255,255,255,.25)'}">${rightPin[0]}</text>`;

    // Labels for highlighted pins
    if(showLabels&&lHighlight){
      s+=`<text x="${ox-4}" y="${cy+3}" text-anchor="end" font-family="var(--mono)" font-size="8" font-weight="700" fill="${PIN_COLORS[leftPin[2]]}" class="stagger" style="--del:${row*0.03}s">${leftPin[1]}</text>`;
    }
    if(showLabels&&rHighlight){
      s+=`<text x="${ox+bw+4}" y="${cy+3}" text-anchor="start" font-family="var(--mono)" font-size="8" font-weight="700" fill="${PIN_COLORS[rightPin[2]]}" class="stagger" style="--del:${row*0.03}s">${rightPin[1]}</text>`;
    }
  }
  return {svg:s, w:bw, h:bh, padX, padTop, pinGap, colGap,
    // Helper: get pixel coords of a physical pin
    pinPos(physPin){
      const idx=PI_PINS.findIndex(p=>p[0]===physPin);
      const row=Math.floor(idx/2);
      const isRight=idx%2===1;
      return {x:ox+(isRight?padX+colGap:padX), y:oy+padTop+row*pinGap};
    }
  };
}

// L298N board SVG. Returns at (ox,oy). ~200 wide, ~180 tall.
function l298nBoard(ox,oy,highlightTerminals=[]){
  const bw=200,bh=180;
  let s=`<rect x="${ox}" y="${oy}" width="${bw}" height="${bh}" rx="8" fill="#2d1a1a" stroke="#5a3030" stroke-width="1.5"/>`;
  s+=`<text x="${ox+bw/2}" y="${oy+16}" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="10" fill="rgba(255,255,255,.5)" letter-spacing=".06em">L298N MOTOR DRIVER</text>`;

  // Heatsink
  s+=`<rect x="${ox+70}" y="${oy+55}" width="${60}" height="${50}" rx="3" fill="#333" stroke="#555" stroke-width="1"/>`;
  s+=`<text x="${ox+100}" y="${oy+83}" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="rgba(255,255,255,.3)">HEATSINK</text>`;

  // Motor output screw terminals (top)
  const outs=[
    {name:'OUT1',x:ox+22,y:oy+28},
    {name:'OUT2',x:ox+48,y:oy+28},
    {name:'OUT3',x:ox+152,y:oy+28},
    {name:'OUT4',x:ox+178,y:oy+28},
  ];
  outs.forEach(t=>{
    const hl=highlightTerminals.includes(t.name);
    s+=`<rect x="${t.x-10}" y="${t.y-6}" width="20" height="12" rx="2" fill="${hl?'#4a7a4a':'#444'}" stroke="${hl?'var(--wire-green)':'#666'}" stroke-width="1"/>`;
    s+=`<text x="${t.x}" y="${t.y+18}" text-anchor="middle" font-family="var(--mono)" font-size="7" font-weight="700" fill="${hl?'#fff':'rgba(255,255,255,.4)'}">${t.name}</text>`;
    if(hl) s+=`<circle cx="${t.x}" cy="${t.y}" r="3" fill="var(--wire-green)" class="pin-active" style="--glow-color:rgba(67,160,71,.5)"/>`;
  });

  // Power screw terminals (bottom)
  const pwr=[
    {name:'+12V',x:ox+35,y:oy+155},
    {name:'GND',x:ox+65,y:oy+155},
    {name:'+5V',x:ox+95,y:oy+155},
  ];
  pwr.forEach(t=>{
    const hl=highlightTerminals.includes(t.name);
    s+=`<rect x="${t.x-12}" y="${t.y-6}" width="24" height="12" rx="2" fill="${hl?'#4a4a7a':'#444'}" stroke="${hl?'var(--accent)':'#666'}" stroke-width="1"/>`;
    s+=`<text x="${t.x}" y="${t.y-10}" text-anchor="middle" font-family="var(--mono)" font-size="7" font-weight="700" fill="${hl?'#fff':'rgba(255,255,255,.4)'}">${t.name}</text>`;
    if(hl) s+=`<circle cx="${t.x}" cy="${t.y}" r="3" fill="var(--accent)" class="pin-active"/>`;
  });

  // Control pin header (right side)
  const ctrl=[
    {name:'ENA',x:ox+bw-18,y:oy+60},
    {name:'IN1',x:ox+bw-18,y:oy+76},
    {name:'IN2',x:ox+bw-18,y:oy+92},
    {name:'IN3',x:ox+bw-18,y:oy+108},
    {name:'IN4',x:ox+bw-18,y:oy+124},
    {name:'ENB',x:ox+bw-18,y:oy+140},
  ];
  ctrl.forEach(t=>{
    const hl=highlightTerminals.includes(t.name);
    s+=`<circle cx="${t.x}" cy="${t.y}" r="4" fill="${hl?'var(--wire-blue)':'#555'}" ${hl?'class="pin-active" style="--glow-color:rgba(30,136,229,.5)"':''}/>`;
    s+=`<text x="${t.x+10}" y="${t.y+3}" text-anchor="start" font-family="var(--mono)" font-size="7" font-weight="700" fill="${hl?'var(--wire-blue)':'rgba(255,255,255,.35)'}">${t.name}</text>`;
  });

  return {svg:s, w:bw, h:bh,
    termPos(name){
      const all=[...outs,...pwr,...ctrl];
      const t=all.find(a=>a.name===name);
      return t?{x:t.x,y:t.y}:{x:0,y:0};
    }
  };
}

// HC-SR04 board
function hcsr04Board(ox,oy,highlightPins=[]){
  const bw=100,bh=70;
  let s=`<rect x="${ox}" y="${oy}" width="${bw}" height="${bh}" rx="6" fill="#1a3a1a" stroke="#3a6a3a" stroke-width="1.5"/>`;
  // Transducers
  s+=`<circle cx="${ox+25}" cy="${oy+28}" r="14" fill="none" stroke="#666" stroke-width="1.5"/>`;
  s+=`<circle cx="${ox+75}" cy="${oy+28}" r="14" fill="none" stroke="#666" stroke-width="1.5"/>`;
  s+=`<text x="${ox+bw/2}" y="${oy+12}" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="8" fill="rgba(255,255,255,.5)">HC-SR04</text>`;

  const pins=[
    {name:'VCC',x:ox+15,y:oy+bh},
    {name:'TRIG',x:ox+38,y:oy+bh},
    {name:'ECHO',x:ox+62,y:oy+bh},
    {name:'GND',x:ox+85,y:oy+bh},
  ];
  pins.forEach(p=>{
    const hl=highlightPins.includes(p.name);
    const color=p.name==='VCC'?'var(--pin-5v)':p.name==='GND'?'var(--pin-gnd)':p.name==='TRIG'?'var(--wire-purple)':'var(--wire-purple)';
    s+=`<rect x="${p.x-5}" y="${p.y-2}" width="10" height="12" rx="1" fill="${hl?color:'#555'}" ${hl?'class="pin-active" style="--glow-color:'+color+'"':''}/>`;
    s+=`<text x="${p.x}" y="${p.y+20}" text-anchor="middle" font-family="var(--mono)" font-size="7" font-weight="700" fill="${hl?color:'rgba(255,255,255,.35)'}">${p.name}</text>`;
  });

  return {svg:s, w:bw, h:bh,
    pinPos(name){const p=pins.find(a=>a.name===name);return p?{x:p.x,y:p.y+10}:{x:0,y:0};}
  };
}

// Servo connector
function servoConn(ox,oy,label,highlightPins=[]){
  const bw=80,bh=50;
  let s=`<rect x="${ox}" y="${oy}" width="${bw}" height="${bh}" rx="6" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1.5"/>`;
  s+=`<text x="${ox+bw/2}" y="${oy+14}" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="8" fill="rgba(255,255,255,.5)">${label}</text>`;
  const pins=[
    {name:'SIG',x:ox+18,y:oy+bh-8,color:'var(--wire-green)'},
    {name:'VCC',x:ox+40,y:oy+bh-8,color:'var(--pin-5v)'},
    {name:'GND',x:ox+62,y:oy+bh-8,color:'var(--pin-gnd)'},
  ];
  pins.forEach(p=>{
    const hl=highlightPins.includes(p.name);
    s+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${hl?p.color:'#555'}" ${hl?'class="pin-active" style="--glow-color:'+p.color+'"':''}/>`;
    s+=`<text x="${p.x}" y="${p.y+12}" text-anchor="middle" font-family="var(--mono)" font-size="6" font-weight="700" fill="${hl?p.color:'rgba(255,255,255,.35)'}">${p.name}</text>`;
  });
  return {svg:s, w:bw, h:bh,
    pinPos(name){const p=pins.find(a=>a.name===name);return p?{x:p.x,y:p.y}:{x:0,y:0};}
  };
}

// Animated wire path
function wirePath(x1,y1,x2,y2,color,delay,straight){
  if(straight){
    const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2.5" stroke-linecap="round" class="wire-draw" style="--len:${Math.ceil(len)};--del:${delay}s;--dur:0.8s"/>`;
  }
  const mx=(x1+x2)/2;
  // Approximate curve length
  const len=Math.ceil(Math.sqrt((x2-x1)**2+(y2-y1)**2)*1.3);
  return `<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" class="wire-draw" style="--len:${len};--del:${delay}s;--dur:1s"/>`;
}

// Elbow wire (goes horizontal then vertical)
function wireElbow(x1,y1,x2,y2,color,delay){
  const len=Math.abs(x2-x1)+Math.abs(y2-y1);
  return `<path d="M${x1},${y1} L${x2},${y1} L${x2},${y2}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="wire-draw" style="--len:${Math.ceil(len)};--del:${delay}s;--dur:1s"/>`;
}

// Text label with background
function labelTag(x,y,text,color,anchor='middle',delay=0){
  return `<g class="stagger" style="--del:${delay}s"><text x="${x}" y="${y}" text-anchor="${anchor}" font-family="var(--font)" font-weight="700" font-size="10" fill="${color}">${text}</text></g>`;
}

      c+=`<text x="100" y="${y+52}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="rgba(255,255,255,.4)">TT DC Motor</text>`;
      c+=`<circle cx="170" cy="${y+30}" r="4" fill="var(--wire-red)" class="pin-active" style="--glow-color:var(--wire-red)"/>`;
      c+=`<text x="180" y="${y+33}" font-family="var(--mono)" font-size="7" font-weight="700" fill="var(--wire-red)">RED</text>`;
      c+=`<circle cx="170" cy="${y+50}" r="4" fill="#555" class="pin-active" style="--glow-color:rgba(42,42,42,.5)"/>`;
      c+=`<text x="180" y="${y+53}" font-family="var(--mono)" font-size="7" font-weight="700" fill="#777">BLK</text>`;

    pairs.forEach(([pin,term,lbl],i)=>{
      const pp=pi.pinPos(pin), tp=l.termPos(term);

    return mkSvg(620,290,c);
  }

  case 'hcsr04-power': {

  case 'voltage-divider': {
    const pi=piHeader(470,10,[18]);

    let c=hc.svg;
    // Breadboard
    c+=`<rect x="180" y="10" width="240" height="210" rx="8" fill="#f0ede4" stroke="#c9c3b3" stroke-width="1.5"/>`;
    c+=`<text x="300" y="28" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="9" fill="var(--text-mid)" letter-spacing=".06em">BREADBOARD</text>`;
    // Breadboard holes (grid)

      c+=`<circle cx="${200+col*20}" cy="${50+r*20}" r="2" fill="rgba(0,0,0,.08)"/>`;
    }
    // 1kΩ resistor
    const r1x1=220,r1x2=280,r1y=70;
    c+=`<rect x="${r1x1}" y="${r1y-6}" width="${r1x2-r1x1}" height="12" rx="3" fill="#d4a574" stroke="#a07040" stroke-width="1.5"/>`;
    c+=`<text x="${(r1x1+r1x2)/2}" y="${r1y-10}" text-anchor="middle" font-family="var(--mono)" font-weight="800" font-size="10" fill="var(--wire-orange)">1kΩ</text>`;
    // Junction node
    const jx=300,jy=90;
    c+=`<circle cx="${jx}" cy="${jy}" r="5" fill="var(--accent)" class="pin-active"/>`;
    c+=`<text x="${jx+10}" y="${jy+4}" font-family="var(--mono)" font-size="8" font-weight="700" fill="var(--accent)">JUNCTION</text>`;
    // 2kΩ resistor (vertical)
    c+=`<rect x="${jx-6}" y="${jy+20}" width="12" height="60" rx="3" fill="#d4a574" stroke="#a07040" stroke-width="1.5"/>`;
    c+=`<text x="${jx+14}" y="${jy+55}" font-family="var(--mono)" font-weight="800" font-size="10" fill="var(--wire-orange)">2kΩ</text>`;
    // GND label
    c+=`<text x="${jx}" y="${jy+100}" text-anchor="middle" font-family="var(--mono)" font-weight="800" font-size="10" fill="var(--wire-black)">→ GND</text>`;
    // Pi header
    c+=pi.svg;
    // Wires
    const echoPos=hc.pinPos('ECHO');
    c+=wirePath(echoPos.x,echoPos.y,r1x1,r1y,'var(--wire-purple)',0.2,false);
    c+=wirePath(r1x2,r1y,jx,jy,'var(--wire-purple)',0.5,true);
    const gpioPos=pi.pinPos(18);
    c+=wirePath(jx,jy,gpioPos.x,gpioPos.y,'var(--accent)',0.8,false);
    c+=wirePath(jx,jy+6,jx,jy+20,'var(--wire-black)',0.6,true);
    c+=wirePath(jx,jy+80,jx,jy+90,'var(--wire-black)',0.9,true);
    // Voltage math box
    c+=`<rect x="180" y="198" width="240" height="24" rx="4" fill="var(--bg-dark)" class="stagger" style="--del:1.2s"/>`;
    c+=`<text x="300" y="214" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="10" fill="#a5d6a7" class="stagger" style="--del:1.3s">5V × (2k ÷ 3k) = 3.33V ✓ Safe for Pi</text>`;
    return mkSvg(660,235,c);
  }

  case 'pan-servo': {
    const pi=piHeader(30,20,[32,4,9]);
    const sv=servoConn(400,80,'PAN SERVO',['SIG','VCC','GND']);
    let c=pi.svg+sv.svg;
    const pairs=[[32,'SIG','var(--wire-green)',0.3],[4,'VCC','var(--wire-red)',0.6],[9,'GND','var(--wire-black)',0.9]];
    const labels=['Signal (GPIO12)','Power (5V)','Ground'];
    pairs.forEach(([pin,spin,color,del],i)=>{
      const pp=pi.pinPos(pin), sp=sv.pinPos(spin);
      c+=wirePath(pp.x,pp.y,sp.x,sp.y,color,del,false);
      c+=labelTag((pp.x+sp.x)/2, sp.y-20-i*2, labels[i], color, 'middle', del+0.2);
    });
    return mkSvg(540,310,c);
  }

  case 'tilt-servo': {
    const pi=piHeader(30,20,[33,2,14]);
    const sv=servoConn(400,80,'TILT SERVO',['SIG','VCC','GND']);
    let c=pi.svg+sv.svg;
    const pairs=[[33,'SIG','var(--wire-green)',0.3],[2,'VCC','var(--wire-red)',0.6],[14,'GND','var(--wire-black)',0.9]];
    const labels=['Signal (GPIO13)','Power (5V)','Ground'];
    pairs.forEach(([pin,spin,color,del],i)=>{
      const pp=pi.pinPos(pin), sp=sv.pinPos(spin);
      c+=wirePath(pp.x,pp.y,sp.x,sp.y,color,del,false);
      c+=labelTag((pp.x+sp.x)/2, sp.y-20-i*2, labels[i], color, 'middle', del+0.2);
    });
    return mkSvg(540,310,c);
  }

  case 'camera-csi': {
    let c='';
    // Pi board
    c+=`<rect x="40" y="30" width="180" height="220" rx="10" fill="var(--bg-board)" stroke="#3a4260" stroke-width="1.5"/>`;
    c+=`<text x="130" y="52" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="10" fill="rgba(255,255,255,.5)">RASPBERRY PI 5</text>`;
    // CAM port
    c+=`<rect x="90" y="180" width="80" height="24" rx="4" fill="#333" stroke="#666" stroke-width="1.5"/>`;
    c+=`<text x="130" y="196" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="9" fill="#fff">CAM PORT</text>`;
    // Clip
    c+=`<rect x="95" y="174" width="70" height="5" rx="2" fill="var(--text-mid)" class="stagger" style="--del:.3s"/>`;
    c+=`<text x="130" y="168" text-anchor="middle" font-family="var(--font)" font-weight="700" font-size="9" fill="var(--accent)" class="stagger" style="--del:.5s">↑ Pull clip up gently</text>`;
    // Ribbon
    c+=`<rect x="112" y="204" width="36" height="55" rx="2" fill="#ddd" stroke="var(--wire-grey)" stroke-width="1" opacity=".7" class="stagger" style="--del:.7s"/>`;
    c+=`<rect x="112" y="204" width="36" height="8" rx="1" fill="#4a7ab8" class="stagger" style="--del:.8s"/>`;
    c+=`<text x="130" y="210" text-anchor="middle" font-family="var(--mono)" font-size="6" font-weight="700" fill="#fff" class="stagger" style="--del:.8s">BLUE</text>`;
    // Camera
    c+=`<rect x="360" y="60" width="160" height="120" rx="10" fill="#1a3a1a" stroke="#3a6a3a" stroke-width="1.5"/>`;
    c+=`<text x="440" y="82" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="9" fill="rgba(255,255,255,.5)">ARDUCAM IMX708</text>`;
    c+=`<circle cx="440" cy="120" r="22" fill="none" stroke="#666" stroke-width="2"/>`;
    c+=`<circle cx="440" cy="120" r="10" fill="var(--bg-dark)"/>`;
    // Ribbon path
    c+=`<path d="M148,259 C200,280 320,250 360,120" fill="none" stroke="var(--wire-grey)" stroke-width="3" stroke-dasharray="6,4" class="wire-draw" style="--len:300;--del:.4s;--dur:1.2s"/>`;
    c+=labelTag(300,210,'Blue side faces USB ports','var(--accent)','middle',1);
    return mkSvg(560,280,c);
  }

  case 'power-bank': {
    let c='';
    // Power bank
    c+=`<rect x="20" y="50" width="130" height="90" rx="8" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1.5"/>`;
    c+=`<text x="85" y="80" text-anchor="middle" font-family="var(--font)" font-weight="800" font-size="12" fill="#fff">Anker 10K</text>`;
    c+=`<text x="85" y="95" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="rgba(255,255,255,.4)">Power Bank</text>`;
    // Cable
    c+=wirePath(150,95,210,95,'var(--text-mid)',0.2,true);
    // PiSwitch
    c+=`<rect x="210" y="78" width="90" height="34" rx="6" fill="#e8f5e9" stroke="var(--wire-green)" stroke-width="1.5" class="stagger" style="--del:.3s"/>`;
    c+=`<text x="255" y="99" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="9" fill="var(--wire-green)">PiSwitch</text>`;
    c+=`<text x="255" y="72" text-anchor="middle" font-family="var(--font)" font-size="8" fill="var(--text-light)" class="stagger" style="--del:.4s">(optional)</text>`;
    c+=wirePath(300,95,360,95,'var(--text-mid)',0.5,true);
    // 90° adapter
    c+=`<rect x="360" y="82" width="50" height="26" rx="4" fill="#fff3e0" stroke="var(--wire-orange)" stroke-width="1.5" class="stagger" style="--del:.6s"/>`;
    c+=`<text x="385" y="99" text-anchor="middle" font-family="var(--mono)" font-size="7" font-weight="700" fill="var(--wire-orange)">90°</text>`;
    c+=wirePath(410,95,450,95,'var(--text-mid)',0.8,true);
    // Pi
    c+=`<rect x="450" y="40" width="130" height="110" rx="10" fill="var(--bg-board)" stroke="#3a4260" stroke-width="1.5"/>`;
    c+=`<text x="515" y="70" text-anchor="middle" font-family="var(--font)" font-weight="800" font-size="12" fill="#fff">Pi 5</text>`;
    c+=`<rect x="448" y="88" width="20" height="14" rx="2" fill="#555" stroke="#888" stroke-width="1"/>`;
    c+=`<text x="458" y="98" text-anchor="middle" font-family="var(--mono)" font-size="5" font-weight="700" fill="#fff">USB-C</text>`;
    c+=labelTag(300,160,'Must supply 5V / 3A minimum','var(--wire-orange)','middle',1);
    return mkSvg(600,180,c);
  }

  case 'checklist': {
    const div=document.createElement('div');
    div.style.cssText='width:100%;height:100%;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:8px 0';
    let h='<ul class="checklist">';
    CHECKLIST_ITEMS.forEach((item,i)=>{
      h+=`<li onclick="this.classList.toggle('checked')" style="animation:fadeUp .4s var(--ease-out-quart) ${i*0.04}s both"><span class="ck">✓</span>${item}</li>`;
    });
    h+='</ul>';
    div.innerHTML=h;
    return div;
  }

  default: return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// WIZARD ENGINE
// ═══════════════════════════════════════════════════════════════
let currentStep=parseInt(localStorage.getItem('wiring-wizard-step')||'0');
const diagramWrap=document.getElementById('diagramWrap');
const infoBox=document.getElementById('infoBox');
const btnBack=document.getElementById('btnBack');
const btnNext=document.getElementById('btnNext');
const stepLabel=document.getElementById('stepLabel');
const stepTitle=document.getElementById('stepTitle');
const progressFill=document.getElementById('progressFill');
const pipsContainer=document.getElementById('pips');

for(let i=0;i<STEPS.length;i++){
  const p=document.createElement('div');
  p.className='pip';
  pipsContainer.appendChild(p);
}

function renderStep(idx, direction=0){
  const step=STEPS[idx];
  currentStep=idx;
  localStorage.setItem('wiring-wizard-step',idx);

  // Header
  stepLabel.textContent=`STEP ${idx+1} OF ${STEPS.length}`;
  stepTitle.textContent=step.title;
  progressFill.style.width=`${((idx+1)/STEPS.length)*100}%`;

  // Pips
  [...pipsContainer.children].forEach((p,i)=>{
    p.className=i<idx?'pip done':i===idx?'pip current':'pip';
  });

  // Buttons
  btnBack.disabled=idx===0;
  btnNext.textContent=idx===STEPS.length-1?'All Done!':'Done — Next Step';

  // Interstitial
  if(step.interstitial) document.getElementById('interstitial').classList.add('show');

  // Diagram transition
  diagramWrap.classList.remove('visible');
  infoBox.classList.remove('visible');

  setTimeout(()=>{
    diagramWrap.innerHTML='';
    const diagram=buildDiagram(step.diagram);
    if(diagram) diagramWrap.appendChild(diagram);
    requestAnimationFrame(()=>{
      diagramWrap.classList.add('visible');
    });
  },250);

  // Info panel transition
  setTimeout(()=>{
    let html=`<div class="info-text">${step.info}</div>`;
    if(step.why) html+=`<div class="info-why">${step.why}</div>`;
    if(step.callout&&step.danger==='warn') html+=`<div class="callout callout-warn">${step.callout}</div>`;
    if(step.callout&&step.danger==='danger') html+=`<div class="callout callout-danger">${step.callout}</div>`;
    if(step.test) html+=`<div class="test-cmd" onclick="copyCmd(this)" data-cmd="${step.test.replace(/"/g,'&quot;')}">${step.test}</div>`;
    infoBox.innerHTML=html;
    requestAnimationFrame(()=>infoBox.classList.add('visible'));
  },300);
}

function dismissInterstitial(){
  document.getElementById('interstitial').classList.remove('show');
}

function copyCmd(el){
  navigator.clipboard.writeText(el.dataset.cmd).then(()=>{
    el.classList.add('copied');
    setTimeout(()=>el.classList.remove('copied'),1500);
  });
}

btnNext.addEventListener('click',()=>{
  if(currentStep<STEPS.length-1) renderStep(currentStep+1,1);
});
btnBack.addEventListener('click',()=>{
  if(currentStep>0) renderStep(currentStep-1,-1);
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&currentStep<STEPS.length-1) renderStep(currentStep+1,1);
  if(e.key==='ArrowLeft'&&currentStep>0) renderStep(currentStep-1,-1);
});

// Init
renderStep(currentStep);
</script>
