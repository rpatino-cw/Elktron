<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiring Wizard — Escort Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--bg-card:#fffdf8;--bg-dark:#1a1f36;
  --text:#1a1f36;--text-mid:#4a5168;--text-light:#8890a6;
  --accent:#2741E7;--accent-hover:#4260f5;
  --wire-red:#e53935;--wire-black:#1a1a1a;--wire-blue:#1e88e5;
  --wire-green:#43a047;--wire-purple:#8e24aa;--wire-orange:#f57c00;
  --wire-grey:#78909c;
  --warn-bg:#fff3cd;--warn-border:#ffc107;--warn-text:#856404;
  --danger-bg:#f8d7da;--danger-border:#dc3545;--danger-text:#721c24;
  --success-bg:#d4edda;--success-border:#28a745;--success-text:#155724;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(26,31,54,.08);
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'Inconsolata',monospace;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg-dark);padding:0 24px;height:48px;display:flex;align-items:center;gap:24px}
.nav-brand{font-weight:800;font-size:1rem;color:#fff;letter-spacing:.04em}
.nav a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.8125rem;font-weight:500;transition:color .2s}
.nav a:hover,.nav a.active{color:#fff}

/* LAYOUT */
.wizard{display:flex;flex-direction:column;height:calc(100vh - 48px);max-height:calc(100vh - 48px)}
.header{padding:16px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.step-label{font-size:.875rem;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.06em}
.step-title{font-size:1.5rem;font-weight:800;color:var(--text);margin-top:4px;line-height:1.2}

/* PROGRESS */
.progress-wrap{flex-shrink:0;padding:0 24px 12px}
.progress-bar{height:6px;background:rgba(26,31,54,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* DIAGRAM AREA */
.diagram-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 24px;overflow:hidden;position:relative}
.diagram-area svg{max-width:100%;max-height:100%;width:auto;height:auto}
.step-view{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column}
.step-view.active{display:flex}

/* INFO PANEL */
.info-panel{flex-shrink:0;padding:12px 24px;max-height:220px;overflow-y:auto}
.info-box{background:var(--bg-card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow)}
.info-text{font-size:.9375rem;line-height:1.6;color:var(--text)}
.info-text strong{font-weight:700}
.info-why{margin-top:8px;font-size:.8125rem;color:var(--text-mid);font-style:italic}

/* CALLOUTS */
.callout{border-radius:var(--radius-sm);padding:12px 16px;margin-top:12px;font-size:.875rem;line-height:1.5;font-weight:500}
.callout-warn{background:var(--warn-bg);border-left:4px solid var(--warn-border);color:var(--warn-text)}
.callout-danger{background:var(--danger-bg);border-left:4px solid var(--danger-border);color:var(--danger-text)}
.callout-success{background:var(--success-bg);border-left:4px solid var(--success-border);color:var(--success-text)}

/* TEST CMD */
.test-cmd{margin-top:12px;background:var(--bg-dark);border-radius:var(--radius-sm);padding:12px 16px;font-family:var(--mono);font-size:.8125rem;color:#a5d6a7;cursor:pointer;position:relative;transition:background .2s}
.test-cmd:hover{background:#252b42}
.test-cmd::after{content:'click to copy';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--font);font-size:.6875rem;color:rgba(255,255,255,.4);font-weight:500}
.test-cmd.copied::after{content:'copied!';color:#a5d6a7}

/* CONTROLS */
.controls{flex-shrink:0;padding:12px 24px 20px;display:flex;gap:12px;justify-content:space-between;align-items:center}
.btn{padding:12px 28px;border-radius:var(--radius-sm);font-family:var(--font);font-weight:700;font-size:.9375rem;border:none;cursor:pointer;transition:all .2s}
.btn-back{background:transparent;color:var(--text-mid);border:2px solid rgba(26,31,54,.12)}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.btn-next{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(39,65,231,.3)}
.btn-next:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 20px rgba(39,65,231,.4)}
.btn-next:active{transform:translateY(0)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.step-dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(26,31,54,.12);transition:all .3s}
.dot.done{background:var(--accent)}
.dot.current{background:var(--accent);width:24px;border-radius:4px}

/* WIRE ANIMATIONS */
@keyframes drawWire{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 4px rgba(39,65,231,.3))}50%{filter:drop-shadow(0 0 12px rgba(39,65,231,.6))}}

.wire-animated{stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawWire 1.5s ease forwards}
.wire-animated-delay{animation-delay:.5s}
.wire-animated-delay2{animation-delay:1s}
.fade-in{animation:fadeSlideUp .5s ease forwards}
.fade-in-d1{animation-delay:.2s;opacity:0}
.fade-in-d2{animation-delay:.4s;opacity:0}
.fade-in-d3{animation-delay:.6s;opacity:0}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
.glow{animation:glowPulse 2s ease-in-out infinite}

/* COMPONENT STYLES */
.comp-box{fill:var(--bg-card);stroke:var(--bg-dark);stroke-width:2;rx:8}
.comp-box-accent{fill:#e8ecff;stroke:var(--accent);stroke-width:2;rx:8}
.comp-label{font-family:var(--font);font-weight:700;font-size:14px;fill:var(--text)}
.comp-sublabel{font-family:var(--mono);font-weight:600;font-size:11px;fill:var(--text-mid)}
.pin-label{font-family:var(--mono);font-weight:700;font-size:10px}
.pin-dot{r:4}
.ghost{opacity:.15}

/* INTERSTITIAL */
.interstitial{position:fixed;inset:0;z-index:200;background:rgba(26,31,54,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:24px;padding:32px}
.interstitial.show{display:flex}
.interstitial h2{color:#fff;font-size:2rem;font-weight:800;text-align:center}
.interstitial p{color:rgba(255,255,255,.8);font-size:1.125rem;text-align:center;max-width:500px;line-height:1.6}
.interstitial .btn-next{font-size:1.125rem;padding:16px 40px}
.danger-icon{width:80px;height:80px;border-radius:50%;background:var(--danger-border);display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#fff;animation:pulse 1.5s ease infinite}

/* CHECKLIST (step 14) */
.checklist{list-style:none;padding:0}
.checklist li{padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:.9375rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--bg-card);transition:all .2s}
.checklist li:hover{background:#e8ecff}
.checklist li.checked{background:var(--success-bg);color:var(--success-text)}
.checklist li .check-icon{width:20px;height:20px;border-radius:50%;border:2px solid rgba(26,31,54,.2);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:all .2s}
.checklist li.checked .check-icon{background:var(--success-border);border-color:var(--success-border);color:#fff}

/* RESPONSIVE */
@media(max-width:768px){
  .step-title{font-size:1.125rem}
  .controls{padding:8px 16px 16px}
  .info-panel{padding:8px 16px}
  .header{padding:12px 16px 8px}
  .progress-wrap{padding:0 16px 8px}
  .diagram-area{padding:4px 16px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">ELKTRON</div>
  <a href="../hub.html">Hub</a>
  <a href="assembly.html">Assembly</a>
  <a href="wiring-guide.html">Wiring 3D</a>
  <a href="wiring-wizard.html" class="active">Wiring Wizard</a>
</nav>

<div class="wizard">
  <div class="header">
    <div>
      <div class="step-label" id="stepLabel">STEP 1 OF 14</div>
      <div class="step-title" id="stepTitle">Lay Out Your Parts</div>
    </div>
    <div class="step-dots" id="dots"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="diagram-area" id="diagramArea"></div>
  <div class="info-panel" id="infoPanel"></div>
  <div class="controls">
    <button class="btn btn-back" id="btnBack" disabled>Back</button>
    <button class="btn btn-next" id="btnNext">Done — Next Step</button>
  </div>
</div>

<!-- INTERSTITIAL for step 9 -->
<div class="interstitial" id="interstitial">
  <div class="danger-icon">!</div>
  <h2>STOP — Read This Carefully</h2>
  <p>The HC-SR04 ECHO pin outputs <strong>5 volts</strong>. Your Raspberry Pi GPIO pins can only handle <strong>3.3 volts</strong>. Without the voltage divider, you <strong>will fry your Pi</strong>.</p>
  <button class="btn btn-next" onclick="dismissInterstitial()">I Understand — Show Me How</button>
</div>

<script>
const STEPS = [
  // STEP 1 — Parts layout
  {
    title: "Lay Out Your Parts",
    info: `<strong>Before touching a single wire</strong>, lay out every component on your table. Identify each one. This is your inventory check.`,
    why: "If you're missing a part, better to know now than halfway through wiring.",
    diagram: 'parts',
    danger: null,
    test: null
  },
  // STEP 2 — Battery to L298N
  {
    title: "Battery Holder → L298N Power",
    info: `Connect the <strong>red wire (+)</strong> from the 18650 battery holder to the <strong>+12V terminal</strong> on the L298N. Then connect the <strong>black wire (−)</strong> to the <strong>GND terminal</strong>.`,
    why: "This gives the motors their own 7.4V power supply, separate from the Pi.",
    diagram: 'battery-l298n',
    danger: null,
    test: null
  },
  // STEP 3 — Left motors
  {
    title: "Left Motors → L298N Channel A",
    info: `Take the <strong>red wires</strong> from both the Front-Left and Rear-Left motors. <strong>Twist them together</strong>. Push the twisted pair into <strong>OUT1</strong> and tighten the screw. Repeat with <strong>both black wires</strong> into <strong>OUT2</strong>.`,
    why: "Both left motors run in parallel on Channel A — they always spin the same direction together.",
    diagram: 'left-motors',
    danger: null,
    test: null
  },
  // STEP 4 — Right motors
  {
    title: "Right Motors → L298N Channel B",
    info: `Same as the left side. Twist the <strong>red wires</strong> from Front-Right and Rear-Right motors together into <strong>OUT3</strong>. Twist <strong>black wires</strong> into <strong>OUT4</strong>.`,
    why: "Channel B drives the right pair. Left + Right channels give you tank steering.",
    diagram: 'right-motors',
    danger: null,
    test: null
  },
  // STEP 5 — GPIO to L298N control
  {
    title: "Pi GPIO → L298N Control Pins",
    info: `Connect 4 female-to-female jumper wires:<br>
    <strong>GPIO 17</strong> (Pin 11) → <strong>IN1</strong><br>
    <strong>GPIO 27</strong> (Pin 13) → <strong>IN2</strong><br>
    <strong>GPIO 22</strong> (Pin 15) → <strong>IN3</strong><br>
    <strong>GPIO 23</strong> (Pin 16) → <strong>IN4</strong>`,
    why: "These 4 signals tell the L298N which direction to spin each motor pair.",
    diagram: 'gpio-l298n',
    danger: null,
    test: null
  },
  // STEP 6 — Common ground
  {
    title: "Pi GND → L298N GND",
    info: `Connect a jumper wire from any <strong>Pi GND pin</strong> (Pin 6, 9, 14, 20, 25, 30, 34, or 39) to the <strong>GND terminal</strong> on the L298N — the same GND rail where the battery negative is connected.`,
    why: "Without a common ground, the Pi's GPIO signals won't register on the L298N. This is the #1 missed step.",
    diagram: 'common-gnd',
    danger: 'warn',
    callout: "COMMON GROUND is critical. If the motors don't respond to GPIO commands, this is almost always the reason.",
    test: null
  },
  // STEP 7 — HC-SR04 power
  {
    title: "HC-SR04 Power",
    info: `Connect <strong>VCC</strong> on the HC-SR04 to <strong>5V</strong> (Pi Pin 2). Connect <strong>GND</strong> to <strong>GND</strong> (Pi Pin 6).`,
    why: "The ultrasonic sensor needs 5V to operate. It shares the Pi's ground rail.",
    diagram: 'hcsr04-power',
    danger: null,
    test: null
  },
  // STEP 8 — HC-SR04 TRIG
  {
    title: "HC-SR04 TRIG Pin",
    info: `Connect the <strong>TRIG</strong> pin on the HC-SR04 to <strong>GPIO 25</strong> (Pi Pin 22) with a jumper wire.`,
    why: "TRIG sends the ultrasonic pulse. It's a 3.3V output from the Pi — perfectly safe, no resistors needed.",
    diagram: 'hcsr04-trig',
    danger: null,
    test: null
  },
  // STEP 9 — Voltage divider (DANGER STEP)
  {
    title: "HC-SR04 ECHO + Voltage Divider",
    info: `On the breadboard:<br>
    1. ECHO pin → <strong>1kΩ resistor</strong> → row A<br>
    2. From row A, a wire to <strong>GPIO 24</strong> (Pin 18)<br>
    3. From row A, <strong>2kΩ resistor</strong> → GND rail<br><br>
    This creates a voltage divider: 5V × (2k / (1k+2k)) = <strong>3.33V</strong> — safe for the Pi.`,
    why: "The ECHO pin outputs 5V. Pi GPIO is rated for 3.3V max. Without this divider, you risk permanent damage to your Pi.",
    diagram: 'voltage-divider',
    danger: 'danger',
    callout: "DO NOT skip the voltage divider. 5V on a 3.3V GPIO pin can permanently damage your Raspberry Pi.",
    interstitial: true,
    test: `python3 -c "from gpiozero import DistanceSensor; s=DistanceSensor(echo=24,trigger=25); print(f'{s.distance*100:.1f}cm')"`
  },
  // STEP 10 — Pan servo
  {
    title: "Pan Servo Wiring",
    info: `Connect the pan servo (bottom servo on the Arducam pan-tilt platform):<br>
    <strong>Signal (orange/white)</strong> → <strong>GPIO 12</strong> (Pin 32)<br>
    <strong>Power (red)</strong> → <strong>5V</strong> (Pin 4)<br>
    <strong>Ground (brown/black)</strong> → <strong>GND</strong> (Pin 9)`,
    why: "The pan servo rotates the camera left/right to track the person being escorted.",
    diagram: 'pan-servo',
    danger: null,
    test: null
  },
  // STEP 11 — Tilt servo
  {
    title: "Tilt Servo Wiring",
    info: `Connect the tilt servo (top servo on the Arducam platform):<br>
    <strong>Signal (orange/white)</strong> → <strong>GPIO 13</strong> (Pin 33)<br>
    <strong>Power (red)</strong> → <strong>5V</strong> (Pin 2 or 4)<br>
    <strong>Ground (brown/black)</strong> → <strong>GND</strong> (Pin 14)`,
    why: "The tilt servo angles the camera up/down for rack scanning — sweeping bottom to top across 42U racks.",
    diagram: 'tilt-servo',
    danger: null,
    test: `python3 pan_tilt.py --simulate`
  },
  // STEP 12 — Camera CSI
  {
    title: "Camera CSI Ribbon Cable",
    info: `<strong>1.</strong> Gently pull up the black plastic clip on the Pi's <strong>CAM</strong> port.<br>
    <strong>2.</strong> Slide the ribbon cable in — <strong>blue side facing the USB ports</strong>, contacts facing the HDMI ports.<br>
    <strong>3.</strong> Push the clip back down firmly until it clicks.`,
    why: "The CSI connection is fragile. A loose ribbon = 'no camera detected' errors that waste hours to debug.",
    diagram: 'camera-csi',
    danger: 'warn',
    callout: "The clip is fragile — don't force it. Pull straight up gently. If it doesn't slide easily, the cable may be backwards.",
    test: `libcamera-hello --timeout 5000`
  },
  // STEP 13 — Power bank
  {
    title: "Power Bank → Pi USB-C",
    info: `<strong>1.</strong> Plug the <strong>90° USB-C adapter</strong> into the Pi's USB-C port.<br>
    <strong>2.</strong> Connect the <strong>PiSwitch</strong> inline (if you have one).<br>
    <strong>3.</strong> Connect the USB-C cable from the <strong>Anker power bank</strong> to the switch/adapter.`,
    why: "The Pi 5 needs a solid 5V/3A supply. The Anker 10K handles this. The 90° adapter keeps the cable from sticking out.",
    diagram: 'power-bank',
    danger: null,
    test: null
  },
  // STEP 14 — Final verification
  {
    title: "Final Verification Checklist",
    info: `<strong>Tap each item</strong> as you verify it. All connections should be secure. No bare wires touching each other.`,
    why: "One loose wire can mean hours of debugging. Check everything before powering on.",
    diagram: 'checklist',
    danger: null,
    test: `python3 -c "from gpiozero import Robot; r=Robot(left=(17,27),right=(22,23)); r.forward(0.3); import time; time.sleep(1); r.stop()"`
  }
];

const CHECKLIST_ITEMS = [
  "Battery holder red → L298N +12V",
  "Battery holder black → L298N GND",
  "Left motors (FL+RL) → OUT1/OUT2",
  "Right motors (FR+RR) → OUT3/OUT4",
  "GPIO 17 → IN1, GPIO 27 → IN2",
  "GPIO 22 → IN3, GPIO 23 → IN4",
  "Pi GND → L298N GND (common ground)",
  "HC-SR04 VCC → 5V, GND → GND",
  "HC-SR04 TRIG → GPIO 25",
  "HC-SR04 ECHO → voltage divider → GPIO 24",
  "Pan servo → GPIO 12 + 5V + GND",
  "Tilt servo → GPIO 13 + 5V + GND",
  "Camera ribbon → CAM port (blue side out)",
  "Power bank → 90° adapter → PiSwitch → Pi USB-C",
  "No bare wires touching each other",
  "ENA/ENB jumpers ON (on L298N)"
];

let currentStep = parseInt(localStorage.getItem('wiring-wizard-step') || '0');
const diagramArea = document.getElementById('diagramArea');
const infoPanel = document.getElementById('infoPanel');
const btnBack = document.getElementById('btnBack');
const btnNext = document.getElementById('btnNext');
const stepLabel = document.getElementById('stepLabel');
const stepTitle = document.getElementById('stepTitle');
const progressFill = document.getElementById('progressFill');
const dotsContainer = document.getElementById('dots');

// Build dots
for(let i = 0; i < STEPS.length; i++){
  const d = document.createElement('div');
  d.className = 'dot';
  dotsContainer.appendChild(d);
}

function renderStep(idx){
  currentStep = idx;
  localStorage.setItem('wiring-wizard-step', idx);
  const step = STEPS[idx];

  stepLabel.textContent = `STEP ${idx+1} OF ${STEPS.length}`;
  stepTitle.textContent = step.title;
  progressFill.style.width = `${((idx+1)/STEPS.length)*100}%`;

  // Dots
  const dots = dotsContainer.children;
  for(let i = 0; i < dots.length; i++){
    dots[i].className = i < idx ? 'dot done' : i === idx ? 'dot current' : 'dot';
  }

  // Buttons
  btnBack.disabled = idx === 0;
  btnNext.textContent = idx === STEPS.length - 1 ? 'All Done!' : 'Done — Next Step';

  // Show interstitial for step 9
  if(step.interstitial){
    document.getElementById('interstitial').classList.add('show');
  }

  // Diagram
  diagramArea.innerHTML = '';
  const svg = buildDiagram(step.diagram);
  if(svg) diagramArea.appendChild(svg);

  // Info panel
  let html = `<div class="info-box">
    <div class="info-text">${step.info}</div>
    ${step.why ? `<div class="info-why">"${step.why}"</div>` : ''}
    ${step.callout && step.danger === 'warn' ? `<div class="callout callout-warn">${step.callout}</div>` : ''}
    ${step.callout && step.danger === 'danger' ? `<div class="callout callout-danger">${step.callout}</div>` : ''}
    ${step.test ? `<div class="test-cmd" onclick="copyCmd(this)" data-cmd="${step.test.replace(/"/g,'&quot;')}">${step.test}</div>` : ''}
  </div>`;
  infoPanel.innerHTML = html;
}

function dismissInterstitial(){
  document.getElementById('interstitial').classList.remove('show');
}

function copyCmd(el){
  navigator.clipboard.writeText(el.dataset.cmd).then(()=>{
    el.classList.add('copied');
    setTimeout(()=>el.classList.remove('copied'),1500);
  });
}

btnNext.addEventListener('click',()=>{
  if(currentStep < STEPS.length-1) renderStep(currentStep+1);
});
btnBack.addEventListener('click',()=>{
  if(currentStep > 0) renderStep(currentStep-1);
});

// Keyboard nav
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'&&currentStep<STEPS.length-1) renderStep(currentStep+1);
  if(e.key==='ArrowLeft'&&currentStep>0) renderStep(currentStep-1);
});

// ─── SVG DIAGRAM BUILDER ───
function svg(w,h,content){
  const el = document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.setAttribute('viewBox',`0 0 ${w} ${h}`);
  el.setAttribute('width',w);
  el.setAttribute('height',h);
  el.innerHTML = content;
  return el;
}

function compRect(x,y,w,h,label,sublabel,accent){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${accent?'comp-box-accent':'comp-box'}" />
    <text x="${x+w/2}" y="${y+h/2-6}" text-anchor="middle" class="comp-label">${label}</text>
    ${sublabel?`<text x="${x+w/2}" y="${y+h/2+10}" text-anchor="middle" class="comp-sublabel">${sublabel}</text>`:''}`;
}

function pin(x,y,color,label,side){
  const tx = side==='right' ? x+10 : x-10;
  const anchor = side==='right' ? 'start' : 'end';
  return `<circle cx="${x}" cy="${y}" class="pin-dot" fill="${color}" />
    <text x="${tx}" y="${y+4}" text-anchor="${anchor}" class="pin-label" fill="${color}">${label}</text>`;
}

function wire(x1,y1,x2,y2,color,cls){
  const mx = (x1+x2)/2;
  return `<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" class="${cls||'wire-animated'}" />`;
}

function wireStraight(x1,y1,x2,y2,color,cls){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="3" stroke-linecap="round" class="${cls||'wire-animated'}" />`;
}

function wireL(x1,y1,x2,y2,color,cls){
  return `<path d="M${x1},${y1} L${x2},${y1} L${x2},${y2}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" class="${cls||'wire-animated'}" />`;
}

function arrowLabel(x,y,text,color){
  return `<text x="${x}" y="${y}" text-anchor="middle" font-family="var(--font)" font-weight="700" font-size="12" fill="${color||'var(--accent)'}" class="pop-in">${text}</text>`;
}
